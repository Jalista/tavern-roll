const {useState,useEffect,useRef,Component}=React;
const FB="https://incitavernroll-default-rtdb.europe-west1.firebasedatabase.app";
const fbGet=async p=>{try{const r=await fetch(`${FB}/${p}.json`);return await r.json();}catch(e){console.error("fbGet",p,e);return null;}};
const fbSet=async(p,v)=>{try{const r=await fetch(`${FB}/${p}.json`,{method:"PUT",body:JSON.stringify(v)});if(!r.ok)throw new Error(`HTTP ${r.status}`);return true;}catch(e){console.error("fbSet",p,e);return false;}};
const fbPatch=async(p,v)=>{try{await fetch(`${FB}/${p}.json`,{method:"PATCH",body:JSON.stringify(v)});}catch(e){console.error("fbPatch",p,e);}};
const fbDel=async p=>{try{await fetch(`${FB}/${p}.json`,{method:"DELETE"});}catch(e){console.error("fbDel",p,e);}};
const fbListen=(path,cb)=>{
  const es=new EventSource(`${FB}/${path}.json`);
  es.addEventListener("put",e=>{try{cb(JSON.parse(e.data).data);}catch(err){console.error("fbListen parse",err);}});
  es.onerror=e=>{console.warn("fbListen error",path,e);};
  return()=>es.close();
};

// ─── ERROR BOUNDARY ──────────────────────────────────────────────────────────
class ErrorBoundary extends Component{
  constructor(props){super(props);this.state={error:null,info:null};}
  static getDerivedStateFromError(error){return{error};}
  componentDidCatch(error,info){
    console.error("ErrorBoundary caught:",error,info);
    this.setState({info});
  }
  render(){
    const {error,info}=this.state;
    if(error) return(
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0d0705",padding:20}}>
        <div style={{background:"#1e1710",border:"1px solid rgba(139,26,26,.5)",borderRadius:10,padding:32,maxWidth:500,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,.6)"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.1rem",color:"#ff6060",marginBottom:12,letterSpacing:".1em"}}>⚠ Bir Hata Oluştu</div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",letterSpacing:".15em",color:"rgba(200,149,42,.6)",textTransform:"uppercase",marginBottom:8}}>Hata Detayı</div>
          <pre style={{background:"#0d0705",border:"1px solid rgba(200,149,42,.15)",borderRadius:6,padding:12,fontSize:".78rem",color:"var(--text-mid)",overflowX:"auto",marginBottom:16,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
            {error.toString()}
            {info&&info.componentStack?"\n\nKonum:"+info.componentStack.split("\n").slice(0,5).join("\n"):""}
          </pre>
          <button
            onClick={()=>{this.setState({error:null,info:null});}}
            style={{background:"rgba(200,149,42,.12)",border:"1px solid rgba(200,149,42,.4)",borderRadius:5,color:"var(--gold-light)",fontFamily:"'Cinzel',serif",fontSize:".75rem",letterSpacing:".12em",padding:"10px 20px",cursor:"pointer",width:"100%",textTransform:"uppercase"}}>
            ↺ Yeniden Dene
          </button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

.moves-info{background:rgba(200,149,42,.06);border:1px solid rgba(200,149,42,.15);border-radius:6px;padding:10px 12px;margin-bottom:12px;display:flex;gap:16px;flex-wrap:wrap}

/* Notebooks */
.nb-actions{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.nb-action-btn{flex:1;min-width:140px;background:var(--bg2);border:1px solid var(--border-gold);border-radius:6px;color:var(--gold-light);font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;padding:12px 8px;cursor:pointer;transition:all .2s;text-transform:uppercase;text-align:center}
.nb-action-btn:hover{background:rgba(200,149,42,.15);box-shadow:0 0 12px rgba(200,149,42,.15)}
.nb-form{background:var(--bg1);border:1px solid var(--border-gold);border-radius:8px;padding:16px;margin-bottom:14px}
.nb-form h4{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:12px}
.nb-input{width:100%;background:var(--bg2);border:1px solid rgba(200,149,42,.25);border-radius:4px;color:var(--text);font-family:'Crimson Text',serif;font-size:1rem;padding:8px 10px;outline:none;margin-bottom:8px}
.nb-input:focus{border-color:var(--gold)}
.nb-input::placeholder{color:var(--text-dim)}
.nb-btn{background:rgba(200,149,42,.1);border:1px solid rgba(200,149,42,.35);border-radius:4px;color:var(--gold-light);font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;padding:8px 16px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.nb-btn:hover{background:rgba(200,149,42,.2)}
.nb-btn.cancel{background:transparent;border-color:rgba(200,149,42,.2);color:var(--text-dim)}

.nb-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.nb-item{background:var(--bg1);border:1px solid rgba(200,149,42,.2);border-radius:6px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s}
.nb-item:hover{border-color:var(--gold-light);background:rgba(200,149,42,.06)}
.nb-item.active{border-color:#f0c060;background:rgba(200,149,42,.1);box-shadow:0 0 10px rgba(200,149,42,.15)}
.nb-item-icon{font-size:1.4rem}
.nb-item-body{flex:1}
.nb-item-name{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold-light);font-weight:600}
.nb-item-meta{font-size:.75rem;color:var(--text-dim);margin-top:2px;font-style:italic}
.nb-item-lock{font-size:.85rem;opacity:.5}
.nb-editor{background:var(--bg1);border:1px solid rgba(200,149,42,.2);border-radius:8px;overflow:hidden}
.nb-editor-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(200,149,42,.12);background:rgba(200,149,42,.04)}
.nb-editor-title{font-family:'Cinzel',serif;font-size:.78rem;color:var(--gold-light);font-weight:600}
.nb-editor-meta{font-size:.7rem;color:var(--text-dim);font-style:italic}
.nb-editor-close{background:transparent;border:1px solid rgba(200,149,42,.2);border-radius:3px;color:var(--text-dim);font-family:'Cinzel',serif;font-size:.6rem;padding:3px 8px;cursor:pointer}
.nb-editor-close:hover{border-color:var(--gold);color:var(--gold)}
.nb-textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:'Crimson Text',serif;font-size:1.05rem;padding:14px;outline:none;resize:none;line-height:1.7;min-height:260px}
.nb-footer{padding:6px 14px;border-top:1px solid rgba(200,149,42,.08);display:flex;justify-content:space-between;align-items:center}
.nb-wordcount{font-size:.72rem;color:var(--text-dim);font-style:italic}
.nb-save-ind{font-size:.72rem;color:rgba(200,149,42,.5);font-style:italic;transition:color .3s}
.nb-save-ind.ok{color:#3cb454}
.nb-lock-overlay{display:flex;flex-direction:column;align-items:center;gap:12px;padding:28px 20px;text-align:center}
.nb-lock-icon{font-size:2.5rem;opacity:.6}
.nb-lock-title{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase}
.nb-err{color:#ff6060;font-size:.78rem;font-style:italic}
.nb-dm-row{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:rgba(139,26,26,.06);border:1px solid rgba(139,26,26,.15);border-radius:5px;margin-bottom:6px}
.nb-dm-info{flex:1}
.nb-dm-name{font-family:'Cinzel',serif;font-size:.75rem;color:#ffaaaa;font-weight:600}
.nb-dm-pass{font-size:.78rem;color:rgba(var(--text-rgb,245,230,200),.45);font-style:italic;margin-top:2px}
.dmo{background:rgba(139,26,26,.08);border:1px solid rgba(139,26,26,.2);border-radius:5px;padding:8px 14px;margin-bottom:16px;font-size:.8rem;color:rgba(var(--text-rgb,245,230,200),.45);font-style:italic;text-align:center}
.cb{background:var(--bg1);border:1px solid rgba(200,149,42,.18);border-radius:8px;padding:14px;margin-bottom:12px}
.cr{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.ch{flex:1;min-width:120px}
.cl{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;display:block}
.cl.f{color:#4caf7d}.cl.z{color:#5b9bd5}
.pr{display:flex;gap:7px}
.pip{width:32px;height:32px;border-radius:50%;border:2px solid;cursor:pointer;transition:all .2s;background:transparent}
.pip:disabled{cursor:not-allowed;opacity:.5}
.pip.fe{border-color:rgba(76,175,125,.35)}.pip.fe:hover:not(:disabled){border-color:#4caf7d;background:rgba(76,175,125,.1)}
.pip.ff{border-color:#4caf7d;background:#4caf7d;box-shadow:0 0 10px rgba(76,175,125,.4)}
.pip.ze{border-color:rgba(91,155,213,.35)}.pip.ze:hover:not(:disabled){border-color:#5b9bd5;background:rgba(91,155,213,.1)}
.pip.zf{border-color:#5b9bd5;background:#5b9bd5;box-shadow:0 0 10px rgba(91,155,213,.4)}
.cdv{width:1px;background:rgba(200,149,42,.12);align-self:stretch;margin:0 4px}
.ncw{margin:6px 0 10px}
.ncr{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.ncl{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.1em;width:60px}
.ncl.f{color:#4caf7d}.ncl.z{color:#5b9bd5}
.np{width:22px;height:22px;border-radius:50%;border:1.5px solid;cursor:pointer;transition:all .18s;background:transparent}
.np:disabled{cursor:not-allowed;opacity:.5}
.np.fe{border-color:rgba(76,175,125,.3)}.np.fe:hover:not(:disabled){border-color:#4caf7d;background:rgba(76,175,125,.15)}
.np.ff{border-color:#4caf7d;background:#4caf7d;box-shadow:0 0 8px rgba(76,175,125,.4)}
.np.ze{border-color:rgba(91,155,213,.3)}.np.ze:hover:not(:disabled){border-color:#5b9bd5;background:rgba(91,155,213,.15)}
.np.zf{border-color:#5b9bd5;background:#5b9bd5;box-shadow:0 0 8px rgba(91,155,213,.4)}
.mpr{display:flex;gap:4px}
.mp{width:10px;height:10px;border-radius:50%;border:1px solid}
.mp.ff{border-color:#4caf7d;background:#4caf7d}.mp.fe{border-color:rgba(76,175,125,.3);background:transparent}
.mp.zf{border-color:#5b9bd5;background:#5b9bd5}.mp.ze{border-color:rgba(91,155,213,.3);background:transparent}
.nl{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.nc{background:var(--bg1);border:1px solid rgba(200,149,42,.15);border-radius:8px;padding:14px;transition:border-color .2s}
.nc:hover{border-color:rgba(200,149,42,.3)}.nc.dead{opacity:.5;filter:grayscale(.5)}
.nr2{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.nn{font-family:'Cinzel',serif;font-size:1rem;color:#f0c060;font-weight:600}
.badge{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.08em;padding:3px 8px;border-radius:2px;border:1px solid}
.be{border-color:#8b1a1a;color:#ff8080;background:rgba(139,26,26,.12)}
.ba{border-color:rgba(60,180,80,.4);color:#7ef0a0;background:rgba(60,180,80,.07)}
.bn{border-color:rgba(200,149,42,.4);color:#c8952a;background:rgba(200,149,42,.07)}
.ns{font-size:.78rem;color:var(--text-dim);margin-bottom:8px}
.nnt{font-size:.82rem;color:rgba(var(--text-rgb,245,230,200),.45);font-style:italic;margin-bottom:8px}
.nct{display:flex;gap:6px;flex-wrap:wrap}
.nbtn{background:var(--bg2);border:1px solid rgba(200,149,42,.15);color:var(--text-mid);font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.05em;padding:5px 11px;cursor:pointer;border-radius:3px;transition:all .15s}
.nbtn.rm:hover{border-color:#8b1a1a;color:#ff9090}
.danger-btn{background:rgba(139,26,26,.1);border:1px solid rgba(139,26,26,.35);border-radius:4px;color:#ff9090;font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.1em;padding:8px 16px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.danger-btn:hover{background:rgba(139,26,26,.2);border-color:#c03030}
.confirm-box{background:#1e1710;border:1px solid rgba(139,26,26,.4);border-radius:8px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.confirm-box span{font-size:.9rem;color:rgba(var(--text-rgb,245,230,200),.7);font-style:italic}
.confirm-btns{display:flex;gap:8px}
.yes-btn{background:rgba(139,26,26,.15);border:1px solid #c03030;border-radius:4px;color:#ff9090;font-family:'Cinzel',serif;font-size:.68rem;padding:6px 14px;cursor:pointer;transition:all .15s;text-transform:uppercase}
.yes-btn:hover{background:rgba(139,26,26,.3)}
.no-btn{background:rgba(200,149,42,.08);border:1px solid rgba(200,149,42,.3);border-radius:4px;color:var(--text-mid);font-family:'Cinzel',serif;font-size:.68rem;padding:6px 14px;cursor:pointer;transition:all .15s;text-transform:uppercase}
.no-btn:hover{border-color:#c8952a;color:#f0c060}
.dm-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:12px;background:rgba(139,26,26,.05);border:1px solid rgba(139,26,26,.15);border-radius:6px}
.an{background:var(--bg1);border:1px dashed rgba(200,149,42,.2);border-radius:8px;padding:16px}
.an h3{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.15em;color:#c8952a;margin-bottom:12px;text-transform:uppercase}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fin{background:var(--bg2);border:1px solid rgba(200,149,42,.2);border-radius:4px;color:var(--text);font-family:'Crimson Text',serif;font-size:.95rem;padding:6px 10px;outline:none;width:100%}
.fin:focus{border-color:var(--gold)}.fin option{background:var(--bg1)}
.ab{background:rgba(200,149,42,.1);border:1px solid rgba(200,149,42,.35);border-radius:4px;color:#f0c060;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.12em;padding:9px 20px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.ab:hover{background:rgba(200,149,42,.18)}
.em{text-align:center;padding:28px;color:rgba(var(--text-rgb,245,230,200),.25);font-style:italic}
.floating-nb{position:fixed;bottom:148px;right:22px;width:320px;max-height:480px;background:var(--bg1);border:1px solid rgba(200,149,42,.35);border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.7);z-index:498;display:flex;flex-direction:column;animation:chat-in .2s ease-out;overflow:hidden}
.floating-nb-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(200,149,42,.12);flex-shrink:0;cursor:move;background:rgba(200,149,42,.04)}
.floating-nb-title{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase}
.floating-nb-body{flex:1;overflow-y:auto;padding:10px}
.nb-float-btn{position:fixed;bottom:84px;right:22px;z-index:500}
.nb-float-toggle{width:52px;height:52px;border-radius:50%;background:rgba(200,149,42,.12);border:2px solid rgba(200,149,42,.5);color:var(--gold-light);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .2s;position:relative}
.nb-float-toggle:hover{background:rgba(200,149,42,.25);transform:scale(1.05)}
.nb-float-badge{position:absolute;top:-4px;right:-4px;background:#f0c060;color:#0d0705;border-radius:50%;width:18px;height:18px;font-size:.6rem;font-family:'Cinzel',serif;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg0)}
.boss-npc{background:rgba(20,5,5,.98)!important;box-shadow:0 0 20px rgba(180,40,40,.25);animation:boss-border 3s ease-in-out infinite}
@keyframes boss-border{0%,100%{border-color:rgba(200,149,42,.8)}50%{border-color:rgba(180,40,40,.9)}}
.boss-npc .nn{background:linear-gradient(90deg,#c8952a,#8b1a1a,#c8952a);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:boss-text 3s ease-in-out infinite}
@keyframes boss-text{0%,100%{background-position:0%}50%{background-position:100%}}
.mc.boss-card{animation:boss-border 3s ease-in-out infinite}
.mc.boss-card .mnm{background:linear-gradient(90deg,#c8952a,#8b1a1a,#c8952a);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:boss-text 3s ease-in-out infinite}
.em span{display:block;font-size:2rem;margin-bottom:8px;opacity:.3}
.mw{max-width:860px;margin:0 auto;padding:0 18px 20px}
.mh{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.22em;color:rgba(200,149,42,.5);text-transform:uppercase;border-bottom:1px solid rgba(200,149,42,.1);padding-bottom:5px;margin-bottom:10px}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px}
.mc{border-radius:7px;padding:10px 12px 9px;border:1px solid;position:relative;overflow:hidden;transition:all .3s}
/* Hasar rengi — 0 pip kaldıkça koyulaşır */
.mc.dmg1{box-shadow:inset 0 0 12px rgba(180,40,40,.15)}
.mc.dmg2{box-shadow:inset 0 0 20px rgba(180,40,40,.3);border-color:rgba(180,40,40,.5)!important}
.mc.dmg3{box-shadow:inset 0 0 30px rgba(180,40,40,.5);border-color:#8b1a1a!important;animation:dmg-pulse 2s ease-in-out infinite}
@keyframes dmg-pulse{0%,100%{box-shadow:inset 0 0 30px rgba(180,40,40,.5)}50%{box-shadow:inset 0 0 40px rgba(180,40,40,.8)}}
/* Mp pip butonları */
.mp{width:12px;height:12px;border-radius:50%;border:1.5px solid;cursor:pointer;transition:all .15s}
.mp:hover{transform:scale(1.25)}
.mp:disabled{cursor:default}
.mp.ff{border-color:#4caf7d;background:#4caf7d}.mp.fe{border-color:rgba(76,175,125,.3)}.mp.fe:hover{border-color:#4caf7d;background:rgba(76,175,125,.2)}
.mp.zf{border-color:#5b9bd5;background:#5b9bd5}.mp.ze{border-color:rgba(91,155,213,.3)}.mp.ze:hover{border-color:#5b9bd5;background:rgba(91,155,213,.2)}
.mc::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(255,255,255,.04),transparent 70%);pointer-events:none}
.mc:hover{transform:translateY(-1px)}
.mc.player{background:var(--bg1);border-color:rgba(200,149,42,.35)}
.mc.player.me{border-color:#f0c060;border-width:2px;box-shadow:0 0 12px rgba(240,192,96,.2)}
.ts{font-size:.62rem;color:rgba(var(--text-rgb,245,230,200),.3);margin-left:auto;white-space:nowrap}

/* Avatar */
.avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px}
.avatar-img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);box-shadow:0 0 14px rgba(200,149,42,.3)}
.avatar-placeholder{width:80px;height:80px;border-radius:50%;background:var(--bg2);border:2px dashed rgba(200,149,42,.3);display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;transition:all .2s}
.avatar-placeholder:hover{border-color:var(--gold);background:rgba(200,149,42,.08)}
.avatar-upload-btn{background:transparent;border:1px solid rgba(200,149,42,.25);border-radius:4px;color:var(--text-dim);font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.08em;padding:4px 12px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.avatar-upload-btn:hover{border-color:var(--gold);color:var(--gold)}

/* Chat bubble */
.chat-bubble{position:fixed;bottom:22px;right:22px;z-index:500}
.chat-toggle{width:52px;height:52px;border-radius:50%;background:rgba(200,149,42,.15);border:2px solid var(--gold);color:var(--gold-light);font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .2s;position:relative}
.chat-toggle:hover{background:rgba(200,149,42,.25);transform:scale(1.05)}
.chat-badge{position:absolute;top:-4px;right:-4px;background:#e05050;color:#fff;border-radius:50%;width:18px;height:18px;font-size:.65rem;font-family:'Cinzel',serif;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg0);animation:badge-pop .3s ease-out}
@keyframes badge-pop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}

/* Chat panel */
.chat-panel{position:fixed;bottom:84px;right:22px;width:320px;max-height:480px;background:var(--bg1);border:1px solid rgba(200,149,42,.3);border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.7);z-index:499;display:flex;flex-direction:column;animation:chat-in .2s ease-out}
@keyframes chat-in{0%{opacity:0;transform:translateY(12px) scale(.97)}100%{opacity:1;transform:translateY(0) scale(1)}}
@media(max-width:400px){.chat-panel{width:calc(100vw - 32px);right:16px}}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(200,149,42,.12);flex-shrink:0}
.chat-header-title{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase}
.chat-header-close{background:transparent;border:none;color:var(--text-dim);font-size:1rem;cursor:pointer;padding:2px 6px}
.chat-header-close:hover{color:var(--gold)}
.chat-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:0}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(200,149,42,.2);border-radius:2px}
.chat-msg{display:flex;gap:8px;align-items:flex-start}
.chat-msg.mine{flex-direction:row-reverse}
.chat-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid rgba(200,149,42,.3);flex-shrink:0}
.chat-avatar-placeholder{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid rgba(200,149,42,.2);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.chat-bubble-body{max-width:70%}
.chat-sender{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.06em;color:var(--gold);margin-bottom:3px}
.chat-msg.mine .chat-sender{text-align:right}
.chat-text{background:var(--bg2);border:1px solid rgba(200,149,42,.15);border-radius:8px;border-top-left-radius:2px;padding:7px 10px;font-size:.88rem;color:var(--text);line-height:1.4;word-break:break-word}
.chat-msg.mine .chat-text{background:rgba(200,149,42,.1);border-color:rgba(200,149,42,.25);border-radius:8px;border-top-right-radius:2px}
.chat-whisper .chat-text{background:rgba(139,26,26,.12);border-color:rgba(139,26,26,.3);font-style:italic}
.chat-whisper .chat-sender::before{content:"🤫 ";font-style:normal}
.chat-time{font-size:.6rem;color:var(--text-dim);margin-top:3px}
.chat-msg.mine .chat-time{text-align:right}

// saglik = dolu pip sayısı (max=tam sağlıklı, 0=ölü)
function PipBar({type,saglik,maxPips,onChange,disabled}){
  const c=type==="fiziksel"?"f":"z";
  const max=maxPips||3;
  return <div className="ch">
    <span className={`cl ${c}`}>{type==="fiziksel"?"⚔ Beden":"🧠 Zihin"}</span>
    <div className="pr">{Array.from({length:max}).map((_,i)=>{
      const dolu=i<saglik;
      return <button key={i} className={`pip ${c}${dolu?"f":"e"}`} disabled={disabled}
        onClick={()=>{ if(dolu) onChange(saglik-1===i?saglik-1:saglik-1); else onChange(i+1); }}
      />;
    })}</div>
  </div>;
}
function NpcPips({type,saglik,maxPips,onChange,disabled}){
  const c=type==="fiziksel"?"f":"z";
  const max=maxPips||3;
  return <div className="ncr">
    <span className={`ncl ${c}`}>{type==="fiziksel"?"Beden":"Zihin"}</span>
    {Array.from({length:max}).map((_,i)=>{
      const dolu=i<saglik;
      return <button key={i} className={`np ${c}${dolu?"f":"e"}`} disabled={disabled}
        onClick={()=>{ onChange(dolu?saglik-1:i+1); }}
      />;
    })}
  </div>;
}
function MPs({type,saglik,maxPips,onChange,disabled}){
  const c=type==="fiziksel"?"f":"z";
  const max=maxPips||3;
  return <div className="mpr" style={{gap:4}}>
    {Array.from({length:max}).map((_,i)=>(
      <button key={i}
        className={`mp ${c}${i<saglik?"f":"e"}`}
        disabled={disabled}
        onClick={onChange?()=>onChange(i<saglik?saglik-1:i+1):undefined}
        style={{cursor:onChange&&!disabled?"pointer":"default",width:14,height:14,border:"none",padding:0,borderRadius:"50%",transition:"all .15s",outline:"none"}}
      />
    ))}
  </div>;
}

function Masa({me,role,char,npcs,all,avatars,onPipChange,onNpcPipChange}){
  const tl={player:"OYUNCU",ally:"MÜTTEFİK",neutral:"TARAFSIZ",enemy:"DÜŞMAN"};
  const isDM=role==="dm";

  const myCard=isDM?null:{
    key:`p-${me}`, type:"player", isMe:true,
    name:char.name||me,
    sub:[char.race,char.level?`Seviye ${char.level}`:null].filter(Boolean).join(" · ")||"—",
    fiziksel:char.fiziksel!=null?char.fiziksel:3, zihinsel:char.zihinsel!=null?char.zihinsel:3,
    fizMax:3, zihMax:3, pname:me,
    dead:(char.fiziksel!=null?char.fiziksel:3)<=0&&(char.zihinsel!=null?char.zihinsel:3)<=0
  };

  const otherPCs=all.filter(p=>p.name!==me&&p.role!=="dm").map(p=>{
    const c=p.char||{};
    return{key:`p-${p.name}`,type:"player",isMe:false,
      name:c.name||p.name,
      sub:[c.race,c.level?`Seviye ${c.level}`:null].filter(Boolean).join(" · ")||"—",
      fiziksel:c.fiziksel!=null?c.fiziksel:3,zihinsel:c.zihinsel!=null?c.zihinsel:3,
      fizMax:3,zihMax:3,pname:p.name,
      dead:(c.fiziksel!=null?c.fiziksel:3)<=0&&(c.zihinsel!=null?c.zihinsel:3)<=0};
  });

  const npcCards=npcs.map(n=>({key:`n-${n.id}`,type:n.type,isMe:false,name:n.name,boss:n.boss||false,
    sub:`ZS ${n.ac} · CR ${n.cr}${n.boss?" · BOSS":""}`,
    fiziksel:n.fiziksel!=null?n.fiziksel:(n.fizMax||3),
    zihinsel:n.zihinsel!=null?n.zihinsel:(n.zihMax||3),
    fizMax:n.fizMax||3,zihMax:n.zihMax||3,npcId:n.id,
    dead:(n.fiziksel!=null?n.fiziksel:(n.fizMax||3))<=0&&(n.zihinsel!=null?n.zihinsel:(n.zihMax||3))<=0}));

  const ord={ally:1,neutral:2,enemy:3};
  const others=[...otherPCs,...npcCards].sort((a,b)=>(ord[a.type]||0)-(ord[b.type]||0));
  const cards=[myCard,...others].filter(Boolean);

  if(!cards.length)return null;
  return <div className="mw">
    <div className="mh">⚔ Masa Durumu</div>
    <div className="mg">{cards.map(card=>{
      // Pip değişiklik yetkileri
      const canEdit=isDM||(card.isMe&&onPipChange);
      const onFiz=canEdit?(v=>card.npcId?onNpcPipChange&&onNpcPipChange(card.npcId,"fiziksel",v):onPipChange&&onPipChange(card.pname||me,"fiziksel",v)):null;
      const onZih=canEdit?(v=>card.npcId?onNpcPipChange&&onNpcPipChange(card.npcId,"zihinsel",v):onPipChange&&onPipChange(card.pname||me,"zihinsel",v)):null;
      const fiz=card.fiziksel!=null?card.fiziksel:(card.fizMax||3);
      const zih=card.zihinsel!=null?card.zihinsel:(card.zihMax||3);
      const fmax=card.fizMax||3; const zmax=card.zihMax||3;
      const healthPct=((fiz+zih)/(fmax+zmax));
      const dmgClass=card.dead?"":(healthPct<=0.33?" dmg3":healthPct<=0.66?" dmg2":healthPct<1?" dmg1":"");
      return <div key={card.key} className={`mc ${card.type}${card.dead?" dead":""}${card.isMe?" me":""}${card.boss?" boss-card":""}${dmgClass}`}>
        {card.dead&&<span className="sku">💀</span>}
        {card.type==="player"&&avatars&&avatars[card.key.replace("p-","")]&&
          <img src={avatars[card.key.replace("p-","")]} style={{width:32,height:32,borderRadius:"50%",objectFit:"cover",border:"1px solid rgba(200,149,42,.4)",marginBottom:5}} alt=""/>}
        <div className="mtg">{card.isMe?"👤 SEN":card.boss?"💀 BOSS":tl[card.type]}</div>
        <div className="mnm">{card.name}</div>
        <div className="msb">{card.sub}</div>
        <div style={{display:"flex",flexDirection:"column",gap:5,marginTop:6}}>
          <MPs type="fiziksel" saglik={card.fiziksel} maxPips={card.fizMax||3} onChange={onFiz} disabled={!canEdit}/>
          <MPs type="zihinsel" saglik={card.zihinsel} maxPips={card.zihMax||3} onChange={onZih} disabled={!canEdit}/>
        </div>
        {card.ac&&<div style={{fontSize:".65rem",color:"rgba(var(--text-rgb,245,230,200),.3)",marginTop:5}}>ZS {card.ac}</div>}
      </div>;
    })}
    </div>
  </div>;
}

function Smoke(){
  const [puffs,setPuffs]=useState([]);
  useEffect(()=>{
    const cx=window.innerWidth/2;
    const cy=window.innerHeight*0.4;
    const colors=["#1a0a0a","#2d0d0d","#3a1a1a","#1c1010","#0d0505","#2a1515","#150808","#241212"];
    const count=28;
    const newPuffs=Array.from({length:count},(_,i)=>{
      const angle=(i/count)*Math.PI*2+(Math.random()-0.5)*0.6;
      const dist=60+Math.random()*180;
      const dx=Math.cos(angle)*dist*(0.7+Math.random()*0.6);
      const dy=Math.sin(angle)*dist*(0.5+Math.random()*0.5)-Math.random()*60;
      const size=40+Math.random()*90;
      return{
        id:i,
        x:cx+Math.random()*80-40,
        y:cy+Math.random()*40-20,
        dx,dy,
        size,
        color:colors[i%colors.length],
        blur:8+Math.random()*16,
        scale:2+Math.random()*2.5,
        dur:1.4+Math.random()*0.8,
        delay:Math.random()*0.25,
      };
    });
    setPuffs(newPuffs);
    const t=setTimeout(()=>setPuffs([]),2400);
    return()=>clearTimeout(t);
  },[]);
  return <>
    <div className="smoke-flash"/>
    <div className="smoke-overlay">
      {puffs.map(p=><div key={p.id} className="smoke-puff" style={{
        left:p.x, top:p.y,
        width:p.size, height:p.size,
        marginLeft:-p.size/2, marginTop:-p.size/2,
        background:`radial-gradient(circle,${p.color} 0%,transparent 70%)`,
        '--dx':`${p.dx}px`,'--dy':`${p.dy}px`,
        '--blur':`${p.blur}px`,'--sc':p.scale,'--dur':`${p.dur}s`,
        animationDelay:`${p.delay}s`,
      }}/>)}
    </div>
  </>;
}

function Fireworks(){
  const [sparks,setSparks]=useState([]);
  useEffect(()=>{
    const colors=["#ffd700","#ff6b35","#f7c59f","#efefd0","#4ecdc4","#ff6b6b","#c7f2a4","#e8d5b7"];
    const count=60;
    const cx=window.innerWidth/2, cy=window.innerHeight*0.35;
    const newSparks=Array.from({length:count},(_,i)=>{
      const angle=(i/count)*Math.PI*2;
      const dist=80+Math.random()*220;
      const dx=Math.cos(angle)*dist*(0.6+Math.random()*0.8);
      const dy=Math.sin(angle)*dist*(0.6+Math.random()*0.8)-Math.random()*80;
      return{id:i,x:cx+Math.random()*60-30,y:cy+Math.random()*40-20,dx,dy,color:colors[i%colors.length],size:4+Math.random()*6,delay:Math.random()*0.3};
    });
    setSparks(newSparks);
    const t=setTimeout(()=>setSparks([]),1600);
    return()=>clearTimeout(t);
  },[]);
  return <div className="fireworks">
    {sparks.map(s=><div key={s.id} className="spark" style={{
      left:s.x,top:s.y,width:s.size,height:s.size,
      background:s.color,boxShadow:`0 0 6px ${s.color}`,
      '--dx':`${s.dx}px`,'--dy':`${s.dy}px`,
      animationDelay:`${s.delay}s`,animationDuration:"1.2s"
    }}/>)}
  </div>;
}

function HistoryModal({feed,onClose}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}} onClick={onClose}>
    <div style={{background:"#1e1710",border:"1px solid rgba(200,149,42,0.3)",borderRadius:10,padding:"24px",width:"100%",maxWidth:520,maxHeight:"80vh",display:"flex",flexDirection:"column",gap:0}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:".75rem",letterSpacing:".18em",color:"var(--gold)",textTransform:"uppercase"}}>📜 Zar Geçmişi</span>
        <button onClick={onClose} style={{background:"transparent",border:"1px solid rgba(200,149,42,0.2)",borderRadius:4,color:"rgba(var(--text-rgb,245,230,200),0.5)",fontFamily:"'Cinzel',serif",fontSize:".65rem",padding:"4px 10px",cursor:"pointer"}}>✕ Kapat</button>
      </div>
      <div style={{overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
        {feed.map((r,i)=>{
          const c=r.sides===20&&r.raw===20?"crit":r.sides===20&&r.raw===1?"fum":"";
          return <div key={r.id} className={`fi${i===0?" nr":""}`}>
            <span className="fdie">{DI[r.sides]||"🎲"}</span>
            <div className="fb"><div className="fp">{r.skillName||r.player}<span className="ts">{fmtTime(r.time||r.id)}</span></div><div className="fd">{r.skillName?r.player+" · ":""}d{r.sides} = {r.raw}{r.modifier!==0?` + (${r.modifier>0?"+":""}${r.modifier})`:""}{c==="crit"?" ✨ Crit!":c==="fum"?" 💀 Fail!":""}</div></div>
            <div className={`fv ${c}`}>{r.total}</div>
          </div>;
        })}
      </div>
    </div>
  </div>;
}

function Dice({me,role,char,npcs,all,rolls,onRoll,animOn,avatars,onPipChange,onNpcPipChange}){
  const [mod,setMod]=useState("0");
  const [showFW,setShowFW]=useState(false);
  const [showSmoke,setShowSmoke]=useState(false);
  const [showHistory,setShowHistory]=useState(false);
  const [showSkillPicker,setShowSkillPicker]=useState(false);
  const {latest,feed,akey}=rolls;
  const ic=(latest&&latest.sides)===20&&(latest&&latest.raw)===20;
  const fu=(latest&&latest.sides)===20&&(latest&&latest.raw)===1;

  const prevAkey=useRef(0);
  const clickTimer=useRef(null);

  useEffect(()=>{
    if(akey!==prevAkey.current){
      prevAkey.current=akey;
      if(ic&&animOn){ setShowFW(true); setTimeout(()=>setShowFW(false),1600); }
      if(fu&&animOn){ setShowSmoke(true); setTimeout(()=>setShowSmoke(false),2400); }
    }
  },[akey,ic,fu]);

  const roll=async(s,skillMod,skillName)=>{
    const raw=Math.floor(Math.random()*s)+1;
    const m=skillMod!=null?skillMod:(parseInt(mod)||0);
    const label=skillName||null;
    await onRoll({sides:s,raw,modifier:m,total:raw+m,skillName:label});
    setShowSkillPicker(false);
  };

  // d20 tek tık → skill picker aç, çift tık → düz at
  const handleD20Click=()=>{
    if(clickTimer.current){
      // Çift tık
      clearTimeout(clickTimer.current);
      clickTimer.current=null;
      roll(20,parseInt(mod)||0,null);
    } else {
      clickTimer.current=setTimeout(()=>{
        clickTimer.current=null;
        setShowSkillPicker(s=>!s);
      },250);
    }
  };

  // Karakterin tüm skill'leri modifier ile
  const charSkills=Object.entries((char&&char.skills)||{})
    .sort((a,b)=>b[1]-a[1])
    .map(([name,lv])=>({name,lv}));

  const isDM=role==="dm";

  return <div className="panel">
    {showFW&&<Fireworks/>}
    {showSmoke&&<Smoke/>}
    <div className="dg">
      {DICE.map(d=>{
        if(d.s===20){
          return <button key={d.s} className="db" onClick={handleD20Click} title="Tek tık: Skill seç | Çift tık: Düz at">
            <span className="di">{d.i}</span>
            <span className="dl">d20</span>
          </button>;
        }
        return <button key={d.s} className="db" onClick={()=>roll(d.s)}><span className="di">{d.i}</span><span className="dl">d{d.s}</span></button>;
      })}
    </div>

    {/* d20 Skill Picker */}
    {showSkillPicker&&(
      <div style={{background:"var(--bg1)",border:"1px solid rgba(200,149,42,.25)",borderRadius:8,padding:12,marginBottom:12,animation:"fp .2s ease-out"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",letterSpacing:".12em",color:"var(--gold)",textTransform:"uppercase"}}>⚔ d20 — Skill Seç</span>
          <button onClick={()=>setShowSkillPicker(false)} style={{background:"transparent",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:".9rem"}}>✕</button>
        </div>
        {charSkills.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".85rem",marginBottom:8}}>Henüz skill eklenmemiş.</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
          {charSkills.map(({name,lv})=>{
            const isFiz=FIZIKSEL_SKILLS.includes(name);
            const isPos=lv>0;
            return(
              <button key={name} onClick={()=>roll(20,lv,name)}
                style={{
                  background:isFiz?"rgba(76,175,125,.08)":"rgba(91,155,213,.08)",
                  border:`1px solid ${isFiz?"rgba(76,175,125,.3)":"rgba(91,155,213,.3)"}`,
                  borderRadius:6,padding:"8px 10px",cursor:"pointer",textAlign:"left",
                  transition:"all .15s",display:"flex",justifyContent:"space-between",alignItems:"center"
                }}
                onMouseEnter={e=>{e.currentTarget.style.background=isFiz?"rgba(76,175,125,.18)":"rgba(91,155,213,.18)";}}
                onMouseLeave={e=>{e.currentTarget.style.background=isFiz?"rgba(76,175,125,.08)":"rgba(91,155,213,.08)";}}
              >
                <span style={{fontFamily:"'Crimson Text',serif",fontSize:".9rem",color:"var(--parchment)"}}>{name}</span>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:".75rem",fontWeight:"700",color:isPos?"#7ef0a0":"#ff9090",marginLeft:8}}>
                  {lv>0?"+":""}{lv}
                </span>
              </button>
            );
          })}
        </div>
        <button onClick={()=>roll(20,parseInt(mod)||0,null)}
          style={{width:"100%",background:"rgba(200,149,42,.08)",border:"1px solid rgba(200,149,42,.2)",borderRadius:6,padding:"7px",fontFamily:"'Cinzel',serif",fontSize:".65rem",letterSpacing:".1em",color:"var(--gold)",cursor:"pointer",textTransform:"uppercase"}}>
          Modifier ile At ({parseInt(mod)||0 >= 0 ? "+" : ""}{parseInt(mod)||0})
        </button>
      </div>
    )}

    <div className="mr"><label>Modifier</label><input className="mi" type="number" value={mod} onChange={e=>setMod(e.target.value)}/></div>
    <div className="ra">
      {latest?<>
        <div className="rw">{latest.player}{latest.skillName?` — ${latest.skillName}`:` — d${latest.sides}`}</div>
        <div key={akey} className={`rn ra2${ic?" crit":fu?" fum":""}`}>{latest.total}</div>
        <div className="rm">{ic?"✨ Crit Success!":fu?"💀 Crit Fail!":`${latest.raw}${latest.modifier!==0?` + (${latest.modifier>0?"+":""}${latest.modifier})`:""}`}</div>
      </>:<div className="rm">Bir zar seç ve at... (d20'ye çift tık = düz at)</div>}
    </div>

    {feed.length>0&&<>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div className="ft" style={{margin:0,border:"none",padding:0}}>Son Atışlar</div>
        {feed.length>4&&<button onClick={()=>setShowHistory(true)} style={{background:"transparent",border:"none",color:"rgba(200,149,42,0.6)",fontFamily:"'Cinzel',serif",fontSize:".65rem",letterSpacing:".08em",cursor:"pointer",textDecoration:"underline",textUnderlineOffset:3}}>Tümünü Gör ({feed.length}) →</button>}
      </div>
      <div className="feed">{feed.slice(0,4).map((r,i)=>{
        const c=r.sides===20&&r.raw===20?"crit":r.sides===20&&r.raw===1?"fum":"";
        return <div key={r.id} className={`fi${i===0?" nr":""}`}>
          <span className="fdie">{DI[r.sides]||"🎲"}</span>
          <div className="fb"><div className="fp">{r.skillName||r.player}<span className="ts">{fmtTime(r.time||r.id)}</span></div><div className="fd">{r.skillName?r.player+" · ":""}d{r.sides} = {r.raw}{r.modifier!==0?` + (${r.modifier>0?"+":""}${r.modifier})`:""}{c==="crit"?" ✨ Crit!":c==="fum"?" 💀 Fail!":""}</div></div>
          <div className={`fv ${c}`}>{r.total}</div>
        </div>;
      })}</div>
    </>}
    {showHistory&&<HistoryModal feed={feed} onClose={()=>setShowHistory(false)}/>}
    <div style={{height:24}}/>
    <Masa me={me} role={role} char={char} npcs={npcs} all={all} avatars={avatars} onPipChange={onPipChange} onNpcPipChange={onNpcPipChange}/>
  </div>;
}

// ─── NOTEBOOKS ───────────────────────────────────────────────────────────────
function Notebooks({me,isDM,charName}){
  const [notebooks,setNotebooks]=useState([]);
  const [mode,setMode]=useState(null); // null | "create" | "pickup"
  const [activeNb,setActiveNb]=useState(null); // {id, name, owner}
  const [unlocked,setUnlocked]=useState({}); // id -> true
  const [form,setForm]=useState({name:"",pass:""});
  const [passInput,setPassInput]=useState("");
  const [passErr,setPassErr]=useState(false);
  const [nbContent,setNbContent]=useState({});
  const [saved,setSaved]=useState({});
  const saveTimers=useRef({});

  // Load notebooks list
  useEffect(()=>{
    const load=async()=>{
      const data=await fbGet("notebooks");
      if(!data)return;
      setNotebooks(Object.values(data).sort((a,b)=>a.createdAt-b.createdAt));
    };
    load();
    const iv=setInterval(load,4000);
    return()=>clearInterval(iv);
  },[]);

  // Load content when notebook unlocked
  useEffect(()=>{
    if(!activeNb||!unlocked[activeNb.id])return;
    const load=async()=>{
      const data=await fbGet(`nbcontent/${activeNb.id}`);
      setNbContent(c=>({...c,[activeNb.id]:(data&&data.text)||""}));
    };
    load();
  },[activeNb,unlocked]);

  const createNotebook=async()=>{
    if(!form.name.trim()||!form.pass.trim())return;
    const id=`nb${ts()}`;
    const nb={id,name:form.name.trim(),owner:me,pass:form.pass.trim(),createdAt:ts(),wordCount:0};
    try{
      await fbSet(`notebooks/${id}`,nb);
      await fbSet(`nbcontent/${id}`,{text:""});
      setNotebooks(prev=>[...prev,nb]);
      setUnlocked(u=>({...u,[id]:true}));
      setNbContent(c=>({...c,[id]:""}));
      setActiveNb(nb);
      setForm({name:"",pass:""});
      setMode(null);
    }catch(e){
      alert("Oluşturma hatası: "+e.message);
    }
  };

  const tryUnlock=(nb)=>{
    if(passInput===nb.pass||isDM){
      setUnlocked(u=>({...u,[nb.id]:true}));
      setPassInput("");setPassErr(false);
      setActiveNb(nb);setMode(null);
    } else {
      setPassErr(true);setTimeout(()=>setPassErr(false),1800);
    }
  };

  const countWords=text=>text.trim()?text.trim().split(/\s+/).length:0;
  const closeEditor=()=>{setActiveNb(null);setPassInput("");setPassErr(false);};
  const [confirmDelete,setConfirmDelete]=useState(null); // nb id
  const [manualSaving,setManualSaving]=useState(false);

  const deleteNotebook=async(id)=>{
    try{
      await fbDel(`notebooks/${id}`);
      await fbDel(`nbcontent/${id}`);
      setNotebooks(prev=>prev.filter(n=>n.id!==id));
      if(activeNb&&activeNb.id===id) closeEditor();
      setConfirmDelete(null);
    }catch(e){console.error("Delete error:",e);}
  };

  const manualSave=async()=>{
    if(!activeNb||!unlocked[activeNb.id])return;
    setManualSaving(true);
    const text=nbContent[activeNb.id]||"";
    const wc=countWords(text);
    await fbSet(`nbcontent/${activeNb.id}`,{text});
    await fbPatch(`notebooks/${activeNb.id}`,{wordCount:wc});
    setNotebooks(prev=>prev.map(n=>n.id===activeNb.id?{...n,wordCount:wc}:n));
    setSaved(s=>({...s,[activeNb.id]:true}));
    setTimeout(()=>{setManualSaving(false);setSaved(s=>({...s,[activeNb.id]:false}));},1500);
  };

  const handleEdit=async(id,text)=>{
    setNbContent(c=>({...c,[id]:text}));
    clearTimeout(saveTimers.current[id]);
    saveTimers.current[id]=setTimeout(async()=>{
      const wc=countWords(text);
      try{
        await fbSet(`nbcontent/${id}`,{text});
        await fbPatch(`notebooks/${id}`,{wordCount:wc});
        setNotebooks(prev=>prev.map(n=>n.id===id?{...n,wordCount:wc}:n));
        setSaved(s=>({...s,[id]:true}));
        setTimeout(()=>setSaved(s=>({...s,[id]:false})),1500);
      }catch(e){console.error("Save error:",e);}
    },700);
  };

  const exportPDF=async(nb,text,charName)=>{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const now=new Date();
    const dateStr=now.toLocaleDateString("tr-TR",{year:"numeric",month:"long",day:"numeric"});
    const timeStr=now.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
    const W=210, margin=20, contentW=W-margin*2;

    // Header bg
    doc.setFillColor(30,23,16);
    doc.rect(0,0,W,40,"F");

    // Gold line
    doc.setDrawColor(200,149,42);
    doc.setLineWidth(0.5);
    doc.line(margin,40,W-margin,40);

    // Title block
    doc.setTextColor(240,192,96);
    doc.setFontSize(18);
    doc.setFont("helvetica","bold");
    doc.text("İnci — Tavern Roll",margin,14);

    doc.setFontSize(11);
    doc.setTextColor(200,149,42);
    doc.setFont("helvetica","normal");
    doc.text(nb.name,margin,22);

    doc.setFontSize(9);
    doc.setTextColor(180,160,120);
    doc.text(`Karakter: ${charName||nb.owner}`,margin,29);
    doc.text(`${dateStr} · ${timeStr}`,margin,34);

    // Word count right side
    doc.setFontSize(8);
    doc.setTextColor(140,120,80);
    const wc=countWords(text);
    doc.text(`${wc} kelime`,W-margin,29,{align:"right"});
    doc.text(`${text.length} karakter`,W-margin,34,{align:"right"});

    // Content
    doc.setTextColor(30,20,10);
    doc.setFontSize(11);
    doc.setFont("helvetica","normal");

    const lines=doc.splitTextToSize(text||"(Boş not defteri)",contentW);
    let y=52;
    const lineH=6;
    const pageH=297;
    const bottomMargin=20;

    for(let i=0;i<lines.length;i++){
      if(y+lineH>pageH-bottomMargin){
        doc.addPage();
        doc.setFillColor(250,245,235);
        doc.rect(0,0,W,pageH,"F");
        // page header
        doc.setDrawColor(200,149,42);
        doc.setLineWidth(0.3);
        doc.line(margin,12,W-margin,12);
        doc.setFontSize(8);
        doc.setTextColor(160,130,60);
        doc.text(`${nb.name} — ${charName||nb.owner}`,margin,10);
        doc.text(`${doc.getCurrentPageInfo().pageNumber}. sayfa`,W-margin,10,{align:"right"});
        y=20;
      }
      doc.setFontSize(11);
      doc.setTextColor(30,20,10);
      doc.text(lines[i],margin,y);
      y+=lineH;
    }

    // Footer on last page
    doc.setDrawColor(200,149,42);
    doc.setLineWidth(0.3);
    doc.line(margin,pageH-12,W-margin,pageH-12);
    doc.setFontSize(7);
    doc.setTextColor(160,130,60);
    doc.text("İnci · Tavern Roll — tavern-roll.github.io",margin,pageH-7);
    doc.text(`${dateStr}`,W-margin,pageH-7,{align:"right"});

    const safeName=(nb.name+"-"+(charName||nb.owner)).replace(/[^a-zA-Z0-9\u00C0-\u017E\s_-]/g,"").replace(/\s+/g,"_");
    doc.save(`InciTavernRoll_${safeName}_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}.pdf`);
  };

  // DM view: all notebooks with passwords
  const dmView=isDM&&mode==="dm";

  return <div>
    <div className="st">📓 Not Defterleri</div>

    {!activeNb&&!dmView&&<div className="nb-actions">
      <button className="nb-action-btn" onClick={()=>setMode(m=>m==="create"?null:"create")}>✦ Not Defteri Oluştur</button>
      <button className="nb-action-btn" onClick={()=>setMode(m=>m==="pickup"?null:"pickup")}>📖 Not Defteri Teslim Al</button>
      {isDM&&<button className="nb-action-btn" style={{borderColor:"rgba(139,26,26,.4)",color:"#ffaaaa"}} onClick={()=>setMode(m=>m==="dm"?null:"dm")}>👁 DM Görünümü</button>}
    </div>}

    {/* CREATE FORM */}
    {mode==="create"&&!activeNb&&<div className="nb-form">
      <h4>✦ Yeni Not Defteri</h4>
      <input className="nb-input" placeholder="Defterin adı (ör. Gizli Planlarım)" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
      <input className="nb-input" type="password" placeholder="Şifre (sadece sen bileceksin)" value={form.pass} onChange={e=>setForm(f=>({...f,pass:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&createNotebook()}/>
      <div style={{display:"flex",gap:8}}>
        <button className="nb-btn" onClick={createNotebook} disabled={!form.name.trim()||!form.pass.trim()}>Oluştur →</button>
        <button className="nb-btn cancel" onClick={()=>setMode(null)}>İptal</button>
      </div>
    </div>}

    {/* PICKUP LIST */}
    {mode==="pickup"&&!activeNb&&<div className="nb-form">
      <h4>📖 Mevcut Not Defterleri</h4>
      {notebooks.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".9rem",padding:"8px 0"}}>Henüz hiç not defteri yok.</div>}
      <div className="nb-list">
        {notebooks.map(nb=>{
          const isOwner=nb.owner===me;
          const isOpen=unlocked[nb.id];
          return <div key={nb.id} className={`nb-item${(activeNb&&activeNb.id)===nb.id?" active":""}`} onClick={()=>{setActiveNb(nb);setMode(null);}}>
            <span className="nb-item-icon">{isOpen?"📖":"📓"}</span>
            <div className="nb-item-body">
              <div className="nb-item-name">{nb.name}</div>
              <div className="nb-item-meta">{nb.owner} · {nb.wordCount||0} kelime</div>
            </div>
            <span className="nb-item-lock">{isOpen?"🔓":isOwner?"🔑":"🔒"}</span>
          </div>;
        })}
      </div>
      <button className="nb-btn cancel" onClick={()=>setMode(null)}>Kapat</button>
    </div>}

    {/* DM VIEW */}
    {dmView&&<div className="nb-form">
      <h4>👁 Tüm Not Defterleri — DM Erişimi</h4>
      {notebooks.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".9rem",padding:"8px 0"}}>Henüz not defteri yok.</div>}
      {notebooks.map(nb=><div key={nb.id} className="nb-dm-row">
        <span style={{fontSize:"1.3rem"}}>📓</span>
        <div className="nb-dm-info">
          <div className="nb-dm-name">{nb.name} <span style={{color:"var(--text-dim)",fontWeight:"normal"}}>— {nb.owner}</span></div>
          <div className="nb-dm-pass">🔑 Şifre: <strong style={{color:"rgba(240,192,96,.7)"}}>{nb.pass}</strong> · {nb.wordCount||0} kelime</div>
          {confirmDelete===nb.id&&<div style={{marginTop:8,background:"rgba(139,26,26,.12)",border:"1px solid rgba(139,26,26,.3)",borderRadius:5,padding:"8px 10px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:".78rem",color:"#ffaaaa",fontStyle:"italic"}}>⚠ Emin misin? Bu işlem geri alınamaz.</span>
            <div style={{display:"flex",gap:6}}>
              <button className="yes-btn" onClick={()=>deleteNotebook(nb.id)}>✓ Sil</button>
              <button className="no-btn" onClick={()=>setConfirmDelete(null)}>✕ İptal</button>
            </div>
          </div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          <button className="nb-btn" style={{fontSize:".6rem",padding:"4px 10px"}} onClick={()=>{setUnlocked(u=>({...u,[nb.id]:true}));setActiveNb(nb);setMode(null);}}>Aç</button>
          <button className="nb-btn" style={{fontSize:".6rem",padding:"4px 10px",borderColor:"rgba(139,26,26,.4)",color:"#ff9090"}}
            onClick={()=>setConfirmDelete(confirmDelete===nb.id?null:nb.id)}>Sil</button>
        </div>
      </div>)}
      <button className="nb-btn cancel" style={{marginTop:8}} onClick={()=>{setMode(null);setConfirmDelete(null);}}>Kapat</button>
    </div>}

    {/* EDITOR */}
    {activeNb&&<div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <button className="nb-btn cancel" onClick={closeEditor}>← Geri</button>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"var(--gold)",letterSpacing:".08em"}}>{activeNb.name}</span>
        <span style={{fontSize:".7rem",color:"var(--text-dim)",fontStyle:"italic"}}>— {activeNb.owner}</span>
      </div>

      {unlocked[activeNb.id]
        ? <div className="nb-editor">
            <div className="nb-editor-header">
              <div>
                <div className="nb-editor-title">📖 {activeNb.name}</div>
                <div className="nb-editor-meta">{countWords(nbContent[activeNb.id]||"")} kelime</div>
              </div>
            </div>
            <textarea
              className="nb-textarea"
              placeholder="Notlarını buraya yaz..."
              value={nbContent[activeNb.id]||""}
              onChange={e=>handleEdit(activeNb.id,e.target.value)}
              disabled={activeNb.owner!==me&&!isDM}
            />
            <div className="nb-footer">
              <span className="nb-wordcount">{countWords(nbContent[activeNb.id]||"")} kelime · {(nbContent[activeNb.id]||"").length} karakter</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button className="nb-btn" style={{fontSize:".6rem",padding:"4px 12px",borderColor:"rgba(200,149,42,.25)"}}
                  onClick={()=>exportPDF(activeNb,nbContent[activeNb.id]||"",charName)}>
                  ⬇ PDF
                </button>
                <button
                  className="nb-btn"
                  style={{fontSize:".6rem",padding:"4px 12px",borderColor:manualSaving?"#3cb454":"rgba(200,149,42,.3)",color:manualSaving?"#3cb454":"var(--gold-light)",transition:"all .3s"}}
                  onClick={manualSave}
                  disabled={manualSaving||activeNb.owner!==me&&!isDM}>
                  {manualSaving?"✓ Kaydedildi":"💾 Kaydet"}
                </button>
                <span className={`nb-save-ind${saved[activeNb.id]?" ok":""}`}>{saved[activeNb.id]?"✓ Otomatik kaydedildi":"Otomatik kaydediliyor..."}</span>
              </div>
            </div>
          </div>
        : <div className="nb-editor">
            <div className="nb-lock-overlay">
              <div className="nb-lock-icon">🔒</div>
              <div className="nb-lock-title">Şifre Gerekli</div>
              <div style={{fontSize:".85rem",color:"var(--text-dim)",fontStyle:"italic",marginBottom:8}}>{activeNb.name} · {activeNb.owner}</div>
              <input className="nb-input" type="password" placeholder="Şifreyi gir..." value={passInput}
                style={{maxWidth:220,textAlign:"center",borderColor:passErr?"#c03030":undefined}}
                onChange={e=>setPassInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&tryUnlock(activeNb)}/>
              {passErr&&<div className="nb-err">Yanlış şifre!</div>}
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <button className="nb-btn" onClick={()=>tryUnlock(activeNb)}>Kilidi Aç →</button>
                <button className="nb-btn cancel" onClick={closeEditor}>İptal</button>
              </div>
            </div>
          </div>
      }
    </div>}
  </div>;
}

function Char({me,isDM,char,setChar,all,avatars,onUploadAvatar}){
  const [saved,setSaved]=useState(false);
  const [vp,setVp]=useState(me);
  const [pickerOpen,setPickerOpen]=useState(null);
  const st=useRef(null);
  const self=vp===me||!isDM;
  const vc=self?char:(all.find(p=>p.name===vp)||{char:iChar(vp)}).char||iChar(vp);
  const can=self||isDM;
  const save=async(u,t)=>{await fbSet(`chars/${t}`,u);if(t===me){setSaved(true);setTimeout(()=>setSaved(false),1500);}};
  const upd=(f,v)=>{
    if(!can)return;
    if(self){setChar(c=>{const n={...c,[f]:v};clearTimeout(st.current);st.current=setTimeout(()=>save(n,me),600);return n;});}
    else{const u={...vc,[f]:v};clearTimeout(st.current);st.current=setTimeout(()=>save(u,vp),600);}
  };
  const updAttr=(attr,v)=>{
    if(!can)return;
    const newAttrs={...(vc.attrs||{}),[attr]:v};
    upd("attrs",newAttrs);
  };
  const skills=vc.skills||{};
  const slotsMap={"5":1,"4":2,"3":2,"2":3,"1":4,"-1":4,"-2":3,"-3":2,"-4":2,"-5":1};
  const getSlotsForLevel=lv=>slotsMap[String(lv)]||1;
  const skillsAtLevel=lv=>Object.entries(skills).filter(([,v])=>v===lv).map(([k])=>k);
  const level=parseInt(vc.level)||1;

  // Kullanılan negatif hamle = tüm negatif skill'lerin mutlak değerleri toplamı
  const usedNegMoves=Object.entries(skills).filter(([,v])=>v<0).reduce((s,[,v])=>s+Math.abs(v),0);
  // Toplam pozitif hak = seviye + negatif hamle sayısı (her negatif seviye +1 bonus)
  const totalPosMoves=level+usedNegMoves;
  // Kullanılan pozitif hamle = tüm pozitif skill'lerin değerleri toplamı
  const usedPosMoves=Object.entries(skills).filter(([,v])=>v>0).reduce((s,[,v])=>s+v,0);
  const remPos=totalPosMoves-usedPosMoves;
  const remNeg=level-usedNegMoves;
  const placedSkills=new Set(Object.keys(skills));

  // Bir skili fromLv'den toLv'ye taşımanın maliyetini hesapla
  // Pozitif için: toLv - (mevcut pozitif seviye veya 0)
  // Negatif için: |toLv| - (mevcut negatif seviye veya 0)
  const getMoveCost=(fromLv, toLv)=>{
    if(fromLv===toLv)return{posCost:0,negCost:0};
    const from=fromLv||0;
    if(toLv>0){
      // fromLv negatifse önce neg hamleler iade olur → pos bonus azalır
      const posFrom=from>0?from:0;
      return{posCost:toLv-posFrom, negCost:0};
    } else if(toLv<0){
      const negFrom=from<0?Math.abs(from):0;
      return{posCost:0, negCost:Math.abs(toLv)-negFrom};
    }
    return{posCost:0,negCost:0};
  };

  const canAssign=(skill, toLv)=>{
    if(!can)return false;
    const fromLv=skills[skill]||0;
    if(fromLv===toLv)return false;
    const {posCost,negCost}=getMoveCost(fromLv,toLv);
    // Pos'tan neg'e veya neg'den pos'a geçerken mevcut hamleler güncellenir
    // Negatiften pozitife: neg hamleler iade olur, pos bonus azalır, yeni pos harcanır
    if(fromLv<0&&toLv>0){
      const newUsedNeg=usedNegMoves-Math.abs(fromLv);
      const newTotalPos=level+newUsedNeg;
      const newUsedPos=usedPosMoves+toLv;
      return newTotalPos>=newUsedPos;
    }
    if(toLv>0) return remPos>=posCost;
    if(toLv<0) return remNeg>=negCost;
    return false;
  };

  const moveCost=(fromLv,toLv)=>{
    const{posCost,negCost}=getMoveCost(fromLv||0,toLv);
    return toLv>0?posCost:negCost;
  };

  const assignSkill=(skill,lv)=>{
    if(!can||!canAssign(skill,lv))return;
    upd("skills",{...skills,[skill]:lv});
    setPickerOpen(null);
  };
  const removeSkill=(skill)=>{if(!can)return;const ns={...skills};delete ns[skill];upd("skills",ns);};
  return <div className="panel">
    {self&&<AvatarUpload me={me} avatars={avatars} onUpload={onUploadAvatar}/>}
    {isDM&&!self&&avatars&&avatars[vp]&&<div className="avatar-wrap"><img src={avatars[vp]} className="avatar-img" alt="avatar"/></div>}
    {isDM&&all.length>0&&<>
      <div className="st" style={{marginTop:0}}>Oyuncuları Görüntüle</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {all.map(p=><button key={p.name} className={`tb${vp===p.name?" on":""}`} onClick={()=>{setVp(p.name);setPickerOpen(null);}} style={{fontSize:".7rem"}}>{p.name}</button>)}
      </div>
    </>}
    {!can&&<div className="dmo">📖 Salt okunur — {vp} karakteri</div>}
    <div className="st" style={{marginTop:0}}>Karakter Bilgileri</div>
    <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:8,marginBottom:12}}>
      {[{l:"KARAKTER ADI",f:"name",ph:"Duncan the Tall..."},{l:"IRK",f:"race",sel:RACES},{l:"YAŞ",f:"age",ph:"25"},{l:"SEVİYE",f:"level",ph:"1",type:"number"}].map(x=>(
        <div key={x.f} className="cf">
          <label>{x.l}</label>
          {x.sel
            ?<select value={vc[x.f]||""} onChange={e=>upd(x.f,e.target.value)} disabled={!can}><option value="">—</option>{x.sel.map(o=><option key={o}>{o}</option>)}</select>
            :<input type={x.type||"text"} value={vc[x.f]||""} onChange={e=>upd(x.f,e.target.value)} placeholder={x.ph} disabled={!can}/>}
        </div>
      ))}
    </div>
    <div className="st">Kondisyon</div>
    <div className="cb"><div className="cr">
      <PipBar type="fiziksel" saglik={vc.fiziksel!=null?vc.fiziksel:3} maxPips={3} disabled={!can} onChange={v=>upd("fiziksel",v)}/>
      <div className="cdv"/>
      <PipBar type="zihinsel" saglik={vc.zihinsel!=null?vc.zihinsel:3} maxPips={3} disabled={!can} onChange={v=>upd("zihinsel",v)}/>
    </div></div>
    <div className="st">Saving Throwlar</div>
    <div className="attr-grid">
      {ATTRIBUTES.map(a=>(
        <div key={a} className="attr-box">
          <div className="attr-name">{a}</div>
          <input className="attr-input" type="text" value={(vc.attrs&&vc.attrs[a])||""} placeholder="—"
            onChange={e=>updAttr(a,e.target.value)} disabled={!can}/>
        </div>
      ))}
    </div>
    <div className="st">Skill Piramidi</div>
    <div className="moves-info">
      <div className="moves-item"><span>{remPos}</span><span className="moves-label">Pozitif hamle kaldı</span></div>
      <div className="moves-item"><span>{remNeg}</span><span className="moves-label">Negatif hamle kaldı</span></div>
      <div className="moves-item" style={{color:"var(--text-dim)",fontSize:".7rem",alignSelf:"center",fontStyle:"italic"}}>
        Seviye {level} → {level} pozitif{usedNegMoves>0?` + ${usedNegMoves} bonus`:""} · {level} negatif hakkı
      </div>
    </div>
    <div className="pyramid-wrap">
      {PYRAMID_LEVELS.map(lv=>{
        const isNeg=lv<0;
        const slots=getSlotsForLevel(lv);
        const placed=skillsAtLevel(lv);
        return(
          <div key={lv} className="pyramid-row">
            <div className={`pyramid-level ${isNeg?"neg":"pos"}`}>{lv>0?"+":""}{lv}</div>
            <div className="pyramid-slots">
              {Array.from({length:slots}).map((_,si)=>{
                const skill=placed[si];
                const isOpen=pickerOpen&&pickerOpen.level===lv&&pickerOpen.slotIdx===si;
                const isFiz=skill&&FIZIKSEL_SKILLS.includes(skill);
                const canAdd=can&&!skill&&((!isNeg&&remPos>0)||(isNeg&&remNeg>0));
                return(
                  <div key={si} style={{position:"relative"}}>
                    <div className={`pyramid-slot${skill?" filled":""}${skill&&isNeg?" neg-slot":""}`}
                      onClick={()=>{if(canAdd||skill)setPickerOpen(isOpen?null:{level:lv,slotIdx:si});}}>
                      {skill?(
                        <>
                          <span className="pyramid-slot-text" style={{color:isFiz?"#7ef0a0":"#a8c8f8"}}>{skill}</span>
                          {can&&<button className="pyramid-slot-remove" onClick={e=>{e.stopPropagation();removeSkill(skill);}}>✕</button>}
                        </>
                      ):(
                        <span style={{fontSize:".68rem",color:canAdd?"rgba(200,149,42,.4)":"rgba(var(--text-rgb,245,230,200),.15)"}}>
                          {canAdd?"+ ekle":"—"}
                        </span>
                      )}
                    </div>
                    {isOpen&&(
                      <div className="skill-picker" style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",zIndex:500,minWidth:300,maxWidth:"90vw",maxHeight:"80vh",overflowY:"auto"}}>
                        <div className="skill-picker-title">
                          {skill?`${skill} taşı → ${lv>0?"+":""}${lv}`:
                          `${lv>0?"+":""}${lv} seviyesine skill ekle`}
                        </div>
                        <div style={{marginBottom:8,fontSize:".7rem",color:"rgba(200,149,42,.5)",fontStyle:"italic"}}>
                          {isNeg?`Kalan neg hamle: ${remNeg}`:`Kalan pos hamle: ${remPos}`}
                        </div>
                        {/* Mevcut bir skili taşı */}
                        {Object.keys(skills).length>0&&<>
                          <div style={{marginBottom:6,fontSize:".65rem",color:"rgba(200,149,42,.7)"}}>↑ Mevcut Skili Taşı</div>
                          <div className="skill-picker-cols" style={{marginBottom:10}}>
                            {Object.entries(skills).filter(([s,v])=>v!==lv).map(([s,v])=>{
                              const cost=moveCost(v,lv);
                              const ok=canAssign(s,lv);
                              return <button key={s} className={"skill-pick-btn "+(FIZIKSEL_SKILLS.includes(s)?"fiz":"zih")}
                                disabled={!ok}
                                onClick={()=>assignSkill(s,lv)}
                                style={{opacity:ok?1:.4}}>
                                {s} <span style={{fontSize:".6rem",color:"rgba(200,149,42,.7)"}}>{v>0?"+":""}{v}→{lv>0?"+":""}{lv} ({cost>0?"+":""}{cost})</span>
                              </button>;
                            })}
                          </div>
                        </>}
                        <div style={{marginBottom:6,fontSize:".65rem",color:"rgba(76,175,125,.8)"}}>🟢 Yeni Fiziksel</div>
                        <div className="skill-picker-cols" style={{marginBottom:8}}>
                          {FIZIKSEL_SKILLS.filter(s=>!placedSkills.has(s)).map(s=>{
                            const cost=moveCost(0,lv);
                            const ok=canAssign(s,lv);
                            return <button key={s} className="skill-pick-btn fiz"
                              disabled={!ok}
                              onClick={()=>assignSkill(s,lv)}
                              style={{opacity:ok?1:.4}}>
                              {s} <span style={{fontSize:".6rem",color:"rgba(200,149,42,.7)"}}>({cost>0?"+":""}{cost})</span>
                            </button>;
                          })}
                        </div>
                        <div style={{marginBottom:6,fontSize:".65rem",color:"rgba(91,155,213,.8)"}}>🔵 Yeni Zihinsel</div>
                        <div className="skill-picker-cols">
                          {ZIHINSEL_SKILLS.filter(s=>!placedSkills.has(s)).map(s=>{
                            const cost=moveCost(0,lv);
                            const ok=canAssign(s,lv);
                            return <button key={s} className="skill-pick-btn zih"
                              disabled={!ok}
                              onClick={()=>assignSkill(s,lv)}
                              style={{opacity:ok?1:.4}}>
                              {s} <span style={{fontSize:".6rem",color:"rgba(200,149,42,.7)"}}>({cost>0?"+":""}{cost})</span>
                            </button>;
                          })}
                        </div>
                        <button className="nb-btn cancel" style={{marginTop:8,width:"100%"}} onClick={()=>setPickerOpen(null)}>İptal</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
    <div className="st">Notlar</div>
    <textarea className="na" rows={5} placeholder="Geçmiş, bağlantılar, ekipman..." value={vc.notes||""} onChange={e=>upd("notes",e.target.value)} disabled={!can}/>
    <div className={`si${saved?" ok":""}`}>{saved?"✓ Kaydedildi":"Otomatik kaydediliyor..."}</div>
    {self&&can&&<button className="nb-btn" style={{marginTop:10,width:"100%"}} onClick={()=>exportCharPDF(vc,avatars&&avatars[me])}>⬇ Karakter Sayfasini PDF Indir</button>}
    {self&&<ErrorBoundary><Notebooks me={me} isDM={isDM} charName={vc.name||me}/></ErrorBoundary>}
  </div>;
}

function Npc({isDM,npcs,setNpcs,onClearRolls,allPlayers}){
  const [form,setForm]=useState({name:"",type:"enemy",ac:"12",cr:"1",notes:"",boss:false,fizMax:"3",zihMax:"3"});
  const [confirm,setConfirm]=useState(null);
  const [modOpen,setModOpen]=useState(false);
  const [allChars,setAllChars]=useState({});
  const [allAccounts,setAllAccounts]=useState({});
  const [allPlayersData,setAllPlayersData]=useState({});
  const [kickConfirm,setKickConfirm]=useState(null);
  const [deleteTarget,setDeleteTarget]=useState(null);
  const [deleteInput,setDeleteInput]=useState("");
  const [deleteErr,setDeleteErr]=useState(false);
  const [changePassTarget,setChangePassTarget]=useState(null);
  const [newPass,setNewPass]=useState("");

  useEffect(()=>{
    if(!isDM||!modOpen)return;
    const load=async()=>{
      const data=await fbGet("chars");if(data)setAllChars(data);
      const accs=await fbGet("accounts");if(accs)setAllAccounts(accs);
      const pdata=await fbGet("players");if(pdata)setAllPlayersData(pdata);
    };
    load();
    const iv=setInterval(load,4000);
    return()=>clearInterval(iv);
  },[isDM,modOpen]);

  const sync=async u=>{setNpcs(u);if(!u.length){await fbSet("npcs",null);return;}const o={};u.forEach(n=>{o[n.id]=n;});await fbSet("npcs",o);};
  const add=async(boss)=>{
    if(!form.name.trim())return;
    const fiz=boss?parseInt(form.fizMax)||3:3;
    const zih=boss?parseInt(form.zihMax)||3:3;
    await sync([...npcs,{...form,id:ts(),fiziksel:fiz,zihinsel:zih,fizMax:fiz,zihMax:zih,boss:boss||false}]);
    setForm({name:"",type:"enemy",ac:"12",cr:"1",notes:"",boss:false,fizMax:"3",zihMax:"3"});
  };
  const uPip=async(id,f,v)=>sync(npcs.map(n=>n.id===id?{...n,[f]:v}:n));
  const rem=async id=>sync(npcs.filter(n=>n.id!==id));
  const doConfirm=async()=>{
    if(confirm==="npcs")await sync([]);
    if(confirm==="rolls")await onClearRolls();
    setConfirm(null);
  };
  const kickPlayer=async(pname)=>{
    await fbSet("kicked/"+pname,{at:ts()});
    await fbDel("players/"+pname);
    setKickConfirm(null);
  };
  const startDelete=(pname)=>{setDeleteTarget({name:pname});setDeleteInput("");setDeleteErr(false);};
  const changePassword=async()=>{
    if(!newPass.trim()||!changePassTarget)return;
    if(changePassTarget.type==="player"){
      await fbPatch("accounts/"+changePassTarget.id,{pass:newPass.trim()});
      setAllAccounts(a=>({...a,[changePassTarget.id]:{...a[changePassTarget.id],pass:newPass.trim()}}));
    } else if(changePassTarget.type==="notebook"){
      await fbPatch("notebooks/"+changePassTarget.id,{pass:newPass.trim()});
    }
    setChangePassTarget(null);setNewPass("");
  };
  const confirmDelete=async()=>{
    if(deleteInput.trim()!==deleteTarget.name){setDeleteErr(true);return;}
    await fbDel("chars/"+deleteTarget.name);
    await fbDel("players/"+deleteTarget.name);
    await fbDel("avatars/"+deleteTarget.name);
    const nc={...allChars};delete nc[deleteTarget.name];
    setAllChars(nc);setDeleteTarget(null);setDeleteInput("");
  };

  const onlinePNames=new Set((allPlayers||[]).filter(p=>p.role!=="dm").map(p=>p.name));
  const allCharNames=Object.keys(allChars).filter(n=>n!=="DM");

  return <div className="panel">
    {!isDM&&<div className="dmo">NPC'ler DM tarafından yonetilir.</div>}
    {isDM&&<>
      <div className="st" style={{marginTop:0}}>DM Araclar</div>
      <div className="dm-tools">
        <button className="danger-btn" onClick={()=>setConfirm("npcs")}>Tum NPC'leri Temizle</button>
        <button className="danger-btn" onClick={()=>setConfirm("rolls")}>Tum Zarlari Temizle</button>
        <button className="danger-btn" style={{background:"rgba(139,26,26,.08)",borderColor:"rgba(139,26,26,.35)",color:"#ffaaaa"}} onClick={()=>setModOpen(o=>!o)}>Moderator</button>
      </div>
      {confirm&&<div className="confirm-box">
        <span>Emin misin?</span>
        <div className="confirm-btns">
          <button className="yes-btn" onClick={doConfirm}>Evet</button>
          <button className="no-btn" onClick={()=>setConfirm(null)}>Iptal</button>
        </div>
      </div>}
      {modOpen&&<div style={{background:"rgba(139,26,26,.07)",border:"1px solid rgba(139,26,26,.3)",borderRadius:8,padding:14,marginBottom:16}}>
        <div className="st" style={{marginTop:0,color:"#ffaaaa",borderColor:"rgba(139,26,26,.3)"}}>Moderator Paneli</div>
        {allCharNames.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".85rem",padding:"8px 0"}}>Kayitli karakter yok.</div>}
        {allCharNames.map(pname=>{
          const isOnline=onlinePNames.has(pname);
          const cd=allChars[pname];
          const acc=allAccounts[pname];
          const playerData=allPlayersData[pname];
          const onlinePlayer=(allPlayers||[]).find(p=>p.name===pname);
          const onlineDur=isOnline&&onlinePlayer&&onlinePlayer.loginAt
            ?(()=>{const s=Math.floor((ts()-onlinePlayer.loginAt)/1000);const h=Math.floor(s/3600);const m=Math.floor((s%3600)/60);return h>0?h+'s '+m+'dk':m+'dk';})()
            :null;
          const lastOnline=!isOnline&&playerData&&playerData.lastSeen
            ?(()=>{const ago=Math.floor((ts()-playerData.lastSeen)/1000);if(ago<60)return ago+'sn once';if(ago<3600)return Math.floor(ago/60)+'dk once';if(ago<86400)return Math.floor(ago/3600)+'s once';return Math.floor(ago/86400)+'g once';})()
            :null;
          return <div key={pname} style={{padding:"8px 0",borderBottom:"1px solid rgba(139,26,26,.12)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:isOnline?"#3cb454":"rgba(var(--text-rgb,245,230,200),.2)",flexShrink:0,display:"inline-block"}}/>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:".75rem",color:"var(--parchment)",flex:1}}>
                {cd&&cd.name?cd.name:pname}
                <span style={{fontSize:".65rem",color:"var(--text-dim)",marginLeft:6}}>{isOnline?"çevrimiçi":"çevrimdışı"}</span>
                {onlineDur&&<span style={{fontSize:".62rem",color:"rgba(60,180,80,.7)",marginLeft:6}}>⏱ {onlineDur}</span>}
