const {useState,useEffect,useRef,useCallback,Component}=React;
const FB="https://incitavernroll-default-rtdb.europe-west1.firebasedatabase.app";
const fbGet=async p=>{try{const r=await fetch(`${FB}/${p}.json`);return await r.json();}catch(e){console.error("fbGet",p,e);return null;}};
const fbSet=async(p,v)=>{try{const r=await fetch(`${FB}/${p}.json`,{method:"PUT",body:JSON.stringify(v)});if(!r.ok)throw new Error(`HTTP ${r.status}`);return true;}catch(e){console.error("fbSet",p,e);return false;}};
const fbPatch=async(p,v)=>{try{await fetch(`${FB}/${p}.json`,{method:"PATCH",body:JSON.stringify(v)});}catch(e){console.error("fbPatch",p,e);}};
const fbDel=async p=>{try{await fetch(`${FB}/${p}.json`,{method:"DELETE"});}catch(e){console.error("fbDel",p,e);}};
const fbListen=(path,cb)=>{
  const es=new EventSource(`${FB}/${path}.json`);
  es.addEventListener("put",e=>{try{cb(JSON.parse(e.data).data);}catch(err){console.error("fbListen parse",err);}});
  es.onerror=e=>{console.warn("fbListen error",path,e);};
  return()=>es.close();
};

// ─── ERROR BOUNDARY ──────────────────────────────────────────────────────────
class ErrorBoundary extends Component{
  constructor(props){super(props);this.state={error:null,info:null};}
  static getDerivedStateFromError(error){return{error};}
  componentDidCatch(error,info){
    console.error("ErrorBoundary caught:",error,info);
    this.setState({info});
  }
  render(){
    const {error,info}=this.state;
    if(error) return(
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0d0705",padding:20}}>
        <div style={{background:"#1e1710",border:"1px solid rgba(139,26,26,.5)",borderRadius:10,padding:32,maxWidth:500,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,.6)"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.1rem",color:"#ff6060",marginBottom:12,letterSpacing:".1em"}}>⚠ Bir Hata Oluştu</div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",letterSpacing:".15em",color:"rgba(200,149,42,.6)",textTransform:"uppercase",marginBottom:8}}>Hata Detayı</div>
          <pre style={{background:"#0d0705",border:"1px solid rgba(200,149,42,.15)",borderRadius:6,padding:12,fontSize:".78rem",color:"var(--text-mid)",overflowX:"auto",marginBottom:16,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
            {error.toString()}
            {info&&info.componentStack?"\n\nKonum:"+info.componentStack.split("\n").slice(0,5).join("\n"):""}
          </pre>
          <button
            onClick={()=>{this.setState({error:null,info:null});}}
            style={{background:"rgba(200,149,42,.12)",border:"1px solid rgba(200,149,42,.4)",borderRadius:5,color:"var(--gold-light)",fontFamily:"'Cinzel',serif",fontSize:".75rem",letterSpacing:".12em",padding:"10px 20px",cursor:"pointer",width:"100%",textTransform:"uppercase"}}>
            ↺ Yeniden Dene
          </button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

.skill-pick-btn{background:transparent;border:1px solid rgba(200,149,42,.15);border-radius:4px;color:var(--text-dim);font-family:'Crimson Text',serif;font-size:.88rem;padding:5px 8px;cursor:pointer;text-align:left;transition:all .15s}
.skill-pick-btn:hover{border-color:var(--gold);color:var(--parchment);background:rgba(200,149,42,.08)}
.skill-pick-btn:disabled{opacity:.35;cursor:not-allowed}
.skill-pick-btn.fiz{border-left:2px solid rgba(76,175,125,.4)}
.skill-pick-btn.zih{border-left:2px solid rgba(91,155,213,.4)}
.attr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}

.attr-box{background:var(--bg1);border:1px solid rgba(200,149,42,.18);border-radius:6px;text-align:center;padding:8px 4px 6px}
.attr-name{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.08em;color:var(--gold);margin-bottom:4px}
.attr-input{background:transparent;border:none;border-bottom:1px solid rgba(200,149,42,.25);color:var(--parchment);font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;width:100%;text-align:center;outline:none}
.moves-info{background:rgba(200,149,42,.06);border:1px solid rgba(200,149,42,.15);border-radius:6px;padding:10px 12px;margin-bottom:12px;display:flex;gap:16px;flex-wrap:wrap}
.moves-item{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.08em}
.moves-item span{color:var(--gold-light);font-size:.9rem;font-weight:700;margin-right:4px}
.moves-item.used span{color:rgba(var(--text-rgb,245,230,200),.3)}
.moves-label{color:var(--text-mid)}
/* Notebooks */
.nb-actions{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.nb-action-btn{flex:1;min-width:140px;background:var(--bg2);border:1px solid var(--border-gold);border-radius:6px;color:var(--gold-light);font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;padding:12px 8px;cursor:pointer;transition:all .2s;text-transform:uppercase;text-align:center}
.nb-action-btn:hover{background:rgba(200,149,42,.15);box-shadow:0 0 12px rgba(200,149,42,.15)}
.nb-form{background:var(--bg1);border:1px solid var(--border-gold);border-radius:8px;padding:16px;margin-bottom:14px}
.nb-form h4{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:12px}
.nb-input{width:100%;background:var(--bg2);border:1px solid rgba(200,149,42,.25);border-radius:4px;color:var(--text);font-family:'Crimson Text',serif;font-size:1rem;padding:8px 10px;outline:none;margin-bottom:8px}
.nb-input:focus{border-color:var(--gold)}
.nb-input::placeholder{color:var(--text-dim)}
.nb-btn{background:rgba(200,149,42,.1);border:1px solid rgba(200,149,42,.35);border-radius:4px;color:var(--gold-light);font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;padding:8px 16px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.nb-btn:hover{background:rgba(200,149,42,.2)}
.nb-btn.cancel{background:transparent;border-color:rgba(200,149,42,.2);color:var(--text-dim)}
.nb-btn.cancel:hover{border-color:var(--gold);color:var(--gold)}
.nb-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.nb-item{background:var(--bg1);border:1px solid rgba(200,149,42,.2);border-radius:6px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s}
.nb-item:hover{border-color:var(--gold-light);background:rgba(200,149,42,.06)}
.nb-item.active{border-color:#f0c060;background:rgba(200,149,42,.1);box-shadow:0 0 10px rgba(200,149,42,.15)}
.nb-item-icon{font-size:1.4rem}
.nb-item-body{flex:1}
.nb-item-name{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold-light);font-weight:600}
.nb-item-meta{font-size:.75rem;color:var(--text-dim);margin-top:2px;font-style:italic}
.nb-item-lock{font-size:.85rem;opacity:.5}
.nb-editor{background:var(--bg1);border:1px solid rgba(200,149,42,.2);border-radius:8px;overflow:hidden}
.nb-editor-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(200,149,42,.12);background:rgba(200,149,42,.04)}
.nb-editor-title{font-family:'Cinzel',serif;font-size:.78rem;color:var(--gold-light);font-weight:600}
.nb-editor-meta{font-size:.7rem;color:var(--text-dim);font-style:italic}
.nb-editor-close{background:transparent;border:1px solid rgba(200,149,42,.2);border-radius:3px;color:var(--text-dim);font-family:'Cinzel',serif;font-size:.6rem;padding:3px 8px;cursor:pointer}
.nb-editor-close:hover{border-color:var(--gold);color:var(--gold)}
.nb-textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:'Crimson Text',serif;font-size:1.05rem;padding:14px;outline:none;resize:none;line-height:1.7;min-height:260px}
.nb-footer{padding:6px 14px;border-top:1px solid rgba(200,149,42,.08);display:flex;justify-content:space-between;align-items:center}
.nb-wordcount{font-size:.72rem;color:var(--text-dim);font-style:italic}
.nb-save-ind{font-size:.72rem;color:rgba(200,149,42,.5);font-style:italic;transition:color .3s}
.nb-save-ind.ok{color:#3cb454}
.nb-lock-overlay{display:flex;flex-direction:column;align-items:center;gap:12px;padding:28px 20px;text-align:center}
.nb-lock-icon{font-size:2.5rem;opacity:.6}
.nb-lock-title{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase}
.nb-err{color:#ff6060;font-size:.78rem;font-style:italic}
.nb-dm-row{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:rgba(139,26,26,.06);border:1px solid rgba(139,26,26,.15);border-radius:5px;margin-bottom:6px}
.nb-dm-info{flex:1}
.nb-dm-name{font-family:'Cinzel',serif;font-size:.75rem;color:#ffaaaa;font-weight:600}
.nb-dm-pass{font-size:.78rem;color:rgba(var(--text-rgb,245,230,200),.45);font-style:italic;margin-top:2px}
.dmo{background:rgba(139,26,26,.08);border:1px solid rgba(139,26,26,.2);border-radius:5px;padding:8px 14px;margin-bottom:16px;font-size:.8rem;color:rgba(var(--text-rgb,245,230,200),.45);font-style:italic;text-align:center}
.cb{background:var(--bg1);border:1px solid rgba(200,149,42,.18);border-radius:8px;padding:14px;margin-bottom:12px}
.cr{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.ch{flex:1;min-width:120px}
.cl{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;display:block}
.cl.f{color:#4caf7d}.cl.z{color:#5b9bd5}
.pr{display:flex;gap:7px}
.pip{width:32px;height:32px;border-radius:50%;border:2px solid;cursor:pointer;transition:all .2s;background:transparent}
.pip:disabled{cursor:not-allowed;opacity:.5}
.pip.fe{border-color:rgba(76,175,125,.35)}.pip.fe:hover:not(:disabled){border-color:#4caf7d;background:rgba(76,175,125,.1)}
.pip.ff{border-color:#4caf7d;background:#4caf7d;box-shadow:0 0 10px rgba(76,175,125,.4)}
.pip.ze{border-color:rgba(91,155,213,.35)}.pip.ze:hover:not(:disabled){border-color:#5b9bd5;background:rgba(91,155,213,.1)}
.pip.zf{border-color:#5b9bd5;background:#5b9bd5;box-shadow:0 0 10px rgba(91,155,213,.4)}
.cdv{width:1px;background:rgba(200,149,42,.12);align-self:stretch;margin:0 4px}
.ncw{margin:6px 0 10px}
.ncr{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.ncl{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.1em;width:60px}
.ncl.f{color:#4caf7d}.ncl.z{color:#5b9bd5}
.np{width:22px;height:22px;border-radius:50%;border:1.5px solid;cursor:pointer;transition:all .18s;background:transparent}
.np:disabled{cursor:not-allowed;opacity:.5}
.np.fe{border-color:rgba(76,175,125,.3)}.np.fe:hover:not(:disabled){border-color:#4caf7d;background:rgba(76,175,125,.15)}
.np.ff{border-color:#4caf7d;background:#4caf7d;box-shadow:0 0 8px rgba(76,175,125,.4)}
.np.ze{border-color:rgba(91,155,213,.3)}.np.ze:hover:not(:disabled){border-color:#5b9bd5;background:rgba(91,155,213,.15)}
.np.zf{border-color:#5b9bd5;background:#5b9bd5;box-shadow:0 0 8px rgba(91,155,213,.4)}
.mpr{display:flex;gap:4px}
.mp{width:10px;height:10px;border-radius:50%;border:1px solid}
.mp.ff{border-color:#4caf7d;background:#4caf7d}.mp.fe{border-color:rgba(76,175,125,.3);background:transparent}
.mp.zf{border-color:#5b9bd5;background:#5b9bd5}.mp.ze{border-color:rgba(91,155,213,.3);background:transparent}
.nl{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.nc{background:var(--bg1);border:1px solid rgba(200,149,42,.15);border-radius:8px;padding:14px;transition:border-color .2s}
.nc:hover{border-color:rgba(200,149,42,.3)}.nc.dead{opacity:.5;filter:grayscale(.5)}
.nr2{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.nn{font-family:'Cinzel',serif;font-size:1rem;color:#f0c060;font-weight:600}
.badge{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.08em;padding:3px 8px;border-radius:2px;border:1px solid}
.be{border-color:#8b1a1a;color:#ff8080;background:rgba(139,26,26,.12)}
.ba{border-color:rgba(60,180,80,.4);color:#7ef0a0;background:rgba(60,180,80,.07)}
.bn{border-color:rgba(200,149,42,.4);color:#c8952a;background:rgba(200,149,42,.07)}
.ns{font-size:.78rem;color:var(--text-dim);margin-bottom:8px}
.nnt{font-size:.82rem;color:rgba(var(--text-rgb,245,230,200),.45);font-style:italic;margin-bottom:8px}
.nct{display:flex;gap:6px;flex-wrap:wrap}
.nbtn{background:var(--bg2);border:1px solid rgba(200,149,42,.15);color:var(--text-mid);font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.05em;padding:5px 11px;cursor:pointer;border-radius:3px;transition:all .15s}
.nbtn.rm:hover{border-color:#8b1a1a;color:#ff9090}
.danger-btn{background:rgba(139,26,26,.1);border:1px solid rgba(139,26,26,.35);border-radius:4px;color:#ff9090;font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.1em;padding:8px 16px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.danger-btn:hover{background:rgba(139,26,26,.2);border-color:#c03030}
.confirm-box{background:#1e1710;border:1px solid rgba(139,26,26,.4);border-radius:8px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.confirm-box span{font-size:.9rem;color:rgba(var(--text-rgb,245,230,200),.7);font-style:italic}
.confirm-btns{display:flex;gap:8px}
.yes-btn{background:rgba(139,26,26,.15);border:1px solid #c03030;border-radius:4px;color:#ff9090;font-family:'Cinzel',serif;font-size:.68rem;padding:6px 14px;cursor:pointer;transition:all .15s;text-transform:uppercase}
.yes-btn:hover{background:rgba(139,26,26,.3)}
.no-btn{background:rgba(200,149,42,.08);border:1px solid rgba(200,149,42,.3);border-radius:4px;color:var(--text-mid);font-family:'Cinzel',serif;font-size:.68rem;padding:6px 14px;cursor:pointer;transition:all .15s;text-transform:uppercase}
.no-btn:hover{border-color:#c8952a;color:#f0c060}
.dm-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:12px;background:rgba(139,26,26,.05);border:1px solid rgba(139,26,26,.15);border-radius:6px}
.an{background:var(--bg1);border:1px dashed rgba(200,149,42,.2);border-radius:8px;padding:16px}
.an h3{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.15em;color:#c8952a;margin-bottom:12px;text-transform:uppercase}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fin{background:var(--bg2);border:1px solid rgba(200,149,42,.2);border-radius:4px;color:var(--text);font-family:'Crimson Text',serif;font-size:.95rem;padding:6px 10px;outline:none;width:100%}
.fin:focus{border-color:var(--gold)}.fin option{background:var(--bg1)}
.ab{background:rgba(200,149,42,.1);border:1px solid rgba(200,149,42,.35);border-radius:4px;color:#f0c060;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.12em;padding:9px 20px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.ab:hover{background:rgba(200,149,42,.18)}
.em{text-align:center;padding:28px;color:rgba(var(--text-rgb,245,230,200),.25);font-style:italic}
.floating-nb{position:fixed;bottom:148px;right:22px;width:320px;max-height:480px;background:var(--bg1);border:1px solid rgba(200,149,42,.35);border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.7);z-index:498;display:flex;flex-direction:column;animation:chat-in .2s ease-out;overflow:hidden}
.floating-nb-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(200,149,42,.12);flex-shrink:0;cursor:move;background:rgba(200,149,42,.04)}
.floating-nb-title{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase}
.floating-nb-body{flex:1;overflow-y:auto;padding:10px}
.nb-float-btn{position:fixed;bottom:84px;right:22px;z-index:500}
.nb-float-toggle{width:52px;height:52px;border-radius:50%;background:rgba(200,149,42,.12);border:2px solid rgba(200,149,42,.5);color:var(--gold-light);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .2s;position:relative}
.nb-float-toggle:hover{background:rgba(200,149,42,.25);transform:scale(1.05)}
.nb-float-badge{position:absolute;top:-4px;right:-4px;background:#f0c060;color:#0d0705;border-radius:50%;width:18px;height:18px;font-size:.6rem;font-family:'Cinzel',serif;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg0)}
.boss-npc{background:rgba(20,5,5,.98)!important;box-shadow:0 0 20px rgba(180,40,40,.25);animation:boss-border 3s ease-in-out infinite}
@keyframes boss-border{0%,100%{border-color:rgba(200,149,42,.8)}50%{border-color:rgba(180,40,40,.9)}}
.boss-npc .nn{background:linear-gradient(90deg,#c8952a,#8b1a1a,#c8952a);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:boss-text 3s ease-in-out infinite}
@keyframes boss-text{0%,100%{background-position:0%}50%{background-position:100%}}
.mc.boss-card{animation:boss-border 3s ease-in-out infinite}
.mc.boss-card .mnm{background:linear-gradient(90deg,#c8952a,#8b1a1a,#c8952a);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:boss-text 3s ease-in-out infinite}
.em span{display:block;font-size:2rem;margin-bottom:8px;opacity:.3}
.mw{max-width:860px;margin:0 auto;padding:0 18px 20px}
.mh{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.22em;color:rgba(200,149,42,.5);text-transform:uppercase;border-bottom:1px solid rgba(200,149,42,.1);padding-bottom:5px;margin-bottom:10px}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px}
.mc{border-radius:7px;padding:10px 12px 9px;border:1px solid;position:relative;overflow:hidden;transition:all .3s}
/* Durum animasyonları */
.mc.st-zehirli{animation:st-poison 2s ease-in-out infinite}
@keyframes st-poison{0%,100%{box-shadow:inset 0 0 12px rgba(80,180,40,.2)}50%{box-shadow:inset 0 0 24px rgba(80,180,40,.5);border-color:rgba(80,180,40,.6)!important}}
.mc.st-baygın{animation:st-stun 1.5s ease-in-out infinite;filter:brightness(.85)}
@keyframes st-stun{0%,100%{box-shadow:inset 0 0 10px rgba(240,200,50,.2)}50%{box-shadow:inset 0 0 22px rgba(240,200,50,.5);border-color:rgba(240,200,50,.5)!important}}
.mc.st-panik{animation:st-panic .8s ease-in-out infinite}
@keyframes st-panic{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
.mc.st-kör{filter:contrast(.7) brightness(.8)}
.mc.st-sağır{opacity:.85}
.mc.st-şaşkın{animation:st-confuse 3s linear infinite}
@keyframes st-confuse{0%{box-shadow:inset 0 0 10px rgba(180,80,220,.2)}50%{box-shadow:inset 0 0 20px rgba(80,160,220,.3)}100%{box-shadow:inset 0 0 10px rgba(180,80,220,.2)}}
.mc.st-sıkıştı{box-shadow:inset 0 0 18px rgba(160,100,40,.4);border-color:rgba(160,100,40,.6)!important}
/* Status badges */
.status-badges{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.status-badge{font-size:.65rem;padding:1px 5px;border-radius:3px;cursor:default;border:1px solid;white-space:nowrap}
.sb-zehirli{background:rgba(80,180,40,.15);border-color:rgba(80,180,40,.4);color:#7ef07e}
.sb-baygın{background:rgba(240,200,50,.12);border-color:rgba(240,200,50,.4);color:#f0e050}
.sb-panik{background:rgba(220,60,60,.12);border-color:rgba(220,60,60,.4);color:#ff9090}
.sb-kör{background:rgba(60,60,60,.2);border-color:rgba(120,120,120,.4);color:#aaa}
.sb-sağır{background:rgba(80,80,120,.15);border-color:rgba(80,80,180,.3);color:#a0a8f0}
.sb-şaşkın{background:rgba(180,80,220,.12);border-color:rgba(180,80,220,.4);color:#d090f0}
.sb-sıkıştı{background:rgba(160,100,40,.15);border-color:rgba(160,100,40,.4);color:#c8a070}
/* Hasar rengi — 0 pip kaldıkça koyulaşır */
.mc.dmg1{box-shadow:inset 0 0 12px rgba(180,40,40,.15)}
.mc.dmg2{box-shadow:inset 0 0 20px rgba(180,40,40,.3);border-color:rgba(180,40,40,.5)!important}
.mc.dmg3{box-shadow:inset 0 0 30px rgba(180,40,40,.5);border-color:#8b1a1a!important;animation:dmg-pulse 2s ease-in-out infinite}
@keyframes dmg-pulse{0%,100%{box-shadow:inset 0 0 30px rgba(180,40,40,.5)}50%{box-shadow:inset 0 0 40px rgba(180,40,40,.8)}}
/* Mp pip butonları */
.mp{width:12px;height:12px;border-radius:50%;border:1.5px solid;cursor:pointer;transition:all .15s}
.mp:hover{transform:scale(1.25)}
.mp:disabled{cursor:default}
.mp.ff{border-color:#4caf7d;background:#4caf7d}.mp.fe{border-color:rgba(76,175,125,.3)}.mp.fe:hover{border-color:#4caf7d;background:rgba(76,175,125,.2)}
.mp.zf{border-color:#5b9bd5;background:#5b9bd5}.mp.ze{border-color:rgba(91,155,213,.3)}.mp.ze:hover{border-color:#5b9bd5;background:rgba(91,155,213,.2)}
.mc::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(255,255,255,.04),transparent 70%);pointer-events:none}
.mc:hover{transform:translateY(-1px)}
.mc.player{background:var(--bg1);border-color:rgba(200,149,42,.35)}
.mc.player.me{border-color:#f0c060;border-width:2px;box-shadow:0 0 12px rgba(240,192,96,.2)}
.ts{font-size:.62rem;color:rgba(var(--text-rgb,245,230,200),.3);margin-left:auto;white-space:nowrap}

/* Avatar */
.avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px}
.avatar-img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);box-shadow:0 0 14px rgba(200,149,42,.3)}
.avatar-placeholder{width:80px;height:80px;border-radius:50%;background:var(--bg2);border:2px dashed rgba(200,149,42,.3);display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;transition:all .2s}
.avatar-placeholder:hover{border-color:var(--gold);background:rgba(200,149,42,.08)}
.avatar-upload-btn{background:transparent;border:1px solid rgba(200,149,42,.25);border-radius:4px;color:var(--text-dim);font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.08em;padding:4px 12px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.avatar-upload-btn:hover{border-color:var(--gold);color:var(--gold)}

/* Chat bubble */
.chat-bubble{position:fixed;bottom:22px;right:22px;z-index:500}

// saglik = dolu pip sayısı (max=tam sağlıklı, 0=ölü)
function PipBar({type,saglik,maxPips,onChange,disabled}){
  const c=type==="fiziksel"?"f":"z";
  const max=maxPips||3;
  return <div className="ch">
    <span className={`cl ${c}`}>{type==="fiziksel"?"⚔ Beden":"🧠 Zihin"}</span>
    <div className="pr">{Array.from({length:max}).map((_,i)=>{
      const dolu=i<saglik;
      return <button key={i} className={`pip ${c}${dolu?"f":"e"}`} disabled={disabled}
        onClick={()=>{ if(dolu) onChange(saglik-1===i?saglik-1:saglik-1); else onChange(i+1); }}
      />;
    })}</div>
  </div>;
}
function NpcPips({type,saglik,maxPips,onChange,disabled}){
  const c=type==="fiziksel"?"f":"z";
  const max=maxPips||3;
  return <div className="ncr">
    <span className={`ncl ${c}`}>{type==="fiziksel"?"Beden":"Zihin"}</span>
    {Array.from({length:max}).map((_,i)=>{
      const dolu=i<saglik;
      return <button key={i} className={`np ${c}${dolu?"f":"e"}`} disabled={disabled}
        onClick={()=>{ onChange(dolu?saglik-1:i+1); }}
      />;
    })}
  </div>;
}
function StatusPicker({statuses,onChange,disabled}){
  const active=statuses||[];
  const toggle=id=>{
    if(disabled)return;
    const has=active.includes(id);
    onChange(has?active.filter(s=>s!==id):[...active,id]);
  };
  return <div className="status-badges" style={{marginTop:6}}>
    {STATUSES.map(s=>(
      <button key={s.id}
        className={"status-badge "+(active.includes(s.id)?s.cls:"" )}
        style={{
          background:active.includes(s.id)?undefined:"transparent",
          borderColor:active.includes(s.id)?undefined:"rgba(245,230,200,.12)",
          color:active.includes(s.id)?undefined:"rgba(245,230,200,.25)",
          cursor:disabled?"default":"pointer",
          transition:"all .2s"
        }}
        onClick={()=>toggle(s.id)}
        title={s.label}
      >
        {s.icon} {s.label}
      </button>
    ))}
  </div>;
}

function MPs({type,saglik,maxPips,onChange,disabled}){
  const c=type==="fiziksel"?"f":"z";
  const max=maxPips||3;
  return <div className="mpr" style={{gap:4}}>
    {Array.from({length:max}).map((_,i)=>(
      <button key={i}
        className={`mp ${c}${i<saglik?"f":"e"}`}
        disabled={disabled}
        onClick={onChange?()=>onChange(i<saglik?saglik-1:i+1):undefined}
        style={{cursor:onChange&&!disabled?"pointer":"default",width:14,height:14,border:"none",padding:0,borderRadius:"50%",transition:"all .15s",outline:"none"}}
      />
    ))}
  </div>;
}

function Masa({me,role,char,npcs,all,avatars,onPipChange,onNpcPipChange}){
  const tl={player:"OYUNCU",ally:"MÜTTEFİK",neutral:"TARAFSIZ",enemy:"DÜŞMAN"};
  const isDM=role==="dm";

  const myCard=isDM?null:{
    key:`p-${me}`, type:"player", isMe:true,
    name:char.name||me,
    sub:[char.race,char.level?`Seviye ${char.level}`:null].filter(Boolean).join(" · ")||"—",
    fiziksel:char.fiziksel!=null?char.fiziksel:3, zihinsel:char.zihinsel!=null?char.zihinsel:3,
    fizMax:3, zihMax:3, pname:me,
    statuses:char.statuses||[],
    dead:(char.fiziksel!=null?char.fiziksel:3)<=0&&(char.zihinsel!=null?char.zihinsel:3)<=0
  };

  const otherPCs=all.filter(p=>p.name!==me&&p.role!=="dm").map(p=>{
    const c=p.char||{};
    return{key:`p-${p.name}`,type:"player",isMe:false,
      name:c.name||p.name,
      sub:[c.race,c.level?`Seviye ${c.level}`:null].filter(Boolean).join(" · ")||"—",
      fiziksel:c.fiziksel!=null?c.fiziksel:3,zihinsel:c.zihinsel!=null?c.zihinsel:3,
      fizMax:3,zihMax:3,pname:p.name,statuses:c.statuses||[],
      dead:(c.fiziksel!=null?c.fiziksel:3)<=0&&(c.zihinsel!=null?c.zihinsel:3)<=0};
  });

  const npcCards=npcs.map(n=>({key:`n-${n.id}`,type:n.type,isMe:false,name:n.name,boss:n.boss||false,
    sub:`ZS ${n.ac} · CR ${n.cr}${n.boss?" · BOSS":""}`,
    fiziksel:n.fiziksel!=null?n.fiziksel:(n.fizMax||3),
    zihinsel:n.zihinsel!=null?n.zihinsel:(n.zihMax||3),
    fizMax:n.fizMax||3,zihMax:n.zihMax||3,npcId:n.id,statuses:n.statuses||[],
    dead:(n.fiziksel!=null?n.fiziksel:(n.fizMax||3))<=0&&(n.zihinsel!=null?n.zihinsel:(n.zihMax||3))<=0}));

  const ord={ally:1,neutral:2,enemy:3};
  const others=[...otherPCs,...npcCards].sort((a,b)=>(ord[a.type]||0)-(ord[b.type]||0));
  const cards=[myCard,...others].filter(Boolean);

  if(!cards.length)return null;
  return <div className="mw">
    <div className="mh">⚔ Masa Durumu</div>
    <div className="mg">{cards.map(card=>{
      // Pip değişiklik yetkileri
      const canEdit=isDM||(card.isMe&&onPipChange);
      const onFiz=canEdit?(v=>card.npcId?onNpcPipChange&&onNpcPipChange(card.npcId,"fiziksel",v):onPipChange&&onPipChange(card.pname||me,"fiziksel",v)):null;
      const onZih=canEdit?(v=>card.npcId?onNpcPipChange&&onNpcPipChange(card.npcId,"zihinsel",v):onPipChange&&onPipChange(card.pname||me,"zihinsel",v)):null;
      const onStatus=isDM?(newStatuses=>{
        if(card.npcId&&onNpcPipChange) onNpcPipChange(card.npcId,"statuses",newStatuses);
        else if(card.pname&&onPipChange) onPipChange(card.pname,"statuses",newStatuses);
      }):null;
      const fiz=card.fiziksel!=null?card.fiziksel:(card.fizMax||3);
      const zih=card.zihinsel!=null?card.zihinsel:(card.zihMax||3);
      const fmax=card.fizMax||3; const zmax=card.zihMax||3;
      const healthPct=((fiz+zih)/(fmax+zmax));
      const dmgClass=card.dead?"":(healthPct<=0.33?" dmg3":healthPct<=0.66?" dmg2":healthPct<1?" dmg1":"");
      const cardStatuses=card.statuses||[];
      const statusAnimClasses=cardStatuses.map(sid=>{const s=STATUSES.find(x=>x.id===sid);return s?" "+s.animCls:"";}).join("");
      return <div key={card.key} className={`mc ${card.type}${card.dead?" dead":""}${card.isMe?" me":""}${card.boss?" boss-card":""}${dmgClass}${statusAnimClasses}`}>
        {card.dead&&<span className="sku">💀</span>}
        {card.type==="player"&&avatars&&avatars[card.key.replace("p-","")]&&
          <img src={avatars[card.key.replace("p-","")]} style={{width:32,height:32,borderRadius:"50%",objectFit:"cover",border:"1px solid rgba(200,149,42,.4)",marginBottom:5}} alt=""/>}
        <div className="mtg">{card.isMe?"👤 SEN":card.boss?"💀 BOSS":tl[card.type]}</div>
        <div className="mnm">{card.name}</div>
        <div className="msb">{card.sub}</div>
        <div style={{display:"flex",flexDirection:"column",gap:5,marginTop:6}}>
          <MPs type="fiziksel" saglik={card.fiziksel} maxPips={card.fizMax||3} onChange={onFiz} disabled={!canEdit}/>
          <MPs type="zihinsel" saglik={card.zihinsel} maxPips={card.zihMax||3} onChange={onZih} disabled={!canEdit}/>
        </div>
        {card.ac&&<div style={{fontSize:".65rem",color:"rgba(var(--text-rgb,245,230,200),.3)",marginTop:5}}>ZS {card.ac}</div>}
        {cardStatuses.length>0&&<div className="status-badges">
          {cardStatuses.map(sid=>{const s=STATUSES.find(x=>x.id===sid);return s?<span key={sid} className={"status-badge "+s.cls}>{s.icon} {s.label}</span>:null;})}
        </div>}
        {isDM&&onStatus&&<StatusPicker statuses={cardStatuses} onChange={onStatus} disabled={false}/>}
      </div>;
    })}
    </div>
  </div>;
}

function Smoke(){
  const [puffs,setPuffs]=useState([]);
  useEffect(()=>{
    const cx=window.innerWidth/2;
    const cy=window.innerHeight*0.4;
    const colors=["#1a0a0a","#2d0d0d","#3a1a1a","#1c1010","#0d0505","#2a1515","#150808","#241212"];
    const count=28;
    const newPuffs=Array.from({length:count},(_,i)=>{
      const angle=(i/count)*Math.PI*2+(Math.random()-0.5)*0.6;
      const dist=60+Math.random()*180;
      const dx=Math.cos(angle)*dist*(0.7+Math.random()*0.6);
      const dy=Math.sin(angle)*dist*(0.5+Math.random()*0.5)-Math.random()*60;
      const size=40+Math.random()*90;
      return{
        id:i,
        x:cx+Math.random()*80-40,
        y:cy+Math.random()*40-20,
        dx,dy,
        size,
        color:colors[i%colors.length],
        blur:8+Math.random()*16,
        scale:2+Math.random()*2.5,
        dur:1.4+Math.random()*0.8,
        delay:Math.random()*0.25,
      };
    });
    setPuffs(newPuffs);
    const t=setTimeout(()=>setPuffs([]),2400);
    return()=>clearTimeout(t);
  },[]);
  return <>
    <div className="smoke-flash"/>
    <div className="smoke-overlay">
      {puffs.map(p=><div key={p.id} className="smoke-puff" style={{
        left:p.x, top:p.y,
        width:p.size, height:p.size,
        marginLeft:-p.size/2, marginTop:-p.size/2,
        background:`radial-gradient(circle,${p.color} 0%,transparent 70%)`,
        '--dx':`${p.dx}px`,'--dy':`${p.dy}px`,
        '--blur':`${p.blur}px`,'--sc':p.scale,'--dur':`${p.dur}s`,
        animationDelay:`${p.delay}s`,
      }}/>)}
    </div>
  </>;
}

function Fireworks(){
  const [sparks,setSparks]=useState([]);
  useEffect(()=>{
    const colors=["#ffd700","#ff6b35","#f7c59f","#efefd0","#4ecdc4","#ff6b6b","#c7f2a4","#e8d5b7"];
    const count=60;
    const cx=window.innerWidth/2, cy=window.innerHeight*0.35;
    const newSparks=Array.from({length:count},(_,i)=>{
      const angle=(i/count)*Math.PI*2;
      const dist=80+Math.random()*220;
      const dx=Math.cos(angle)*dist*(0.6+Math.random()*0.8);
      const dy=Math.sin(angle)*dist*(0.6+Math.random()*0.8)-Math.random()*80;
      return{id:i,x:cx+Math.random()*60-30,y:cy+Math.random()*40-20,dx,dy,color:colors[i%colors.length],size:4+Math.random()*6,delay:Math.random()*0.3};
    });
    setSparks(newSparks);
    const t=setTimeout(()=>setSparks([]),1600);
    return()=>clearTimeout(t);
  },[]);
  return <div className="fireworks">
    {sparks.map(s=><div key={s.id} className="spark" style={{
      left:s.x,top:s.y,width:s.size,height:s.size,
      background:s.color,boxShadow:`0 0 6px ${s.color}`,
      '--dx':`${s.dx}px`,'--dy':`${s.dy}px`,
      animationDelay:`${s.delay}s`,animationDuration:"1.2s"
    }}/>)}
  </div>;
}

function Dice({me,role,char,npcs,all,rolls,onRoll,animOn,avatars,onPipChange,onNpcPipChange}){
  const [mod,setMod]=useState("0");
  const [showFW,setShowFW]=useState(false);
  const [showSmoke,setShowSmoke]=useState(false);
  const [showHistory,setShowHistory]=useState(false);
  const [showSkillPicker,setShowSkillPicker]=useState(false);
  const {latest,feed,akey}=rolls;
  const ic=(latest&&latest.sides)===20&&(latest&&latest.raw)===20;
  const fu=(latest&&latest.sides)===20&&(latest&&latest.raw)===1;

  const prevAkey=useRef(0);
  const clickTimer=useRef(null);

  useEffect(()=>{
    if(akey!==prevAkey.current){
      prevAkey.current=akey;
      if(ic&&animOn){ setShowFW(true); setTimeout(()=>setShowFW(false),1600); }
      if(fu&&animOn){ setShowSmoke(true); setTimeout(()=>setShowSmoke(false),2400); }
    }
  },[akey,ic,fu]);

  const roll=async(s,skillMod,skillName)=>{
    const raw=Math.floor(Math.random()*s)+1;
    const m=skillMod!=null?skillMod:(parseInt(mod)||0);
    const label=skillName||null;
    await onRoll({sides:s,raw,modifier:m,total:raw+m,skillName:label});
    setShowSkillPicker(false);
  };

  // d20 tek tık → düz at, çift tık → skill picker
  const handleD20Click=()=>{
    if(clickTimer.current){
      // Çift tık → skill picker aç
      clearTimeout(clickTimer.current);
      clickTimer.current=null;
      setShowSkillPicker(s=>!s);
    } else {
      // Tek tık → düz at (250ms içinde çift tık gelmezse)
      clickTimer.current=setTimeout(()=>{
        clickTimer.current=null;
        roll(20,parseInt(mod)||0,null);
      },250);
    }
  };

  // Karakterin tüm skill'leri modifier ile
  const charSkills=Object.entries((char&&char.skills)||{})
    .sort((a,b)=>b[1]-a[1])
    .map(([name,lv])=>({name,lv}));

  const isDM=role==="dm";

  return <div className="panel">
    {showFW&&<Fireworks/>}
    {showSmoke&&<Smoke/>}
    <div className="dg">
      {DICE.map(d=>{
        if(d.s===20){
          return <button key={d.s} className="db" onClick={handleD20Click} title="Tek tık: Düz at | Çift tık: Skill seç">
            <span className="di">{d.i}</span>
            <span className="dl">d20</span>
          </button>;
        }
        return <button key={d.s} className="db" onClick={()=>roll(d.s)}><span className="di">{d.i}</span><span className="dl">d{d.s}</span></button>;
      })}
    </div>

    {/* d20 Skill Picker */}
    {showSkillPicker&&(
      <div style={{background:"var(--bg1)",border:"1px solid rgba(200,149,42,.25)",borderRadius:8,padding:12,marginBottom:12,animation:"fp .2s ease-out"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",letterSpacing:".12em",color:"var(--gold)",textTransform:"uppercase"}}>⚔ d20 — Skill Seç</span>
          <button onClick={()=>setShowSkillPicker(false)} style={{background:"transparent",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:".9rem"}}>✕</button>
        </div>
        {charSkills.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".85rem",marginBottom:8}}>Henüz skill eklenmemiş.</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
          {charSkills.map(({name,lv})=>{
            const isFiz=FIZIKSEL_SKILLS.includes(name);
            const isPos=lv>0;
            return(
              <button key={name} onClick={()=>roll(20,lv,name)}
                style={{
                  background:isFiz?"rgba(76,175,125,.08)":"rgba(91,155,213,.08)",
                  border:`1px solid ${isFiz?"rgba(76,175,125,.3)":"rgba(91,155,213,.3)"}`,
                  borderRadius:6,padding:"8px 10px",cursor:"pointer",textAlign:"left",
                  transition:"all .15s",display:"flex",justifyContent:"space-between",alignItems:"center"
                }}
                onMouseEnter={e=>{e.currentTarget.style.background=isFiz?"rgba(76,175,125,.18)":"rgba(91,155,213,.18)";}}
                onMouseLeave={e=>{e.currentTarget.style.background=isFiz?"rgba(76,175,125,.08)":"rgba(91,155,213,.08)";}}
              >
                <span style={{fontFamily:"'Crimson Text',serif",fontSize:".9rem",color:"var(--parchment)"}}>{name}</span>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:".75rem",fontWeight:"700",color:isPos?"#7ef0a0":"#ff9090",marginLeft:8}}>
                  {lv>0?"+":""}{lv}
                </span>
              </button>
            );
          })}
        </div>
        <button onClick={()=>roll(20,parseInt(mod)||0,null)}
          style={{width:"100%",background:"rgba(200,149,42,.08)",border:"1px solid rgba(200,149,42,.2)",borderRadius:6,padding:"7px",fontFamily:"'Cinzel',serif",fontSize:".65rem",letterSpacing:".1em",color:"var(--gold)",cursor:"pointer",textTransform:"uppercase"}}>
          Modifier ile At ({parseInt(mod)||0 >= 0 ? "+" : ""}{parseInt(mod)||0})
        </button>
      </div>
    )}

    <div className="mr"><label>Modifier</label><input className="mi" type="number" value={mod} onChange={e=>setMod(e.target.value)}/></div>
    <div className="ra">
      {latest?<>
        <div className="rw">{latest.player}{latest.skillName?` — ${latest.skillName}`:` — d${latest.sides}`}</div>
        <div key={akey} className={`rn ra2${ic?" crit":fu?" fum":""}`}>{latest.total}</div>
        <div className="rm">{ic?"✨ Crit Success!":fu?"💀 Crit Fail!":`${latest.raw}${latest.modifier!==0?` + (${latest.modifier>0?"+":""}${latest.modifier})`:""}`}</div>
      </>:<div className="rm">Bir zar seç ve at... (d20 çift tık = skill seç)</div>}
    </div>

    {feed.length>0&&<>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div className="ft" style={{margin:0,border:"none",padding:0}}>Son Atışlar</div>
        {feed.length>4&&<button onClick={()=>setShowHistory(true)} style={{background:"transparent",border:"none",color:"rgba(200,149,42,0.6)",fontFamily:"'Cinzel',serif",fontSize:".65rem",letterSpacing:".08em",cursor:"pointer",textDecoration:"underline",textUnderlineOffset:3}}>Tümünü Gör ({feed.length}) →</button>}
      </div>
      <div className="feed">{feed.slice(0,4).map((r,i)=>{
        const c=r.sides===20&&r.raw===20?"crit":r.sides===20&&r.raw===1?"fum":"";
        return <div key={r.id} className={`fi${i===0?" nr":""}`}>
          <span className="fdie">{DI[r.sides]||"🎲"}</span>
          <div className="fb"><div className="fp">{r.skillName||r.player}<span className="ts">{fmtTime(r.time||r.id)}</span></div><div className="fd">{r.skillName?r.player+" · ":""}d{r.sides} = {r.raw}{r.modifier!==0?` + (${r.modifier>0?"+":""}${r.modifier})`:""}{c==="crit"?" ✨ Crit!":c==="fum"?" 💀 Fail!":""}</div></div>
          <div className={`fv ${c}`}>{r.total}</div>
        </div>;
      })}</div>
    </>}
    {showHistory&&<HistoryModal feed={feed} onClose={()=>setShowHistory(false)}/>}
    <div style={{height:24}}/>
    <Masa me={me} role={role} char={char} npcs={npcs} all={all} avatars={avatars} onPipChange={onPipChange} onNpcPipChange={onNpcPipChange}/>
  </div>;
}
