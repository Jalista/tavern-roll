                {av?<img src={av} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span>x</span>}
              </div>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"var(--parchment)"}}>{c.name||p.name}</span>
            </button>;
          }))}
          {pickModal.type==="npc"&&(npcs.length===0?<p style={{color:"var(--text-dim)",fontSize:".8rem",fontStyle:"italic",margin:0}}>NPC yok.</p>:npcs.map(n=>(
            <button key={n.id} onClick={()=>{addPin(pickModal.col,pickModal.row,"npc",n.name,n.id);setPickModal(null);}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:"rgba(220,80,50,.06)",border:"1px solid rgba(220,80,50,.15)",borderRadius:7,padding:"8px 10px",cursor:"pointer",marginBottom:5,transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(220,80,50,.14)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(220,80,50,.06)"}>
              <span style={{fontSize:"1.1rem"}}>💀</span>
              <div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:".7rem",color:"var(--parchment)"}}>{n.name}</div>
                <div style={{fontSize:".58rem",color:"var(--text-dim)"}}>ZS {n.ac} CR {n.cr}</div>
              </div>
            </button>
          )))}
        </div>
      )}

      {/* Per-pin suruklenebilir kartlar */}
      {pins.filter(p=>openCards[p.id]).map(pin=>{
        const pt=getPT(pin);
        const info=getPinInfo(pin);
        const animCls=statusAnimCls(info.statuses);
        const pos=openCards[pin.id];
        const closeCard=()=>setOpenCards(c=>{const n={...c};delete n[pin.id];return n;});
        const startDrag=(e)=>{
          const sx=e.clientX-pos.x;
          const sy=e.clientY-pos.y;
          const onMove=(mv)=>setOpenCards(c=>({...c,[pin.id]:{x:mv.clientX-sx,y:mv.clientY-sy}}));
          const onUp=()=>{document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);};
          document.addEventListener("mousemove",onMove);
          document.addEventListener("mouseup",onUp);
        };
        return(
          <div key={pin.id} className={animCls} style={{position:"fixed",left:Math.max(10,pos.x),top:Math.max(10,pos.y),width:218,background:"rgba(14,8,4,.98)",border:"2px solid "+(info.dead?"rgba(80,40,40,.6)":pt.stroke+"88"),borderRadius:12,padding:12,zIndex:450,boxShadow:"0 8px 40px rgba(0,0,0,.85)",opacity:info.dead?.75:1}}>
            <div onMouseDown={startDrag} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,cursor:"grab",paddingBottom:7,borderBottom:"1px solid rgba(200,149,42,.1)"}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:".5rem",letterSpacing:".1em",color:info.dead?"rgba(120,60,60,.7)":"rgba(200,149,42,.35)",textTransform:"uppercase"}}>{info.dead?"OLU":pin.type}</span>
              <button onClick={closeCard} style={{background:"transparent",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:".9rem",lineHeight:1}}>x</button>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:8}}>
              <div style={{width:44,height:44,borderRadius:"50%",border:"2px solid "+(info.dead?"rgba(80,40,40,.5)":pt.stroke),overflow:"hidden",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.3)",filter:info.dead?"grayscale(.8)":"none"}}>
                {info.dead?<span style={{fontSize:"1.4rem"}}>💀</span>:info.av?<img src={info.av} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:"1.2rem"}}>{pt.icon}</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:".78rem",fontWeight:700,color:info.dead?"rgba(120,60,60,.7)":pt.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{info.name}{info.dead?" - OLU":""}</div>
                {info.sub&&<div style={{fontSize:".6rem",color:"var(--text-dim)",marginTop:1}}>{info.sub}</div>}
                {info.note&&<div style={{fontSize:".6rem",color:"var(--text-mid)",fontStyle:"italic",marginTop:1}}>{info.note}</div>}
              </div>
              {(isDM||pin.owner===me)&&<button onClick={()=>removePin(pin.id)} style={{background:"transparent",border:"none",color:"rgba(180,40,40,.35)",cursor:"pointer",fontSize:".9rem",lineHeight:1,flexShrink:0,alignSelf:"flex-start"}} onMouseEnter={e=>e.currentTarget.style.color="rgba(220,60,60,.7)"} onMouseLeave={e=>e.currentTarget.style.color="rgba(180,40,40,.35)"}>x</button>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:6}}>
              <PipRow type="fiziksel" val={info.fiz} max={info.fizMax}
                onChange={isDM?(v=>{
                  if(pin.type==="player"){const p=all.find(x=>x.name===(pin.entityId||pin.name));if(p){const updated={...(p.char||{}),fiziksel:v};fbSet("chars/"+p.name,updated);}}
                  else if(pin.type==="npc"){const n=npcs.find(x=>x.id===pin.entityId||x.name===pin.name);if(n){const updated={...n,fiziksel:v};const o={};npcs.map(x=>x.id===n.id?updated:x).forEach(x=>{o[x.id]=x;});fbSet("npcs",o);}}
                }):null}/>
              <PipRow type="zihinsel" val={info.zih} max={info.zihMax}
                onChange={isDM?(v=>{
                  if(pin.type==="player"){const p=all.find(x=>x.name===(pin.entityId||pin.name));if(p){const updated={...(p.char||{}),zihinsel:v};fbSet("chars/"+p.name,updated);}}
                  else if(pin.type==="npc"){const n=npcs.find(x=>x.id===pin.entityId||x.name===pin.name);if(n){const updated={...n,zihinsel:v};const o={};npcs.map(x=>x.id===n.id?updated:x).forEach(x=>{o[x.id]=x;});fbSet("npcs",o);}}
                }):null}/>
            </div>
            {info.statuses&&info.statuses.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:4}}>
              {info.statuses.map(sid=>{const s=STATUSES.find(x=>x.id===sid);return s?<span key={sid} className={"status-badge "+s.cls} style={{fontSize:".55rem",padding:"1px 5px"}}>{s.icon} {s.label}</span>:null;})}
            </div>}
          </div>
        );
      })}
    </div>
  );
}

function LobbyScreen({role,setRole,dmPass,setDmPass,dmErr,setDmErr,setName,setPhase}){
  const [lobbyMode,setLobbyMode]=useState("select");
  const [accounts,setAccounts]=useState({});
  const [regName,setRegName]=useState("");
  const [regPass,setRegPass]=useState("");
  const [regErr,setRegErr]=useState("");
  const [loginSel,setLoginSel]=useState("");
  const [loginPass,setLoginPass]=useState("");
  const [loginErr,setLoginErr]=useState("");

  useEffect(()=>{
    fbGet("accounts").then(data=>{ if(data) setAccounts(data); });
  },[]);

  const dmSelected=role==="dm";

  const register=async()=>{
    if(!regName.trim()){setRegErr("Isim gir!");return;}
    if(regPass.length<3){setRegErr("Sifre en az 3 karakter!");return;}
    if(accounts[regName]){setRegErr("Bu isim zaten kayitli!");return;}
    await fbSet("accounts/"+regName,{name:regName,pass:regPass});
    setName(regName);
    setPhase("game");
  };

  const loginAccount=async()=>{
    if(!loginSel){setLoginErr("Bir karakter sec!");return;}
    const acc=accounts[loginSel];
    if(!acc||acc.pass!==loginPass){setLoginErr("Sifre yanlis!");setTimeout(()=>setLoginErr(""),2000);return;}
    setName(acc.name);
    setPhase("game");
  };

  const joinDM=()=>{
    if(dmPass!=="05426654789"){setDmErr(true);setTimeout(()=>setDmErr(false),2000);return;}
    setName("DM");
    setPhase("game");
  };

  const accountList=Object.values(accounts);

  return(
    <div className="lobby">
      <h1 className="lt">TAVERN ROLL</h1>
      <p className="ls">Inci Companion</p>
      <div className="lc">
        <div className="lr" style={{marginBottom:16}}>
          <button className={"rb"+(role==="player"?" on":"")} onClick={()=>{setRole("player");setLobbyMode("select");}}>Oyuncu</button>
          <button className={"rb"+(role==="dm"?" on":"")} onClick={()=>setRole("dm")}>DM</button>
        </div>
        {dmSelected&&<>
          <input className="ii" type="password" placeholder="DM Sifresi..." value={dmPass} onChange={e=>setDmPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&joinDM()} style={{borderColor:dmErr?"#c03030":undefined}}/>
          {dmErr&&<div style={{color:"#ff6060",fontSize:".8rem",fontStyle:"italic",marginBottom:8,textAlign:"center"}}>Sifre yanlis!</div>}
          <button className="jb" onClick={joinDM}>Masaya Otur</button>
        </>}
        {!dmSelected&&lobbyMode==="select"&&<div style={{display:"flex",gap:8,marginBottom:16}}>
          <button className="jb" style={{flex:1,marginTop:0}} onClick={()=>setLobbyMode("register")}>Kayit Ol</button>
          <button className="jb" style={{flex:1,marginTop:0,background:"rgba(200,149,42,.08)"}} onClick={()=>setLobbyMode("login")}>Giris Yap</button>
        </div>}
        {!dmSelected&&lobbyMode==="register"&&<>
          <h2 style={{marginBottom:14}}>Kayit Ol</h2>
          <input className="ii" placeholder="Karakter adin..." value={regName} onChange={e=>{setRegName(e.target.value);setRegErr("");}}/>
          <input className="ii" type="password" placeholder="Sifre belirle..." value={regPass} onChange={e=>{setRegPass(e.target.value);setRegErr("");}} onKeyDown={e=>e.key==="Enter"&&register()}/>
          <div style={{background:"rgba(200,149,42,.06)",border:"1px solid rgba(200,149,42,.15)",borderRadius:5,padding:"8px 12px",marginBottom:10,fontSize:".75rem",color:"var(--text-mid)",fontStyle:"italic",lineHeight:1.5}}>
            Kendi sahsi sifrenizi kullanmayiniz.
          </div>
          {regErr&&<div style={{color:"#ff6060",fontSize:".78rem",marginBottom:8,textAlign:"center"}}>{regErr}</div>}
          <button className="jb" onClick={register} disabled={!regName.trim()}>Kayit Ol ve Giris Yap</button>
          <button className="rb" style={{width:"100%",marginTop:8}} onClick={()=>setLobbyMode("select")}>Geri</button>
        </>}
        {!dmSelected&&lobbyMode==="login"&&<>
          <h2 style={{marginBottom:14}}>Giris Yap</h2>
          {accountList.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".85rem",marginBottom:12,textAlign:"center"}}>Kayitli karakter yok.</div>}
          {accountList.length>0&&<>
            <select className="ii" style={{marginBottom:8}} value={loginSel} onChange={e=>setLoginSel(e.target.value)}>
              <option value="">-- Karakter sec --</option>
              {accountList.map(a=><option key={a.name} value={a.name}>{a.name}</option>)}
            </select>
            <input className="ii" type="password" placeholder="Sifren..." value={loginPass} onChange={e=>{setLoginPass(e.target.value);setLoginErr("");}} onKeyDown={e=>e.key==="Enter"&&loginAccount()}/>
            {loginErr&&<div style={{color:"#ff6060",fontSize:".78rem",marginBottom:8,textAlign:"center"}}>{loginErr}</div>}
            <button className="jb" onClick={loginAccount} disabled={!loginSel}>Giris Yap</button>
          </>}
          <button className="rb" style={{width:"100%",marginTop:8}} onClick={()=>setLobbyMode("select")}>Geri</button>
        </>}
      </div>
    </div>
  );
}


function exportCharPDF(char, avatarB64){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const now=new Date();
  const dateStr=now.toLocaleDateString("tr-TR",{year:"numeric",month:"long",day:"numeric"});
  const timeStr=now.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
  const W=210, M=18, CW=W-M*2;
  doc.setFillColor(13,7,5); doc.rect(0,0,W,297,"F");
  doc.setFillColor(30,23,16); doc.rect(0,0,W,52,"F");
  doc.setDrawColor(200,149,42); doc.setLineWidth(0.6); doc.line(M,52,W-M,52);
  if(avatarB64){try{doc.addImage(avatarB64,"JPEG",M,8,36,36);doc.setDrawColor(200,149,42);doc.setLineWidth(0.5);doc.circle(M+18,26,18,"S");}catch(e){}}
  const tx=avatarB64?M+44:M;
  doc.setFontSize(22);doc.setFont("helvetica","bold");doc.setTextColor(240,192,96);doc.text("Inci - Tavern Roll",tx,18);
  doc.setFontSize(15);doc.setTextColor(245,230,200);doc.text(char.name||"—",tx,28);
  doc.setFontSize(9);doc.setTextColor(160,130,80);
  const sub=[char.race,char.level?"Seviye "+char.level:null,char.age?"Yas: "+char.age:null].filter(Boolean).join("  -  ");
  doc.text(sub||"—",tx,36);doc.text(dateStr+" - "+timeStr,tx,43);
  let y=62;
  const section=(title)=>{
    doc.setFillColor(30,23,16);doc.roundedRect(M,y,CW,7,1,1,"F");
    doc.setDrawColor(200,149,42);doc.setLineWidth(0.3);doc.roundedRect(M,y,CW,7,1,1,"S");
    doc.setFontSize(7);doc.setFont("helvetica","bold");doc.setTextColor(200,149,42);
    doc.text(title.toUpperCase(),M+4,y+4.8);y+=11;
  };
  section("Kondisyon");
  const fiz=char.fiziksel!=null?char.fiziksel:3;
  const zih=char.zihinsel!=null?char.zihinsel:3;
  ["Fiziksel","Zihinsel"].forEach((lbl,idx)=>{
    const sag=idx===0?fiz:zih;
    const px=idx===0?M:M+CW/2;
    doc.setFontSize(7);doc.setFont("helvetica","normal");doc.setTextColor(140,120,80);doc.text(lbl,px,y+3);
    for(let i=0;i<3;i++){
      if(i<sag){doc.setFillColor(76,175,125);doc.circle(px+18+i*8,y+1.5,2.5,"F");}
      doc.setDrawColor(76,175,125);doc.setLineWidth(0.4);doc.circle(px+18+i*8,y+1.5,2.5,"S");
    }
  });
  y+=12;
  section("Saving Throwlar");
  const attrs=char.attrs||{};
  const attrKeys=["Guc","Ceviklik","Dayaniklilik","Zeka","Irfan","Karizma"];
  const attrReal=["Güç","Çeviklik","Dayanıklılık","Zeka","İrfan","Karizma"];
  const colW=CW/3;
  for(let i=0;i<6;i++){
    const col=i%3;const row=Math.floor(i/3);const fy=y+row*16;const fx=M+col*colW;
    doc.setFontSize(6.5);doc.setFont("helvetica","normal");doc.setTextColor(120,100,60);doc.text(attrKeys[i],fx,fy);
    doc.setFontSize(10);doc.setFont("helvetica","bold");doc.setTextColor(245,230,200);doc.text(String(attrs[attrReal[i]]||"—"),fx,fy+5.5);
    doc.setDrawColor(200,149,42);doc.setLineWidth(0.2);doc.line(fx,fy+7,fx+colW-2,fy+7);
  }
  y+=34;
  section("Skill Piramidi");
  const skills=char.skills||{};
  [5,4,3,2,1,-1,-2,-3,-4,-5].forEach(lv=>{
    const placed=Object.entries(skills).filter(([,v])=>v===lv).map(([k])=>k);
    if(!placed.length)return;
    doc.setFontSize(7.5);doc.setFont("helvetica","bold");
    if(lv>0){doc.setTextColor(76,175,125);}else{doc.setTextColor(180,40,40);}
    doc.text((lv>0?"+":"")+lv,M,y+4);
    doc.setFont("helvetica","normal");doc.setTextColor(200,200,200);
    doc.text(placed.join(", "),M+10,y+4);y+=7;
  });
  y+=4;
  if(char.notes&&char.notes.trim()){
    if(y>240){doc.addPage();doc.setFillColor(13,7,5);doc.rect(0,0,W,297,"F");y=20;}
    section("Notlar");
    doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(200,185,155);
    doc.splitTextToSize(char.notes,CW).forEach(line=>{
      if(y>280){doc.addPage();doc.setFillColor(13,7,5);doc.rect(0,0,W,297,"F");y=20;}
      doc.text(line,M,y);y+=5.5;
    });
  }
  doc.setDrawColor(200,149,42);doc.setLineWidth(0.3);doc.line(M,290,W-M,290);
  doc.setFontSize(7);doc.setFont("helvetica","normal");doc.setTextColor(100,80,40);
  doc.text("Inci - Tavern Roll",M,295);doc.text(dateStr,W-M,295,{align:"right"});
  const safeName=(char.name||"karakter").replace(/[^a-zA-Z0-9\s_-]/g,"").replace(/\s+/g,"_")||"karakter";
  doc.save("InciTavernRoll_"+safeName+"_"+now.getFullYear()+String(now.getMonth()+1).padStart(2,"0")+String(now.getDate()).padStart(2,"0")+".pdf");
}

function applyTheme(darkness){
  const d=darkness/100;
  const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
  const lerpHex=(r1,g1,b1,r2,g2,b2,t)=>{
    const r=lerp(r1,r2,t),g=lerp(g1,g2,t),b=lerp(b1,b2,t);
    return "#"+r.toString(16).padStart(2,"0")+g.toString(16).padStart(2,"0")+b.toString(16).padStart(2,"0");
  };
  const root=document.documentElement;
  const body=document.body;

  if(d===0){
    // Tam koyu — sadece class'ı kaldır, :root default'ları geçerli
    root.removeAttribute("data-theme");
    root.removeAttribute("style");
    body.style.background="";
    return;
  }

  if(d>=1){
    // Tam açık — light class ekle
    root.setAttribute("data-theme","light");
    root.removeAttribute("style");
    body.style.background="";
    return;
  }

  // Ara değer — interpolate et
  root.removeAttribute("data-theme");

  // Dark → Light renk geçişi
  const bg0=lerpHex(13,7,5,     214,201,176, d);
  const bg1=lerpHex(30,23,16,   232,221,200, d);
  const bg2=lerpHex(46,36,24,   207,194,168, d);
  const tR=lerp(245,44,d), tG=lerp(230,31,d), tB=lerp(200,14,d);
  const text="rgb("+tR+","+tG+","+tB+")";
  const textDim="rgba("+tR+","+tG+","+tB+","+(0.4+d*0.15)+")";
  const textMid="rgba("+tR+","+tG+","+tB+","+(0.6+d*0.15)+")";
  const gR=lerp(200,122,d),gG=lerp(149,79,d),gB=lerp(42,16,d);
  const gold="rgb("+gR+","+gG+","+gB+")";
  const goldLight=lerpHex(240,192,96, 94,58,8, d);
  const bA=(0.2+d*0.1);
  const border="rgba("+gR+","+gG+","+gB+","+bA+")";
  const borderGold="rgba("+gR+","+gG+","+gB+","+(bA*1.6)+")";
  const hR=lerp(13,180,d),hG=lerp(7,165,d),hB=lerp(5,140,d);
  const hdrBg="rgba("+hR+","+hG+","+hB+",.97)";

  root.style.setProperty("--bg0",bg0);
  root.style.setProperty("--bg1",bg1);
  root.style.setProperty("--bg2",bg2);
  root.style.setProperty("--text",text);
  root.style.setProperty("--text-dim",textDim);
  root.style.setProperty("--text-mid",textMid);
  root.style.setProperty("--gold",gold);
  root.style.setProperty("--gold-light",goldLight);
  root.style.setProperty("--border",border);
  root.style.setProperty("--border-gold",borderGold);
  root.style.setProperty("--parchment",text);
  root.style.setProperty("--hdr-bg",hdrBg);
  body.style.background=bg0;
}

// ─── INITIATIVE TRACKER ──────────────────────────────────────────────────────
function FloatingNotebook({me,isDM,charName}){
  const [open,setOpen]=useState(false);
  const [notebooks,setNBs]=useState([]);
  const [activeNb,setActiveNb]=useState(null);
  const [unlocked,setUnlocked]=useState({});
  const [passInput,setPassInput]=useState("");
  const [passErr,setPassErr]=useState(false);
  const [content,setContent]=useState({});
  const [saved,setSaved]=useState({});
  const saveTimers=useRef({});
  const dragRef=useRef(null);
  const posRef=useRef({x:0,y:0});

  useEffect(()=>{
    const load=async()=>{
      const data=await fbGet("notebooks");
      if(data) setNBs(Object.values(data).sort((a,b)=>a.createdAt-b.createdAt));
    };
    load();
    const iv=setInterval(load,5000);
    return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    if(!activeNb||!unlocked[activeNb.id])return;
    fbGet("nbcontent/"+activeNb.id).then(d=>{
      setContent(c=>({...c,[activeNb.id]:(d&&d.text)||""}));
    });
  },[activeNb,unlocked]);

  const tryUnlock=(nb)=>{
    if(passInput===nb.pass||isDM){
      setUnlocked(u=>({...u,[nb.id]:true}));setPassInput("");setPassErr(false);
    } else {setPassErr(true);setTimeout(()=>setPassErr(false),1500);}
  };

  const handleEdit=async(id,text)=>{
    setContent(c=>({...c,[id]:text}));
    clearTimeout(saveTimers.current[id]);
    saveTimers.current[id]=setTimeout(async()=>{
      const wc=text.trim()?text.trim().split(/\s+/).length:0;
      await fbSet("nbcontent/"+id,{text});
      await fbPatch("notebooks/"+id,{wordCount:wc});
      setSaved(s=>({...s,[id]:true}));
      setTimeout(()=>setSaved(s=>({...s,[id]:false})),1500);
    },700);
  };

  // Drag to move
  const onDragStart=(e)=>{
    const el=dragRef.current;
    if(!el)return;
    const rect=el.getBoundingClientRect();
    posRef.current={ox:e.clientX-rect.left,oy:e.clientY-rect.top};
    const onMove=(ev)=>{
      el.style.left=(ev.clientX-posRef.current.ox)+"px";
      el.style.top=(ev.clientY-posRef.current.oy)+"px";
      el.style.bottom="auto";
    };
    const onUp=()=>{document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);};
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  };

  const myNBs=notebooks.filter(nb=>nb.owner===me||isDM);

  return <>
    <div className="nb-float-btn">
      <button className="nb-float-toggle" onClick={()=>setOpen(o=>!o)} title="Not Defterleri">
        📓
        {myNBs.length>0&&<span className="nb-float-badge">{myNBs.length}</span>}
      </button>
    </div>
    {open&&<div className="floating-nb" ref={dragRef}>
      <div className="floating-nb-header" onMouseDown={onDragStart}>
        <span className="floating-nb-title">📓 Not Defterleri</span>
        <button onClick={()=>setOpen(false)} style={{background:"transparent",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:"1rem"}}>✕</button>
      </div>
      <div className="floating-nb-body">
        {!activeNb&&<>
          {notebooks.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".85rem",padding:"8px 0"}}>Henüz not defteri yok.</div>}
          {notebooks.map(nb=>(
            <div key={nb.id} className="nb-item" onClick={()=>setActiveNb(nb)}>
              <span className="nb-item-icon">{unlocked[nb.id]?"📖":"📓"}</span>
              <div className="nb-item-body">
                <div className="nb-item-name">{nb.name}</div>
                <div className="nb-item-meta">{nb.owner} · {nb.wordCount||0} kelime</div>
              </div>
              <span className="nb-item-lock">{unlocked[nb.id]?"🔓":nb.owner===me?"🔑":"🔒"}</span>
            </div>
          ))}
        </>}
        {activeNb&&<>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <button className="nb-btn cancel" style={{fontSize:".6rem",padding:"3px 8px"}} onClick={()=>setActiveNb(null)}>← Geri</button>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:".7rem",color:"var(--gold)"}}>{activeNb.name}</span>
          </div>
          {unlocked[activeNb.id]?(
            <div className="nb-editor">
              <textarea className="nb-textarea" style={{minHeight:200}}
                placeholder="Notlarını buraya yaz..."
                value={content[activeNb.id]||""}
                onChange={e=>handleEdit(activeNb.id,e.target.value)}
                disabled={activeNb.owner!==me&&!isDM}/>
              <div className="nb-footer">
                <span className="nb-wordcount">{(content[activeNb.id]||"").trim()?(content[activeNb.id].trim().split(/\s+/).length):0} kelime</span>
                <span className={"nb-save-ind"+(saved[activeNb.id]?" ok":"")}>{saved[activeNb.id]?"✓ Kaydedildi":"Otomatik..."}</span>
              </div>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:8,alignItems:"center",padding:"16px 0"}}>
              <span style={{fontSize:"1.8rem",opacity:.6}}>🔒</span>
              <input className="nb-input" type="password" placeholder="Şifre..."
                value={passInput} style={{maxWidth:180,textAlign:"center",borderColor:passErr?"#c03030":undefined}}
                onChange={e=>setPassInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&tryUnlock(activeNb)}/>
              {passErr&&<div style={{color:"#ff6060",fontSize:".75rem"}}>Yanlış şifre!</div>}
              <button className="nb-btn" onClick={()=>tryUnlock(activeNb)}>Kilidi Aç →</button>
            </div>
          )}
        </>}
      </div>
    </div>}
  </>;
}

function AvatarUpload({me,avatars,onUpload}){
  const fileRef=useRef(null);
  const myAvatar=avatars[me];
  const upload=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>500000){alert("Dosya 500KB'dan küçük olmalı!");return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const b64=ev.target.result;
      onUpload(b64);
    };
    reader.readAsDataURL(file);
  };
  return(
    <div className="avatar-wrap">
      {myAvatar
        ?<img src={myAvatar} className="avatar-img" alt="avatar" onClick={()=>fileRef.current.click()}/>
        :<div className="avatar-placeholder" onClick={()=>fileRef.current.click()}>🧙</div>}
      <button className="avatar-upload-btn" onClick={()=>fileRef.current.click()}>
        {myAvatar?"📷 Değiştir":"📷 Fotoğraf Ekle"}
      </button>
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={upload}/>
    </div>
  );
}

function Chat({me,role,all,avatars}){
  const [open,setOpen]=useState(false);
  const [messages,setMessages]=useState([]);
  const [text,setText]=useState("");
  const [target,setTarget]=useState("all");
  const [unread,setUnread]=useState(0);
  const [showClear,setShowClear]=useState(false);
  const [clearInput,setClearInput]=useState("");
  const lastMsgId=useRef(0);
  const bottomRef=useRef(null);
  const isDM=role==="dm";

  useEffect(()=>{
    const poll=async()=>{
      const data=await fbGet("chat");
      if(!data)return;
      const arr=Object.values(data).sort((a,b)=>a.id-b.id);
      // filter: show msg if: target=all, or i am sender, or i am recipient, or i am DM
      const visible=arr.filter(m=>{
        if(m.to==="all")return true;
        if(m.from===me)return true;
        if(m.to===me)return true;
        if(role==="dm")return true;
        return false;
      });
      const newOnes=visible.filter(m=>m.id>lastMsgId.current);
      if(newOnes.length){
        lastMsgId.current=Math.max(...newOnes.map(m=>m.id));
        setMessages(visible.slice(-60));
        if(!open) setUnread(u=>u+newOnes.filter(m=>m.from!==me).length);
      }
    };
    poll();
    const iv=setInterval(poll,2000);
    return()=>clearInterval(iv);
  },[open,me,role]);

  useEffect(()=>{
    if(open){setUnread(0);setTimeout(()=>bottomRef.current&&bottomRef.current.scrollIntoView({behavior:"smooth"}),100);}
  },[open,messages]);

  const send=async()=>{
    if(!text.trim())return;
    const id=ts();
    const msg={id,from:me,to:target,text:text.trim(),time:id};
    await fbSet(`chat/${id}`,msg);
    setText("");
    // trim
    const all2=await fbGet("chat");
    if(all2){const keys=Object.keys(all2).sort((a,b)=>Number(a)-Number(b));if(keys.length>200)for(const k of keys.slice(0,keys.length-200))await fbDel(`chat/${k}`);}
  };

  const clearChat=async()=>{
    if(clearInput!=="Temizle")return;
    await fbSet("chat",null);
    setMessages([]);setClearInput("");setShowClear(false);lastMsgId.current=0;
  };

  const others=all.filter(p=>p.name!==me).map(p=>p.name);

  const Avatar=({name,size=28})=>{
    const av=avatars[name];
    return av
      ?<img src={av} className="chat-avatar" style={{width:size,height:size}} alt={name}/>
      :<div className="chat-avatar-placeholder" style={{width:size,height:size}}>{name[0]||"?"}</div>;
  };

  return(
    <>
      {open&&(
        <div className="chat-panel">
          <div className="chat-header">
            <span className="chat-header-title">💬 Tavern Chat</span>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {isDM&&<button onClick={()=>{setShowClear(s=>!s);setClearInput("");}} style={{background:"transparent",border:"none",color:showClear?"#ff9090":"rgba(200,149,42,.3)",cursor:"pointer",fontSize:".75rem",padding:"2px 4px"}} title="Sohbeti Temizle">🗑</button>}
              <button className="chat-header-close" onClick={()=>setOpen(false)}>✕</button>
            </div>
          </div>
          {showClear&&isDM&&(
            <div style={{padding:"8px 12px",borderBottom:"1px solid rgba(139,26,26,.2)",background:"rgba(139,26,26,.06)"}}>
              <div style={{fontSize:".68rem",color:"rgba(255,120,120,.7)",marginBottom:6,fontStyle:"italic"}}>Tüm mesajları silmek için <strong style={{color:"#ff9090"}}>Temizle</strong> yaz:</div>
              <div style={{display:"flex",gap:6}}>
                <input value={clearInput} onChange={e=>setClearInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&clearChat()}
                  placeholder="Temizle" style={{flex:1,background:"rgba(139,26,26,.1)",border:"1px solid rgba(139,26,26,.3)",borderRadius:5,padding:"4px 8px",color:"var(--parchment)",fontFamily:"'Cinzel',serif",fontSize:".7rem",outline:"none"}}/>
                <button onClick={clearChat} disabled={clearInput!=="Temizle"}
                  style={{background:clearInput==="Temizle"?"rgba(139,26,26,.25)":"rgba(139,26,26,.06)",border:"1px solid rgba(139,26,26,.3)",borderRadius:5,padding:"4px 10px",cursor:clearInput==="Temizle"?"pointer":"not-allowed",color:clearInput==="Temizle"?"#ff9090":"rgba(200,100,100,.3)",fontFamily:"'Cinzel',serif",fontSize:".62rem",transition:"all .2s"}}>
                  Sil
                </button>
              </div>
            </div>
          )}
          <div className="chat-messages">
            {messages.length===0&&<div className="chat-empty">Henüz mesaj yok.<br/>Merhaba de! 👋</div>}
            {messages.map(m=>{
              const isMine=m.from===me;
              const isWhisper=m.to!=="all";
              const time=new Date(m.time).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
              return(
                <div key={m.id} className={`chat-msg${isMine?" mine":""}${isWhisper?" chat-whisper":""}`}>
                  <Avatar name={m.from}/>
                  <div className="chat-bubble-body">
                    <div className="chat-sender">
                      {m.from}{isWhisper&&!isMine?` → ${m.to==="all"?"Herkes":m.to}`:""}
                      {isWhisper&&isMine?` → ${m.to}`:""}
                    </div>
                    <div className="chat-text">{m.text}</div>
                    <div className="chat-time">{time}</div>
                  </div>
                </div>
              );
            })}
            <div ref={bottomRef}/>
          </div>
          <div className="chat-input-area">
            <select className="chat-whisper-select" value={target} onChange={e=>setTarget(e.target.value)}>
              <option value="all">📢 Herkese</option>
              {others.map(p=><option key={p} value={p}>🤫 Sadece {p}</option>)}
            </select>
            <div className="chat-input-row">
              <textarea className="chat-input" rows={1} placeholder="Mesaj yaz..." value={text}
                onChange={e=>setText(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}/>
              <button className="chat-send" onClick={send}>➤</button>
            </div>
          </div>
        </div>
      )}
      <div className="chat-bubble">
        <button className="chat-toggle" onClick={()=>setOpen(o=>!o)}>
          {open?"✕":"💬"}
          {!open&&unread>0&&<span className="chat-badge">{unread>9?"9+":unread}</span>}
        </button>
      </div>
    </>
  );
}

// ─── AMBİYANS (YouTube) ──────────────────────────────────────────────────────
const ytIdFromUrl=url=>{
  if(!url)return null;
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
};

function Ambiance({isDM}){
  const [open,setOpen]=useState(false);
  const [url,setUrl]=useState("");
  const [status,setStatus]=useState("idle"); // idle|loading|playing|paused|error
  const [myVol,setMyVol]=useState(70);
  const [savedLinks,setSavedLinks]=useState(()=>{try{return JSON.parse(localStorage.getItem("jukebox_sc")||"[]");}catch{return[];}});
  const [showMgr,setShowMgr]=useState(false);
  const [scLabel,setScLabel]=useState("");
  const [scUrl,setScUrl]=useState("");

  // Firebase state
  const [fbData,setFbData]=useState({ytId:null,startedAt:0,pausedAt:null,dmVol:70,state:"idle"});
  const lastFbRef=useRef(null);
  const playerRef=useRef(null);
  const pollRef=useRef(null);

  // Poll Firebase ambiance state
  useEffect(()=>{
    const poll=async()=>{
      const data=await fbGet("ambiance");
      const key=JSON.stringify(data);
      if(key===lastFbRef.current)return;
      lastFbRef.current=key;
      const d=data||{ytId:null,startedAt:0,pausedAt:null,dmVol:70,state:"idle"};
      setFbData(d);
    };
    poll();
    pollRef.current=setInterval(poll,2500);
    return()=>clearInterval(pollRef.current);
  },[]);

  // Load YT API
  useEffect(()=>{
    if(window.YT)return;
    const tag=document.createElement("script");
    tag.src="https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  },[]);

  const destroyPlayer=()=>{
    if(playerRef.current){try{playerRef.current.destroy();}catch{}playerRef.current=null;}
    const old=document.querySelectorAll("[id^='yt-jb-']");
    old.forEach(el=>el.remove());
  };

  const createPlayer=(ytId,seekTo,vol,autoplay)=>{
    destroyPlayer();
    setStatus("loading");
    const div=document.createElement("div");
    div.id="yt-jb-"+Date.now();
    div.style.cssText="position:fixed;bottom:-200px;width:1px;height:1px;opacity:0;pointer-events:none;";
    document.body.appendChild(div);
    const go=()=>{
      playerRef.current=new window.YT.Player(div.id,{
        videoId:ytId,
        playerVars:{autoplay:autoplay?1:0,loop:1,playlist:ytId,start:Math.floor(seekTo||0),controls:0,disablekb:1,fs:0},
        events:{
          onReady:(e)=>{
            e.target.setVolume(vol!=null?vol:myVol);
            if(autoplay)e.target.playVideo();
            else{e.target.pauseVideo();}
            setStatus(autoplay?"playing":"paused");
          },
          onError:()=>setStatus("error"),
          onStateChange:(e)=>{
            if(e.data===0)e.target.playVideo(); // loop
          }
        }
      });
    };
    if(window.YT&&window.YT.Player)go();
    else window.onYouTubeIframeAPIReady=go;
  };

  // React to Firebase changes (player side)
  const prevFbState=useRef(null);
  useEffect(()=>{
    if(isDM)return;
    const prev=prevFbState.current;
    const cur=fbData;
    prevFbState.current=cur;

    const vol=myVol;

    // No video
    if(!cur.ytId){
      if(playerRef.current){destroyPlayer();setStatus("idle");}
      return;
    }

    // New video started
    if(!prev||prev.ytId!==cur.ytId){
      const elapsed=(ts()-cur.startedAt)/1000;
      const seek=cur.pausedAt?((cur.pausedAt-cur.startedAt)/1000):elapsed%3600;
      createPlayer(cur.ytId,seek,vol,cur.state==="playing");
      return;
    }

    // State changed: play/pause
    if(prev&&prev.state!==cur.state&&playerRef.current){
      try{
        if(cur.state==="playing")playerRef.current.playVideo();
        else if(cur.state==="paused")playerRef.current.pauseVideo();
      }catch{}
      setStatus(cur.state==="playing"?"playing":"paused");
    }

  },[fbData,isDM]);


  useEffect(()=>()=>destroyPlayer(),[]);

  // DM actions
  const play=async(ytUrl)=>{
    const ytId=ytIdFromUrl(ytUrl||url);
    if(!ytId){setStatus("error");setTimeout(()=>setStatus("idle"),2000);return;}
    const data={ytId,startedAt:ts(),pausedAt:null,dmVol:fbData.dmVol||myVol,state:"playing"};
    await fbSet("ambiance",data);
    setUrl("");
    createPlayer(ytId,0,data.dmVol,true);
  };

  const pause=async()=>{
    if(!playerRef.current)return;
    let elapsed=0;
    try{elapsed=playerRef.current.getCurrentTime();}catch{}
    const pausedAt=fbData.startedAt+(elapsed*1000);
    await fbPatch("ambiance",{state:"paused",pausedAt});
    try{playerRef.current.pauseVideo();}catch{}
    setStatus("paused");
  };

  const resume=async()=>{
    await fbPatch("ambiance",{state:"playing",pausedAt:null});
    try{playerRef.current.playVideo();}catch{}
    setStatus("playing");
  };

  const stop=async()=>{
    await fbSet("ambiance",{ytId:null,startedAt:0,pausedAt:null,dmVol:fbData.dmVol||70,state:"idle"});
    destroyPlayer();setStatus("idle");setUrl("");
  };

  const changeDMVol=async(v)=>{
    setMyVol(v);
    if(playerRef.current)try{playerRef.current.setVolume(v);}catch{}
    await fbPatch("ambiance",{dmVol:v});
  };

  const saveLink=()=>{
    if(!scLabel.trim()||!scUrl.trim())return;

    {q:"Revlo Krell gözünü nasıl kaybetti?",a:"Vali Veran'ın hançeriyle",w:["Savaşta ok ile","Engizisyon işkencesiyle","Turnuvada kılıçla"]},
    {q:"Olfrit'in 'Dealbreaker' lakabı ne anlama gelir?",a:"Dalgaların oyununu bozan",w:["Anlaşmayı bozan","En iyi denizci","Korsanları durduran"]},
    {q:"Vakanüvis İlber, Golyat'a hangi unvanı verdi?",a:"The Flyingship",w:["The Tall","The Fox","The Rottweiler"]},
    {q:"Kumpanya kolonilerinde en fazla kaç kişi yaşar?",a:"80-150",w:["500-1000","20-50","1500-2000"]},
    {q:"Vita Vya'da Yeshinda kimdir?",a:"Atashinda'nın yeğeni",w:["Vita'nın abisi","Pawos'un kardeşi","Tera'nın annesi"]},
  ];

  const pickTrivia=()=>{
    const q=TRIVIA[Math.floor(Math.random()*TRIVIA.length)];
    setTrivia({...q,opts:shuffle([q.a,...q.w])});
    setAnswered(null);setTriviaEffect(null);
  };

  const saveHighScore=async(newStreak)=>{
    const ex=scores.find(s=>s.name===me);
    if(!ex||newStreak>ex.streak){
      const e={name:me,streak:newStreak,date:new Date().toLocaleDateString("tr-TR")};
      await fbSet("triviaScores/"+me,e);
      setScores(prev=>[...prev.filter(s=>s.name!==me),e].sort((a,b)=>b.streak-a.streak));
    }
  };

  const answerTrivia=async(chosen)=>{
    if(answered)return;
    const correct=chosen===trivia.a;
    setAnswered({correct,chosen});
    if(correct){
      const ns=streakRef.current+1;
      setStreak(ns);
      playSound(ns===20?"twenty":ns===10?"ten":"correct");
      setTriviaEffect("correct");setTimeout(()=>setTriviaEffect(null),700);
      if(ns===10){setCelebration("ten");setTimeout(()=>setCelebration(null),3500);}
      if(ns===20){setCelebration("twenty");setTimeout(()=>setCelebration(null),5000);}
      await saveHighScore(ns);
    } else {
      const old=streakRef.current;
      setStreak(0);
      playSound("wrong");
      setTriviaEffect("wrong");setTimeout(()=>setTriviaEffect(null),700);
      if(old>0)await saveHighScore(old);
    }
  };

  const fetchNews=async()=>{
    setNewsLoading(true);setNews([]);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1500,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:"Sozcu gazetesi son dakika sayfasini tara: https://www.sozcu.com.tr/son-dakika/ — En guncel 8 haberin basligini ve 1-2 cumlelik kisa aciklamasini JSON array olarak ver. Format: [{\"title\":\"...\",\"desc\":\"...\",\"url\":\"...\",\"time\":\"...\"}]. Sadece JSON dondur."}]
        })
      });
      const data=await res.json();
      const text=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      const clean=text.replace(/```json|```/g,"").trim();
      const items=JSON.parse(clean);
      if(Array.isArray(items)&&items.length>0){
        setNews(items);
        setNewsUpdated(new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}));
      }
    }catch(e){console.error(e);}
    setNewsLoading(false);
  };

  const startBreak=async()=>{
    const mins=parseInt(breakInput)||15;
    const end=Date.now()+mins*60000;
    setBreakEnd(end);await fbSet("breakTimer",{end,mins});
  };
  const clearBreak=async()=>{setBreakEnd(null);await fbSet("breakTimer",null);};

  const remaining=breakEnd?Math.max(0,Math.ceil((breakEnd-now)/1000)):null;
  const remMin=remaining!=null?Math.floor(remaining/60):null;
  const remSec=remaining!=null?remaining%60:null;
  const breakMins=breakEnd?(parseInt(breakInput)||15):15;
  const sandPct=remaining!=null&&breakEnd?remaining/(breakMins*60):1;

  const HourGlass=()=>(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:18,padding:"14px 16px",background:"rgba(200,149,42,.04)",border:"1px solid rgba(200,149,42,.12)",borderRadius:10,marginBottom:14}}>
      <svg width={44} height={60} viewBox="0 0 44 60">
        <line x1={4} y1={3} x2={40} y2={3} stroke="rgba(200,149,42,.6)" strokeWidth={2} strokeLinecap="round"/>
        <line x1={4} y1={57} x2={40} y2={57} stroke="rgba(200,149,42,.6)" strokeWidth={2} strokeLinecap="round"/>
        <path d="M4,5 L22,28 L40,5 Z" fill="rgba(200,149,42,.06)"/>
        <path d="M22,32 L40,55 L4,55 Z" fill="rgba(200,149,42,.06)"/>
        <clipPath id="hg-t"><path d="M4,5 L22,28 L40,5 Z"/></clipPath>
        <clipPath id="hg-b"><path d="M22,32 L40,55 L4,55 Z"/></clipPath>
        <rect x={4} y={5} width={36} height={sandPct*23} fill="rgba(200,149,42,.45)" clipPath="url(#hg-t)"/>
        <rect x={4} y={55-(1-sandPct)*23} width={36} height={(1-sandPct)*23} fill="rgba(200,149,42,.5)" clipPath="url(#hg-b)"/>
        <circle cx={22} cy={30} r={1.5} fill="rgba(200,149,42,.55)"/>
      </svg>
      <div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:".48rem",letterSpacing:".15em",color:"rgba(200,149,42,.4)",textTransform:"uppercase",marginBottom:4}}>☕ Mola</div>
        {remaining!=null&&remaining>0?(
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.8rem",fontWeight:900,color:"#f0c060",lineHeight:1,letterSpacing:".05em"}}>{String(remMin).padStart(2,"0")}:{String(remSec).padStart(2,"0")}</div>
        ):(
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"1rem",color:"#7ef0a0",fontWeight:700}}>✓ Mola bitti!</div>
        )}
        {remaining!=null&&remaining>0&&(
          <div style={{marginTop:6,width:110,height:3,background:"rgba(200,149,42,.1)",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:(sandPct*100)+"%",background:"linear-gradient(90deg,rgba(200,149,42,.4),#f0c060)",borderRadius:2,transition:"width 1s linear"}}/>
          </div>
        )}
      </div>
    </div>
  );

  const rankColor=(i)=>i===0?"#f0c060":i===1?"#c0c0c0":i===2?"#cd7f32":"rgba(200,149,42,.4)";
  const rankIcon=(i)=>i===0?"🥇":i===1?"🥈":i===2?"🥉":String(i+1)+".";

  const ScoreBoard=({data,myKey,valueKey,unit})=>(
    <div style={{borderRadius:10,overflow:"hidden",border:"1px solid rgba(200,149,42,.1)"}}>
      <div style={{padding:"9px 14px",background:"rgba(200,149,42,.06)",borderBottom:"1px solid rgba(200,149,42,.1)"}}>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:".52rem",letterSpacing:".18em",color:"rgba(200,149,42,.5)",textTransform:"uppercase"}}>🏆 Liderlik Tablosu</span>
      </div>
      {data.length===0&&(
        <div style={{padding:"16px",textAlign:"center",fontSize:".72rem",color:"var(--text-dim)",fontStyle:"italic",background:"rgba(0,0,0,.1)"}}>Henüz kimse kayıt yapmadı!</div>
      )}
      {data.slice(0,8).map((e,i)=>{
        const isMe=e.name===myKey;
        const rc=rankColor(i);
        const isMedal=i<3;
        return(
          <div key={e.name} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",background:isMe?"rgba(200,149,42,.07)":i%2===0?"rgba(0,0,0,.1)":"rgba(0,0,0,.05)",borderBottom:i<data.slice(0,8).length-1?"1px solid rgba(200,149,42,.05)":"none",transition:"background .15s"}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:isMedal?".8rem":".62rem",color:rc,minWidth:26,textAlign:"center",fontWeight:isMedal?700:400,lineHeight:1}}>{rankIcon(i)}</span>
            <div style={{flex:1,minWidth:0}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:".7rem",color:isMe?"#f0c060":isMedal?rc:"var(--parchment)",fontWeight:isMe?700:isMedal?600:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"block"}}>

            <div style={{textAlign:"right",flexShrink:0}}>

            </div>
          </div>
        );
      })}
    </div>
  );

  const myBest=scores.find(s=>s.name===me);

  return(

      {celebration&&(
        <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:celebration==="twenty"?"3.5rem":"2.5rem",fontWeight:900,color:"#f0c060",textShadow:"0 0 60px rgba(240,192,96,.9),0 0 20px rgba(240,192,96,.5)",animation:"fp .4s ease-out",textAlign:"center",lineHeight:1.2}}>

          <div style={{fontFamily:"'Cinzel',serif",fontSize:".85rem",letterSpacing:".3em",color:"rgba(240,192,96,.6)",textTransform:"uppercase"}}>

            {view==="home"&&<div style={{fontSize:".68rem",color:"var(--text-dim)",marginTop:2}}>Oturum başlayana kadar rahat edin</div>}
          </div>
        </div>
        {isDM&&(
          <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>

            <span style={{fontSize:".56rem",color:"rgba(200,149,42,.4)"}}>dk</span>
            <button onClick={startBreak} title="Mola başlat" style={{background:"rgba(200,149,42,.08)",border:"1px solid rgba(200,149,42,.22)",borderRadius:5,padding:"4px 9px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".56rem",color:"var(--gold)"}}>⏳ Başlat</button>
            {breakEnd&&<button onClick={clearBreak} style={{background:"transparent",border:"1px solid rgba(139,26,26,.2)",borderRadius:5,padding:"3px 7px",cursor:"pointer",color:"rgba(255,100,100,.4)",fontSize:".6rem"}}>✕</button>}
          </div>
        )}
      </div>

      {/* Kum saati */}
      {breakEnd&&<HourGlass/>}

      {/* HOME */}
      {view==="home"&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {[
            {id:"trivia",icon:"🧠",label:"İnci Trivia",desc:"Dünya lore'unu ne kadar biliyorsun?",
              sub:scores.length>0?"🏆 "+scores[0].name+" — "+scores[0].streak+" streak":null,
              bg:"rgba(200,149,42,.05)",border:"rgba(200,149,42,.18)",hbg:"rgba(200,149,42,.1)",hb:"rgba(200,149,42,.4)",tc:"var(--gold)"},
            {id:"snake",icon:"🐍",label:"Snake",desc:"Klasik yılan oyunu. Kaç elma yiyebilirsin?",sub:null,
              bg:"rgba(76,175,125,.04)",border:"rgba(76,175,125,.16)",hbg:"rgba(76,175,125,.1)",hb:"rgba(76,175,125,.4)",tc:"#7ef0a0"},
            {id:"library",icon:"📚",label:"Kütüphane",desc:"İnci'nin tarihi ve lore'u hakkında eserler",sub:null,
              bg:"rgba(139,90,43,.05)",border:"rgba(139,90,43,.2)",hbg:"rgba(139,90,43,.12)",hb:"rgba(139,90,43,.45)",tc:"#c8a46e"},
            {id:"news",icon:"📰",label:"Haberler",desc:"Türkiye gündemine dair haberler",sub:null,
              bg:"rgba(91,155,213,.04)",border:"rgba(91,155,213,.16)",hbg:"rgba(91,155,213,.1)",hb:"rgba(91,155,213,.4)",tc:"#90b8f0"},
          ].map(item=>(
            <button key={item.id} onClick={()=>setView(item.id)}
              style={{background:item.bg,border:"1px solid "+item.border,borderRadius:12,padding:"16px 18px",cursor:"pointer",textAlign:"left",transition:"all .2s",display:"flex",alignItems:"center",gap:14,width:"100%"}}
              onMouseEnter={e=>{e.currentTarget.style.background=item.hbg;e.currentTarget.style.borderColor=item.hb;e.currentTarget.style.transform="translateY(-1px)";}}
              onMouseLeave={e=>{e.currentTarget.style.background=item.bg;e.currentTarget.style.borderColor=item.border;e.currentTarget.style.transform="none";}}>
              <span style={{fontSize:"1.7rem",flexShrink:0,lineHeight:1}}>{item.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:".82rem",color:item.tc,fontWeight:700,marginBottom:3}}>{item.label}</div>
                <div style={{fontSize:".68rem",color:"var(--text-dim)",lineHeight:1.4}}>{item.desc}</div>
                {item.sub&&<div style={{marginTop:5,fontSize:".6rem",color:"rgba(200,149,42,.45)",borderTop:"1px solid rgba(200,149,42,.08)",paddingTop:5}}>{item.sub}</div>}
              </div>
              <span style={{color:"rgba(200,149,42,.25)",fontSize:".8rem",flexShrink:0}}>›</span>
            </button>
          ))}
        </div>
      )}

      {/* TRİVİA */}
      {view==="trivia"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Streak ve kişisel rekor bar */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:"rgba(200,149,42,.04)",border:"1px solid rgba(200,149,42,.1)",borderRadius:8}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:".42rem",color:"rgba(200,149,42,.4)",letterSpacing:".12em",textTransform:"uppercase"}}>Streak</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.3rem",fontWeight:900,color:streak>0?"#f0c060":"rgba(200,149,42,.25)",lineHeight:1}}>{streak>0?"🔥 "+streak:"—"}</div>
              </div>
              {myBest&&<div style={{textAlign:"center",paddingLeft:10,borderLeft:"1px solid rgba(200,149,42,.12)"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:".42rem",color:"rgba(200,149,42,.4)",letterSpacing:".12em",textTransform:"uppercase"}}>Rekorun</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.3rem",fontWeight:900,color:"rgba(200,149,42,.5)",lineHeight:1}}>{myBest.streak}</div>
              </div>}
            </div>
            <button onClick={pickTrivia} style={{background:"rgba(200,149,42,.08)",border:"1px solid rgba(200,149,42,.2)",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".58rem",color:"rgba(200,149,42,.6)"}}>↻ Yeni Soru</button>
          </div>

          {/* Soru */}
          <div style={{background:triviaEffect==="correct"?"rgba(76,175,125,.12)":triviaEffect==="wrong"?"rgba(180,40,40,.12)":"rgba(0,0,0,.15)",border:"1px solid "+(triviaEffect==="correct"?"rgba(76,175,125,.45)":triviaEffect==="wrong"?"rgba(180,40,40,.45)":"rgba(200,149,42,.1)"),borderRadius:10,padding:16,transition:"all .18s"}}>
            {!trivia&&<div style={{textAlign:"center",padding:"16px 0",color:"rgba(200,149,42,.35)",fontFamily:"'Cinzel',serif",fontSize:".62rem",letterSpacing:".1em"}}>⏳ Yükleniyor...</div>}
            {trivia&&<>
              <div style={{fontSize:".92rem",color:"var(--parchment)",marginBottom:14,lineHeight:1.5,fontFamily:"'Crimson Text',serif"}}>{trivia.q}</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {trivia.opts.map((opt,i)=>{
                  const isChosen=answered&&answered.chosen===opt;
                  const isCorrect=opt===trivia.a;
                  const show=!!answered;
                  let bg="rgba(200,149,42,.04)",bdr="rgba(200,149,42,.1)",clr="var(--parchment)";
                  if(show&&isCorrect){bg="rgba(76,175,125,.12)";bdr="rgba(76,175,125,.5)";clr="#7ef0a0";}
                  else if(show&&isChosen&&!isCorrect){bg="rgba(180,40,40,.12)";bdr="rgba(180,40,40,.5)";clr="#ff9090";}
                  return(
                    <button key={i} onClick={()=>answerTrivia(opt)} disabled={!!answered}
                      style={{background:bg,border:"1px solid "+bdr,borderRadius:7,padding:"9px 12px",cursor:answered?"default":"pointer",textAlign:"left",color:clr,fontSize:".82rem",transition:"all .18s",display:"flex",alignItems:"center",gap:8,fontFamily:"'Crimson Text',serif"}}
                      onMouseEnter={e=>{if(!answered){e.currentTarget.style.background="rgba(200,149,42,.1)";e.currentTarget.style.borderColor="rgba(200,149,42,.35)";}}}
                      onMouseLeave={e=>{if(!answered){e.currentTarget.style.background=bg;e.currentTarget.style.borderColor=bdr;}}}>
                      <span style={{fontFamily:"'Cinzel',serif",fontSize:".52rem",color:show?(isCorrect?"#7ef0a0":isChosen?"#ff9090":"rgba(200,149,42,.2)"):"rgba(200,149,42,.4)",flexShrink:0,minWidth:16,fontWeight:700}}>
                        {show?(isCorrect?"✓":isChosen?"✗":String.fromCharCode(65+i)):String.fromCharCode(65+i)}
                      </span>
                      {opt}
                    </button>
                  );
                })}
              </div>
              {answered&&(
                <div style={{marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:10,borderTop:"1px solid rgba(200,149,42,.08)"}}>
                  <span style={{fontSize:".75rem",color:answered.correct?"#7ef0a0":"#ff9090",fontStyle:"italic",fontFamily:"'Crimson Text',serif"}}>{answered.correct?"✨ Doğru!":"💀 Yanlış!"}</span>
                  <button onClick={pickTrivia} style={{background:"rgba(200,149,42,.08)",border:"1px solid rgba(200,149,42,.25)",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".6rem",color:"var(--gold)"}}>Sonraki →</button>
                </div>
              )}
            </>}
          </div>

          {/* Liderlik */}
          <ScoreBoard data={scores} myKey={me} valueKey="streak" unit="streak"/>
        </div>
      )}

      {/* SNAKE */}
      {view==="snake"&&<SnakeGame me={me}/>}
      {view==="library"&&<LibraryView me={me} isDM={isDM}/>}

      {/* HABERLER */}
      {view==="news"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {/* Haber çekme butonu */}
          {news.length===0&&!newsLoading&&(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,padding:"32px 20px",background:"rgba(91,155,213,.04)",border:"1px solid rgba(91,155,213,.14)",borderRadius:12,textAlign:"center"}}>
              <span style={{fontSize:"2.5rem"}}>📰</span>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:".75rem",color:"#90b8f0",fontWeight:600}}>Haberler</div>
              <div style={{fontSize:".7rem",color:"var(--text-dim)",lineHeight:1.5,maxWidth:240}}>Sözcü gazetesinden güncel haberleri çekmek için butona bas.</div>
              <button onClick={fetchNews}
                style={{background:"rgba(91,155,213,.12)",border:"1px solid rgba(91,155,213,.35)",borderRadius:8,padding:"10px 24px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".68rem",color:"#90b8f0",letterSpacing:".1em",marginTop:4,transition:"all .2s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(91,155,213,.22)";}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(91,155,213,.12)";}}>
                📡 Haberleri Getir
              </button>
            </div>
          )}
          {newsLoading&&(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,padding:"32px 0"}}>
              <div style={{fontSize:"2rem",animation:"amb-pulse 1.5s infinite"}}>📡</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",color:"rgba(91,155,213,.5)",letterSpacing:".15em"}}>Haberler yükleniyor...</div>
            </div>
          )}
          {news.length>0&&(
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:".52rem",letterSpacing:".15em",color:"rgba(91,155,213,.45)",textTransform:"uppercase"}}>📰 Sözcü — Son Dakika</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {newsUpdated&&<span style={{fontSize:".58rem",color:"var(--text-dim)"}}>{newsUpdated}</span>}
                  <button onClick={fetchNews} style={{background:"rgba(91,155,213,.08)",border:"1px solid rgba(91,155,213,.2)",borderRadius:5,padding:"3px 9px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".54rem",color:"#90b8f0"}}>↻</button>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {news.map((item,i)=>(
                  <a key={i} href={item.url} target="_blank" rel="noopener noreferrer"
                    style={{display:"flex",gap:12,padding:"11px 14px",background:"rgba(0,0,0,.15)",border:"1px solid rgba(91,155,213,.1)",borderRadius:9,textDecoration:"none",transition:"all .18s"}}
                    onMouseEnter={e=>{e.currentTarget.style.background="rgba(91,155,213,.08)";e.currentTarget.style.borderColor="rgba(91,155,213,.28)";}}
                    onMouseLeave={e=>{e.currentTarget.style.background="rgba(0,0,0,.15)";e.currentTarget.style.borderColor="rgba(91,155,213,.1)";}}>
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:".62rem",color:"rgba(91,155,213,.35)",flexShrink:0,marginTop:2,minWidth:18,fontWeight:600}}>{i+1}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:".82rem",color:"var(--parchment)",lineHeight:1.4,fontFamily:"'Crimson Text',serif",fontWeight:600,marginBottom:item.desc?4:0}}>{item.title}</div>
                      {item.desc&&<div style={{fontSize:".72rem",color:"var(--text-dim)",lineHeight:1.4,fontFamily:"'Crimson Text',serif",fontStyle:"italic"}}>{item.desc}</div>}
                      {item.time&&<div style={{fontSize:".58rem",color:"rgba(91,155,213,.4)",marginTop:3}}>{item.time}</div>}
                    </div>
                    <span style={{color:"rgba(91,155,213,.25)",fontSize:".75rem",flexShrink:0,marginTop:2}}>↗</span>
                  </a>
                ))}
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

function LibraryView({me,isDM}){
  const [selBook,setSelBook]=useState(null);
  const [selChap,setSelChap]=useState(null);
  const [readStats,setReadStats]=useState({});

  // Firebase'den okuma istatistikleri çek (DM için)
  useEffect(()=>{
    fbGet("libraryStats").then(d=>{if(d)setReadStats(d);});
  },[]);

  const trackRead=(bookId)=>{
    if(!me)return;
    const key="libraryStats/"+me+"/"+bookId;
    fbGet("libraryStats/"+me+"/"+bookId).then(cur=>{
      const newCount=(cur||0)+1;
      fbSet(key,newCount);
      setReadStats(prev=>({...prev,[me]:{...(prev[me]||{}),[bookId]:newCount}}));
    });
  };

  const openBook=(bookId)=>{
    setSelBook(bookId);
    setSelChap(null);
    trackRead(bookId);
  };

        {title:"Neredesin Vita?",text:"Grubun en küçüğü Vita'nın, nüfuzlu bir Lord'a 'hediye' olarak verilip geri dönmemesi, yetimlerin içindeki son masumiyet kırıntısını da öldürdü.\n\nOrmanın derinliklerinden gelen melankolik ve korkutucu ezgi, bir kervan için ölümün ilanıdır. Bu şarkının son mısrasını duyanın yaşadığı görülmemiştir.\n\n'Neredesin sevgili Vita? Geber Atashinda.'"},
        {title:"İlkeleri",text:"1. Yetimleri Koru: Nerede bir yetim görseler onlara yardım eder, saflarına katarlar.\n\n2. Güven Sadece Bizdedir: Birbirlerinden başka kimseye güvenmezler.\n\n3. Vita'yı Bul: Tek bir iz dahi olsa, sarayın en derin mahzenine kadar sızmayı göze alırlar."},
      ]

    {
      id:"wildgarmoth",spine:"Wild ile Garmoth",author:"Halk Masalları",year:"Her Dönem",color:"#5C3D1A",
      desc:"İnci Kıtasının her meyhanesinde fısıldanan iki figür. Beşeriyetin bitmek bilmeyen kusurlarının ete kemiğe bürünmüş hali.",
      chapters:[
        {title:"Kahramanlarımız",text:"Wild: 'Düşünmeyen Kılıç.' Her kavgada haksız olan, her tartışmada bağıran ve her kapıyı çalmak yerine kırmaya çalışan savaşçı.\n\nGarmoth: 'Mantıklı Felaketlerin Mimarı.' Son derece zeki, sakin bir büyücü. Ama her zaman en mantıklı görünen ama en feci sonuçları doğuran yanlış kararı seçer."},
        {title:"Isel Macerası",text:"Isel'deyken Isel'e gitmeye çalıştılar. Garmoth'un 'Bu kadar soğuk ancak Noer'in topraklarında olur' teşhisiyle tüm mallarını atlarına yükleyip gecenin köründe şehirden çıktılar.\n\nGün ağardığında kendilerini yine terk ettikleri şehrin arka kapısında buldular. Garmoth: 'Isel'i ne kadar hızlı bulduğumuza inanamıyorum, coğrafi sezgilerim yine yanıltmadı.'"},
        {title:"Deyimler",text:"'Wild gibi sallıyor, Garmoth gibi tutturuyor.' — Hiçbir şey bilmeden konuşuyor ve en kötü sonucu doğuracak tercihi yapıyor.\n\nOnlar her yerdedir; her başarısız girişimin, her komik mağlubiyetin ve her yanlış tercihin arkasında bıyık altından gülen o iki hayalet figür vardır."},
      ]
    },
    {
      id:"donanma",spine:"İmparatorluk Donanması",author:"Deniz Nizam Konseyi",year:"1179",color:"#1A2A5C",
      desc:"Kraliyet Deniz Kuvvetleri'nin kuruluşu, armadaları ve tarihi. 'Imperium Ultra Horizontem.'",
      chapters:[
        {title:"Kuruluş",text:"İmparatorluk Donanması, İmparator Agus tarafından kurulmuştur. Amacı kıtanın dört bir yanının denizlerle çevrili olmasının sağladığı stratejik üstünlüğü, mutlak hakimiyete dönüştürmektir.\n\nDeniz Nizam Konseyi beş üyeden oluşur: üçü İmparator'un ataması, biri Mavi Yemin Kardeşliği Reisi, biri Servus dinine uygunluğu denetleyen ruhbandır."},
        {title:"Üç Armada",text:"Kuzey Armadası: Kuzey halkıyla kaynaşan, rütbelerden çok güvene dayalı düzen kuran armada. II. Baldus tarafından lağvedildi — gemileri 'Kuzey Balıkçıları' yazılarak barakaya dönüştürüldü.\n\nBatı Armadası: 'En gözde Armada.' Sancağında taç giydirilmiş köpekbalığı vardır.\n\nDoğu Armadası: İnsulam'ı korur. Sancağında Servus'un sessiz kudretini simgeleyen vatoz yer alır."},
        {title:"Mavi Yemin",text:"'Mare Rex Aeternus' — Ebedi Deniz Krallığı. Sol omuzlarında 'MRA' yazılı dövme taşırlar.\n\nKardeşlerden biri olmak için bir üyenin referansı şart. 'Güverte İçtiması' üç yılda bir yapılır.\n\n'Bana verilen görevi namusum ve vicdanım gereğince yerine getireceğime... yemin ederim.'"},
      ]
    },
  ];

  // Harita SVG'leri
  const HaritaSVG=({sehir})=>{
    const lokasyonlar={
      "Agus — Başkent":{x:50,y:55,renk:"#f0c060",label:"Agus"},
      "İnsulam — Tanrı Krallığı":{x:72,y:45,renk:"#c0c0c0",label:"İnsulam"},
      "Ragusium — Engizisyon Kalesi":{x:35,y:42,renk:"#cc4444",label:"Ragusium"},
      "Noer — Özgür Eyalet":{x:40,y:28,renk:"#7ef0a0",label:"Noer"},
      "Theranda Eyaleti":{x:55,y:68,renk:"#90b8f0",label:"Theranda"},
      "Ala Adaları":{x:60,y:82,renk:"#ff9090",label:"Ala"},
      "Sisica":{x:75,y:62,renk:"#ffc060",label:"Sisica"},

    };
    const tum=[
      {x:35,y:18,r:14,f:"rgba(76,120,76,.25)"},
      {x:50,y:30,r:22,f:"rgba(76,120,76,.2)"},
      {x:45,y:50,r:20,f:"rgba(76,120,76,.22)"},
      {x:60,y:55,r:16,f:"rgba(76,120,76,.18)"},
      {x:55,y:72,r:12,f:"rgba(76,120,76,.2)"},
      {x:72,y:45,r:8,f:"rgba(76,120,76,.15)"},

  // İçerik okuma ekranı
  if(selBook&&selChap!==null){

    return(
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <button onClick={()=>setSelChap(null)} style={{background:"transparent",border:"none",color:"rgba(200,149,42,.5)",cursor:"pointer",fontSize:".8rem",textAlign:"left",padding:0,fontFamily:"'Cinzel',serif"}}>← {book.spine}</button>
        <div style={{background:"rgba(200,149,42,.04)",border:"1px solid rgba(200,149,42,.15)",borderRadius:10,padding:"16px 14px"}}>

          {chap.harita&&<div style={{marginBottom:14}}><HaritaSVG sehir={chap.title}/><div style={{fontSize:".6rem",color:"rgba(200,149,42,.4)",fontStyle:"italic",marginTop:4}}>{chap.haritaNot}</div></div>}
          <div style={{fontFamily:"'Crimson Text',serif",fontSize:"1rem",color:"var(--parchment)",lineHeight:1.85,whiteSpace:"pre-line"}}>{chap.text}</div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
          {selChap>0&&<button onClick={()=>setSelChap(selChap-1)} style={{flex:1,background:"rgba(200,149,42,.06)",border:"1px solid rgba(200,149,42,.15)",borderRadius:7,padding:"7px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".6rem",color:"rgba(200,149,42,.6)"}}>← Önceki</button>}
          {selChap<book.chapters.length-1&&<button onClick={()=>setSelChap(selChap+1)} style={{flex:1,background:"rgba(200,149,42,.06)",border:"1px solid rgba(200,149,42,.15)",borderRadius:7,padding:"7px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".6rem",color:"rgba(200,149,42,.6)"}}>Sonraki →</button>}
        </div>
      </div>
    );
  }

  // Kitap içerik ekranı
  if(selBook){
    const book=BOOKS.find(b=>b.id===selBook);
    return(
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <button onClick={()=>setSelBook(null)} style={{background:"transparent",border:"none",color:"rgba(200,149,42,.5)",cursor:"pointer",fontSize:".8rem",textAlign:"left",padding:0,fontFamily:"'Cinzel',serif"}}>← Kütüphane</button>
        <div style={{display:"flex",gap:14,alignItems:"flex-start",padding:"14px 0",borderBottom:"1px solid rgba(200,149,42,.1)",marginBottom:4}}>
          <div style={{width:8,borderRadius:2,alignSelf:"stretch",background:book.color,flexShrink:0,minHeight:70}}/>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.05rem",fontWeight:700,color:"var(--parchment)",marginBottom:4}}>{book.spine}</div>
            <div style={{fontSize:".66rem",color:"rgba(200,149,42,.5)",fontFamily:"'Cinzel',serif",marginBottom:8}}>{book.author} · {book.year}</div>
            <div style={{fontSize:".8rem",color:"var(--text-dim)",fontFamily:"'Crimson Text',serif",lineHeight:1.5}}>{book.desc}</div>
          </div>
        </div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:".5rem",letterSpacing:".18em",color:"rgba(200,149,42,.4)",textTransform:"uppercase",marginBottom:2}}>Bölümler</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {book.chapters.map((ch,i)=>(
            <button key={i} onClick={()=>setSelChap(i)}
              style={{background:"rgba(200,149,42,.04)",border:"1px solid rgba(200,149,42,.1)",borderRadius:8,padding:"10px 14px",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all .18s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(200,149,42,.1)";e.currentTarget.style.borderColor="rgba(200,149,42,.3)";}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(200,149,42,.04)";e.currentTarget.style.borderColor="rgba(200,149,42,.1)";}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:".58rem",color:"rgba(200,149,42,.35)",minWidth:18}}>{i+1}.</span>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:".8rem",color:"var(--parchment)"}}>{ch.title}</span>
              </div>
              <span style={{color:"rgba(200,149,42,.3)",fontSize:".8rem"}}>›</span>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // Kütüphane ana ekranı
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{fontFamily:"'Crimson Text',serif",fontSize:".9rem",color:"var(--text-dim)",fontStyle:"italic",lineHeight:1.6,padding:"10px 14px",background:"rgba(200,149,42,.04)",border:"1px solid rgba(200,149,42,.1)",borderRadius:8,borderLeft:"3px solid rgba(200,149,42,.3)"}}>
        "Yazılmayan şey yaşanmamış demektir." — Baş Vakanüvis İlber Middlen
      </div>

      {/* DM istatistikleri */}
      {isDM&&Object.keys(readStats).length>0&&(
        <div style={{background:"rgba(91,155,213,.04)",border:"1px solid rgba(91,155,213,.14)",borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:".5rem",letterSpacing:".18em",color:"rgba(91,155,213,.5)",textTransform:"uppercase",marginBottom:8}}>👁 Okuma İstatistikleri</div>
          {Object.entries(readStats).map(([oyuncu,kitaplar])=>(
            <div key={oyuncu} style={{marginBottom:8}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",color:"var(--gold)",marginBottom:4}}>{oyuncu}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {Object.entries(kitaplar).map(([bookId,count])=>{
                  const book=BOOKS.find(b=>b.id===bookId);
                  return book?(
                    <span key={bookId} style={{fontFamily:"'Cinzel',serif",fontSize:".55rem",background:"rgba(91,155,213,.1)",border:"1px solid rgba(91,155,213,.2)",borderRadius:4,padding:"2px 7px",color:"#90b8f0"}}>
                      {book.spine} ×{count}
                    </span>
                  ):null;
                })}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Raf */}
      <div style={{fontFamily:"'Cinzel',serif",fontSize:".5rem",letterSpacing:".2em",color:"rgba(200,149,42,.4)",textTransform:"uppercase"}}>{BOOKS.length} eser</div>
      <div style={{display:"flex",gap:2,alignItems:"flex-end",padding:"0 0 10px",borderBottom:"2px solid rgba(200,149,42,.18)",overflowX:"auto",paddingBottom:14}}>
        {BOOKS.map((book,i)=>(
          <button key={book.id} onClick={()=>openBook(book.id)} title={book.spine}
            style={{display:"flex",flexDirection:"column",alignItems:"center",background:"transparent",border:"none",cursor:"pointer",padding:"0 3px",gap:5,flexShrink:0}}
            onMouseEnter={e=>{const b=e.currentTarget.querySelector(".bk");if(b){b.style.transform="translateY(-7px)";b.style.boxShadow="3px 3px 12px rgba(0,0,0,.55)";}}}
            onMouseLeave={e=>{const b=e.currentTarget.querySelector(".bk");if(b){b.style.transform="translateY(0)";b.style.boxShadow="2px 2px 6px rgba(0,0,0,.3)";}}}
          >
            <div className="bk" style={{width:44,height:i%3===0?128:i%3===1?112:120,background:book.color,borderRadius:"2px 4px 4px 2px",boxShadow:"2px 2px 6px rgba(0,0,0,.3)",transition:"all .2s ease",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:5,background:"rgba(0,0,0,.22)",borderRadius:"2px 0 0 2px"}}/>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:".38rem",fontWeight:700,color:"rgba(255,255,255,.8)",textAlign:"center",writingMode:"vertical-rl",textOrientation:"mixed",transform:"rotate(180deg)",lineHeight:1.2,maxHeight:"85%",overflow:"hidden",marginLeft:5,padding:"0 4px"}}>{book.spine}</div>
            </div>
          </button>
        ))}
      </div>

      {/* Liste */}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {BOOKS.map(book=>(
          <button key={book.id} onClick={()=>openBook(book.id)}

            onMouseEnter={e=>{e.currentTarget.style.background="rgba(200,149,42,.1)";e.currentTarget.style.borderColor="rgba(200,149,42,.28)";}}
            onMouseLeave={e=>{e.currentTarget.style.background="rgba(200,149,42,.04)";e.currentTarget.style.borderColor="rgba(200,149,42,.1)";}}>

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}}>
