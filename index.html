function Notebooks({me,isDM,charName}){
  const [notebooks,setNotebooks]=useState([]);
  const [mode,setMode]=useState(null); // null | "create" | "pickup"
  const [activeNb,setActiveNb]=useState(null); // {id, name, owner}
  const [unlocked,setUnlocked]=useState({}); // id -> true
  const [form,setForm]=useState({name:"",pass:""});
  const [passInput,setPassInput]=useState("");
  const [passErr,setPassErr]=useState(false);
  const [nbContent,setNbContent]=useState({});
  const [saved,setSaved]=useState({});
  const saveTimers=useRef({});

  // Load notebooks list
  useEffect(()=>{
    const load=async()=>{
      const data=await fbGet("notebooks");
      if(!data)return;
      setNotebooks(Object.values(data).sort((a,b)=>a.createdAt-b.createdAt));
    };
    load();
    const iv=setInterval(load,4000);
    return()=>clearInterval(iv);
  },[]);

  // Load content when notebook unlocked
  useEffect(()=>{
    if(!activeNb||!unlocked[activeNb.id])return;
    const load=async()=>{
      const data=await fbGet(`nbcontent/${activeNb.id}`);
      setNbContent(c=>({...c,[activeNb.id]:(data&&data.text)||""}));
    };
    load();
  },[activeNb,unlocked]);

  const createNotebook=async()=>{
    if(!form.name.trim()||!form.pass.trim())return;
    const id=`nb${ts()}`;
    const nb={id,name:form.name.trim(),owner:me,pass:form.pass.trim(),createdAt:ts(),wordCount:0};
    try{
      await fbSet(`notebooks/${id}`,nb);
      await fbSet(`nbcontent/${id}`,{text:""});
      setNotebooks(prev=>[...prev,nb]);
      setUnlocked(u=>({...u,[id]:true}));
      setNbContent(c=>({...c,[id]:""}));
      setActiveNb(nb);
      setForm({name:"",pass:""});
      setMode(null);
    }catch(e){
      alert("Oluşturma hatası: "+e.message);
    }
  };

  const tryUnlock=(nb)=>{
    if(passInput===nb.pass||isDM){
      setUnlocked(u=>({...u,[nb.id]:true}));
      setPassInput("");setPassErr(false);
      setActiveNb(nb);setMode(null);
    } else {
      setPassErr(true);setTimeout(()=>setPassErr(false),1800);
    }
  };

  const countWords=text=>text.trim()?text.trim().split(/\s+/).length:0;
  const closeEditor=()=>{setActiveNb(null);setPassInput("");setPassErr(false);};
  const [confirmDelete,setConfirmDelete]=useState(null); // nb id
  const [manualSaving,setManualSaving]=useState(false);

  const deleteNotebook=async(id)=>{
    try{
      await fbDel(`notebooks/${id}`);
      await fbDel(`nbcontent/${id}`);
      setNotebooks(prev=>prev.filter(n=>n.id!==id));
      if(activeNb&&activeNb.id===id) closeEditor();
      setConfirmDelete(null);
    }catch(e){console.error("Delete error:",e);}
  };

  const manualSave=async()=>{
    if(!activeNb||!unlocked[activeNb.id])return;
    setManualSaving(true);
    const text=nbContent[activeNb.id]||"";
    const wc=countWords(text);
    await fbSet(`nbcontent/${activeNb.id}`,{text});
    await fbPatch(`notebooks/${activeNb.id}`,{wordCount:wc});
    setNotebooks(prev=>prev.map(n=>n.id===activeNb.id?{...n,wordCount:wc}:n));
    setSaved(s=>({...s,[activeNb.id]:true}));
    setTimeout(()=>{setManualSaving(false);setSaved(s=>({...s,[activeNb.id]:false}));},1500);
  };

  const handleEdit=async(id,text)=>{
    setNbContent(c=>({...c,[id]:text}));
    clearTimeout(saveTimers.current[id]);
    saveTimers.current[id]=setTimeout(async()=>{
      const wc=countWords(text);
      try{
        await fbSet(`nbcontent/${id}`,{text});
        await fbPatch(`notebooks/${id}`,{wordCount:wc});
        setNotebooks(prev=>prev.map(n=>n.id===id?{...n,wordCount:wc}:n));
        setSaved(s=>({...s,[id]:true}));
        setTimeout(()=>setSaved(s=>({...s,[id]:false})),1500);
      }catch(e){console.error("Save error:",e);}
    },700);
  };

  const exportPDF=async(nb,text,charName)=>{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const now=new Date();
    const dateStr=now.toLocaleDateString("tr-TR",{year:"numeric",month:"long",day:"numeric"});
    const timeStr=now.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
    const W=210, margin=20, contentW=W-margin*2;

    // Header bg
    doc.setFillColor(30,23,16);
    doc.rect(0,0,W,40,"F");

    // Gold line
    doc.setDrawColor(200,149,42);
    doc.setLineWidth(0.5);
    doc.line(margin,40,W-margin,40);

    // Title block
    doc.setTextColor(240,192,96);
    doc.setFontSize(18);
    doc.setFont("helvetica","bold");
    doc.text("İnci — Tavern Roll",margin,14);

    doc.setFontSize(11);
    doc.setTextColor(200,149,42);
    doc.setFont("helvetica","normal");
    doc.text(nb.name,margin,22);

    doc.setFontSize(9);
    doc.setTextColor(180,160,120);
    doc.text(`Karakter: ${charName||nb.owner}`,margin,29);
    doc.text(`${dateStr} · ${timeStr}`,margin,34);

    // Word count right side
    doc.setFontSize(8);
    doc.setTextColor(140,120,80);
    const wc=countWords(text);
    doc.text(`${wc} kelime`,W-margin,29,{align:"right"});
    doc.text(`${text.length} karakter`,W-margin,34,{align:"right"});

    // Content
    doc.setTextColor(30,20,10);
    doc.setFontSize(11);
    doc.setFont("helvetica","normal");

    const lines=doc.splitTextToSize(text||"(Boş not defteri)",contentW);
    let y=52;
    const lineH=6;
    const pageH=297;
    const bottomMargin=20;

    for(let i=0;i<lines.length;i++){
      if(y+lineH>pageH-bottomMargin){
        doc.addPage();
        doc.setFillColor(250,245,235);
        doc.rect(0,0,W,pageH,"F");
        // page header
        doc.setDrawColor(200,149,42);
        doc.setLineWidth(0.3);
        doc.line(margin,12,W-margin,12);
        doc.setFontSize(8);
        doc.setTextColor(160,130,60);
        doc.text(`${nb.name} — ${charName||nb.owner}`,margin,10);
        doc.text(`${doc.getCurrentPageInfo().pageNumber}. sayfa`,W-margin,10,{align:"right"});
        y=20;
      }
      doc.setFontSize(11);
      doc.setTextColor(30,20,10);
      doc.text(lines[i],margin,y);
      y+=lineH;
    }

    // Footer on last page
    doc.setDrawColor(200,149,42);
    doc.setLineWidth(0.3);
    doc.line(margin,pageH-12,W-margin,pageH-12);
    doc.setFontSize(7);
    doc.setTextColor(160,130,60);
    doc.text("İnci · Tavern Roll — tavern-roll.github.io",margin,pageH-7);
    doc.text(`${dateStr}`,W-margin,pageH-7,{align:"right"});

    const safeName=(nb.name+"-"+(charName||nb.owner)).replace(/[^a-zA-Z0-9\u00C0-\u017E\s_-]/g,"").replace(/\s+/g,"_");
    doc.save(`InciTavernRoll_${safeName}_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}.pdf`);
  };

  // DM view: all notebooks with passwords
  const dmView=isDM&&mode==="dm";

  return <div>
    <div className="st">📓 Not Defterleri</div>

    {!activeNb&&!dmView&&<div className="nb-actions">
      <button className="nb-action-btn" onClick={()=>setMode(m=>m==="create"?null:"create")}>✦ Not Defteri Oluştur</button>
      <button className="nb-action-btn" onClick={()=>setMode(m=>m==="pickup"?null:"pickup")}>📖 Not Defteri Teslim Al</button>
      {isDM&&<button className="nb-action-btn" style={{borderColor:"rgba(139,26,26,.4)",color:"#ffaaaa"}} onClick={()=>setMode(m=>m==="dm"?null:"dm")}>👁 DM Görünümü</button>}
    </div>}

    {/* CREATE FORM */}
    {mode==="create"&&!activeNb&&<div className="nb-form">
      <h4>✦ Yeni Not Defteri</h4>
      <input className="nb-input" placeholder="Defterin adı (ör. Gizli Planlarım)" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
      <input className="nb-input" type="password" placeholder="Şifre (sadece sen bileceksin)" value={form.pass} onChange={e=>setForm(f=>({...f,pass:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&createNotebook()}/>
      <div style={{display:"flex",gap:8}}>
        <button className="nb-btn" onClick={createNotebook} disabled={!form.name.trim()||!form.pass.trim()}>Oluştur →</button>
        <button className="nb-btn cancel" onClick={()=>setMode(null)}>İptal</button>
      </div>
    </div>}

    {/* PICKUP LIST */}
    {mode==="pickup"&&!activeNb&&<div className="nb-form">
      <h4>📖 Mevcut Not Defterleri</h4>
      {notebooks.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".9rem",padding:"8px 0"}}>Henüz hiç not defteri yok.</div>}
      <div className="nb-list">
        {notebooks.map(nb=>{
          const isOwner=nb.owner===me;
          const isOpen=unlocked[nb.id];
          return <div key={nb.id} className={`nb-item${(activeNb&&activeNb.id)===nb.id?" active":""}`} onClick={()=>{setActiveNb(nb);setMode(null);}}>
            <span className="nb-item-icon">{isOpen?"📖":"📓"}</span>
            <div className="nb-item-body">
              <div className="nb-item-name">{nb.name}</div>
              <div className="nb-item-meta">{nb.owner} · {nb.wordCount||0} kelime</div>
            </div>
            <span className="nb-item-lock">{isOpen?"🔓":isOwner?"🔑":"🔒"}</span>
          </div>;
        })}
      </div>
      <button className="nb-btn cancel" onClick={()=>setMode(null)}>Kapat</button>
    </div>}

    {/* DM VIEW */}
    {dmView&&<div className="nb-form">
      <h4>👁 Tüm Not Defterleri — DM Erişimi</h4>
      {notebooks.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".9rem",padding:"8px 0"}}>Henüz not defteri yok.</div>}
      {notebooks.map(nb=><div key={nb.id} className="nb-dm-row">
        <span style={{fontSize:"1.3rem"}}>📓</span>
        <div className="nb-dm-info">
          <div className="nb-dm-name">{nb.name} <span style={{color:"var(--text-dim)",fontWeight:"normal"}}>— {nb.owner}</span></div>
          <div className="nb-dm-pass">🔑 Şifre: <strong style={{color:"rgba(240,192,96,.7)"}}>{nb.pass}</strong> · {nb.wordCount||0} kelime</div>
          {confirmDelete===nb.id&&<div style={{marginTop:8,background:"rgba(139,26,26,.12)",border:"1px solid rgba(139,26,26,.3)",borderRadius:5,padding:"8px 10px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:".78rem",color:"#ffaaaa",fontStyle:"italic"}}>⚠ Emin misin? Bu işlem geri alınamaz.</span>
            <div style={{display:"flex",gap:6}}>
              <button className="yes-btn" onClick={()=>deleteNotebook(nb.id)}>✓ Sil</button>
              <button className="no-btn" onClick={()=>setConfirmDelete(null)}>✕ İptal</button>
            </div>
          </div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          <button className="nb-btn" style={{fontSize:".6rem",padding:"4px 10px"}} onClick={()=>{setUnlocked(u=>({...u,[nb.id]:true}));setActiveNb(nb);setMode(null);}}>Aç</button>
          <button className="nb-btn" style={{fontSize:".6rem",padding:"4px 10px",borderColor:"rgba(139,26,26,.4)",color:"#ff9090"}}
            onClick={()=>setConfirmDelete(confirmDelete===nb.id?null:nb.id)}>Sil</button>
        </div>
      </div>)}
      <button className="nb-btn cancel" style={{marginTop:8}} onClick={()=>{setMode(null);setConfirmDelete(null);}}>Kapat</button>
    </div>}

    {/* EDITOR */}
    {activeNb&&<div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <button className="nb-btn cancel" onClick={closeEditor}>← Geri</button>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"var(--gold)",letterSpacing:".08em"}}>{activeNb.name}</span>
        <span style={{fontSize:".7rem",color:"var(--text-dim)",fontStyle:"italic"}}>— {activeNb.owner}</span>
      </div>

      {unlocked[activeNb.id]
        ? <div className="nb-editor">
            <div className="nb-editor-header">
              <div>
                <div className="nb-editor-title">📖 {activeNb.name}</div>
                <div className="nb-editor-meta">{countWords(nbContent[activeNb.id]||"")} kelime</div>
              </div>
            </div>
            <textarea
              className="nb-textarea"
              placeholder="Notlarını buraya yaz..."
              value={nbContent[activeNb.id]||""}
              onChange={e=>handleEdit(activeNb.id,e.target.value)}
              disabled={activeNb.owner!==me&&!isDM}
            />
            <div className="nb-footer">
              <span className="nb-wordcount">{countWords(nbContent[activeNb.id]||"")} kelime · {(nbContent[activeNb.id]||"").length} karakter</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button className="nb-btn" style={{fontSize:".6rem",padding:"4px 12px",borderColor:"rgba(200,149,42,.25)"}}
                  onClick={()=>exportPDF(activeNb,nbContent[activeNb.id]||"",charName)}>
                  ⬇ PDF
                </button>
                <button
                  className="nb-btn"
                  style={{fontSize:".6rem",padding:"4px 12px",borderColor:manualSaving?"#3cb454":"rgba(200,149,42,.3)",color:manualSaving?"#3cb454":"var(--gold-light)",transition:"all .3s"}}
                  onClick={manualSave}
                  disabled={manualSaving||activeNb.owner!==me&&!isDM}>
                  {manualSaving?"✓ Kaydedildi":"💾 Kaydet"}
                </button>
                <span className={`nb-save-ind${saved[activeNb.id]?" ok":""}`}>{saved[activeNb.id]?"✓ Otomatik kaydedildi":"Otomatik kaydediliyor..."}</span>
              </div>
            </div>
          </div>
        : <div className="nb-editor">
            <div className="nb-lock-overlay">
              <div className="nb-lock-icon">🔒</div>
              <div className="nb-lock-title">Şifre Gerekli</div>
              <div style={{fontSize:".85rem",color:"var(--text-dim)",fontStyle:"italic",marginBottom:8}}>{activeNb.name} · {activeNb.owner}</div>
              <input className="nb-input" type="password" placeholder="Şifreyi gir..." value={passInput}
                style={{maxWidth:220,textAlign:"center",borderColor:passErr?"#c03030":undefined}}
                onChange={e=>setPassInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&tryUnlock(activeNb)}/>
              {passErr&&<div className="nb-err">Yanlış şifre!</div>}
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <button className="nb-btn" onClick={()=>tryUnlock(activeNb)}>Kilidi Aç →</button>
                <button className="nb-btn cancel" onClick={closeEditor}>İptal</button>
              </div>
            </div>
          </div>
      }
    </div>}
  </div>;
}

function Char({me,isDM,char,setChar,all,avatars,onUploadAvatar}){
  const [saved,setSaved]=useState(false);
  const [vp,setVp]=useState(me);
  const [pickerOpen,setPickerOpen]=useState(null);
  const st=useRef(null);
  const self=vp===me||!isDM;
  const vc=self?char:(all.find(p=>p.name===vp)||{char:iChar(vp)}).char||iChar(vp);
  const can=self||isDM;
  const save=async(u,t)=>{await fbSet(`chars/${t}`,u);if(t===me){setSaved(true);setTimeout(()=>setSaved(false),1500);}};
  const upd=(f,v)=>{
    if(!can)return;
    if(self){setChar(c=>{const n={...c,[f]:v};clearTimeout(st.current);st.current=setTimeout(()=>save(n,me),600);return n;});}
    else{const u={...vc,[f]:v};clearTimeout(st.current);st.current=setTimeout(()=>save(u,vp),600);}
  };
  const updAttr=(attr,v)=>{
    if(!can)return;
    const newAttrs={...(vc.attrs||{}),[attr]:v};
    upd("attrs",newAttrs);
  };
  const skills=vc.skills||{};
  const slotsMap={"5":1,"4":2,"3":2,"2":3,"1":4,"-1":4,"-2":3,"-3":2,"-4":2,"-5":1};
  const getSlotsForLevel=lv=>slotsMap[String(lv)]||1;
  const skillsAtLevel=lv=>Object.entries(skills).filter(([,v])=>v===lv).map(([k])=>k);
  const level=parseInt(vc.level)||1;

  // Kullanılan negatif hamle = tüm negatif skill'lerin mutlak değerleri toplamı
  const usedNegMoves=Object.entries(skills).filter(([,v])=>v<0).reduce((s,[,v])=>s+Math.abs(v),0);
  // Toplam pozitif hak = seviye + negatif hamle sayısı (her negatif seviye +1 bonus)
  const totalPosMoves=level+usedNegMoves;
  // Kullanılan pozitif hamle = tüm pozitif skill'lerin değerleri toplamı
  const usedPosMoves=Object.entries(skills).filter(([,v])=>v>0).reduce((s,[,v])=>s+v,0);
  const remPos=totalPosMoves-usedPosMoves;
  const remNeg=level-usedNegMoves;
  const placedSkills=new Set(Object.keys(skills));

  // Bir skili fromLv'den toLv'ye taşımanın maliyetini hesapla
  // Pozitif için: toLv - (mevcut pozitif seviye veya 0)
  // Negatif için: |toLv| - (mevcut negatif seviye veya 0)
  const getMoveCost=(fromLv, toLv)=>{
    if(fromLv===toLv)return{posCost:0,negCost:0};
    const from=fromLv||0;
    if(toLv>0){
      // fromLv negatifse önce neg hamleler iade olur → pos bonus azalır
      const posFrom=from>0?from:0;
      return{posCost:toLv-posFrom, negCost:0};
    } else if(toLv<0){
      const negFrom=from<0?Math.abs(from):0;
      return{posCost:0, negCost:Math.abs(toLv)-negFrom};
    }
    return{posCost:0,negCost:0};
  };

  const canAssign=(skill, toLv)=>{
    if(!can)return false;
    const fromLv=skills[skill]||0;
    if(fromLv===toLv)return false;
    const {posCost,negCost}=getMoveCost(fromLv,toLv);
    // Pos'tan neg'e veya neg'den pos'a geçerken mevcut hamleler güncellenir
    // Negatiften pozitife: neg hamleler iade olur, pos bonus azalır, yeni pos harcanır
    if(fromLv<0&&toLv>0){
      const newUsedNeg=usedNegMoves-Math.abs(fromLv);
      const newTotalPos=level+newUsedNeg;
      const newUsedPos=usedPosMoves+toLv;
      return newTotalPos>=newUsedPos;
    }
    if(toLv>0) return remPos>=posCost;
    if(toLv<0) return remNeg>=negCost;
    return false;
  };

  const moveCost=(fromLv,toLv)=>{
    const{posCost,negCost}=getMoveCost(fromLv||0,toLv);
    return toLv>0?posCost:negCost;
  };

  const assignSkill=(skill,lv)=>{
    if(!can||!canAssign(skill,lv))return;
    upd("skills",{...skills,[skill]:lv});
    setPickerOpen(null);
  };
  const removeSkill=(skill)=>{if(!can)return;const ns={...skills};delete ns[skill];upd("skills",ns);};
  return <div className="panel">
    {self&&<AvatarUpload me={me} avatars={avatars} onUpload={onUploadAvatar}/>}
    {isDM&&!self&&avatars&&avatars[vp]&&<div className="avatar-wrap"><img src={avatars[vp]} className="avatar-img" alt="avatar"/></div>}
    {isDM&&all.length>0&&<>
      <div className="st" style={{marginTop:0}}>Oyuncuları Görüntüle</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {all.map(p=><button key={p.name} className={`tb${vp===p.name?" on":""}`} onClick={()=>{setVp(p.name);setPickerOpen(null);}} style={{fontSize:".7rem"}}>{p.name}</button>)}
      </div>
    </>}
    {!can&&<div className="dmo">📖 Salt okunur — {vp} karakteri</div>}
    <div className="st" style={{marginTop:0}}>Karakter Bilgileri</div>
    <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:8,marginBottom:12}}>
      {[{l:"KARAKTER ADI",f:"name",ph:"Duncan the Tall..."},{l:"IRK",f:"race",sel:RACES},{l:"YAŞ",f:"age",ph:"25"},{l:"SEVİYE",f:"level",ph:"1",type:"number"}].map(x=>(
        <div key={x.f} className="cf">
          <label>{x.l}</label>
          {x.sel
            ?<select value={vc[x.f]||""} onChange={e=>upd(x.f,e.target.value)} disabled={!can}><option value="">—</option>{x.sel.map(o=><option key={o}>{o}</option>)}</select>
            :<input type={x.type||"text"} value={vc[x.f]||""} onChange={e=>upd(x.f,e.target.value)} placeholder={x.ph} disabled={!can}/>}
        </div>
      ))}
    </div>
    <div className="st">Kondisyon</div>
    <div className="cb"><div className="cr">
      <PipBar type="fiziksel" saglik={vc.fiziksel!=null?vc.fiziksel:3} maxPips={3} disabled={!can} onChange={v=>upd("fiziksel",v)}/>
      <div className="cdv"/>
      <PipBar type="zihinsel" saglik={vc.zihinsel!=null?vc.zihinsel:3} maxPips={3} disabled={!can} onChange={v=>upd("zihinsel",v)}/>
    </div></div>
    <div className="st">Durum Etkileri</div>
    <StatusPicker statuses={vc.statuses||[]} onChange={v=>upd("statuses",v)} disabled={!can}/>
    <div className="st">Saving Throwlar</div>
    <div className="attr-grid">
      {ATTRIBUTES.map(a=>(
        <div key={a} className="attr-box">
          <div className="attr-name">{a}</div>
          <input className="attr-input" type="text" value={(vc.attrs&&vc.attrs[a])||""} placeholder="—"
            onChange={e=>updAttr(a,e.target.value)} disabled={!can}/>
        </div>
      ))}
    </div>
    <div className="st">Skill Piramidi</div>
    <div className="moves-info">
      <div className="moves-item"><span>{remPos}</span><span className="moves-label">Pozitif hamle kaldı</span></div>
      <div className="moves-item"><span>{remNeg}</span><span className="moves-label">Negatif hamle kaldı</span></div>
      <div className="moves-item" style={{color:"var(--text-dim)",fontSize:".7rem",alignSelf:"center",fontStyle:"italic"}}>
        Seviye {level} → {level} pozitif{usedNegMoves>0?` + ${usedNegMoves} bonus`:""} · {level} negatif hakkı
      </div>
    </div>
    <div className="pyramid-wrap">
      {PYRAMID_LEVELS.map(lv=>{
        const isNeg=lv<0;
        const slots=getSlotsForLevel(lv);
        const placed=skillsAtLevel(lv);
        return(
          <div key={lv} className="pyramid-row">
            <div className={`pyramid-level ${isNeg?"neg":"pos"}`}>{lv>0?"+":""}{lv}</div>
            <div className="pyramid-slots">
              {Array.from({length:slots}).map((_,si)=>{
                const skill=placed[si];
                const isOpen=pickerOpen&&pickerOpen.level===lv&&pickerOpen.slotIdx===si;
                const isFiz=skill&&FIZIKSEL_SKILLS.includes(skill);
                const canAdd=can&&!skill&&((!isNeg&&remPos>0)||(isNeg&&remNeg>0));
                return(
                  <div key={si} style={{position:"relative"}}>
                    <div className={`pyramid-slot${skill?" filled":""}${skill&&isNeg?" neg-slot":""}`}
                      onClick={()=>{if(canAdd||skill)setPickerOpen(isOpen?null:{level:lv,slotIdx:si});}}>
                      {skill?(
                        <>
                          <span className="pyramid-slot-text" style={{color:isFiz?"#7ef0a0":"#a8c8f8"}}>{skill}</span>
                          {can&&<button className="pyramid-slot-remove" onClick={e=>{e.stopPropagation();removeSkill(skill);}}>✕</button>}
                        </>
                      ):(
                        <span style={{fontSize:".68rem",color:canAdd?"rgba(200,149,42,.4)":"rgba(var(--text-rgb,245,230,200),.15)"}}>
                          {canAdd?"+ ekle":"—"}
                        </span>
                      )}
                    </div>
                    {isOpen&&(
                      <div className="skill-picker" style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",zIndex:500,minWidth:300,maxWidth:"90vw",maxHeight:"80vh",overflowY:"auto"}}>
                        <div className="skill-picker-title">
                          {skill?`${skill} taşı → ${lv>0?"+":""}${lv}`:
                          `${lv>0?"+":""}${lv} seviyesine skill ekle`}
                        </div>
                        <div style={{marginBottom:8,fontSize:".7rem",color:"rgba(200,149,42,.5)",fontStyle:"italic"}}>
                          {isNeg?`Kalan neg hamle: ${remNeg}`:`Kalan pos hamle: ${remPos}`}
                        </div>
                        {/* Mevcut bir skili taşı */}
                        {Object.keys(skills).length>0&&<>
                          <div style={{marginBottom:6,fontSize:".65rem",color:"rgba(200,149,42,.7)"}}>↑ Mevcut Skili Taşı</div>
                          <div className="skill-picker-cols" style={{marginBottom:10}}>
                            {Object.entries(skills).filter(([s,v])=>v!==lv).map(([s,v])=>{
                              const cost=moveCost(v,lv);
                              const ok=canAssign(s,lv);
                              return <button key={s} className={"skill-pick-btn "+(FIZIKSEL_SKILLS.includes(s)?"fiz":"zih")}
                                disabled={!ok}
                                onClick={()=>assignSkill(s,lv)}
                                style={{opacity:ok?1:.4}}>
                                {s} <span style={{fontSize:".6rem",color:"rgba(200,149,42,.7)"}}>{v>0?"+":""}{v}→{lv>0?"+":""}{lv} ({cost>0?"+":""}{cost})</span>
                              </button>;
                            })}
                          </div>
                        </>}
                        <div style={{marginBottom:6,fontSize:".65rem",color:"rgba(76,175,125,.8)"}}>🟢 Yeni Fiziksel</div>
                        <div className="skill-picker-cols" style={{marginBottom:8}}>
                          {FIZIKSEL_SKILLS.filter(s=>!placedSkills.has(s)).map(s=>{
                            const cost=moveCost(0,lv);
                            const ok=canAssign(s,lv);
                            return <button key={s} className="skill-pick-btn fiz"
                              disabled={!ok}
                              onClick={()=>assignSkill(s,lv)}
                              style={{opacity:ok?1:.4}}>
                              {s} <span style={{fontSize:".6rem",color:"rgba(200,149,42,.7)"}}>({cost>0?"+":""}{cost})</span>
                            </button>;
                          })}
                        </div>
                        <div style={{marginBottom:6,fontSize:".65rem",color:"rgba(91,155,213,.8)"}}>🔵 Yeni Zihinsel</div>
                        <div className="skill-picker-cols">
                          {ZIHINSEL_SKILLS.filter(s=>!placedSkills.has(s)).map(s=>{
                            const cost=moveCost(0,lv);
                            const ok=canAssign(s,lv);
                            return <button key={s} className="skill-pick-btn zih"
                              disabled={!ok}
                              onClick={()=>assignSkill(s,lv)}
                              style={{opacity:ok?1:.4}}>
                              {s} <span style={{fontSize:".6rem",color:"rgba(200,149,42,.7)"}}>({cost>0?"+":""}{cost})</span>
                            </button>;
                          })}
                        </div>
                        <button className="nb-btn cancel" style={{marginTop:8,width:"100%"}} onClick={()=>setPickerOpen(null)}>İptal</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
    <div className="st">Notlar</div>
    <textarea className="na" rows={5} placeholder="Geçmiş, bağlantılar, ekipman..." value={vc.notes||""} onChange={e=>upd("notes",e.target.value)} disabled={!can}/>
    <div className={`si${saved?" ok":""}`}>{saved?"✓ Kaydedildi":"Otomatik kaydediliyor..."}</div>
    {self&&can&&<button className="nb-btn" style={{marginTop:10,width:"100%"}} onClick={()=>exportCharPDF(vc,avatars&&avatars[me])}>⬇ Karakter Sayfasini PDF Indir</button>}
    {self&&<ErrorBoundary><Notebooks me={me} isDM={isDM} charName={vc.name||me}/></ErrorBoundary>}
  </div>;
}

function WaitRoomToggle(){
  const [active,setActive]=useState(false);
  useEffect(()=>{fbGet("waitRoomActive").then(d=>setActive(!!d));},[]);
  const toggle=async()=>{
    const next=!active;setActive(next);
    await fbSet("waitRoomActive",next?{on:true}:null);
  };
  return(
    <button onClick={toggle} style={{
      background:active?"rgba(91,155,213,.14)":"rgba(200,149,42,.06)",
      border:"1px solid "+(active?"rgba(91,155,213,.4)":"rgba(200,149,42,.25)"),
      borderRadius:5,padding:"5px 10px",cursor:"pointer",
      fontFamily:"'Cinzel',serif",fontSize:".6rem",letterSpacing:".06em",
      color:active?"#90b8f0":"var(--text-dim)",transition:"all .2s"
    }}>
      {active?"🏠 Bekleme Odası: AÇIK":"🏠 Bekleme Odası: KAPALI"}
    </button>
  );
}

function NbPassList({onChangePass}){
  const [nbs,setNbs]=useState([]);
  useEffect(()=>{
    fbGet("notebooks").then(data=>{if(data)setNbs(Object.values(data));});
  },[]);
  if(!nbs.length)return <div style={{fontSize:".78rem",color:"var(--text-dim)",fontStyle:"italic"}}>Henüz not defteri yok.</div>;
  return <div style={{display:"flex",flexDirection:"column",gap:5}}>
    {nbs.map(nb=>(
      <div key={nb.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0"}}>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"var(--parchment)",flex:1}}>
          {nb.name} <span style={{color:"var(--text-dim)",fontSize:".65rem"}}>— {nb.owner}</span>
        </span>
        <span style={{fontFamily:"monospace",fontSize:".68rem",color:"rgba(200,149,42,.6)"}}>{nb.pass}</span>
        <button className="nbtn" style={{fontSize:".55rem",padding:"2px 7px"}} onClick={()=>onChangePass(nb.id,nb.name)}>✏</button>
      </div>
    ))}
  </div>;
}

function Npc({isDM,npcs,setNpcs,onClearRolls,allPlayers}){
  const [form,setForm]=useState({name:"",type:"enemy",ac:"12",cr:"1",notes:"",boss:false,fizMax:"3",zihMax:"3"});
  const [confirm,setConfirm]=useState(null);
  const [modOpen,setModOpen]=useState(false);
  const [allChars,setAllChars]=useState({});
  const [allAccounts,setAllAccounts]=useState({});
  const [allPlayersData,setAllPlayersData]=useState({});
  const [kickConfirm,setKickConfirm]=useState(null);
  const [deleteTarget,setDeleteTarget]=useState(null);
  const [deleteInput,setDeleteInput]=useState("");
  const [deleteErr,setDeleteErr]=useState(false);
  const [changePassTarget,setChangePassTarget]=useState(null);
  const [newPass,setNewPass]=useState("");

  useEffect(()=>{
    if(!isDM||!modOpen)return;
    const load=async()=>{
      const data=await fbGet("chars");if(data)setAllChars(data);
      const accs=await fbGet("accounts");if(accs)setAllAccounts(accs);
      const pdata=await fbGet("players");if(pdata)setAllPlayersData(pdata);
    };
    load();
    const iv=setInterval(load,4000);
    return()=>clearInterval(iv);
  },[isDM,modOpen]);

  const sync=async u=>{setNpcs(u);if(!u.length){await fbSet("npcs",null);return;}const o={};u.forEach(n=>{o[n.id]=n;});await fbSet("npcs",o);};
  const add=async(boss)=>{
    if(!form.name.trim())return;
    const fiz=boss?parseInt(form.fizMax)||3:3;
    const zih=boss?parseInt(form.zihMax)||3:3;
    await sync([...npcs,{...form,id:ts(),fiziksel:fiz,zihinsel:zih,fizMax:fiz,zihMax:zih,boss:boss||false}]);
    setForm({name:"",type:"enemy",ac:"12",cr:"1",notes:"",boss:false,fizMax:"3",zihMax:"3"});
  };
  const uPip=async(id,f,v)=>sync(npcs.map(n=>n.id===id?{...n,[f]:v}:n));
  const rem=async id=>sync(npcs.filter(n=>n.id!==id));
  const doConfirm=async()=>{
    if(confirm==="npcs")await sync([]);
    if(confirm==="rolls")await onClearRolls();
    setConfirm(null);
  };
  const kickPlayer=async(pname)=>{
    await fbSet("kicked/"+pname,{at:ts()});
    await fbDel("players/"+pname);
    setKickConfirm(null);
  };
  const startDelete=(pname)=>{setDeleteTarget({name:pname});setDeleteInput("");setDeleteErr(false);};
  const changePassword=async()=>{
    if(!newPass.trim()||!changePassTarget)return;
    if(changePassTarget.type==="player"){
      await fbPatch("accounts/"+changePassTarget.id,{pass:newPass.trim()});
      setAllAccounts(a=>({...a,[changePassTarget.id]:{...a[changePassTarget.id],pass:newPass.trim()}}));
    } else if(changePassTarget.type==="notebook"){
      await fbPatch("notebooks/"+changePassTarget.id,{pass:newPass.trim()});
    }
    setChangePassTarget(null);setNewPass("");
  };
  const confirmDelete=async()=>{
    if(deleteInput.trim()!==deleteTarget.name){setDeleteErr(true);return;}
    await fbDel("chars/"+deleteTarget.name);
    await fbDel("players/"+deleteTarget.name);
    await fbDel("avatars/"+deleteTarget.name);
    const nc={...allChars};delete nc[deleteTarget.name];
    setAllChars(nc);setDeleteTarget(null);setDeleteInput("");
  };

  const onlinePNames=new Set((allPlayers||[]).filter(p=>p.role!=="dm").map(p=>p.name));
  const allCharNames=Object.keys(allChars).filter(n=>n!=="DM");

  return <div className="panel">
    {!isDM&&<div className="dmo">NPC'ler DM tarafından yonetilir.</div>}
    {isDM&&<>
      <div className="st" style={{marginTop:0}}>DM Araclar</div>
      <div className="dm-tools">
        <button className="danger-btn" onClick={()=>setConfirm("npcs")}>Tum NPC'leri Temizle</button>
        <button className="danger-btn" onClick={()=>setConfirm("rolls")}>Tum Zarlari Temizle</button>
        <button className="danger-btn" style={{background:"rgba(139,26,26,.08)",borderColor:"rgba(139,26,26,.35)",color:"#ffaaaa"}} onClick={()=>setModOpen(o=>!o)}>Moderator</button>
        <WaitRoomToggle/>
      </div>
      {confirm&&<div className="confirm-box">
        <span>Emin misin?</span>
        <div className="confirm-btns">
          <button className="yes-btn" onClick={doConfirm}>Evet</button>
          <button className="no-btn" onClick={()=>setConfirm(null)}>Iptal</button>
        </div>
      </div>}
      {modOpen&&<div style={{background:"rgba(139,26,26,.07)",border:"1px solid rgba(139,26,26,.3)",borderRadius:8,padding:14,marginBottom:16}}>
        <div className="st" style={{marginTop:0,color:"#ffaaaa",borderColor:"rgba(139,26,26,.3)"}}>Moderator Paneli</div>
        {allCharNames.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".85rem",padding:"8px 0"}}>Kayitli karakter yok.</div>}
        {allCharNames.map(pname=>{
          const isOnline=onlinePNames.has(pname);
          const cd=allChars[pname];
          const acc=allAccounts[pname];
          const playerData=allPlayersData[pname];
          const onlinePlayer=(allPlayers||[]).find(p=>p.name===pname);
          const onlineDur=isOnline&&onlinePlayer&&onlinePlayer.loginAt
            ?(()=>{const s=Math.floor((ts()-onlinePlayer.loginAt)/1000);const h=Math.floor(s/3600);const m=Math.floor((s%3600)/60);return h>0?h+'s '+m+'dk':m+'dk';})()
            :null;
          const lastOnline=!isOnline&&playerData&&playerData.lastSeen
            ?(()=>{const ago=Math.floor((ts()-playerData.lastSeen)/1000);if(ago<60)return ago+'sn once';if(ago<3600)return Math.floor(ago/60)+'dk once';if(ago<86400)return Math.floor(ago/3600)+'s once';return Math.floor(ago/86400)+'g once';})()
            :null;
          return <div key={pname} style={{padding:"8px 0",borderBottom:"1px solid rgba(139,26,26,.12)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:isOnline?"#3cb454":"rgba(var(--text-rgb,245,230,200),.2)",flexShrink:0,display:"inline-block"}}/>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:".75rem",color:"var(--parchment)",flex:1}}>
                {cd&&cd.name?cd.name:pname}
                <span style={{fontSize:".65rem",color:"var(--text-dim)",marginLeft:6}}>{isOnline?"çevrimiçi":"çevrimdışı"}</span>
                {onlineDur&&<span style={{fontSize:".62rem",color:"rgba(60,180,80,.7)",marginLeft:6}}>⏱ {onlineDur}</span>}
                {lastOnline&&<span style={{fontSize:".62rem",color:"rgba(200,149,42,.45)",marginLeft:6}}>son: {lastOnline}</span>}
              </span>
              {isOnline&&<button className="nbtn" style={{fontSize:".6rem",padding:"3px 10px",borderColor:"rgba(139,26,26,.4)",color:"#ff9090"}} onClick={()=>setKickConfirm(kickConfirm===pname?null:pname)}>Kick</button>}
              <button className="nbtn" style={{fontSize:".6rem",padding:"3px 10px"}} onClick={()=>deleteTarget&&deleteTarget.name===pname?setDeleteTarget(null):startDelete(pname)}>Sil</button>
            </div>
            {acc&&acc.pass&&<div style={{fontSize:".7rem",color:"rgba(200,149,42,.4)",fontStyle:"italic",paddingLeft:16,marginTop:3,display:"flex",alignItems:"center",gap:8}}>
              Şifre: <span style={{color:"rgba(200,149,42,.7)",fontFamily:"monospace"}}>{acc.pass}</span>
              <button className="nbtn" style={{fontSize:".55rem",padding:"2px 7px"}} onClick={()=>{setChangePassTarget({type:"player",id:pname,name:cd&&cd.name?cd.name:pname});setNewPass("");}}>✏</button>
            </div>}
            {!acc&&<div style={{fontSize:".65rem",color:"rgba(var(--text-rgb,245,230,200),.25)",fontStyle:"italic",paddingLeft:16,marginTop:2}}>Kayıt yok</div>}
          </div>;
        })}
        {kickConfirm&&<div className="confirm-box" style={{marginTop:8}}>
          <span>{kickConfirm} oyundan atilsin mi?</span>
          <div className="confirm-btns">
            <button className="yes-btn" onClick={()=>kickPlayer(kickConfirm)}>Kick</button>
            <button className="no-btn" onClick={()=>setKickConfirm(null)}>Iptal</button>
          </div>
        </div>}
        {deleteTarget&&<div style={{marginTop:10,background:"rgba(139,26,26,.1)",border:"1px solid rgba(139,26,26,.3)",borderRadius:6,padding:12}}>
          <div style={{fontSize:".78rem",color:"#ffaaaa",marginBottom:8}}>
            Silmek icin karakter ismini yaz: <strong>{deleteTarget.name}</strong>
          </div>
          <input className="fin" style={{marginBottom:8,borderColor:deleteErr?"#c03030":undefined}}
            placeholder={deleteTarget.name} value={deleteInput}
            onChange={e=>{setDeleteInput(e.target.value);setDeleteErr(false);}}
            onKeyDown={e=>e.key==="Enter"&&confirmDelete()}/>
          {deleteErr&&<div style={{color:"#ff6060",fontSize:".75rem",marginBottom:6}}>Isim eslesmedi!</div>}
          <div style={{display:"flex",gap:8}}>
            <button className="yes-btn" onClick={confirmDelete}>Kalici Sil</button>
            <button className="no-btn" onClick={()=>setDeleteTarget(null)}>Iptal</button>
          </div>
        </div>}

        {/* Şifre Değiştir Formu */}
        {changePassTarget&&<div style={{marginTop:10,background:"rgba(200,149,42,.06)",border:"1px solid rgba(200,149,42,.25)",borderRadius:6,padding:12}}>
          <div style={{fontSize:".78rem",color:"var(--gold)",marginBottom:8}}>
            ✏ {changePassTarget.name} için yeni şifre:
          </div>
          <input className="fin" type="password" style={{marginBottom:8}} placeholder="Yeni şifre..."
            value={newPass} onChange={e=>setNewPass(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&changePassword()}/>
          <div style={{display:"flex",gap:8}}>
            <button className="nb-btn" onClick={changePassword} disabled={!newPass.trim()}>Kaydet</button>
            <button className="nb-btn cancel" onClick={()=>{setChangePassTarget(null);setNewPass("");}}>İptal</button>
          </div>
        </div>}

        {/* Not Defterleri Şifreleri */}
        {Object.keys(allChars).length>0&&<>
          <div className="st" style={{marginTop:14,color:"rgba(200,149,42,.5)",borderColor:"rgba(200,149,42,.1)"}}>Not Defterleri</div>
          <NbPassList isDM={true} onChangePass={(id,name)=>{setChangePassTarget({type:"notebook",id,name});setNewPass("");}}/>
        </>}
      </div>}
    </>}

    <div className="nl">
      {!npcs.length&&<div className="em"><span>🐉</span>Henuz NPC yok.</div>}
      {npcs.map(n=>{
        const fmax=n.fizMax||3; const zmax=n.zihMax||3;
        const fsag=n.fiziksel!=null?n.fiziksel:fmax;
        const zsag=n.zihinsel!=null?n.zihinsel:zmax;
        const dead=fsag<=0&&zsag<=0;
        return <div key={n.id} className={"nc"+(dead?" dead":"")+(n.boss?" boss-npc":"")}>
          <div className="nr2">
            <div className="nn">{n.boss?"BOSS: ":""}{n.name}{dead?" - OLU":""}</div>
            <span className={"badge b"+(n.type==="enemy"?"e":n.type==="ally"?"a":"n")}>{n.type==="enemy"?"DUSMAN":n.type==="ally"?"MUTTEFIK":"TARAFSIZ"}</span>
          </div>
          <div className="ns">ZS {n.ac} - CR {n.cr}{n.boss?" - BOSS":""}</div>
          <div className="ncw">
            <NpcPips type="fiziksel" saglik={fsag} maxPips={fmax} disabled={!isDM} onChange={v=>uPip(n.id,"fiziksel",v)}/>
            <NpcPips type="zihinsel" saglik={zsag} maxPips={zmax} disabled={!isDM} onChange={v=>uPip(n.id,"zihinsel",v)}/>
            {isDM&&<StatusPicker statuses={n.statuses||[]} onChange={v=>sync(npcs.map(x=>x.id===n.id?{...x,statuses:v}:x))} disabled={false}/>}
          </div>
          {n.notes&&<div className="nnt">{n.notes}</div>}
          {isDM&&<div className="nct"><button className="nbtn rm" onClick={()=>rem(n.id)}>Kaldir</button></div>}
        </div>;
      })}
    </div>

    {isDM&&<div className="an">
      <h3>+ Yeni NPC</h3>
      <div className="f2">
        <input className="fin" placeholder="Isim" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
        <select className="fin" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}><option value="enemy">Dusman</option><option value="ally">Muttefik</option><option value="neutral">Tarafsiz</option></select>
      </div>
      <div className="f2">
        <input className="fin" placeholder="Zirh" type="number" value={form.ac} onChange={e=>setForm(f=>({...f,ac:e.target.value}))}/>
        <input className="fin" placeholder="CR" value={form.cr} onChange={e=>setForm(f=>({...f,cr:e.target.value}))}/>
      </div>
      <input className="fin" style={{marginBottom:8}} placeholder="Notlar" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
      {form.boss&&<div className="f2" style={{marginBottom:8}}>
        <div>
          <label style={{fontFamily:"'Cinzel',serif",fontSize:".55rem",color:"var(--gold)",display:"block",marginBottom:3}}>FIZIKSEL PIP</label>
          <input className="fin" type="number" min="1" max="20" value={form.fizMax} onChange={e=>setForm(f=>({...f,fizMax:e.target.value}))}/>
        </div>
        <div>
          <label style={{fontFamily:"'Cinzel',serif",fontSize:".55rem",color:"var(--gold)",display:"block",marginBottom:3}}>ZIHINSEL PIP</label>
          <input className="fin" type="number" min="1" max="20" value={form.zihMax} onChange={e=>setForm(f=>({...f,zihMax:e.target.value}))}/>
        </div>
      </div>}
      <div style={{display:"flex",gap:8}}>
        <button className="ab" onClick={()=>add(false)}>Ekle</button>
        <button className="ab" style={{background:"rgba(139,26,26,.12)",borderColor:"rgba(139,26,26,.5)",color:"#ff9090"}} onClick={()=>form.boss?add(true):setForm(f=>({...f,boss:true}))}>
          {form.boss?"BOSS Ekle":"BOSS"}
        </button>
        {form.boss&&<button className="nbtn" onClick={()=>setForm(f=>({...f,boss:false,fizMax:"3",zihMax:"3"}))}>Iptal</button>}
      </div>
    </div>}
  </div>;
}

// ─── HEX MAP ──────────────────────────────────────────────────────────────────
const HEX_COLS=13, HEX_ROWS=9;
const HEX_SIZE=34;

const PIN_TYPES=[
  {id:"player", label:"Oyuncu",  color:"#5b9bd5", fill:"rgba(91,155,213,.25)",  stroke:"#5b9bd5"},
  {id:"npc",    label:"NPC",     color:"#c8952a", fill:"rgba(200,149,42,.25)",  stroke:"#c8952a"},
  {id:"point",  label:"Önemli",  color:"#f0c060", fill:"rgba(240,192,96,.2)",   stroke:"#f0c060"},
  {id:"note",   label:"Not",     color:"#7ef0a0", fill:"rgba(126,240,160,.15)", stroke:"#7ef0a0"},
];

const hexToPixel=(col,row,size)=>({
  x: size*(1.5*col+1),
  y: size*(Math.sqrt(3)*(row+(col%2)*0.5)+1)
});

const hexPath=(cx,cy,r)=>{
  const pts=Array.from({length:6},(_,i)=>{
    const a=Math.PI/180*(60*i-30);
    return (cx+r*Math.cos(a)).toFixed(1)+","+(cy+r*Math.sin(a)).toFixed(1);
  });
  return "M"+pts.join("L")+"Z";
};

const hexToRgb=hex=>{
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return r+","+g+","+b;
};

function Arena({me,isDM,avatars,all,npcs,rolls,onRoll,char}){
  const [pins,setPins]=useState([]);
  const [blocked,setBlocked]=useState([]);
  const [openCards,setOpenCards]=useState({});
  const [pickModal,setPickModal]=useState(null);
  const [dragPin,setDragPin]=useState(null);
  const lastMapRef=useRef(null),lastBlkRef=useRef(null),lastInitRef=useRef(null);
  const svgRef=useRef(null);
  const cardDragRef=useRef({});

  const [order,setOrder]=useState([]);
  const [activeIdx,setActiveIdx]=useState(0);
  const [turn,setTurn]=useState(1);
  const [combat,setCombat]=useState(false);
  const dragInitIdx=useRef(null);

  const [showSkillPicker,setShowSkillPicker]=useState(false);
  const [lastRoll,setLastRoll]=useState(null);
  const [savedMaps,setSavedMaps]=useState(()=>{try{const s=localStorage.getItem("tr_maps");return s?JSON.parse(s):[];}catch{return[];}});
  const [showMapMgr,setShowMapMgr]=useState(false);
  const [mapName,setMapName]=useState("");
  const dblTimers=useRef({});

  const S=HEX_SIZE;
  const W=HEX_COLS*S*1.5+S*1.5;
  const H=HEX_ROWS*S*Math.sqrt(3)+S*Math.sqrt(3);

  useEffect(()=>{
    const poll=async()=>{
      const[md,bd,id]=await Promise.all([fbGet("mapPins"),fbGet("mapBlocked"),fbGet("initiative")]);
      const mk=JSON.stringify(md);if(mk!==lastMapRef.current){lastMapRef.current=mk;setPins(md?Object.values(md):[]);}
      const bk=JSON.stringify(bd);if(bk!==lastBlkRef.current){lastBlkRef.current=bk;setBlocked(bd?Object.values(bd):[]);}
      const ik=JSON.stringify(id);
      if(ik!==lastInitRef.current){lastInitRef.current=ik;if(!id){setOrder([]);setActiveIdx(0);setTurn(1);setCombat(false);}else{if(id.order)setOrder(id.order);if(id.activeIdx!=null)setActiveIdx(id.activeIdx);if(id.turn!=null)setTurn(id.turn);if(id.combat!=null)setCombat(id.combat);}}
    };
    poll();const iv=setInterval(poll,2000);return()=>clearInterval(iv);
  },[]);

  const isBlocked=(c,r)=>blocked.some(b=>b.col===c&&b.row===r);
  const pinsAt=(c,r)=>pins.filter(p=>p.col===c&&p.row===r);
  const pixelToHex=(px,py)=>{
    const col=Math.round((px/S-1)/1.5);
    const row=Math.round((py/(S*Math.sqrt(3))-1)-col*0.5);
    return{col:Math.max(0,Math.min(HEX_COLS-1,col)),row:Math.max(0,Math.min(HEX_ROWS-1,row))};
  };
  const addPin=async(col,row,type,name,entityId)=>{
    const id="pin_"+ts();const pin={id,col,row,type,owner:me,name:name||"",entityId:entityId||null};
    setPins(p=>[...p,pin]);await fbSet("mapPins/"+id,pin);
  };
  const removePin=async(pid)=>{
    setPins(p=>p.filter(x=>x.id!==pid));await fbDel("mapPins/"+pid);
    setOpenCards(c=>{const n={...c};delete n[pid];return n;});
  };
  const movePin=async(pid,nc,nr)=>{
    if(isBlocked(nc,nr))return;
    setPins(p=>p.map(x=>x.id===pid?{...x,col:nc,row:nr}:x));
    await fbPatch("mapPins/"+pid,{col:nc,row:nr});
  };
  const handleHexClick=(col,row)=>{
    if(dragPin){setDragPin(null);return;}
    if(isBlocked(col,row))return;
    const hp=pinsAt(col,row);
    if(hp.length>0){
      const svgRect=svgRef.current&&svgRef.current.getBoundingClientRect();
      const{x,y}=hexToPixel(col,row,S);
      const baseX=svgRect?svgRect.left+x+20:400;
      const baseY=svgRect?svgRect.top+y-60:300;
      setOpenCards(c=>{
        const n={...c};
        hp.forEach((pin,i)=>{if(n[pin.id])delete n[pin.id];else n[pin.id]={x:baseX+i*15,y:baseY+i*15};});
        return n;
      });
      return;
    }
    setPickModal({col,row});
  };
  const handleHexRC=(e,col,row)=>{
    e.preventDefault();if(!isDM)return;
    if(isBlocked(col,row)){const nb=blocked.filter(b=>!(b.col===col&&b.row===row));setBlocked(nb);const o={};nb.forEach(b=>{o[b.col+"_"+b.row]=b;});fbSet("mapBlocked",nb.length?o:null);}
    else{const nb=[...blocked,{col,row}];setBlocked(nb);const o={};nb.forEach(b=>{o[b.col+"_"+b.row]=b;});fbSet("mapBlocked",o);}
  };
  const handlePinPointerDown=(e,pin)=>{
    e.preventDefault();e.stopPropagation();
    try{e.currentTarget.setPointerCapture(e.pointerId);}catch{}
    setDragPin({id:pin.id,col:pin.col,row:pin.row,dragging:true});
  };
  const handleSvgPointerMove=useCallback((e)=>{
    if(!dragPin||!dragPin.dragging)return;
    const rect=svgRef.current&&svgRef.current.getBoundingClientRect();
    if(!rect)return;
    const h=pixelToHex(e.clientX-rect.left,e.clientY-rect.top);
    if(h.col!==dragPin.col||h.row!==dragPin.row)setDragPin(d=>({...d,...h}));
  },[dragPin]);
  const handleSvgPointerUp=useCallback(()=>{
    if(dragPin&&dragPin.dragging)movePin(dragPin.id,dragPin.col,dragPin.row);
    setDragPin(null);
  },[dragPin]);

  const getPT=(pin)=>{
    if(pin.type==="npc"){
      const n=npcs.find(x=>x.id===pin.entityId||x.name===pin.name);
      const t=n?n.type:"enemy";
      if(t==="ally")return{color:"#7ef0a0",fill:"rgba(76,200,100,.22)",stroke:"#7ef0a0",icon:"🤝"};
      if(t==="neutral")return{color:"#90b8f0",fill:"rgba(91,155,213,.22)",stroke:"#90b8f0",icon:"😐"};
      return{color:"#ff9090",fill:"rgba(200,60,60,.25)",stroke:"#ff6060",icon:"💀"};
    }
    const map={player:{color:"#5b9bd5",fill:"rgba(91,155,213,.3)",stroke:"#5b9bd5",icon:"⚔️"},point:{color:"#f0c060",fill:"rgba(240,192,96,.2)",stroke:"#f0c060",icon:"⭐"},note:{color:"#7ef0a0",fill:"rgba(126,240,160,.15)",stroke:"#7ef0a0",icon:"📝"}};
    return map[pin.type]||map.point;
  };
  const getPinInfo=(pin)=>{
    if(pin.type==="player"){
      const p=all.find(x=>x.name===(pin.entityId||pin.name));const c=p&&p.char||{};
      const fiz=c.fiziksel!=null?c.fiziksel:3;const zih=c.zihinsel!=null?c.zihinsel:3;
      return{name:c.name||pin.name,sub:[c.race,c.level?"Svye "+c.level:null].filter(Boolean).join(" · ")||"—",av:avatars&&avatars[pin.entityId||pin.name],statuses:c.statuses||[],fiz,zih,fizMax:3,zihMax:3,dead:fiz<=0&&zih<=0};
    }
    if(pin.type==="npc"){
      const n=npcs.find(x=>x.id===pin.entityId||x.name===pin.name);
      const fiz=n?(n.fiziksel!=null?n.fiziksel:n.fizMax||3):3;
      const zih=n?(n.zihinsel!=null?n.zihinsel:n.zihMax||3):3;
      return{name:n?n.name:pin.name,sub:n?"ZS "+n.ac+" CR "+n.cr:"",av:null,statuses:n?n.statuses||[]:[],fiz,zih,fizMax:n?n.fizMax||3:3,zihMax:n?n.zihMax||3:3,dead:fiz<=0&&zih<=0};
    }
    return{name:pin.name||"",note:pin.note||"",av:null,statuses:[],fiz:3,zih:3,fizMax:3,zihMax:3,dead:false};
  };

  const saveInit=async(o,ai,t,c)=>fbSet("initiative",{order:o,activeIdx:ai,turn:t,combat:c});
  const arenaEntities=()=>{const seen=new Set();const res=[];pins.forEach(p=>{if(seen.has(p.id))return;seen.add(p.id);if(p.type==="player"){const pl=all.find(x=>x.name===(p.entityId||p.name));if(pl)res.push({id:p.id,name:p.name||pl.name,type:"player"});}else if(p.type==="npc"){const n=npcs.find(x=>x.id===p.entityId||x.name===p.name);if(n)res.push({id:p.id,name:n.name,type:"npc"});}});return res;};
  const notInOrder=arenaEntities().filter(e=>!order.find(o=>o.id===e.id));
  const addToOrder=async(e)=>{const no=[...order,e];setOrder(no);await saveInit(no,activeIdx,turn,combat);};
  const removeFromOrder=async(id)=>{const no=order.filter(o=>o.id!==id);const ni=activeIdx>=no.length?0:activeIdx;setOrder(no);setActiveIdx(ni);await saveInit(no,ni,turn,combat);};
  const startCombat=async()=>{setCombat(true);await saveInit(order,0,turn,true);};
  const nextTurn=async()=>{const ni=(activeIdx+1)%order.length;const nt=ni===0?turn+1:turn;setActiveIdx(ni);setTurn(nt);await saveInit(order,ni,nt,true);};
  const endCombat=async()=>{setCombat(false);setOrder([]);setActiveIdx(0);setTurn(1);await fbSet("initiative",null);};
  const initDragStart=(e,i)=>{if(!isDM)return;e.dataTransfer.effectAllowed="move";dragInitIdx.current=i;};
  const initDragOver=(e,i)=>{e.preventDefault();if(dragInitIdx.current==null||dragInitIdx.current===i)return;const no=[...order];const[m]=no.splice(dragInitIdx.current,1);no.splice(i,0,m);let na=activeIdx;if(dragInitIdx.current===activeIdx)na=i;else if(dragInitIdx.current<activeIdx&&i>=activeIdx)na--;else if(dragInitIdx.current>activeIdx&&i<=activeIdx)na++;dragInitIdx.current=i;setOrder(no);setActiveIdx(na);};
  const initDragEnd=async()=>{dragInitIdx.current=null;await saveInit(order,activeIdx,turn,combat);};

  const saveMap=()=>{if(!mapName.trim())return;const snap={name:mapName.trim(),pins:[...pins],blocked:[...blocked],savedAt:Date.now()};const nm=[...savedMaps.filter(m=>m.name!==snap.name),snap];setSavedMaps(nm);localStorage.setItem("tr_maps",JSON.stringify(nm));setMapName("");};
  const loadMap=async(snap)=>{setPins(snap.pins||[]);setBlocked(snap.blocked||[]);const po={};(snap.pins||[]).forEach(p=>{po[p.id]=p;});await fbSet("mapPins",(snap.pins&&snap.pins.length)?po:null);const bo={};(snap.blocked||[]).forEach(b=>{bo[b.col+"_"+b.row]=b;});await fbSet("mapBlocked",(snap.blocked&&snap.blocked.length)?bo:null);setShowMapMgr(false);lastMapRef.current=null;lastBlkRef.current=null;};
  const deleteMap=(n)=>{const nm=savedMaps.filter(m=>m.name!==n);setSavedMaps(nm);localStorage.setItem("tr_maps",JSON.stringify(nm));};

  const rollD20=(mod,name)=>{const raw=Math.floor(Math.random()*20)+1;const total=raw+(mod||0);const r={sides:20,raw,modifier:mod||0,total,skillName:name||null};setLastRoll(r);setShowSkillPicker(false);onRoll&&onRoll(r);};
  const charSkills=Object.entries((char&&char.skills)||{}).sort((a,b)=>b[1]-a[1]);
  const lr=lastRoll||(rolls&&rolls.latest);
  const isCrit=lr&&lr.sides===20&&lr.raw===20;
  const isFum=lr&&lr.sides===20&&lr.raw===1;
  const isMyTurn=(nm)=>{
    if(isDM)return true;
    if(!combat)return true; // savaş dışı herkes atabilir
    const active=order[activeIdx];
    return active&&active.name===nm;
  };
  const makeClickHandler=(key,nm)=>()=>{
    if(!isMyTurn(nm))return;
    if(dblTimers.current[key]){clearTimeout(dblTimers.current[key]);dblTimers.current[key]=null;setShowSkillPicker(s=>!s);}
    else{dblTimers.current[key]=setTimeout(()=>{dblTimers.current[key]=null;rollD20(0,null);},260);}
  };

  const PipRow=({type,val,max,onChange})=>{
    const c=type==="fiziksel"?"#4caf7d":"#5b9bd5";
    return <div style={{display:"flex",gap:4,alignItems:"center"}}>
      <span style={{fontSize:".52rem",color:"rgba(200,149,42,.45)",fontFamily:"'Cinzel',serif",minWidth:18,flexShrink:0}}>{type==="fiziksel"?"FZ":"ZH"}</span>
      {Array.from({length:max||3}).map((_,i)=>(
        <button key={i} onClick={onChange?(()=>onChange(i<val?val-1:i+1)):undefined}
          style={{width:13,height:13,borderRadius:"50%",border:"2px solid "+c,background:i<val?c:"transparent",flexShrink:0,padding:0,cursor:onChange?"pointer":"default",transition:"all .15s",outline:"none"}}/>
      ))}
    </div>;
  };

  const statusAnimCls=(sts)=>(!sts||!sts.length?"":STATUSES.filter(s=>sts.includes(s.id)).map(s=>s.animCls).join(" "));

  const panelBg="rgba(16,10,6,.88)";
  const panelBorder="rgba(200,149,42,.13)";

  return(
    <div style={{display:"flex",height:"calc(100vh - 160px)",minHeight:520,background:"var(--bg0)"}}>

      {/* LEFT: Dice */}
      <div style={{width:74,flexShrink:0,display:"flex",flexDirection:"column",background:panelBg,borderRight:"1px solid "+panelBorder,position:"relative"}}>
        <div style={{padding:"7px 0 6px",textAlign:"center",borderBottom:"1px solid "+panelBorder}}>
          <div style={{fontSize:".43rem",fontFamily:"'Cinzel',serif",letterSpacing:".2em",color:"rgba(200,149,42,.35)",textTransform:"uppercase"}}>ZAR</div>
        </div>
        <div style={{padding:"7px 0 6px",textAlign:"center",borderBottom:"1px solid "+panelBorder,background:"rgba(0,0,0,.12)"}}>
          <div style={{fontSize:".36rem",color:"rgba(200,149,42,.28)",fontFamily:"'Cinzel',serif",letterSpacing:".1em",marginBottom:2}}>d20</div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.4rem",fontWeight:900,lineHeight:1,minHeight:26,display:"flex",alignItems:"center",justifyContent:"center",color:isCrit?"#f0c060":isFum?"#ff5050":lr?"var(--parchment)":"rgba(200,149,42,.16)",textShadow:isCrit?"0 0 12px rgba(240,192,96,.55)":isFum?"0 0 12px rgba(255,60,60,.45)":"none"}}>{lr?lr.total:"—"}</div>
          {lr&&<div style={{fontSize:".36rem",fontFamily:"'Cinzel',serif",marginTop:1,color:isCrit?"rgba(240,192,96,.7)":isFum?"rgba(255,130,130,.7)":"rgba(200,149,42,.3)"}}>{isCrit?"✨CRIT":isFum?"💀FAIL":lr.raw+(lr.modifier?((lr.modifier>0?"+":"")+lr.modifier):"")}</div>}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"7px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:7}}>
          {[...all.filter(p=>p.role!=="dm"),...npcs].map((entity)=>{
            const isNpc=!!(entity.id&&!entity.role);
            const c=isNpc?entity:(entity.char||{});
            const nm=isNpc?entity.name:(c.name||entity.name);
            const av=!isNpc&&avatars&&avatars[entity.name];
            const key=isNpc?entity.id:entity.name;
            const isActv=combat&&order[activeIdx]&&order[activeIdx].name===nm;
            return(
              <div key={key} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <button onClick={makeClickHandler(key,nm)} title={"Tek: d20 | Cift: Skill"}
                  disabled={!isMyTurn(nm)&&!isDM}
                  style={{width:44,height:44,borderRadius:"50%",padding:0,overflow:"hidden",cursor:isMyTurn(nm)||isDM?"pointer":"not-allowed",flexShrink:0,border:"2px solid "+(isActv?"#f0c060":"rgba(200,149,42,.2)"),background:av?"transparent":isNpc?"rgba(180,60,40,.14)":"rgba(91,155,213,.1)",boxShadow:isActv?"0 0 8px rgba(240,192,96,.35)":"none",opacity:(!isMyTurn(nm)&&!isDM)?0.4:1,transition:"all .2s"}}>
                  {av?<img src={av} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:"1rem",lineHeight:"44px",display:"block",textAlign:"center"}}>{isNpc?"💀":"🧙"}</span>}
                </button>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:".38rem",color:isActv?"#f0c060":"rgba(200,149,42,.32)",maxWidth:60,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textAlign:"center"}}>{nm.substring(0,6)}</span>
              </div>
            );
          })}
        </div>
        {showSkillPicker&&(
          <div style={{position:"absolute",left:78,top:0,width:220,background:"rgba(14,8,4,.99)",border:"1px solid rgba(200,149,42,.28)",borderRadius:10,padding:12,zIndex:400,boxShadow:"0 6px 32px rgba(0,0,0,.9)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:".6rem",letterSpacing:".1em",color:"var(--gold)"}}>SKILL SEC</span>
              <button onClick={()=>setShowSkillPicker(false)} style={{background:"transparent",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:"1rem",lineHeight:1}}>x</button>
            </div>
            {charSkills.length===0?<p style={{color:"var(--text-dim)",fontSize:".75rem",fontStyle:"italic",margin:0}}>Skill eklenmemis.</p>:(
              <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:8}}>
                {charSkills.map(([sn,lv])=>{
                  const isFiz=FIZIKSEL_SKILLS.includes(sn);
                  return <button key={sn} onClick={()=>rollD20(lv,sn)} style={{background:isFiz?"rgba(76,175,125,.07)":"rgba(91,155,213,.07)",border:"1px solid "+(isFiz?"rgba(76,175,125,.22)":"rgba(91,155,213,.22)"),borderRadius:5,padding:"6px 9px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontFamily:"'Crimson Text',serif",fontSize:".88rem",color:"var(--parchment)"}}>{sn}</span>
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",fontWeight:700,color:lv>0?"#7ef0a0":"#ff9090",marginLeft:6}}>{lv>0?"+":""}{lv}</span>
                  </button>;
                })}
              </div>
            )}
            <button onClick={()=>rollD20(0,null)} style={{width:"100%",background:"rgba(200,149,42,.05)",border:"1px solid rgba(200,149,42,.15)",borderRadius:5,padding:"6px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".58rem",letterSpacing:".08em",color:"var(--gold)"}}>DUZAT</button>
          </div>
        )}
      </div>

      {/* CENTER: Map */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"rgba(6,3,1,.6)"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",background:"rgba(12,7,3,.7)",borderBottom:"1px solid "+panelBorder,flexShrink:0,flexWrap:"wrap"}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:".42rem",letterSpacing:".14em",color:"rgba(200,149,42,.28)",textTransform:"uppercase"}}>Ekle:</span>
          {[{type:"player",icon:"⚔️",label:"Oyuncu",color:"#5b9bd5"},{type:"npc",icon:"💀",label:"NPC",color:"#e8956d"},{type:"point",icon:"⭐",label:"Nokta",color:"#f0c060"},{type:"note",icon:"📝",label:"Not",color:"#7ef0a0"}].map(({type,icon,label,color})=>(
            <button key={type} onClick={()=>setPickModal({col:0,row:0,type})} title={label}
              style={{width:26,height:26,borderRadius:5,border:"1px solid rgba(200,149,42,.1)",background:"rgba(200,149,42,.03)",cursor:"pointer",fontSize:".85rem",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=color;e.currentTarget.style.background="rgba(200,149,42,.08)";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(200,149,42,.1)";e.currentTarget.style.background="rgba(200,149,42,.03)";}}>
              {icon}
            </button>
          ))}
          <div style={{marginLeft:"auto",display:"flex",gap:5,alignItems:"center"}}>
            {isDM&&<button onClick={()=>setShowMapMgr(s=>!s)} style={{background:showMapMgr?"rgba(200,149,42,.12)":"rgba(200,149,42,.04)",border:"1px solid rgba(200,149,42,.18)",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".48rem",color:"var(--gold)",letterSpacing:".08em"}}>Haritalar</button>}
            {isDM&&<span style={{fontFamily:"'Cinzel',serif",fontSize:".4rem",color:"rgba(180,40,40,.35)",letterSpacing:".06em"}}>SAG=ENGEL</span>}
            {isDM&&pins.length>0&&<button onClick={async()=>{setPins([]);await fbSet("mapPins",null);lastMapRef.current=null;}} style={{background:"transparent",border:"1px solid rgba(139,26,26,.2)",borderRadius:5,padding:"2px 6px",cursor:"pointer",color:"rgba(255,100,100,.45)",fontFamily:"'Cinzel',serif",fontSize:".45rem"}}>Temizle</button>}
          </div>
        </div>
        {isDM&&showMapMgr&&(
          <div style={{padding:"8px 10px",background:"rgba(10,6,3,.8)",borderBottom:"1px solid rgba(200,149,42,.1)",flexShrink:0}}>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <input value={mapName} onChange={e=>setMapName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveMap()} placeholder="Harita adi..." style={{flex:1,background:"rgba(200,149,42,.05)",border:"1px solid rgba(200,149,42,.18)",borderRadius:5,padding:"4px 8px",color:"var(--parchment)",fontFamily:"'Cinzel',serif",fontSize:".65rem",outline:"none"}}/>
              <button onClick={saveMap} disabled={!mapName.trim()} style={{background:"rgba(200,149,42,.1)",border:"1px solid rgba(200,149,42,.25)",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".6rem",color:"var(--gold)"}}>Kaydet</button>
            </div>
            {savedMaps.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {savedMaps.map(m=>(
                <div key={m.name} style={{display:"flex",alignItems:"center",gap:3,background:"rgba(200,149,42,.06)",border:"1px solid rgba(200,149,42,.14)",borderRadius:5,padding:"2px 4px 2px 8px"}}>
                  <button onClick={()=>loadMap(m)} style={{background:"transparent",border:"none",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".58rem",color:"var(--gold)",padding:0}}>{m.name}</button>
                  <button onClick={()=>deleteMap(m.name)} style={{background:"transparent",border:"none",cursor:"pointer",color:"rgba(180,40,40,.4)",fontSize:".65rem",lineHeight:1,padding:"0 2px"}} onMouseEnter={e=>e.currentTarget.style.color="rgba(220,60,60,.7)"} onMouseLeave={e=>e.currentTarget.style.color="rgba(180,40,40,.4)"}>x</button>
                </div>
              ))}
            </div>}
          </div>
        )}
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:10,overflow:"hidden"}}>
          <div style={{border:"1px solid rgba(200,149,42,.18)",borderRadius:8,overflow:"hidden",boxShadow:"0 4px 28px rgba(0,0,0,.55)",lineHeight:0,flexShrink:0}}>
            <svg ref={svgRef} width={W} height={H} style={{display:"block",cursor:dragPin?"grabbing":"crosshair",touchAction:"none"}}
              onContextMenu={e=>e.preventDefault()}
              onPointerMove={handleSvgPointerMove} onPointerUp={handleSvgPointerUp} onPointerLeave={handleSvgPointerUp}>
              <defs>
                {pins.filter(p=>p.type==="player"&&avatars&&avatars[p.entityId||p.name]).map(pin=>{
                  const{x,y}=hexToPixel(pin.col,pin.row,S);
                  return <clipPath key={"cp"+pin.id} id={"hcp-"+pin.id}><path d={hexPath(x,y,S*.5)}/></clipPath>;
                })}
              </defs>
              <rect width={W} height={H} fill="#0a0603"/>
              {Array.from({length:HEX_COLS},(_,col)=>Array.from({length:HEX_ROWS},(_,row)=>{
                const{x,y}=hexToPixel(col,row,S);
                const blkBg=isBlocked(col,row);
                return <path key={"bg"+col+","+row} d={hexPath(x,y,S-1.2)} fill={blkBg?"#0a0603":"rgba(35,22,12,.65)"} stroke={blkBg?"#0a0603":"rgba(200,149,42,.16)"} strokeWidth={0.7}/>;
              }))}
              {Array.from({length:HEX_COLS},(_,col)=>Array.from({length:HEX_ROWS},(_,row)=>{
                const{x,y}=hexToPixel(col,row,S);
                const hp=pinsAt(col,row);
                const blk=isBlocked(col,row);
                const sel=hp.some(p=>openCards[p.id]);
                const dh=dragPin&&dragPin.col===col&&dragPin.row===row&&!blk;
                return <g key={col+","+row} onClick={()=>handleHexClick(col,row)} onContextMenu={e=>handleHexRC(e,col,row)} style={{cursor:blk?"not-allowed":hp.length?"pointer":"crosshair"}}>
                  {/* Hit area — her zaman tıklanabilir */}
                  <path d={hexPath(x,y,S-1)} fill="transparent" stroke="none"/>
                  {blk&&<path d={hexPath(x,y,S-1.2)} fill="rgba(0,0,0,.55)" stroke="rgba(80,40,40,.4)" strokeWidth={1} strokeDasharray="3,2"/>}
                  {!blk&&(sel||dh)&&<path d={hexPath(x,y,S-1.2)} fill={dh?"rgba(200,149,42,.12)":sel?"rgba(200,149,42,.09)":"transparent"} stroke={dh?"rgba(240,192,96,.65)":sel?"rgba(200,149,42,.5)":"transparent"} strokeWidth={1.1}/>}
                  {!blk&&hp.slice(0,3).map((pin,pi)=>{
                    const pt=getPT(pin);
                    const av=pin.type==="player"&&avatars&&avatars[pin.entityId||pin.name];
                    const total=hp.length;
                    const ang=total>1?(Math.PI*2*pi/total)-Math.PI/2:0;
                    const ox=total>1?Math.cos(ang)*S*.26:0;
                    const oy=total>1?Math.sin(ang)*S*.26:0;
                    const isDrg=dragPin&&dragPin.id===pin.id;
                    const initPos=order.findIndex(o=>o.id===pin.id);
                    const isActPin=combat&&initPos===activeIdx;
                    const pinInfo=getPinInfo(pin);
                    const isDead=pinInfo.dead;
                    return <g key={pin.id} transform={"translate("+ox+","+oy+")"} onPointerDown={e=>handlePinPointerDown(e,pin)} style={{cursor:"grab",opacity:isDrg?.2:isDead?.5:1}}>
                      {isActPin&&<circle cx={x} cy={y} r={S*.52} fill="none" stroke="rgba(240,192,96,.45)" strokeWidth={2} style={{animation:"dmg-pulse 1.5s infinite"}}/>}
                      <path d={hexPath(x,y,S*.47)} fill={isDead?"rgba(20,10,8,.6)":pt.fill} stroke={isDead?"rgba(80,40,40,.6)":pt.stroke} strokeWidth={isActPin?2:1.4}/>
                      {isDead?<text x={x} y={y} textAnchor="middle" dominantBaseline="central" fontSize={S*.42} style={{userSelect:"none"}}>💀</text>:av?<image href={av} x={x-S*.32} y={y-S*.32} width={S*.64} height={S*.64} clipPath={"url(#hcp-"+pin.id+")"} preserveAspectRatio="xMidYMid slice"/>:<text x={x} y={y} textAnchor="middle" dominantBaseline="central" fontSize={S*.42} style={{userSelect:"none"}}>{pt.icon}</text>}
                      {initPos>=0&&<>
                        <circle cx={x+S*.35} cy={y-S*.35} r={S*.17} fill={isActPin?"#f0c060":"rgba(18,10,4,.92)"} stroke={isDead?"rgba(80,40,40,.6)":pt.stroke} strokeWidth={.8}/>
                        <text x={x+S*.35} y={y-S*.35} textAnchor="middle" dominantBaseline="central" fontSize={S*.16} fill={isActPin?"#0d0705":pt.stroke} fontFamily="'Cinzel',serif" fontWeight="bold">{initPos+1}</text>
                      </>}
                      {pin.name&&<text x={x} y={y+S*.74} textAnchor="middle" fontSize={S*.18} fill={isDead?"rgba(120,60,60,.6)":pt.stroke} style={{userSelect:"none",fontWeight:600}}>{pin.name.substring(0,9)}{isDead?" x":""}</text>}
                    </g>;
                  })}
                  {hp.length>3&&<text x={x} y={y-S*.62} textAnchor="middle" fontSize={S*.2} fill="rgba(200,149,42,.55)">+{hp.length-3}</text>}
                </g>;
              }))}
            </svg>
          </div>
        </div>
      </div>

      {/* RIGHT: Initiative */}
      <div style={{width:186,flexShrink:0,display:"flex",flexDirection:"column",background:panelBg,borderLeft:"1px solid "+panelBorder}}>
        <div style={{padding:"8px 0 7px",textAlign:"center",borderBottom:"1px solid "+panelBorder,background:combat?"rgba(100,18,8,.1)":"transparent",transition:"background .4s"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:".45rem",letterSpacing:".2em",color:combat?"rgba(255,130,100,.5)":"rgba(200,149,42,.35)",textTransform:"uppercase"}}>INITIATIVE</div>
          {combat&&<div style={{fontFamily:"'Cinzel',serif",fontSize:".95rem",fontWeight:700,color:"#f0c060",marginTop:2}}>TUR {turn}</div>}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"5px 5px 0"}}>
          {order.length===0&&<div style={{color:"rgba(200,149,42,.3)",fontSize:".68rem",fontStyle:"italic",textAlign:"center",padding:"18px 6px",lineHeight:1.8,fontFamily:"'Crimson Text',serif"}}>Arenaya pin ekle, buradan siraya al.</div>}
          {order.map((item,idx)=>{
            const isActv=combat&&idx===activeIdx;
            const pin=pins.find(p=>p.id===item.id);
            const av=(pin&&pin.type==="player"&&avatars&&avatars[pin.entityId||pin.name])||(item.type==="player"&&avatars&&avatars[item.name]);
            return(
              <div key={item.id+idx} draggable={isDM} onDragStart={e=>initDragStart(e,idx)} onDragOver={e=>initDragOver(e,idx)} onDragEnd={initDragEnd}
                style={{display:"flex",alignItems:"center",gap:5,padding:"6px 6px",borderRadius:6,marginBottom:3,background:isActv?"rgba(200,149,42,.1)":"rgba(255,255,255,.015)",border:"1px solid "+(isActv?"rgba(200,149,42,.3)":"rgba(200,149,42,.05)"),cursor:isDM?"grab":"default",transition:"background .15s,border .15s"}}>

              </div>

        {notInOrder.length>0&&isDM&&(
          <div style={{padding:"5px 5px",borderTop:"1px solid rgba(200,149,42,.06)"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:".4rem",letterSpacing:".15em",color:"rgba(200,149,42,.25)",textTransform:"uppercase",marginBottom:3}}>SIRAYA EKLE</div>
            {notInOrder.slice(0,5).map(e=>(
              <button key={e.id} onClick={()=>addToOrder(e)}
                style={{display:"flex",alignItems:"center",gap:4,width:"100%",background:"rgba(200,149,42,.025)",border:"1px solid rgba(200,149,42,.07)",borderRadius:5,padding:"5px 6px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".56rem",color:"var(--text-dim)",marginBottom:2,transition:"all .15s",textAlign:"left"}}

                onMouseLeave={e=>{e.currentTarget.style.color="var(--text-dim)";e.currentTarget.style.background="rgba(200,149,42,.025)";}}>

        )}
        {isDM&&<div style={{padding:"7px 5px",borderTop:"1px solid rgba(200,149,42,.08)",display:"flex",flexDirection:"column",gap:4}}>
          {!combat&&order.length>0&&<button onClick={startCombat} style={{background:"rgba(76,175,125,.09)",border:"1px solid rgba(76,175,125,.24)",borderRadius:6,padding:"7px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".57rem",color:"#7ef0a0",letterSpacing:".1em",textTransform:"uppercase",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(76,175,125,.18)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(76,175,125,.09)"}>Baslat</button>}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",letterSpacing:".1em",color:"var(--gold)"}}>{pickModal.type==="player"?"Oyuncu Ekle":pickModal.type==="npc"?"NPC Ekle":pickModal.type==="note"?"Not":"Nokta"}</span>
            <button onClick={()=>setPickModal(null)} style={{background:"transparent",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:"1rem",lineHeight:1}}>x</button>
          </div>
          {pickModal.type==="player"&&(all.filter(p=>p.role!=="dm").length===0?<p style={{color:"var(--text-dim)",fontSize:".8rem",fontStyle:"italic",margin:0}}>Cevrimici oyuncu yok.</p>:all.filter(p=>p.role!=="dm").map(p=>{
            const c=p.char||{};const av=avatars&&avatars[p.name];
            return <button key={p.name} onClick={()=>{addPin(pickModal.col,pickModal.row,"player",c.name||p.name,p.name);setPickModal(null);}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:"rgba(91,155,213,.06)",border:"1px solid rgba(91,155,213,.15)",borderRadius:7,padding:"8px 10px",cursor:"pointer",marginBottom:5,transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(91,155,213,.14)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(91,155,213,.06)"}>
