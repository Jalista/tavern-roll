const fbGet = async (path) => {
  try { const r = await fetch(`${FB_URL}/${path}.json`); return await r.json(); }
  catch { return null; }
};
const fbSet = async (path, val) => {
  try { await fetch(`${FB_URL}/${path}.json`, { method:"PUT", body:JSON.stringify(val) }); }
  catch {}
};
const fbPatch = async (path, val) => {
  try { await fetch(`${FB_URL}/${path}.json`, { method:"PATCH", body:JSON.stringify(val) }); }
  catch {}
};
const fbDelete = async (path) => {
  try { await fetch(`${FB_URL}/${path}.json`, { method:"DELETE" }); }
  catch {}
};
const fbListen = (path, cb) => {
  const es = new EventSource(`${FB_URL}/${path}.json`);
  es.addEventListener("put",   e => { try { cb(JSON.parse(e.data).data); } catch {} });
  es.addEventListener("patch", e => { try { cb(null, JSON.parse(e.data).data); } catch {} });
  es.onerror = () => {};
  return () => es.close();
};

function PipBar({type,hasar,onChange,disabled}){
  const cls=type==="fiziksel"?"f":"z";
  return(
    <div className="chalf">
      <span className={`clabel ${cls}`}>{type==="fiziksel"?"⚔ Fiziksel":"🧠 Zihinsel"}</span>
      <div className="prow">
        {[0,1,2].map(i=>(
          <button key={i} className={`pip ${cls}${i<hasar?"f":"e"}`} disabled={disabled}
            onClick={()=>onChange(i<hasar&&i===hasar-1?hasar-1:i+1)}/>
        ))}
      </div>
    </div>
  );
}
function NpcPipBar({type,hasar,onChange,disabled}){
  const cls=type==="fiziksel"?"f":"z";
  return(
    <div className="ncrow">
      <span className={`nclabel ${cls}`}>{type==="fiziksel"?"⚔ Fiziksel":"🧠 Zihinsel"}</span>
      {[0,1,2].map(i=>(
        <button key={i} className={`npip ${cls}${i<hasar?"f":"e"}`} disabled={disabled}
          onClick={()=>onChange(i<hasar&&i===hasar-1?hasar-1:i+1)}/>
      ))}
    </div>
  );
}
function MiniPips({type,hasar}){
  const cls=type==="fiziksel"?"f":"z";
  return(
    <div className="mprow">
      {[0,1,2].map(i=><div key={i} className={`mp ${cls}${i<hasar?"f":"e"}`}/>)}
    </div>
  );
}

function MasaDurumu({playerName,char,npcs,allPlayers}){
  const tl={player:"OYUNCU",ally:"MÜTTEFİK",neutral:"TARAFSIZ",enemy:"DÜŞMAN"};
  const playerCards=allPlayers.map(p=>{
    const c=p.name===playerName?char:(p.char||{});
    return{key:`p-${p.name}`,type:"player",name:c.name||p.name,
      sub:[c.race,c.charClass,c.level?`Lvl ${c.level}`:null].filter(Boolean).join(" · ")||"—",
      fiziksel:c.fiziksel||0,zihinsel:c.zihinsel||0,ac:c.ac,
      isDead:(c.fiziksel||0)>=3&&(c.zihinsel||0)>=3};
  });
  const npcCards=npcs.map(n=>({key:`n-${n.id}`,type:n.type,name:n.name,
    sub:`ZS ${n.ac} · CR ${n.cr}`,fiziksel:n.fiziksel||0,zihinsel:n.zihinsel||0,
    isDead:(n.fiziksel||0)>=3&&(n.zihinsel||0)>=3}));
  const order={player:0,ally:1,neutral:2,enemy:3};
  const all=[...playerCards,...npcCards].sort((a,b)=>order[a.type]-order[b.type]);
  if(!all.length) return null;
  return(
    <div className="mwrap">
      <div className="mhdr">⚔ Masa Durumu</div>
      <div className="mgrid">
        {all.map(card=>(
          <div key={card.key} className={`mc ${card.type}${card.isDead?" dead":""}`}>
            {card.isDead&&<span className="skull">💀</span>}
            <div className="mtag">{tl[card.type]}</div>
            <div className="mname">{card.name}</div>
            <div className="msub">{card.sub}</div>
            <div style={{display:"flex",flexDirection:"column",gap:5,marginTop:4}}>
              <MiniPips type="fiziksel" hasar={card.fiziksel}/>
              <MiniPips type="zihinsel" hasar={card.zihinsel}/>
            </div>
            {card.ac&&<div style={{fontSize:".65rem",color:"rgba(245,230,200,.3)",marginTop:5}}>ZS {card.ac}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

function DicePanel({playerName,char,npcs,allPlayers}){
  const [modifier,setModifier]=useState("0");
  const [latest,setLatest]=useState(null);
  const [feed,setFeed]=useState([]);
  const [akey,setAkey]=useState(0);
  const lastId=useRef(0);
  useEffect(()=>{
    const unsub=fbListen("rolls",data=>{
      if(!data)return;
      const arr=Object.values(data).sort((a,b)=>a.id-b.id);
      const nw=arr.filter(r=>r.id>lastId.current);
      if(nw.length){
        lastId.current=Math.max(...nw.map(r=>r.id));
        setFeed(arr.slice(-12).reverse());
        setLatest(nw[nw.length-1]);
        setAkey(k=>k+1);
      }
    });
    return unsub;
  },[]);
  const roll=async(sides)=>{
    const raw=Math.floor(Math.random()*sides)+1;
    const m=parseInt(modifier)||0;
    const total=raw+m;
    const id=ts();
    const entry={id,player:playerName,sides,raw,modifier:m,total};
    setLatest(entry);setAkey(k=>k+1);
    await fbSet(`rolls/${id}`,entry);
    const all=await fbGet("rolls");
    if(all){
      const keys=Object.keys(all).sort((a,b)=>Number(a)-Number(b));
      if(keys.length>30) for(const k of keys.slice(0,keys.length-30)) await fbDelete(`rolls/${k}`);
    }
  };
  const ic=latest?.sides===20&&latest?.raw===20;
  const if_=latest?.sides===20&&latest?.raw===1;
  return(
    <div className="panel">
      <div className="dgrid">
        {DICE.map(d=>(
          <button key={d.sides} className="dbtn" onClick={()=>roll(d.sides)}>
            <span className="dicon">{d.icon}</span>
            <span className="dlabel">d{d.sides}</span>
          </button>
        ))}
      </div>
      <div className="mrow">
        <label>Modifier</label>
        <input className="minput" type="number" value={modifier} onChange={e=>setModifier(e.target.value)}/>
      </div>
      <div className="rarea">
        {latest?(
          <>
            <div className="rwho">{latest.player} — d{latest.sides}</div>
            <div key={akey} className={`rnum ranim${ic?" crit":if_?" fumble":""}`}>{latest.total}</div>
            <div className="rmeta">{ic?"⚡ KRİTİK VURUŞ!":if_?"💀 KRİTİK HATA!":`${latest.raw}${latest.modifier!==0?` + (${latest.modifier>0?"+":""}${latest.modifier})`:""}`}</div>
          </>
        ):<div className="rmeta">Bir zar seç ve at...</div>}
      </div>
      {feed.length>0&&(
        <>
          <div className="ftitle">Son Atışlar</div>
          <div className="feed">
            {feed.map((r,i)=>{
              const c=r.sides===20&&r.raw===20?"crit":r.sides===20&&r.raw===1?"fumble":"";
              return(
                <div key={r.id} className={`fi${i===0?" nr":""}`}>
                  <span className="fdie">{DIE_ICONS[r.sides]||"🎲"}</span>
                  <div className="fbody">
                    <div className="fplayer">{r.player}</div>
                    <div className="fdetail">d{r.sides} = {r.raw}{r.modifier!==0?` + (${r.modifier>0?"+":""}${r.modifier})`:""}{c==="crit"?" ⚡":c==="fumble"?" 💀":""}</div>
                  </div>
                  <div className={`ftotal ${c}`}>{r.total}</div>
                </div>
              );
            })}
          </div>
        </>
      )}
      <div style={{height:24}}/>
      <MasaDurumu playerName={playerName} char={char} npcs={npcs} allPlayers={allPlayers}/>
    </div>
  );
}

function CharacterPanel({playerName,isDM,char,setChar,allPlayers}){
  const [saved,setSaved]=useState(false);
  const [vp,setVp]=useState(playerName);
  const st=useRef(null);
  const isSelf=vp===playerName||!isDM;
  const vc=isSelf?char:(allPlayers.find(p=>p.name===vp)?.char||initChar(vp));
  const canEdit=isSelf||isDM;
  const save=async(upd,tgt)=>{await fbSet(`chars/${tgt}`,upd);if(tgt===playerName){setSaved(true);setTimeout(()=>setSaved(false),1500);}};
  const update=(field,val)=>{
    if(!canEdit)return;
    if(isSelf){setChar(c=>{const n={...c,[field]:val};clearTimeout(st.current);st.current=setTimeout(()=>save(n,playerName),600);return n;});}
    else{const upd={...vc,[field]:val};clearTimeout(st.current);st.current=setTimeout(()=>save(upd,vp),600);}
  };
  const updateStat=(stat,val)=>{
    if(!canEdit)return;
    if(isSelf){setChar(c=>{const n={...c,stats:{...c.stats,[stat]:val}};clearTimeout(st.current);st.current=setTimeout(()=>save(n,playerName),600);return n;});}
    else{const upd={...vc,stats:{...vc.stats,[stat]:val}};clearTimeout(st.current);st.current=setTimeout(()=>save(upd,vp),600);}
  };
  const dc=vc;
  return(
    <div className="panel">
      {isDM&&allPlayers.length>0&&(
        <>
          <div className="stitle" style={{marginTop:0}}>Oyuncuları Görüntüle</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {allPlayers.map(p=>(
              <button key={p.name} className={`tb${vp===p.name?" active":""}`}
                onClick={()=>setVp(p.name)} style={{fontSize:".7rem"}}>{p.name}</button>
            ))}
          </div>
        </>
      )}
      {!canEdit&&<div className="dmonly">📖 Salt okunur — {vp}'in sayfası</div>}
      <div className="cg4">
        {[{label:"KARAKTER ADI",field:"name",ph:"Duncan the Tall..."},{label:"IRK",field:"race",type:"select",opts:RACES},{label:"SINIF",field:"charClass",type:"select",opts:CLASSES},{label:"SEVİYE",field:"level",ph:"1"}].map(f=>(
          <div key={f.field} className="cf">
            <label>{f.label}</label>
            {f.type==="select"
              ?<select value={dc[f.field]} onChange={e=>update(f.field,e.target.value)} disabled={!canEdit}>
                <option value="">—</option>{f.opts.map(o=><option key={o}>{o}</option>)}
               </select>
              :<input value={dc[f.field]} onChange={e=>update(f.field,e.target.value)} placeholder={f.ph} disabled={!canEdit}/>}
          </div>
        ))}
      </div>
      <div className="stitle">Yetenekler</div>
      <div className="sgrid">
        {STATS.map(s=>(
          <div key={s} className="sbox">
            <div className="sname">{s}</div>
            <div className="sscore"><input type="number" value={dc.stats[s]} onChange={e=>updateStat(s,e.target.value)} min={1} max={30} disabled={!canEdit}/></div>
            <div className="smod">{statMod(dc.stats[s])}</div>
          </div>
        ))}
      </div>
      <div className="stitle">Can Durumu</div>
      <div className="cblock">
        <div className="crow">
          <PipBar type="fiziksel" hasar={dc.fiziksel||0} disabled={!canEdit} onChange={v=>update("fiziksel",v)}/>
          <div className="cdiv"/>
          <PipBar type="zihinsel" hasar={dc.zihinsel||0} disabled={!canEdit} onChange={v=>update("zihinsel",v)}/>
        </div>
      </div>
      <div className="vrow">
        {[{label:"ZIRH SINIFI",field:"ac"},{label:"HIZ",field:"speed"},{label:"YETKİNLİK",field:"proficiency"}].map(v=>(
          <div key={v.field} className="vbox">
            <label>{v.label}</label>
            <input type="number" value={dc[v.field]} onChange={e=>update(v.field,e.target.value)} disabled={!canEdit}/>
          </div>
        ))}
      </div>
      <div className="stitle">Notlar</div>
      <textarea className="narea" rows={5} placeholder="Geçmiş, yetenekler, büyüler..." value={dc.notes} onChange={e=>update("notes",e.target.value)} disabled={!canEdit}/>
      <div className={`sind${saved?" saved":""}`}>{saved?"✓ Kaydedildi":"Otomatik kaydediliyor..."}</div>
    </div>
  );
}

function NpcPanel({isDM,npcs,setNpcs}){
  const [form,setForm]=useState({name:"",type:"enemy",ac:"12",cr:"1",notes:""});
  const sync=async upd=>{
    setNpcs(upd);
    if(!upd.length){await fbSet("npcs",null);return;}
    const obj={};upd.forEach(n=>{obj[n.id]=n;});
    await fbSet("npcs",obj);
  };
  const add=async()=>{
    if(!form.name.trim())return;
    await sync([...npcs,{...form,id:ts(),fiziksel:0,zihinsel:0}]);
    setForm({name:"",type:"enemy",ac:"12",cr:"1",notes:""});
  };
  const upPip=async(id,field,val)=>sync(npcs.map(n=>n.id===id?{...n,[field]:val}:n));
  const rem=async id=>sync(npcs.filter(n=>n.id!==id));
  return(
    <div className="panel">
      {!isDM&&<div className="dmonly">⚔ NPC'ler DM tarafından yönetilir.</div>}
      <div className="nlist">
        {!npcs.length&&<div className="empty"><span>🐉</span>Henüz NPC yok.</div>}
        {npcs.map(npc=>{
          const dead=(npc.fiziksel||0)>=3&&(npc.zihinsel||0)>=3;
          return(
            <div key={npc.id} className={`ncard${dead?" dead":""}`}>
              <div className="nrow">
                <div className="nname">{npc.name}{dead?" 💀":""}</div>
                <span className={`badge b${npc.type[0]}`}>{npc.type==="enemy"?"DÜŞMAN":npc.type==="ally"?"MÜTTEFİK":"TARAFSIZ"}</span>
              </div>
              <div className="nsub">ZS {npc.ac} · CR {npc.cr}</div>
              <div className="ncwrap">
                <NpcPipBar type="fiziksel" hasar={npc.fiziksel||0} disabled={!isDM} onChange={v=>upPip(npc.id,"fiziksel",v)}/>
                <NpcPipBar type="zihinsel" hasar={npc.zihinsel||0} disabled={!isDM} onChange={v=>upPip(npc.id,"zihinsel",v)}/>
              </div>
              {npc.notes&&<div className="nnotes">📜 {npc.notes}</div>}
              {isDM&&<div className="nctrl"><button className="nbtn rm" onClick={()=>rem(npc.id)}>✕ Kaldır</button></div>}
            </div>
          );
        })}
      </div>
      {isDM&&(
        <div className="addnpc">
          <h3>+ Yeni NPC / Düşman</h3>
          <div className="f2">
            <input className="fin" placeholder="İsim" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
            <select className="fin" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
              <option value="enemy">Düşman</option>
              <option value="ally">Müttefik</option>
              <option value="neutral">Tarafsız</option>
            </select>
          </div>
          <div className="f2">
            <input className="fin" placeholder="Zırh Sınıfı" type="number" value={form.ac} onChange={e=>setForm(f=>({...f,ac:e.target.value}))}/>
            <input className="fin" placeholder="CR" value={form.cr} onChange={e=>setForm(f=>({...f,cr:e.target.value}))}/>
          </div>
          <input className="fin" style={{marginBottom:12}} placeholder="Notlar (opsiyonel)" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
          <button className="abtn" onClick={add}>⚔ Ekle</button>
        </div>
      )}
    </div>
  );
}

function App(){
  const [phase,setPhase]=useState("lobby");
  const [playerName,setPn]=useState("");
  const [role,setRole]=useState("player");
  const [tab,setTab]=useState("dice");
  const [char,setChar]=useState(()=>initChar());
  const [npcs,setNpcs]=useState([]);
  const [allPlayers,setAll]=useState([]);
  const st=useRef(null);

  useEffect(()=>{
    if(phase!=="game")return;
    fbSet(`players/${playerName}`,{name:playerName,role,lastSeen:ts()});
    fbSet(`chars/${playerName}`,char);
    const hb=setInterval(()=>fbPatch(`players/${playerName}`,{lastSeen:ts()}),5000);
    const unP=fbListen("players",data=>{
      if(!data)return;
      const now=ts();
      const alive=Object.values(data).filter(p=>now-(p.lastSeen||0)<15000);
      setAll(prev=>alive.map(p=>({...p,char:prev.find(x=>x.name===p.name)?.char||initChar(p.name)})));
    });
    const unC=fbListen("chars",data=>{
      if(!data)return;
      if(data[playerName])setChar(data[playerName]);
      setAll(prev=>prev.map(p=>({...p,char:data[p.name]||p.char})));
    });
    const unN=fbListen("npcs",data=>{
      if(!data){setNpcs([]);return;}
      setNpcs(Object.values(data).sort((a,b)=>a.id-b.id));
    });
    return()=>{clearInterval(hb);unP();unC();unN();};
  },[phase,playerName]);

  const hsc=fn=>{
    setChar(prev=>{
      const upd=typeof fn==="function"?fn(prev):fn;
      clearTimeout(st.current);
      st.current=setTimeout(()=>fbSet(`chars/${playerName}`,upd),400);
      return upd;
    });
  };

  const TABS=role==="dm"
    ?[{id:"dice",l:"🎲 Zar"},{id:"character",l:"📜 Karakterler"},{id:"npc",l:"⚔ NPC Yönet"}]
    :[{id:"dice",l:"🎲 Zar"},{id:"character",l:"📜 Karakter"},{id:"npc",l:"⚔ Düşmanlar"}];

  if(phase==="lobby")return(
    <div className="lobby">
      <h1 className="lobby-title">TAVERN ROLL</h1>
      <p className="lobby-sub">İnci — Companion</p>
      <div className="lobby-card">
        <h2>Masaya Katıl</h2>
        <input className="li" placeholder="Adın (ör. Duncan the Tall, Kael, Revlo Krell...)"
          value={playerName} onChange={e=>setPn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&playerName.trim()&&setPhase("game")}/>
        <div className="lr">
          <button className={`rb${role==="player"?" active":""}`} onClick={()=>setRole("player")}>⚔ Oyuncu</button>
          <button className={`rb${role==="dm"?" active":""}`} onClick={()=>setRole("dm")}>👁 DM</button>
        </div>
        <button className="jb" onClick={()=>setPhase("game")} disabled={!playerName.trim()}>Masaya Otur →</button>
      </div>
    </div>
  );

  return(
    <div>
      <div className="header">
        <div className="header-title">TAVERN ROLL</div>
        <div className="header-user"><span className="pdot"/><strong>{playerName}</strong>{role==="dm"?" · DM":""}</div>
      </div>
      <div className="obar">
        <span className="olabel">Çevrimiçi</span>
        {allPlayers.map(p=>(
          <span key={p.name} className={`opill${p.role==="dm"?" dm":""}`}>
            <span className="pdot" style={{width:5,height:5}}/>{p.name}{p.role==="dm"?" 👁":""}
          </span>
        ))}
        {!allPlayers.length&&<span style={{fontSize:".72rem",color:"rgba(245,230,200,.25)",fontStyle:"italic"}}>bağlanıyor...</span>}
      </div>
      <div className="tabs">
        {TABS.map(t=>(
          <button key={t.id} className={`tb${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>
        ))}
      </div>
      {tab==="dice"      &&<DicePanel      playerName={playerName} char={char} npcs={npcs} allPlayers={allPlayers}/>}
      {tab==="character" &&<CharacterPanel playerName={playerName} isDM={role==="dm"} char={char} setChar={hsc} allPlayers={allPlayers}/>}
      {tab==="npc"       &&<NpcPanel       isDM={role==="dm"} npcs={npcs} setNpcs={setNpcs}/>}
    </div>
  );
}

const styleEl=document.createElement("style");
styleEl.textContent=CSS;
document.head.appendChild(styleEl);
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
