}
function NpcPips({type,hasar,onChange,disabled}){
  const c=type==="fiziksel"?"f":"z";
  return <div className="ncr">
    <span className={`ncl ${c}`}>{type==="fiziksel"?"⚔ Fiziksel":"🧠 Zihinsel"}</span>
    {[0,1,2].map(i=><button key={i} className={`np ${c}${i<hasar?"f":"e"}`} disabled={disabled} onClick={()=>onChange(i<hasar&&i===hasar-1?hasar-1:i+1)}/>)}
  </div>;
}
function MPs({type,hasar}){
  const c=type==="fiziksel"?"f":"z";
  return <div className="mpr">{[0,1,2].map(i=><div key={i} className={`mp ${c}${i<hasar?"f":"e"}`}/>)}</div>;
}

function Masa({me,char,npcs,all}){
  const tl={player:"OYUNCU",ally:"MÜTTEFİK",neutral:"TARAFSIZ",enemy:"DÜŞMAN"};
  const pc=all.map(p=>{const c=p.name===me?char:(p.char||{});return{key:`p-${p.name}`,type:"player",name:c.name||p.name,sub:[c.race,c.charClass,c.level?`Lvl ${c.level}`:null].filter(Boolean).join(" · ")||"—",fiziksel:c.fiziksel||0,zihinsel:c.zihinsel||0,ac:c.ac,dead:(c.fiziksel||0)>=3&&(c.zihinsel||0)>=3};});
  const nc=npcs.map(n=>({key:`n-${n.id}`,type:n.type,name:n.name,sub:`ZS ${n.ac} · CR ${n.cr}`,fiziksel:n.fiziksel||0,zihinsel:n.zihinsel||0,dead:(n.fiziksel||0)>=3&&(n.zihinsel||0)>=3}));
  const ord={player:0,ally:1,neutral:2,enemy:3};
  const cards=[...pc,...nc].sort((a,b)=>ord[a.type]-ord[b.type]);
  if(!cards.length)return null;
  return <div className="mw">
    <div className="mh">⚔ Masa Durumu</div>
    <div className="mg">{cards.map(c=><div key={c.key} className={`mc ${c.type}${c.dead?" dead":""}`}>
      {c.dead&&<span className="sku">💀</span>}
      <div className="mtg">{tl[c.type]}</div>
      <div className="mnm">{c.name}</div>
      <div className="msb">{c.sub}</div>
      <div style={{display:"flex",flexDirection:"column",gap:5,marginTop:4}}>
        <MPs type="fiziksel" hasar={c.fiziksel}/>
        <MPs type="zihinsel" hasar={c.zihinsel}/>
      </div>
      {c.ac&&<div style={{fontSize:".65rem",color:"rgba(245,230,200,.3)",marginTop:5}}>ZS {c.ac}</div>}
    </div>)}</div>
  </div>;
}

function Dice({me,char,npcs,all,rolls,onRoll}){
  const [mod,setMod]=useState("0");
  const {latest,feed,akey}=rolls;
  const ic=latest?.sides===20&&latest?.raw===20;
  const fu=latest?.sides===20&&latest?.raw===1;
  const roll=async s=>{
    const raw=Math.floor(Math.random()*s)+1;
    const m=parseInt(mod)||0;
    await onRoll({sides:s,raw,modifier:m,total:raw+m});
  };
  return <div className="panel">
    <div className="dg">{DICE.map(d=><button key={d.s} className="db" onClick={()=>roll(d.s)}><span className="di">{d.i}</span><span className="dl">d{d.s}</span></button>)}</div>
    <div className="mr"><label>Modifier</label><input className="mi" type="number" value={mod} onChange={e=>setMod(e.target.value)}/></div>
    <div className="ra">
      {latest?<>
        <div className="rw">{latest.player} — d{latest.sides}</div>
        <div key={akey} className={`rn ra2${ic?" crit":fu?" fum":""}`}>{latest.total}</div>
        <div className="rm">{ic?"⚡ KRİTİK VURUŞ!":fu?"💀 KRİTİK HATA!":`${latest.raw}${latest.modifier!==0?` + (${latest.modifier>0?"+":""}${latest.modifier})`:""}`}</div>
      </>:<div className="rm">Bir zar seç ve at...</div>}
    </div>
    {feed.length>0&&<>
      <div className="ft">Son Atışlar</div>
      <div className="feed">{feed.map((r,i)=>{
        const c=r.sides===20&&r.raw===20?"crit":r.sides===20&&r.raw===1?"fum":"";
        return <div key={r.id} className={`fi${i===0?" nr":""}`}>
          <span className="fdie">{DI[r.sides]||"🎲"}</span>
          <div className="fb"><div className="fp">{r.player}</div><div className="fd">d{r.sides} = {r.raw}{r.modifier!==0?` + (${r.modifier>0?"+":""}${r.modifier})`:""}{c==="crit"?" ⚡":c==="fum"?" 💀":""}</div></div>
          <div className={`fv ${c}`}>{r.total}</div>
        </div>;
      })}</div>
    </>}
    <div style={{height:24}}/>
    <Masa me={me} char={char} npcs={npcs} all={all}/>
  </div>;
}

function Char({me,isDM,char,setChar,all}){
  const [saved,setSaved]=useState(false);
  const [vp,setVp]=useState(me);
  const st=useRef(null);
  const self=vp===me||!isDM;
  const vc=self?char:(all.find(p=>p.name===vp)?.char||iChar(vp));
  const can=self||isDM;
  const save=async(u,t)=>{await fbSet(`chars/${t}`,u);if(t===me){setSaved(true);setTimeout(()=>setSaved(false),1500);}};
  const upd=(f,v)=>{if(!can)return;if(self){setChar(c=>{const n={...c,[f]:v};clearTimeout(st.current);st.current=setTimeout(()=>save(n,me),600);return n;});}else{const u={...vc,[f]:v};clearTimeout(st.current);st.current=setTimeout(()=>save(u,vp),600);}};
  const updS=(s,v)=>{if(!can)return;if(self){setChar(c=>{const n={...c,stats:{...c.stats,[s]:v}};clearTimeout(st.current);st.current=setTimeout(()=>save(n,me),600);return n;});}else{const u={...vc,stats:{...vc.stats,[s]:v}};clearTimeout(st.current);st.current=setTimeout(()=>save(u,vp),600);}};
  return <div className="panel">
    {isDM&&all.length>0&&<><div className="st" style={{marginTop:0}}>Oyuncuları Görüntüle</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {all.map(p=><button key={p.name} className={`tb${vp===p.name?" on":""}`} onClick={()=>setVp(p.name)} style={{fontSize:".7rem"}}>{p.name}</button>)}
      </div></>}
    {!can&&<div className="dmo">📖 Salt okunur — {vp}'in sayfası</div>}
    <div className="cg">
      {[{l:"KARAKTER ADI",f:"name",ph:"Duncan the Tall..."},{l:"IRK",f:"race",sel:RACES},{l:"SINIF",f:"charClass",sel:CLASSES},{l:"SEVİYE",f:"level",ph:"1"}].map(x=><div key={x.f} className="cf">
        <label>{x.l}</label>
        {x.sel?<select value={vc[x.f]} onChange={e=>upd(x.f,e.target.value)} disabled={!can}><option value="">—</option>{x.sel.map(o=><option key={o}>{o}</option>)}</select>
              :<input value={vc[x.f]} onChange={e=>upd(x.f,e.target.value)} placeholder={x.ph} disabled={!can}/>}
      </div>)}
    </div>
    <div className="st">Yetenekler</div>
    <div className="sg">{STATS.map(s=><div key={s} className="sb"><div className="sn">{s}</div><div className="ss"><input type="number" value={vc.stats[s]} onChange={e=>updS(s,e.target.value)} min={1} max={30} disabled={!can}/></div><div className="sm">{smod(vc.stats[s])}</div></div>)}</div>
    <div className="st">Can Durumu</div>
    <div className="cb"><div className="cr">
      <PipBar type="fiziksel" hasar={vc.fiziksel||0} disabled={!can} onChange={v=>upd("fiziksel",v)}/>
      <div className="cdv"/>
      <PipBar type="zihinsel" hasar={vc.zihinsel||0} disabled={!can} onChange={v=>upd("zihinsel",v)}/>
    </div></div>
    <div className="vr">{[{l:"ZIRH SINIFI",f:"ac"},{l:"HIZ",f:"speed"},{l:"YETKİNLİK",f:"proficiency"}].map(v=><div key={v.f} className="vb"><label>{v.l}</label><input type="number" value={vc[v.f]} onChange={e=>upd(v.f,e.target.value)} disabled={!can}/></div>)}</div>
    <div className="st">Notlar</div>
    <textarea className="na" rows={5} placeholder="Geçmiş, yetenekler, büyüler..." value={vc.notes} onChange={e=>upd("notes",e.target.value)} disabled={!can}/>
    <div className={`si${saved?" ok":""}`}>{saved?"✓ Kaydedildi":"Otomatik kaydediliyor..."}</div>
  </div>;
}

function Npc({isDM,npcs,setNpcs,onClearRolls}){
  const [form,setForm]=useState({name:"",type:"enemy",ac:"12",cr:"1",notes:""});
  const [confirm,setConfirm]=useState(null); // "npcs" | "rolls"
  const sync=async u=>{setNpcs(u);if(!u.length){await fbSet("npcs",null);return;}const o={};u.forEach(n=>{o[n.id]=n;});await fbSet("npcs",o);};
  const add=async()=>{if(!form.name.trim())return;await sync([...npcs,{...form,id:ts(),fiziksel:0,zihinsel:0}]);setForm({name:"",type:"enemy",ac:"12",cr:"1",notes:""});};
  const uPip=async(id,f,v)=>sync(npcs.map(n=>n.id===id?{...n,[f]:v}:n));
  const rem=async id=>sync(npcs.filter(n=>n.id!==id));
  const doConfirm=async()=>{
    if(confirm==="npcs") await sync([]);
    if(confirm==="rolls") await onClearRolls();
    setConfirm(null);
  };
  return <div className="panel">
    {!isDM&&<div className="dmo">⚔ NPC'ler DM tarafından yönetilir.</div>}
    {isDM&&<>
      <div className="st" style={{marginTop:0}}>DM Araçları</div>
      <div className="dm-tools">
        <button className="danger-btn" onClick={()=>setConfirm("npcs")}>🗑 Tüm NPC'leri Temizle</button>
        <button className="danger-btn" onClick={()=>setConfirm("rolls")}>🗑 Tüm Zarları Temizle</button>
      </div>
      {confirm&&<div className="confirm-box">
        <span>⚠ Emin misin? Bu işlem geri alınamaz.</span>
        <div className="confirm-btns">
          <button className="yes-btn" onClick={doConfirm}>✓ Evet, Temizle</button>
          <button className="no-btn" onClick={()=>setConfirm(null)}>✕ İptal</button>
        </div>
      </div>}
    </>}
    <div className="nl">
      {!npcs.length&&<div className="em"><span>🐉</span>Henüz NPC yok.</div>}
      {npcs.map(n=>{const dead=(n.fiziksel||0)>=3&&(n.zihinsel||0)>=3;return <div key={n.id} className={`nc${dead?" dead":""}`}>
        <div className="nr2"><div className="nn">{n.name}{dead?" 💀":""}</div>
          <span className={`badge b${n.type==="enemy"?"e":n.type==="ally"?"a":"n"}`}>{n.type==="enemy"?"DÜŞMAN":n.type==="ally"?"MÜTTEFİK":"TARAFSIZ"}</span>
        </div>
        <div className="ns">ZS {n.ac} · CR {n.cr}</div>
        <div className="ncw">
          <NpcPips type="fiziksel" hasar={n.fiziksel||0} disabled={!isDM} onChange={v=>uPip(n.id,"fiziksel",v)}/>
          <NpcPips type="zihinsel" hasar={n.zihinsel||0} disabled={!isDM} onChange={v=>uPip(n.id,"zihinsel",v)}/>
        </div>
        {n.notes&&<div className="nnt">📜 {n.notes}</div>}
        {isDM&&<div className="nct"><button className="nbtn rm" onClick={()=>rem(n.id)}>✕ Kaldır</button></div>}
      </div>;})}
    </div>
    {isDM&&<div className="an"><h3>+ Yeni NPC / Düşman</h3>
      <div className="f2">
        <input className="fin" placeholder="İsim" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
        <select className="fin" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}><option value="enemy">Düşman</option><option value="ally">Müttefik</option><option value="neutral">Tarafsız</option></select>
      </div>
      <div className="f2">
        <input className="fin" placeholder="Zırh Sınıfı" type="number" value={form.ac} onChange={e=>setForm(f=>({...f,ac:e.target.value}))}/>
        <input className="fin" placeholder="CR" value={form.cr} onChange={e=>setForm(f=>({...f,cr:e.target.value}))}/>
      </div>
      <input className="fin" style={{marginBottom:12}} placeholder="Notlar (opsiyonel)" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
      <button className="ab" onClick={add}>⚔ Ekle</button>
    </div>}
  </div>;
}

function App(){
  const ss=window.sessionStorage;
  const [phase,setPhase]=useState(()=>ss.getItem("tr_phase")||"lobby");
  const [name,setName]=useState(()=>ss.getItem("tr_name")||"");
  const [role,setRole]=useState(()=>ss.getItem("tr_role")||"player");
  const [tab,setTab]=useState("dice");
  const [char,setChar]=useState(()=>{try{const c=ss.getItem("tr_char");return c?JSON.parse(c):iChar();}catch{return iChar();}});
  const [npcs,setNpcs]=useState([]);
  const [all,setAll]=useState([]);
  const [rolls,setRolls]=useState({latest:null,feed:[],akey:0});
  const [dmPass,setDmPass]=useState("");
  const [dmErr,setDmErr]=useState(false);
  const lastRid=useRef(0);
  const cst=useRef(null);

  // Persist session (survives F5, cleared on tab close)
  useEffect(()=>{ss.setItem("tr_phase",phase);},[phase]);
  useEffect(()=>{ss.setItem("tr_name",name);},[name]);
  useEffect(()=>{ss.setItem("tr_role",role);},[role]);
  useEffect(()=>{try{ss.setItem("tr_char",JSON.stringify(char));}catch{}},[char]);

  useEffect(()=>{
    if(phase!=="game")return;
    fbSet(`players/${name}`,{name,role,lastSeen:ts()});
    fbSet(`chars/${name}`,char);
    const hb=setInterval(()=>fbPatch(`players/${name}`,{lastSeen:ts()}),5000);

    // Rolls: polling her 2sn - SSE'den daha güvenilir
    const pollRolls=async()=>{
      const data=await fbGet("rolls");
      if(!data)return;
      const arr=Object.values(data).sort((a,b)=>a.id-b.id);
      const nw=arr.filter(r=>r.id>lastRid.current);
      if(nw.length){
        lastRid.current=Math.max(...nw.map(r=>r.id));
        setRolls({latest:nw[nw.length-1],feed:arr.slice(-12).reverse(),akey:Date.now()});
      }
    };
    pollRolls();
    const rollPoll=setInterval(pollRolls,2000);

    // Players/chars/npcs: SSE
    const unP=fbListen("players",data=>{
      if(!data)return;
      const now=ts();
      const alive=Object.values(data).filter(p=>now-(p.lastSeen||0)<15000);
      setAll(prev=>alive.map(p=>({...p,char:prev.find(x=>x.name===p.name)?.char||iChar(p.name)})));
    });
    const unC=fbListen("chars",data=>{
      if(!data)return;
      if(data[name])setChar(data[name]);
      setAll(prev=>prev.map(p=>({...p,char:data[p.name]||p.char})));
    });
    const unN=fbListen("npcs",data=>{
      if(!data){setNpcs([]);return;}
      setNpcs(Object.values(data).sort((a,b)=>a.id-b.id));
    });
    return()=>{clearInterval(hb);clearInterval(rollPoll);unP();unC();unN();};
  },[phase,name]);

  const hChar=fn=>{setChar(prev=>{const u=typeof fn==="function"?fn(prev):fn;clearTimeout(cst.current);cst.current=setTimeout(()=>fbSet(`chars/${name}`,u),400);return u;});};

  const onRoll=async({sides,raw,modifier,total})=>{
    const id=ts();
    const entry={id,player:name,sides,raw,modifier,total};
    setRolls(r=>({latest:entry,feed:[entry,...r.feed].slice(0,12),akey:id}));
    lastRid.current=id;
    await fbSet(`rolls/${id}`,entry);
    const all2=await fbGet("rolls");
    if(all2){const keys=Object.keys(all2).sort((a,b)=>Number(a)-Number(b));if(keys.length>30)for(const k of keys.slice(0,keys.length-30))await fbDel(`rolls/${k}`);}
  };

  const clearRolls=async()=>{
    setRolls({latest:null,feed:[],akey:0});
    lastRid.current=0;
    await fbDel("rolls");
  };

  const TABS=role==="dm"
    ?[{id:"dice",l:"🎲 Zar"},{id:"char",l:"📜 Karakterler"},{id:"npc",l:"⚔ NPC Yönet"}]
    :[{id:"dice",l:"🎲 Zar"},{id:"char",l:"📜 Karakter"},{id:"npc",l:"⚔ Düşmanlar"}];

  if(phase==="lobby"){
    const dmSelected=role==="dm";
    const join=()=>{
      if(!name.trim())return;
      if(role==="dm"&&dmPass!=="05426654789"){setDmErr(true);setTimeout(()=>setDmErr(false),2000);return;}
      setPhase("game");
    };
    return(
      <div className="lobby">
        <h1 className="lt">TAVERN ROLL</h1>
        <p className="ls">İnci — Companion</p>
        <div className="lc">
          <h2>Masaya Katıl</h2>
          <input className="ii" placeholder="Adın (ör. Duncan the Tall, Kael, Revlo Krell...)" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&join()}/>
          <div className="lr">
            <button className={`rb${role==="player"?" on":""}`} onClick={()=>setRole("player")}>⚔ Oyuncu</button>
            <button className={`rb${role==="dm"?" on":""}`} onClick={()=>setRole("dm")}>👁 DM</button>
          </div>
          {dmSelected&&<>
            <input className="ii" type="password" placeholder="DM Şifresi..." value={dmPass} onChange={e=>setDmPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&join()} style={{borderColor:dmErr?"#c03030":undefined}}/>
            {dmErr&&<div style={{color:"#ff6060",fontSize:".8rem",fontStyle:"italic",marginBottom:8,textAlign:"center"}}>Şifre yanlış!</div>}
          </>}
          <button className="jb" onClick={join} disabled={!name.trim()}>Masaya Otur →</button>
        </div>
      </div>
    );
  }

  return <div>
    <div className="hdr">
      <div className="htitle">TAVERN ROLL</div>
      <div className="huser"><span className="pd"/><strong>{name}</strong>{role==="dm"?" · DM":""}</div>
    </div>
    <div className="ob">
      <span className="ol">Çevrimiçi</span>
      {all.map(p=><span key={p.name} className={`op${p.role==="dm"?" dm":""}`}><span className="pd" style={{width:5,height:5}}/>{p.name}{p.role==="dm"?" 👁":""}</span>)}
      {!all.length&&<span style={{fontSize:".72rem",color:"rgba(245,230,200,.25)",fontStyle:"italic"}}>bağlanıyor...</span>}
    </div>
    <div className="tabs">
      {TABS.map(t=><button key={t.id} className={`tb${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
    </div>
    {tab==="dice"&&<Dice me={name} char={char} npcs={npcs} all={all} rolls={rolls} onRoll={onRoll}/>}
    {tab==="char"&&<Char me={name} isDM={role==="dm"} char={char} setChar={hChar} all={all}/>}
    {tab==="npc" &&<Npc isDM={role==="dm"} npcs={npcs} setNpcs={setNpcs} onClearRolls={clearRolls}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
