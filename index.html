                <span style={{fontFamily:"'Cinzel',serif",fontSize:".52rem",color:"rgba(200,149,42,.4)",flexShrink:0,marginLeft:8}}>{book.chapters.length} bölüm</span>
              </div>
              <div style={{fontSize:".63rem",color:"rgba(200,149,42,.45)",fontFamily:"'Cinzel',serif",marginBottom:3}}>{book.author}</div>
              <div style={{fontSize:".73rem",color:"var(--text-dim)",fontFamily:"'Crimson Text',serif",lineHeight:1.4}}>{book.desc}</div>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

function SnakeGame({me}){
  const COLS=22,ROWS=18,SZ=17;
  const W=COLS*SZ,H=ROWS*SZ;
  const [gameState,setGameState]=useState("idle");
  const [snake,setSnake]=useState([{x:11,y:9}]);
  const [food,setFood]=useState({x:5,y:5});
  const [score,setScore]=useState(0);
  const [hi,setHi]=useState(()=>{try{return parseInt(localStorage.getItem("snake_hi_"+me)||"0");}catch{return 0;}});
  const [allHi,setAllHi]=useState([]);
  const dirRef=useRef({x:1,y:0});
  const loopRef=useRef(null);
  const snakeRef=useRef([{x:11,y:9}]);

  useEffect(()=>{
    fbGet("snakeScores").then(data=>{
      if(data)setAllHi(Object.values(data).sort((a,b)=>b.score-a.score));
    });
  },[]);

  const rnd=(s)=>{let f;do{f={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}while(s.some(p=>p.x===f.x&&p.y===f.y));return f;};

  const start=()=>{
    const init=[{x:11,y:9},{x:10,y:9},{x:9,y:9}];
    snakeRef.current=init;dirRef.current={x:1,y:0};
    setSnake(init);setFood(rnd(init));setScore(0);setGameState("playing");
  };

  const saveScore=async(s)=>{
    const newHi=Math.max(hi,s);
    setHi(newHi);localStorage.setItem("snake_hi_"+me,newHi);
    const existing=allHi.find(e=>e.name===me);
    if(!existing||s>existing.score){
      const entry={name:me,score:s,date:new Date().toLocaleDateString("tr-TR")};
      await fbSet("snakeScores/"+me,entry);
      setAllHi(prev=>[...prev.filter(e=>e.name!==me),entry].sort((a,b)=>b.score-a.score));
    }
  };

  useEffect(()=>{
    if(gameState!=="playing")return;
    loopRef.current=setInterval(()=>{
      const d=dirRef.current,s=snakeRef.current;
      const head={x:((s[0].x+d.x)+COLS)%COLS,y:((s[0].y+d.y)+ROWS)%ROWS};
      if(s.some(p=>p.x===head.x&&p.y===head.y)){
        setGameState("dead");clearInterval(loopRef.current);
        setScore(sc=>{saveScore(sc);return sc;});
        return;
      }
      setFood(prev=>{
        const ate=head.x===prev.x&&head.y===prev.y;
        const ns=ate?[head,...s]:[head,...s.slice(0,-1)];
        snakeRef.current=ns;setSnake([...ns]);
        if(ate){setScore(sc=>sc+1);return rnd(ns);}
        return prev;
      });
    },110);
    return()=>clearInterval(loopRef.current);
  },[gameState]);

  useEffect(()=>{
    if(gameState!=="playing")return;
    const h=(e)=>{
      const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
      const nd=map[e.key];if(!nd)return;
      const c=dirRef.current;if(nd.x===-c.x&&nd.y===-c.y)return;
      e.preventDefault();dirRef.current=nd;
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[gameState]);

  const move=(dx,dy)=>{const c=dirRef.current;if(dx===-c.x&&dy===-c.y)return;dirRef.current={x:dx,y:dy};};
  const isNewRecord=gameState==="dead"&&score>0&&score===hi;

  const rankColor=(i)=>i===0?"#f0c060":i===1?"#c0c0c0":i===2?"#cd7f32":"var(--text-dim)";
  const rankIcon=(i)=>i===0?"🥇":i===1?"🥈":i===2?"🥉":String(i+1);

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
      {/* Skor header */}
      <div style={{width:W,display:"flex",gap:6,justifyContent:"center"}}>
        {[
          {label:"Skor",value:score,color:"#f0c060"},
          {label:"Senin Rekorun",value:hi,color:"rgba(200,149,42,.5)"},
          {label:"Genel Rekor",value:allHi.length>0?allHi[0].score:"-",color:"#c0c0c0"},
        ].map((stat,i)=>(
          <div key={i} style={{flex:1,background:"rgba(200,149,42,.05)",border:"1px solid rgba(200,149,42,.1)",borderRadius:7,padding:"7px 4px",textAlign:"center"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:".42rem",letterSpacing:".12em",color:"rgba(200,149,42,.35)",textTransform:"uppercase",marginBottom:3}}>{stat.label}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"1rem",fontWeight:900,color:stat.color,lineHeight:1}}>{stat.value}</div>
          </div>
        ))}
      </div>

      {/* Oyun alanı */}
      <div style={{position:"relative",width:W,height:H,background:"linear-gradient(135deg,rgba(6,3,1,.97),rgba(12,6,2,.95))",border:"1px solid rgba(200,149,42,.2)",borderRadius:6,overflow:"hidden",boxShadow:"0 0 24px rgba(0,0,0,.6),inset 0 0 40px rgba(0,0,0,.4)",cursor:gameState!=="playing"?"pointer":"default"}}
        onClick={gameState!=="playing"?start:undefined}>
        <svg width={W} height={H} style={{position:"absolute",top:0,left:0,pointerEvents:"none"}}>
          {Array.from({length:COLS+1}).map((_,i)=><line key={"v"+i} x1={i*SZ} y1={0} x2={i*SZ} y2={H} stroke="rgba(200,149,42,.03)" strokeWidth={.5}/>)}
          {Array.from({length:ROWS+1}).map((_,i)=><line key={"h"+i} x1={0} y1={i*SZ} x2={W} y2={i*SZ} stroke="rgba(200,149,42,.03)" strokeWidth={.5}/>)}
          <circle cx={food.x*SZ+SZ/2} cy={food.y*SZ+SZ/2} r={SZ*.38} fill="#f0c060"/>
          <circle cx={food.x*SZ+SZ/2-SZ*.1} cy={food.y*SZ+SZ/2-SZ*.1} r={SZ*.1} fill="rgba(255,255,200,.7)"/>
          <circle cx={food.x*SZ+SZ/2} cy={food.y*SZ+SZ/2} r={SZ*.38} fill="none" stroke="rgba(240,192,96,.6)" strokeWidth={1} style={{filter:"drop-shadow(0 0 6px rgba(240,192,96,.9))"}}/>
          {snake.map((p,i)=>{
            const isHead=i===0;
            const t=Math.max(0,1-i*0.04);
            const g=Math.round(175*t+60*(1-t));
            return <g key={i}>
              <rect x={p.x*SZ+1.5} y={p.y*SZ+1.5} width={SZ-3} height={SZ-3} rx={isHead?5:3} fill={isHead?"#3dba6e":`rgb(40,${g},60)`} style={isHead?{filter:"drop-shadow(0 0 4px rgba(61,186,110,.8))"}:undefined}/>
              {isHead&&<>
                <circle cx={p.x*SZ+SZ*.3} cy={p.y*SZ+SZ*.32} r={2} fill="white"/>
                <circle cx={p.x*SZ+SZ*.7} cy={p.y*SZ+SZ*.32} r={2} fill="white"/>
                <circle cx={p.x*SZ+SZ*.3} cy={p.y*SZ+SZ*.32} r={1} fill="#111"/>
                <circle cx={p.x*SZ+SZ*.7} cy={p.y*SZ+SZ*.32} r={1} fill="#111"/>
              </>}
            </g>;
          })}
        </svg>
        {gameState!=="playing"&&(
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.72)",backdropFilter:"blur(1px)",gap:10}}>
            {gameState==="dead"&&<>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.1rem",color:"#ff7070",fontWeight:900,letterSpacing:".1em"}}>💀 GAME OVER</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:".75rem",color:"var(--gold)"}}>{score} elma{isNewRecord?" — 🏆 Yeni Rekor!":""}</div>
            </>}
            {gameState==="idle"&&<div style={{fontFamily:"'Cinzel',serif",fontSize:".75rem",color:"rgba(200,149,42,.6)",letterSpacing:".08em",marginBottom:4}}>🐍 SNAKE</div>}
            <div style={{marginTop:4,background:"rgba(200,149,42,.12)",border:"1px solid rgba(200,149,42,.35)",borderRadius:8,padding:"8px 22px",fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"var(--gold)",cursor:"pointer",letterSpacing:".1em"}}>
              {gameState==="idle"?"▶ BAŞLAT":"↺ TEKRAR"}
            </div>
            {gameState==="idle"&&<div style={{fontSize:".6rem",color:"rgba(200,149,42,.3)",fontStyle:"italic",marginTop:2}}>WASD · Ok tuşları · Mobil butonlar</div>}
          </div>
        )}
      </div>

      {/* Mobil kontroller */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <button onPointerDown={()=>move(0,-1)} style={{width:44,height:34,background:"rgba(200,149,42,.07)",border:"1px solid rgba(200,149,42,.18)",borderRadius:6,cursor:"pointer",color:"var(--gold)",fontSize:".9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>▲</button>
        <div style={{display:"flex",gap:3}}>
          <button onPointerDown={()=>move(-1,0)} style={{width:44,height:34,background:"rgba(200,149,42,.07)",border:"1px solid rgba(200,149,42,.18)",borderRadius:6,cursor:"pointer",color:"var(--gold)",fontSize:".9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>◀</button>
          <button onPointerDown={()=>move(0,1)} style={{width:44,height:34,background:"rgba(200,149,42,.07)",border:"1px solid rgba(200,149,42,.18)",borderRadius:6,cursor:"pointer",color:"var(--gold)",fontSize:".9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>▼</button>
          <button onPointerDown={()=>move(1,0)} style={{width:44,height:34,background:"rgba(200,149,42,.07)",border:"1px solid rgba(200,149,42,.18)",borderRadius:6,cursor:"pointer",color:"var(--gold)",fontSize:".9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>▶</button>
        </div>
      </div>

      {/* Liderlik tablosu */}
      <div style={{width:W,background:"rgba(0,0,0,.2)",border:"1px solid rgba(200,149,42,.12)",borderRadius:8,overflow:"hidden"}}>
        <div style={{padding:"8px 12px",background:"rgba(200,149,42,.05)",borderBottom:"1px solid rgba(200,149,42,.1)"}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:".55rem",letterSpacing:".15em",color:"rgba(200,149,42,.5)",textTransform:"uppercase"}}>🏆 Snake Liderlik Tablosu</span>
        </div>
        {allHi.length===0&&<div style={{padding:"12px",fontSize:".72rem",color:"var(--text-dim)",fontStyle:"italic",textAlign:"center"}}>Henüz kayıt yok</div>}
        {allHi.slice(0,8).map((e,i)=>{
          const isMe=e.name===me;
          const rc=rankColor(i);
          return(
            <div key={e.name} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",background:isMe?"rgba(200,149,42,.06)":"transparent",borderBottom:i<allHi.slice(0,8).length-1?"1px solid rgba(200,149,42,.05)":"none"}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:i<3?".75rem":".62rem",color:rc,minWidth:24,textAlign:"center",fontWeight:i<3?700:400}}>{rankIcon(i)}</span>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:".7rem",color:isMe?"#f0c060":i<3?rc:"var(--parchment)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:isMe?700:i<3?600:400}}>{e.name}{isMe?" (sen)":""}</span>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:".78rem",fontWeight:700,color:i===0?"#f0c060":i===1?"#c0c0c0":i===2?"#cd7f32":"#90b8f0"}}>{e.score}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SettingsPanel({onClose,darkness,setDarkness,animOn,setAnimOn,onLogout}){
  const isLight=darkness>60;
  return <>
    <div className="settings-overlay" onClick={onClose}>
      <div className="settings-panel" onClick={e=>e.stopPropagation()}>
        <div className="settings-title">
          ⚙ Ayarlar
          <button className="settings-close" onClick={onClose}>✕ Kapat</button>
        </div>

        <div className="settings-section">
          <div className="settings-section-title">Site Teması</div>
          <div className="theme-btns">
            <button className={`theme-btn${!isLight?" on":""}`} onClick={()=>{setDarkness(0);applyTheme(0);}}>🌑 Koyu</button>
            <button className={`theme-btn${isLight?" on":""}`} onClick={()=>{setDarkness(100);applyTheme(100);}}>☀️ Açık</button>
          </div>
          <div className="slider-row">
            <div className="slider-label">
              <span>🌑 En Koyu</span>
              <span>☀️ En Açık</span>
            </div>
            <input
              type="range" min={0} max={100} value={darkness}
              className="theme-slider"
              style={{background:`linear-gradient(to right,#1a0f00 0%,var(--parchment) 100%)`}}
              onChange={e=>{const v=Number(e.target.value);setDarkness(v);applyTheme(v);}}
            />
          </div>
        </div>

        <div className="settings-section">
          <div className="settings-section-title">Animasyonlar</div>
          <div className="toggle-row">
            <div>
              <div className="toggle-label">✨ Crit Animasyonları</div>
              <div className="toggle-sub">Havai fişek & duman efektleri</div>
            </div>
            <label className="toggle">
              <input type="checkbox" checked={animOn} onChange={e=>setAnimOn(e.target.checked)}/>
              <div className="toggle-track"/>
              <div className="toggle-thumb"/>
            </label>
          </div>
        </div>

        <div style={{borderTop:"1px solid rgba(200,149,42,.1)",paddingTop:16,marginTop:4}}>
          <button onClick={onLogout} style={{
            width:"100%",background:"rgba(139,26,26,.1)",border:"1px solid rgba(139,26,26,.35)",
            borderRadius:6,color:"#ff9090",fontFamily:"'Cinzel',serif",fontSize:".72rem",
            letterSpacing:".12em",padding:"10px",cursor:"pointer",textTransform:"uppercase",
            transition:"all .2s"
          }}
          onMouseEnter={e=>e.currentTarget.style.background="rgba(139,26,26,.2)"}
          onMouseLeave={e=>e.currentTarget.style.background="rgba(139,26,26,.1)"}>
            ⇠ Çıkış Yap
          </button>
        </div>
      </div>
    </div>
  </>;
}

function App(){
  const ss=window.sessionStorage;
  const [phase,setPhase]=useState(()=>ss.getItem("tr_phase")||"lobby");
  const [name,setName]=useState(()=>ss.getItem("tr_name")||"");
  const [role,setRole]=useState(()=>ss.getItem("tr_role")||"player");
  const [tab,setTab]=useState("dice");
  const [waitRoomActive,setWaitRoomActive]=useState(false);
  const [char,setChar]=useState(()=>{try{const c=ss.getItem("tr_char");return c?JSON.parse(c):iChar();}catch{return iChar();}});
  const [npcs,setNpcs]=useState([]);
  const [all,setAll]=useState([]);
  const [rolls,setRolls]=useState({latest:null,feed:[],akey:0});
  const [dmPass,setDmPass]=useState("");
  const [dmErr,setDmErr]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [darkness,setDarkness]=useState(()=>{const v=localStorage.getItem("tr_dark");return v?Number(v):0;});
  const [animOn,setAnimOn]=useState(()=>localStorage.getItem("tr_anim")!=="0");
  const [avatars,setAvatars]=useState({});

  // Apply saved theme on mount
  useEffect(()=>{applyTheme(darkness);},[]);
  useEffect(()=>{localStorage.setItem("tr_dark",darkness);},[darkness]);
  useEffect(()=>{localStorage.setItem("tr_anim",animOn?"1":"0");},[animOn]);
  const lastRid=useRef(0);
  const cst=useRef(null);

  // Persist session (survives F5, cleared on tab close)
  useEffect(()=>{ss.setItem("tr_phase",phase);},[phase]);
  useEffect(()=>{ss.setItem("tr_name",name);},[name]);
  useEffect(()=>{ss.setItem("tr_role",role);},[role]);
  useEffect(()=>{try{ss.setItem("tr_char",JSON.stringify(char));}catch{}},[char]);

  useEffect(()=>{
    if(phase!=="game")return;
    // Register self immediately & include self in all list right away
    const selfEntry={name,role,lastSeen:ts(),loginAt:ts(),char};
    fbSet(`players/${name}`,{name,role,lastSeen:ts(),loginAt:ts()});
    fbSet(`chars/${name}`,char);
    setAll([selfEntry]);
    const hb=setInterval(()=>fbPatch(`players/${name}`,{lastSeen:ts()}),4000);
    // Poll waitroom active state
    const wrPoll=setInterval(async()=>{
      const d=await fbGet("waitRoomActive");
      setWaitRoomActive(!!d);
    },3000);
    fbGet("waitRoomActive").then(d=>setWaitRoomActive(!!d));
    // Activity tracker — tıklama/tuş = aktif
    const onActivity=()=>fbPatch(`players/${name}`,{lastActive:ts()});
    document.addEventListener("click",onActivity,{passive:true});
    document.addEventListener("keydown",onActivity,{passive:true});

    // Kick check — oyuncu kick edilirse lobby'ye gönder
    const pollKick=async()=>{
      const kicked=await fbGet(`kicked/${name}`);
      if(kicked&&kicked.at){
        await fbDel(`kicked/${name}`);
        ss.clear();
        setPhase("lobby");
        setName("");
        setRole("player");
      }
    };
    pollKick();
    const kickPoll=setInterval(pollKick,3000);

    // Rolls: polling her 2sn
    const pollRolls=async()=>{
      const data=await fbGet("rolls");
      if(!data)return;
      const arr=Object.values(data).sort((a,b)=>a.id-b.id);
      const nw=arr.filter(r=>r.id>lastRid.current);
      if(nw.length){
        lastRid.current=Math.max(...nw.map(r=>r.id));
        setRolls({latest:nw[nw.length-1],feed:arr.slice(-30).reverse(),akey:Date.now()});
      }
    };
    pollRolls();
    const rollPoll=setInterval(pollRolls,2000);

    // Players: polling (SSE unreliable for this)
    const pollPlayers=async()=>{
      const data=await fbGet("players");
      if(!data)return;
      const now=ts();
      const alive=Object.values(data).filter(p=>now-(p.lastSeen||0)<12000);
      const charData=await fbGet("chars");
      setAll(alive.map(p=>({...p,away:now-(p.lastActive||p.lastSeen||0)>180000,char:(charData&&charData[p.name])||iChar(p.name)})));
    };
    pollPlayers();
    const playerPoll=setInterval(pollPlayers,3000);

    // Chars & npcs: SSE (these work fine)
    // Avatars: SSE
    const unA=fbListen("avatars",data=>{
      if(!data)return;
      setAvatars(data);
    });

    const unC=fbListen("chars",data=>{
      if(!data)return;
      if(data[name])setChar(data[name]);
      setAll(prev=>prev.map(p=>({...p,char:data[p.name]||p.char})));
    });
    const unN=fbListen("npcs",data=>{
      if(!data){setNpcs([]);return;}
      setNpcs(Object.values(data).sort((a,b)=>a.id-b.id));
    });
    return()=>{clearInterval(hb);clearInterval(kickPoll);clearInterval(rollPoll);clearInterval(playerPoll);clearInterval(wrPoll);unA();unC();unN();document.removeEventListener("click",onActivity);document.removeEventListener("keydown",onActivity);};
  },[phase,name]);

  const hChar=fn=>{setChar(prev=>{const u=typeof fn==="function"?fn(prev):fn;clearTimeout(cst.current);cst.current=setTimeout(()=>fbSet(`chars/${name}`,u),400);return u;});};

  const onPipChange=async(playerName,field,val)=>{
    if(playerName===name){
      hChar(c=>({...c,[field]:val}));
    } else {
      const cur=all.find(p=>p.name===playerName);
      const updated={...((cur&&cur.char)||{}), [field]:val};
      await fbSet(`chars/${playerName}`,updated);
    }
  };

  const onNpcPipChange=async(npcId,field,val)=>{
    const updated=npcs.map(n=>n.id===npcId?{...n,[field]:val}:n);
    setNpcs(updated);
    const o={};updated.forEach(n=>{o[n.id]=n;});
    await fbSet("npcs",o);
  };

  const onRoll=async({sides,raw,modifier,total,skillName})=>{
    const id=ts();
    const entry={id,player:name,sides,raw,modifier,total,time:id,skillName:skillName||null};
    setRolls(r=>({latest:entry,feed:[entry,...r.feed].slice(0,12),akey:id}));
    lastRid.current=id;
    await fbSet(`rolls/${id}`,entry);
    const all2=await fbGet("rolls");
    if(all2){const keys=Object.keys(all2).sort((a,b)=>Number(a)-Number(b));if(keys.length>30)for(const k of keys.slice(0,keys.length-30))await fbDel(`rolls/${k}`);}
  };

  const uploadAvatar=async(b64)=>{
    setAvatars(a=>({...a,[name]:b64}));
    await fbSet(`avatars/${name}`,b64);
  };

  const clearRolls=async()=>{
    setRolls({latest:null,feed:[],akey:0});
    lastRid.current=0;
    await fbDel("rolls");
  };

  const TABS=role==="dm"
    ?[{id:"dice",l:"🎲 Zar"},{id:"char",l:"📜 Karakterler"},{id:"npc",l:"⚔ NPC Yönet"},{id:"map",l:"⚔ Arena"},{id:"wait",l:"🏠 Bekleme Odası"}]
    :[{id:"dice",l:"🎲 Zar"},{id:"char",l:"📜 Karakter"},{id:"npc",l:"⚔ NPC'ler"},{id:"map",l:"⚔ Arena"},...(waitRoomActive?[{id:"wait",l:"🏠 Bekleme Odası"}]:[])];

  if(phase==="lobby"){
    return <LobbyScreen role={role} setRole={setRole} dmPass={dmPass} setDmPass={setDmPass} dmErr={dmErr} setDmErr={setDmErr} setName={setName} setPhase={setPhase}/>;
  }


  return <div>
    <div className="hdr">
      <div className="htitle">TAVERN ROLL</div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div className="huser"><span className="pd"/><strong>{name}</strong>{role==="dm"?" · DM":""}</div>
        <button className="gear-btn" onClick={()=>setShowSettings(s=>!s)} title="Ayarlar">⚙</button>
      </div>
    </div>
    {showSettings&&<SettingsPanel onClose={()=>setShowSettings(false)} darkness={darkness} setDarkness={setDarkness} animOn={animOn} setAnimOn={setAnimOn} onLogout={()=>{
      // Firebase'den çıkış
      fbDel(`players/${name}`);
      // Session sıfırla
      window.sessionStorage.clear();
      setPhase("lobby");setName("");setRole("player");setShowSettings(false);
    }}/>}
    <div className="ob">
      <span className="ol">Çevrimiçi</span>
      {all.map(p=><span key={p.name} className={`op${p.role==="dm"?" dm":p.away?" away":""}`}><span className={`pd${p.away?" away":""}`} style={{width:5,height:5}}/>{p.name}{p.role==="dm"?" 👁":p.away?" 💤":""}</span>)}
      {!all.length&&<span style={{fontSize:".72rem",color:"rgba(var(--text-rgb,245,230,200),.25)",fontStyle:"italic"}}>bağlanıyor...</span>}
    </div>
    
    <div className="tabs">
      {TABS.map(t=><button key={t.id} className={`tb${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
    </div>
    {tab==="dice"&&<Dice me={name} role={role} char={char} npcs={npcs} all={all} rolls={rolls} onRoll={onRoll} animOn={animOn} avatars={avatars} onPipChange={onPipChange} onNpcPipChange={onNpcPipChange}/>}
    {tab==="char"&&<Char me={name} isDM={role==="dm"} char={char} setChar={hChar} all={all} avatars={avatars} onUploadAvatar={uploadAvatar}/>}
    {tab==="npc" &&<Npc isDM={role==="dm"} npcs={npcs} setNpcs={setNpcs} onClearRolls={clearRolls} allPlayers={all}/>}
    {tab==="map" &&<Arena me={name} isDM={role==="dm"} avatars={avatars} all={all} npcs={npcs} rolls={rolls} onRoll={onRoll} char={char}/>}
    {tab==="wait"&&<WaitingRoom me={name} all={all} isDM={role==="dm"} avatars={avatars}/>}
    <Chat me={name} role={role} all={all} avatars={avatars}/>
    <Ambiance isDM={role==="dm"}/>
    {role!=="dm"&&<FloatingNotebook me={name} isDM={false} charName={char.name||name}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
