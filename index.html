                  {av?<img src={av} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:".7rem"}}>{item.type==="npc"?"💀":"⚔️"}</span>}
                </div>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:".6rem",color:isActv?"#f0c060":"var(--text-mid)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:isActv?700:400}}>{item.name}</span>
                {isDM&&<button onClick={()=>removeFromOrder(item.id)} style={{background:"transparent",border:"none",color:"rgba(180,40,40,.3)",cursor:"pointer",fontSize:".7rem",lineHeight:1,flexShrink:0,padding:2}} onMouseEnter={e=>e.currentTarget.style.color="rgba(220,60,60,.7)"} onMouseLeave={e=>e.currentTarget.style.color="rgba(180,40,40,.3)"}>x</button>}
              </div>
            );
          })}
        </div>
        {notInOrder.length>0&&isDM&&(
          <div style={{padding:"5px 5px",borderTop:"1px solid rgba(200,149,42,.06)"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:".4rem",letterSpacing:".15em",color:"rgba(200,149,42,.25)",textTransform:"uppercase",marginBottom:3}}>SIRAYA EKLE</div>
            {notInOrder.slice(0,5).map(e=>(
              <button key={e.id} onClick={()=>addToOrder(e)}
                style={{display:"flex",alignItems:"center",gap:4,width:"100%",background:"rgba(200,149,42,.025)",border:"1px solid rgba(200,149,42,.07)",borderRadius:5,padding:"5px 6px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".56rem",color:"var(--text-dim)",marginBottom:2,transition:"all .15s",textAlign:"left"}}
                onMouseEnter={e=>{e.currentTarget.style.color="var(--gold)";e.currentTarget.style.background="rgba(200,149,42,.07)";}}
                onMouseLeave={e=>{e.currentTarget.style.color="var(--text-dim)";e.currentTarget.style.background="rgba(200,149,42,.025)";}}>
                <span style={{opacity:.4}}>+</span>{e.name}
              </button>
            ))}
          </div>
        )}
        {isDM&&<div style={{padding:"7px 5px",borderTop:"1px solid rgba(200,149,42,.08)",display:"flex",flexDirection:"column",gap:4}}>
          {!combat&&order.length>0&&<button onClick={startCombat} style={{background:"rgba(76,175,125,.09)",border:"1px solid rgba(76,175,125,.24)",borderRadius:6,padding:"7px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".57rem",color:"#7ef0a0",letterSpacing:".1em",textTransform:"uppercase",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(76,175,125,.18)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(76,175,125,.09)"}>Baslat</button>}
          {combat&&<>
            <button onClick={nextTurn} style={{background:"rgba(200,149,42,.09)",border:"1px solid rgba(200,149,42,.24)",borderRadius:6,padding:"7px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".57rem",color:"var(--gold)",letterSpacing:".1em",textTransform:"uppercase",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(200,149,42,.18)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(200,149,42,.09)"}>Sonraki</button>
            <button onClick={endCombat} style={{background:"transparent",border:"1px solid rgba(139,26,26,.2)",borderRadius:6,padding:"6px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".54rem",color:"rgba(255,100,100,.45)",letterSpacing:".08em",textTransform:"uppercase",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(139,26,26,.15)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>Bitir</button>
          </>}
        </div>}
      </div>

      {/* Pick modal */}
      {pickModal&&(
        <div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:"rgba(14,8,4,.99)",border:"1px solid rgba(200,149,42,.28)",borderRadius:12,padding:18,zIndex:500,minWidth:220,boxShadow:"0 16px 60px rgba(0,0,0,.95)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",letterSpacing:".1em",color:"var(--gold)"}}>{pickModal.type==="player"?"Oyuncu Ekle":pickModal.type==="npc"?"NPC Ekle":pickModal.type==="note"?"Not":"Nokta"}</span>
            <button onClick={()=>setPickModal(null)} style={{background:"transparent",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:"1rem",lineHeight:1}}>x</button>
          </div>
          {pickModal.type==="player"&&(all.filter(p=>p.role!=="dm").length===0?<p style={{color:"var(--text-dim)",fontSize:".8rem",fontStyle:"italic",margin:0}}>Cevrimici oyuncu yok.</p>:all.filter(p=>p.role!=="dm").map(p=>{
            const c=p.char||{};const av=avatars&&avatars[p.name];
            return <button key={p.name} onClick={()=>{addPin(pickModal.col,pickModal.row,"player",c.name||p.name,p.name);setPickModal(null);}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:"rgba(91,155,213,.06)",border:"1px solid rgba(91,155,213,.15)",borderRadius:7,padding:"8px 10px",cursor:"pointer",marginBottom:5,transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(91,155,213,.14)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(91,155,213,.06)"}>
              <div style={{width:32,height:32,borderRadius:"50%",overflow:"hidden",border:"1px solid rgba(91,155,213,.3)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(91,155,213,.1)"}}>
                {av?<img src={av} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span>x</span>}
              </div>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"var(--parchment)"}}>{c.name||p.name}</span>
            </button>;
          }))}
          {pickModal.type==="npc"&&(npcs.length===0?<p style={{color:"var(--text-dim)",fontSize:".8rem",fontStyle:"italic",margin:0}}>NPC yok.</p>:npcs.map(n=>(
            <button key={n.id} onClick={()=>{addPin(pickModal.col,pickModal.row,"npc",n.name,n.id);setPickModal(null);}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:"rgba(220,80,50,.06)",border:"1px solid rgba(220,80,50,.15)",borderRadius:7,padding:"8px 10px",cursor:"pointer",marginBottom:5,transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(220,80,50,.14)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(220,80,50,.06)"}>
              <span style={{fontSize:"1.1rem"}}>💀</span>
              <div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:".7rem",color:"var(--parchment)"}}>{n.name}</div>
                <div style={{fontSize:".58rem",color:"var(--text-dim)"}}>ZS {n.ac} CR {n.cr}</div>
              </div>
            </button>
          )))}
        </div>
      )}

      {/* Per-pin suruklenebilir kartlar */}
      {pins.filter(p=>openCards[p.id]).map(pin=>{
        const pt=getPT(pin);
        const info=getPinInfo(pin);
        const animCls=statusAnimCls(info.statuses);
        const pos=openCards[pin.id];
        const closeCard=()=>setOpenCards(c=>{const n={...c};delete n[pin.id];return n;});
        const startDrag=(e)=>{
          const sx=e.clientX-pos.x;
          const sy=e.clientY-pos.y;
          const onMove=(mv)=>setOpenCards(c=>({...c,[pin.id]:{x:mv.clientX-sx,y:mv.clientY-sy}}));
          const onUp=()=>{document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);};
          document.addEventListener("mousemove",onMove);
          document.addEventListener("mouseup",onUp);
        };
        return(
          <div key={pin.id} className={animCls} style={{position:"fixed",left:Math.max(10,pos.x),top:Math.max(10,pos.y),width:218,background:"rgba(14,8,4,.98)",border:"2px solid "+(info.dead?"rgba(80,40,40,.6)":pt.stroke+"88"),borderRadius:12,padding:12,zIndex:450,boxShadow:"0 8px 40px rgba(0,0,0,.85)",opacity:info.dead?.75:1}}>
            <div onMouseDown={startDrag} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,cursor:"grab",paddingBottom:7,borderBottom:"1px solid rgba(200,149,42,.1)"}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:".5rem",letterSpacing:".1em",color:info.dead?"rgba(120,60,60,.7)":"rgba(200,149,42,.35)",textTransform:"uppercase"}}>{info.dead?"OLU":pin.type}</span>
              <button onClick={closeCard} style={{background:"transparent",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:".9rem",lineHeight:1}}>x</button>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:8}}>
              <div style={{width:44,height:44,borderRadius:"50%",border:"2px solid "+(info.dead?"rgba(80,40,40,.5)":pt.stroke),overflow:"hidden",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.3)",filter:info.dead?"grayscale(.8)":"none"}}>
                {info.dead?<span style={{fontSize:"1.4rem"}}>💀</span>:info.av?<img src={info.av} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:"1.2rem"}}>{pt.icon}</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:".78rem",fontWeight:700,color:info.dead?"rgba(120,60,60,.7)":pt.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{info.name}{info.dead?" - OLU":""}</div>
                {info.sub&&<div style={{fontSize:".6rem",color:"var(--text-dim)",marginTop:1}}>{info.sub}</div>}
                {info.note&&<div style={{fontSize:".6rem",color:"var(--text-mid)",fontStyle:"italic",marginTop:1}}>{info.note}</div>}
              </div>
              {(isDM||pin.owner===me)&&<button onClick={()=>removePin(pin.id)} style={{background:"transparent",border:"none",color:"rgba(180,40,40,.35)",cursor:"pointer",fontSize:".9rem",lineHeight:1,flexShrink:0,alignSelf:"flex-start"}} onMouseEnter={e=>e.currentTarget.style.color="rgba(220,60,60,.7)"} onMouseLeave={e=>e.currentTarget.style.color="rgba(180,40,40,.35)"}>x</button>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:6}}>
              <PipRow type="fiziksel" val={info.fiz} max={info.fizMax}
                onChange={isDM?(v=>{
                  if(pin.type==="player"){const p=all.find(x=>x.name===(pin.entityId||pin.name));if(p){const updated={...(p.char||{}),fiziksel:v};fbSet("chars/"+p.name,updated);}}
                  else if(pin.type==="npc"){const n=npcs.find(x=>x.id===pin.entityId||x.name===pin.name);if(n){const updated={...n,fiziksel:v};const o={};npcs.map(x=>x.id===n.id?updated:x).forEach(x=>{o[x.id]=x;});fbSet("npcs",o);}}
                }):null}/>
              <PipRow type="zihinsel" val={info.zih} max={info.zihMax}
                onChange={isDM?(v=>{
                  if(pin.type==="player"){const p=all.find(x=>x.name===(pin.entityId||pin.name));if(p){const updated={...(p.char||{}),zihinsel:v};fbSet("chars/"+p.name,updated);}}
                  else if(pin.type==="npc"){const n=npcs.find(x=>x.id===pin.entityId||x.name===pin.name);if(n){const updated={...n,zihinsel:v};const o={};npcs.map(x=>x.id===n.id?updated:x).forEach(x=>{o[x.id]=x;});fbSet("npcs",o);}}
                }):null}/>
            </div>
            {info.statuses&&info.statuses.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:4}}>
              {info.statuses.map(sid=>{const s=STATUSES.find(x=>x.id===sid);return s?<span key={sid} className={"status-badge "+s.cls} style={{fontSize:".55rem",padding:"1px 5px"}}>{s.icon} {s.label}</span>:null;})}
            </div>}
          </div>
        );
      })}
    </div>
  );
}

function LobbyScreen({role,setRole,dmPass,setDmPass,dmErr,setDmErr,setName,setPhase}){
  const [lobbyMode,setLobbyMode]=useState("select");
  const [accounts,setAccounts]=useState({});
  const [regName,setRegName]=useState("");
  const [regPass,setRegPass]=useState("");
  const [regErr,setRegErr]=useState("");
  const [loginSel,setLoginSel]=useState("");
  const [loginPass,setLoginPass]=useState("");
  const [loginErr,setLoginErr]=useState("");

  useEffect(()=>{
    fbGet("accounts").then(data=>{ if(data) setAccounts(data); });
  },[]);

  const dmSelected=role==="dm";

  const register=async()=>{
    if(!regName.trim()){setRegErr("Isim gir!");return;}
    if(regPass.length<3){setRegErr("Sifre en az 3 karakter!");return;}
    if(accounts[regName]){setRegErr("Bu isim zaten kayitli!");return;}
    await fbSet("accounts/"+regName,{name:regName,pass:regPass});
    setName(regName);
    setPhase("game");
  };

  const loginAccount=async()=>{
    if(!loginSel){setLoginErr("Bir karakter sec!");return;}
    const acc=accounts[loginSel];
    if(!acc||acc.pass!==loginPass){setLoginErr("Sifre yanlis!");setTimeout(()=>setLoginErr(""),2000);return;}
    setName(acc.name);
    setPhase("game");
  };

  const joinDM=()=>{
    if(dmPass!=="05426654789"){setDmErr(true);setTimeout(()=>setDmErr(false),2000);return;}
    setName("DM");
    setPhase("game");
  };

  const accountList=Object.values(accounts);

  return(
    <div className="lobby">
      <h1 className="lt">TAVERN ROLL</h1>
      <p className="ls">Inci Companion</p>
      <div className="lc">
        <div className="lr" style={{marginBottom:16}}>
          <button className={"rb"+(role==="player"?" on":"")} onClick={()=>{setRole("player");setLobbyMode("select");}}>Oyuncu</button>
          <button className={"rb"+(role==="dm"?" on":"")} onClick={()=>setRole("dm")}>DM</button>
        </div>
        {dmSelected&&<>
          <input className="ii" type="password" placeholder="DM Sifresi..." value={dmPass} onChange={e=>setDmPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&joinDM()} style={{borderColor:dmErr?"#c03030":undefined}}/>
          {dmErr&&<div style={{color:"#ff6060",fontSize:".8rem",fontStyle:"italic",marginBottom:8,textAlign:"center"}}>Sifre yanlis!</div>}
          <button className="jb" onClick={joinDM}>Masaya Otur</button>
        </>}
        {!dmSelected&&lobbyMode==="select"&&<div style={{display:"flex",gap:8,marginBottom:16}}>
          <button className="jb" style={{flex:1,marginTop:0}} onClick={()=>setLobbyMode("register")}>Kayit Ol</button>
          <button className="jb" style={{flex:1,marginTop:0,background:"rgba(200,149,42,.08)"}} onClick={()=>setLobbyMode("login")}>Giris Yap</button>
        </div>}
        {!dmSelected&&lobbyMode==="register"&&<>
          <h2 style={{marginBottom:14}}>Kayit Ol</h2>
          <input className="ii" placeholder="Karakter adin..." value={regName} onChange={e=>{setRegName(e.target.value);setRegErr("");}}/>
          <input className="ii" type="password" placeholder="Sifre belirle..." value={regPass} onChange={e=>{setRegPass(e.target.value);setRegErr("");}} onKeyDown={e=>e.key==="Enter"&&register()}/>
          <div style={{background:"rgba(200,149,42,.06)",border:"1px solid rgba(200,149,42,.15)",borderRadius:5,padding:"8px 12px",marginBottom:10,fontSize:".75rem",color:"var(--text-mid)",fontStyle:"italic",lineHeight:1.5}}>
            Kendi sahsi sifrenizi kullanmayiniz.
          </div>
          {regErr&&<div style={{color:"#ff6060",fontSize:".78rem",marginBottom:8,textAlign:"center"}}>{regErr}</div>}
          <button className="jb" onClick={register} disabled={!regName.trim()}>Kayit Ol ve Giris Yap</button>
          <button className="rb" style={{width:"100%",marginTop:8}} onClick={()=>setLobbyMode("select")}>Geri</button>
        </>}
        {!dmSelected&&lobbyMode==="login"&&<>
          <h2 style={{marginBottom:14}}>Giris Yap</h2>
          {accountList.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".85rem",marginBottom:12,textAlign:"center"}}>Kayitli karakter yok.</div>}
          {accountList.length>0&&<>
            <select className="ii" style={{marginBottom:8}} value={loginSel} onChange={e=>setLoginSel(e.target.value)}>
              <option value="">-- Karakter sec --</option>
              {accountList.map(a=><option key={a.name} value={a.name}>{a.name}</option>)}
            </select>
            <input className="ii" type="password" placeholder="Sifren..." value={loginPass} onChange={e=>{setLoginPass(e.target.value);setLoginErr("");}} onKeyDown={e=>e.key==="Enter"&&loginAccount()}/>
            {loginErr&&<div style={{color:"#ff6060",fontSize:".78rem",marginBottom:8,textAlign:"center"}}>{loginErr}</div>}
            <button className="jb" onClick={loginAccount} disabled={!loginSel}>Giris Yap</button>
          </>}
          <button className="rb" style={{width:"100%",marginTop:8}} onClick={()=>setLobbyMode("select")}>Geri</button>
        </>}
      </div>
    </div>
  );
}


function exportCharPDF(char, avatarB64){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const now=new Date();
  const dateStr=now.toLocaleDateString("tr-TR",{year:"numeric",month:"long",day:"numeric"});
  const timeStr=now.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
  const W=210, M=18, CW=W-M*2;
  doc.setFillColor(13,7,5); doc.rect(0,0,W,297,"F");
  doc.setFillColor(30,23,16); doc.rect(0,0,W,52,"F");
  doc.setDrawColor(200,149,42); doc.setLineWidth(0.6); doc.line(M,52,W-M,52);
  if(avatarB64){try{doc.addImage(avatarB64,"JPEG",M,8,36,36);doc.setDrawColor(200,149,42);doc.setLineWidth(0.5);doc.circle(M+18,26,18,"S");}catch(e){}}
  const tx=avatarB64?M+44:M;
  doc.setFontSize(22);doc.setFont("helvetica","bold");doc.setTextColor(240,192,96);doc.text("Inci - Tavern Roll",tx,18);
  doc.setFontSize(15);doc.setTextColor(245,230,200);doc.text(char.name||"—",tx,28);
  doc.setFontSize(9);doc.setTextColor(160,130,80);
  const sub=[char.race,char.level?"Seviye "+char.level:null,char.age?"Yas: "+char.age:null].filter(Boolean).join("  -  ");
  doc.text(sub||"—",tx,36);doc.text(dateStr+" - "+timeStr,tx,43);
  let y=62;
  const section=(title)=>{
    doc.setFillColor(30,23,16);doc.roundedRect(M,y,CW,7,1,1,"F");
    doc.setDrawColor(200,149,42);doc.setLineWidth(0.3);doc.roundedRect(M,y,CW,7,1,1,"S");
    doc.setFontSize(7);doc.setFont("helvetica","bold");doc.setTextColor(200,149,42);
    doc.text(title.toUpperCase(),M+4,y+4.8);y+=11;
  };
  section("Kondisyon");
  const fiz=char.fiziksel!=null?char.fiziksel:3;
  const zih=char.zihinsel!=null?char.zihinsel:3;
  ["Fiziksel","Zihinsel"].forEach((lbl,idx)=>{
    const sag=idx===0?fiz:zih;
    const px=idx===0?M:M+CW/2;
    doc.setFontSize(7);doc.setFont("helvetica","normal");doc.setTextColor(140,120,80);doc.text(lbl,px,y+3);
    for(let i=0;i<3;i++){
      if(i<sag){doc.setFillColor(76,175,125);doc.circle(px+18+i*8,y+1.5,2.5,"F");}
      doc.setDrawColor(76,175,125);doc.setLineWidth(0.4);doc.circle(px+18+i*8,y+1.5,2.5,"S");
    }
  });
  y+=12;
  section("Saving Throwlar");
  const attrs=char.attrs||{};
  const attrKeys=["Guc","Ceviklik","Dayaniklilik","Zeka","Irfan","Karizma"];
  const attrReal=["Güç","Çeviklik","Dayanıklılık","Zeka","İrfan","Karizma"];
  const colW=CW/3;
  for(let i=0;i<6;i++){
    const col=i%3;const row=Math.floor(i/3);const fy=y+row*16;const fx=M+col*colW;
    doc.setFontSize(6.5);doc.setFont("helvetica","normal");doc.setTextColor(120,100,60);doc.text(attrKeys[i],fx,fy);
    doc.setFontSize(10);doc.setFont("helvetica","bold");doc.setTextColor(245,230,200);doc.text(String(attrs[attrReal[i]]||"—"),fx,fy+5.5);
    doc.setDrawColor(200,149,42);doc.setLineWidth(0.2);doc.line(fx,fy+7,fx+colW-2,fy+7);
  }
  y+=34;
  section("Skill Piramidi");
  const skills=char.skills||{};
  [5,4,3,2,1,-1,-2,-3,-4,-5].forEach(lv=>{
    const placed=Object.entries(skills).filter(([,v])=>v===lv).map(([k])=>k);
    if(!placed.length)return;
    doc.setFontSize(7.5);doc.setFont("helvetica","bold");
    if(lv>0){doc.setTextColor(76,175,125);}else{doc.setTextColor(180,40,40);}
    doc.text((lv>0?"+":"")+lv,M,y+4);
    doc.setFont("helvetica","normal");doc.setTextColor(200,200,200);
    doc.text(placed.join(", "),M+10,y+4);y+=7;
  });
  y+=4;
  if(char.notes&&char.notes.trim()){
    if(y>240){doc.addPage();doc.setFillColor(13,7,5);doc.rect(0,0,W,297,"F");y=20;}
    section("Notlar");
    doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(200,185,155);
    doc.splitTextToSize(char.notes,CW).forEach(line=>{
      if(y>280){doc.addPage();doc.setFillColor(13,7,5);doc.rect(0,0,W,297,"F");y=20;}
      doc.text(line,M,y);y+=5.5;
    });
  }
  doc.setDrawColor(200,149,42);doc.setLineWidth(0.3);doc.line(M,290,W-M,290);
  doc.setFontSize(7);doc.setFont("helvetica","normal");doc.setTextColor(100,80,40);
  doc.text("Inci - Tavern Roll",M,295);doc.text(dateStr,W-M,295,{align:"right"});
  const safeName=(char.name||"karakter").replace(/[^a-zA-Z0-9\s_-]/g,"").replace(/\s+/g,"_")||"karakter";
  doc.save("InciTavernRoll_"+safeName+"_"+now.getFullYear()+String(now.getMonth()+1).padStart(2,"0")+String(now.getDate()).padStart(2,"0")+".pdf");
}

function applyTheme(darkness){
  const d=darkness/100;
  const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
  const lerpHex=(r1,g1,b1,r2,g2,b2,t)=>{
    const r=lerp(r1,r2,t),g=lerp(g1,g2,t),b=lerp(b1,b2,t);
    return "#"+r.toString(16).padStart(2,"0")+g.toString(16).padStart(2,"0")+b.toString(16).padStart(2,"0");
  };
  const root=document.documentElement;
  const body=document.body;

  if(d===0){
    // Tam koyu — sadece class'ı kaldır, :root default'ları geçerli
    root.removeAttribute("data-theme");
    root.removeAttribute("style");
    body.style.background="";
    return;
  }

  if(d>=1){
    // Tam açık — light class ekle
    root.setAttribute("data-theme","light");
    root.removeAttribute("style");
    body.style.background="";
    return;
  }

  // Ara değer — interpolate et
  root.removeAttribute("data-theme");

  // Dark → Light renk geçişi
  const bg0=lerpHex(13,7,5,     214,201,176, d);
  const bg1=lerpHex(30,23,16,   232,221,200, d);
  const bg2=lerpHex(46,36,24,   207,194,168, d);
  const tR=lerp(245,44,d), tG=lerp(230,31,d), tB=lerp(200,14,d);
  const text="rgb("+tR+","+tG+","+tB+")";
  const textDim="rgba("+tR+","+tG+","+tB+","+(0.4+d*0.15)+")";
  const textMid="rgba("+tR+","+tG+","+tB+","+(0.6+d*0.15)+")";
  const gR=lerp(200,122,d),gG=lerp(149,79,d),gB=lerp(42,16,d);
  const gold="rgb("+gR+","+gG+","+gB+")";
  const goldLight=lerpHex(240,192,96, 94,58,8, d);
  const bA=(0.2+d*0.1);
  const border="rgba("+gR+","+gG+","+gB+","+bA+")";
  const borderGold="rgba("+gR+","+gG+","+gB+","+(bA*1.6)+")";
  const hR=lerp(13,180,d),hG=lerp(7,165,d),hB=lerp(5,140,d);
  const hdrBg="rgba("+hR+","+hG+","+hB+",.97)";

  root.style.setProperty("--bg0",bg0);
  root.style.setProperty("--bg1",bg1);
  root.style.setProperty("--bg2",bg2);
  root.style.setProperty("--text",text);
  root.style.setProperty("--text-dim",textDim);
  root.style.setProperty("--text-mid",textMid);
  root.style.setProperty("--gold",gold);
  root.style.setProperty("--gold-light",goldLight);
  root.style.setProperty("--border",border);
  root.style.setProperty("--border-gold",borderGold);
  root.style.setProperty("--parchment",text);
  root.style.setProperty("--hdr-bg",hdrBg);
  body.style.background=bg0;
}

// ─── INITIATIVE TRACKER ──────────────────────────────────────────────────────
function FloatingNotebook({me,isDM,charName}){
  const [open,setOpen]=useState(false);
  const [notebooks,setNBs]=useState([]);
  const [activeNb,setActiveNb]=useState(null);
  const [unlocked,setUnlocked]=useState({});
  const [passInput,setPassInput]=useState("");
  const [passErr,setPassErr]=useState(false);
  const [content,setContent]=useState({});
  const [saved,setSaved]=useState({});
  const saveTimers=useRef({});
  const dragRef=useRef(null);
  const posRef=useRef({x:0,y:0});

  useEffect(()=>{
    const load=async()=>{
      const data=await fbGet("notebooks");
      if(data) setNBs(Object.values(data).sort((a,b)=>a.createdAt-b.createdAt));
    };
    load();
    const iv=setInterval(load,5000);
    return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    if(!activeNb||!unlocked[activeNb.id])return;
    fbGet("nbcontent/"+activeNb.id).then(d=>{
      setContent(c=>({...c,[activeNb.id]:(d&&d.text)||""}));
    });
  },[activeNb,unlocked]);

  const tryUnlock=(nb)=>{
    if(passInput===nb.pass||isDM){
      setUnlocked(u=>({...u,[nb.id]:true}));setPassInput("");setPassErr(false);
    } else {setPassErr(true);setTimeout(()=>setPassErr(false),1500);}
  };

  const handleEdit=async(id,text)=>{
    setContent(c=>({...c,[id]:text}));
    clearTimeout(saveTimers.current[id]);
    saveTimers.current[id]=setTimeout(async()=>{
      const wc=text.trim()?text.trim().split(/\s+/).length:0;
      await fbSet("nbcontent/"+id,{text});
      await fbPatch("notebooks/"+id,{wordCount:wc});
      setSaved(s=>({...s,[id]:true}));
      setTimeout(()=>setSaved(s=>({...s,[id]:false})),1500);
    },700);
  };

  // Drag to move
  const onDragStart=(e)=>{
    const el=dragRef.current;
    if(!el)return;
    const rect=el.getBoundingClientRect();
    posRef.current={ox:e.clientX-rect.left,oy:e.clientY-rect.top};
    const onMove=(ev)=>{
      el.style.left=(ev.clientX-posRef.current.ox)+"px";
      el.style.top=(ev.clientY-posRef.current.oy)+"px";
      el.style.bottom="auto";
    };
    const onUp=()=>{document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);};
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  };

  const myNBs=notebooks.filter(nb=>nb.owner===me||isDM);

  return <>
    <div className="nb-float-btn">
      <button className="nb-float-toggle" onClick={()=>setOpen(o=>!o)} title="Not Defterleri">
        📓
        {myNBs.length>0&&<span className="nb-float-badge">{myNBs.length}</span>}
      </button>
    </div>
    {open&&<div className="floating-nb" ref={dragRef}>
      <div className="floating-nb-header" onMouseDown={onDragStart}>
        <span className="floating-nb-title">📓 Not Defterleri</span>
        <button onClick={()=>setOpen(false)} style={{background:"transparent",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:"1rem"}}>✕</button>
      </div>
      <div className="floating-nb-body">
        {!activeNb&&<>
          {notebooks.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".85rem",padding:"8px 0"}}>Henüz not defteri yok.</div>}
          {notebooks.map(nb=>(
            <div key={nb.id} className="nb-item" onClick={()=>setActiveNb(nb)}>
              <span className="nb-item-icon">{unlocked[nb.id]?"📖":"📓"}</span>
              <div className="nb-item-body">
                <div className="nb-item-name">{nb.name}</div>
                <div className="nb-item-meta">{nb.owner} · {nb.wordCount||0} kelime</div>
              </div>
              <span className="nb-item-lock">{unlocked[nb.id]?"🔓":nb.owner===me?"🔑":"🔒"}</span>
            </div>
          ))}
        </>}
        {activeNb&&<>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <button className="nb-btn cancel" style={{fontSize:".6rem",padding:"3px 8px"}} onClick={()=>setActiveNb(null)}>← Geri</button>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:".7rem",color:"var(--gold)"}}>{activeNb.name}</span>
          </div>
          {unlocked[activeNb.id]?(
            <div className="nb-editor">
              <textarea className="nb-textarea" style={{minHeight:200}}
                placeholder="Notlarını buraya yaz..."
                value={content[activeNb.id]||""}
                onChange={e=>handleEdit(activeNb.id,e.target.value)}
                disabled={activeNb.owner!==me&&!isDM}/>
              <div className="nb-footer">
                <span className="nb-wordcount">{(content[activeNb.id]||"").trim()?(content[activeNb.id].trim().split(/\s+/).length):0} kelime</span>
                <span className={"nb-save-ind"+(saved[activeNb.id]?" ok":"")}>{saved[activeNb.id]?"✓ Kaydedildi":"Otomatik..."}</span>
              </div>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:8,alignItems:"center",padding:"16px 0"}}>
              <span style={{fontSize:"1.8rem",opacity:.6}}>🔒</span>
              <input className="nb-input" type="password" placeholder="Şifre..."
                value={passInput} style={{maxWidth:180,textAlign:"center",borderColor:passErr?"#c03030":undefined}}
                onChange={e=>setPassInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&tryUnlock(activeNb)}/>
              {passErr&&<div style={{color:"#ff6060",fontSize:".75rem"}}>Yanlış şifre!</div>}
              <button className="nb-btn" onClick={()=>tryUnlock(activeNb)}>Kilidi Aç →</button>
            </div>
          )}
        </>}
      </div>
    </div>}
  </>;
}

function AvatarUpload({me,avatars,onUpload}){
  const fileRef=useRef(null);
  const myAvatar=avatars[me];
  const upload=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>500000){alert("Dosya 500KB'dan küçük olmalı!");return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const b64=ev.target.result;
      onUpload(b64);
    };
    reader.readAsDataURL(file);
  };
  return(
    <div className="avatar-wrap">
      {myAvatar
        ?<img src={myAvatar} className="avatar-img" alt="avatar" onClick={()=>fileRef.current.click()}/>
        :<div className="avatar-placeholder" onClick={()=>fileRef.current.click()}>🧙</div>}
      <button className="avatar-upload-btn" onClick={()=>fileRef.current.click()}>
        {myAvatar?"📷 Değiştir":"📷 Fotoğraf Ekle"}
      </button>
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={upload}/>
    </div>
  );
}

function Chat({me,role,all,avatars}){
  const [open,setOpen]=useState(false);
  const [messages,setMessages]=useState([]);
  const [text,setText]=useState("");
  const [target,setTarget]=useState("all");
  const [unread,setUnread]=useState(0);
  const [showClear,setShowClear]=useState(false);
  const [clearInput,setClearInput]=useState("");
  const lastMsgId=useRef(0);
  const bottomRef=useRef(null);
  const isDM=role==="dm";

  useEffect(()=>{
    const poll=async()=>{
      const data=await fbGet("chat");
      if(!data)return;
      const arr=Object.values(data).sort((a,b)=>a.id-b.id);
      // filter: show msg if: target=all, or i am sender, or i am recipient, or i am DM
      const visible=arr.filter(m=>{
        if(m.to==="all")return true;
        if(m.from===me)return true;
        if(m.to===me)return true;
        if(role==="dm")return true;
        return false;
      });
      const newOnes=visible.filter(m=>m.id>lastMsgId.current);
      if(newOnes.length){
        lastMsgId.current=Math.max(...newOnes.map(m=>m.id));
        setMessages(visible.slice(-60));
        if(!open) setUnread(u=>u+newOnes.filter(m=>m.from!==me).length);
      }
    };
    poll();
    const iv=setInterval(poll,2000);
    return()=>clearInterval(iv);
  },[open,me,role]);

  useEffect(()=>{
    if(open){setUnread(0);setTimeout(()=>bottomRef.current&&bottomRef.current.scrollIntoView({behavior:"smooth"}),100);}
  },[open,messages]);

  const send=async()=>{
    if(!text.trim())return;
    const id=ts();
    const msg={id,from:me,to:target,text:text.trim(),time:id};
    await fbSet(`chat/${id}`,msg);
    setText("");
    // trim
    const all2=await fbGet("chat");
    if(all2){const keys=Object.keys(all2).sort((a,b)=>Number(a)-Number(b));if(keys.length>200)for(const k of keys.slice(0,keys.length-200))await fbDel(`chat/${k}`);}
  };

  const clearChat=async()=>{
    if(clearInput!=="Temizle")return;
    await fbSet("chat",null);
    setMessages([]);setClearInput("");setShowClear(false);lastMsgId.current=0;
  };

  const others=all.filter(p=>p.name!==me).map(p=>p.name);

  const Avatar=({name,size=28})=>{
    const av=avatars[name];
    return av
      ?<img src={av} className="chat-avatar" style={{width:size,height:size}} alt={name}/>
      :<div className="chat-avatar-placeholder" style={{width:size,height:size}}>{name[0]||"?"}</div>;
  };

  return(
    <>
      {open&&(
        <div className="chat-panel">
          <div className="chat-header">
            <span className="chat-header-title">💬 Tavern Chat</span>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {isDM&&<button onClick={()=>{setShowClear(s=>!s);setClearInput("");}} style={{background:"transparent",border:"none",color:showClear?"#ff9090":"rgba(200,149,42,.3)",cursor:"pointer",fontSize:".75rem",padding:"2px 4px"}} title="Sohbeti Temizle">🗑</button>}
              <button className="chat-header-close" onClick={()=>setOpen(false)}>✕</button>
            </div>
          </div>
          {showClear&&isDM&&(
            <div style={{padding:"8px 12px",borderBottom:"1px solid rgba(139,26,26,.2)",background:"rgba(139,26,26,.06)"}}>
              <div style={{fontSize:".68rem",color:"rgba(255,120,120,.7)",marginBottom:6,fontStyle:"italic"}}>Tüm mesajları silmek için <strong style={{color:"#ff9090"}}>Temizle</strong> yaz:</div>
              <div style={{display:"flex",gap:6}}>
                <input value={clearInput} onChange={e=>setClearInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&clearChat()}
                  placeholder="Temizle" style={{flex:1,background:"rgba(139,26,26,.1)",border:"1px solid rgba(139,26,26,.3)",borderRadius:5,padding:"4px 8px",color:"var(--parchment)",fontFamily:"'Cinzel',serif",fontSize:".7rem",outline:"none"}}/>
                <button onClick={clearChat} disabled={clearInput!=="Temizle"}
                  style={{background:clearInput==="Temizle"?"rgba(139,26,26,.25)":"rgba(139,26,26,.06)",border:"1px solid rgba(139,26,26,.3)",borderRadius:5,padding:"4px 10px",cursor:clearInput==="Temizle"?"pointer":"not-allowed",color:clearInput==="Temizle"?"#ff9090":"rgba(200,100,100,.3)",fontFamily:"'Cinzel',serif",fontSize:".62rem",transition:"all .2s"}}>
                  Sil
                </button>
              </div>
            </div>
          )}
          <div className="chat-messages">
            {messages.length===0&&<div className="chat-empty">Henüz mesaj yok.<br/>Merhaba de! 👋</div>}
            {messages.map(m=>{
              const isMine=m.from===me;
              const isWhisper=m.to!=="all";
              const time=new Date(m.time).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
              return(
                <div key={m.id} className={`chat-msg${isMine?" mine":""}${isWhisper?" chat-whisper":""}`}>
                  <Avatar name={m.from}/>
                  <div className="chat-bubble-body">
                    <div className="chat-sender">
                      {m.from}{isWhisper&&!isMine?` → ${m.to==="all"?"Herkes":m.to}`:""}
                      {isWhisper&&isMine?` → ${m.to}`:""}
                    </div>
                    <div className="chat-text">{m.text}</div>
                    <div className="chat-time">{time}</div>
                  </div>
                </div>
              );
            })}
            <div ref={bottomRef}/>
          </div>
          <div className="chat-input-area">
            <select className="chat-whisper-select" value={target} onChange={e=>setTarget(e.target.value)}>
              <option value="all">📢 Herkese</option>
              {others.map(p=><option key={p} value={p}>🤫 Sadece {p}</option>)}
            </select>
            <div className="chat-input-row">
              <textarea className="chat-input" rows={1} placeholder="Mesaj yaz..." value={text}
                onChange={e=>setText(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}/>
              <button className="chat-send" onClick={send}>➤</button>
            </div>
          </div>
        </div>
      )}
      <div className="chat-bubble">
        <button className="chat-toggle" onClick={()=>setOpen(o=>!o)}>
          {open?"✕":"💬"}
          {!open&&unread>0&&<span className="chat-badge">{unread>9?"9+":unread}</span>}
        </button>
      </div>
    </>
  );
}

// ─── AMBİYANS (YouTube) ──────────────────────────────────────────────────────
const ytIdFromUrl=url=>{
  if(!url)return null;
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
};

function Ambiance({isDM}){
  const [open,setOpen]=useState(false);
  const [url,setUrl]=useState("");
  const [status,setStatus]=useState("idle"); // idle|loading|playing|paused|error
  const [myVol,setMyVol]=useState(70);
  const [synced,setSynced]=useState(false);
  const [savedLinks,setSavedLinks]=useState(()=>{try{return JSON.parse(localStorage.getItem("jukebox_sc")||"[]");}catch{return[];}});
  const [showMgr,setShowMgr]=useState(false);
  const [scLabel,setScLabel]=useState("");
  const [scUrl,setScUrl]=useState("");

  // Firebase state
  const [fbData,setFbData]=useState({ytId:null,startedAt:0,pausedAt:null,dmVol:70,state:"idle"});
  const lastFbRef=useRef(null);
  const playerRef=useRef(null);
  const pollRef=useRef(null);

  // Poll Firebase ambiance state
  useEffect(()=>{
    const poll=async()=>{
      const data=await fbGet("ambiance");
      const key=JSON.stringify(data);
      if(key===lastFbRef.current)return;
      lastFbRef.current=key;
      const d=data||{ytId:null,startedAt:0,pausedAt:null,dmVol:70,state:"idle"};
      setFbData(d);
    };
    poll();
    pollRef.current=setInterval(poll,2500);
    return()=>clearInterval(pollRef.current);
  },[]);

  // Load YT API
  useEffect(()=>{
    if(window.YT)return;
    const tag=document.createElement("script");
    tag.src="https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  },[]);

  const destroyPlayer=()=>{
    if(playerRef.current){try{playerRef.current.destroy();}catch{}playerRef.current=null;}
    const old=document.querySelectorAll("[id^='yt-jb-']");
    old.forEach(el=>el.remove());
  };

  const createPlayer=(ytId,seekTo,vol,autoplay)=>{
    destroyPlayer();
    setStatus("loading");
    const div=document.createElement("div");
    div.id="yt-jb-"+Date.now();
    div.style.cssText="position:fixed;bottom:-200px;width:1px;height:1px;opacity:0;pointer-events:none;";
    document.body.appendChild(div);
    const go=()=>{
      playerRef.current=new window.YT.Player(div.id,{
        videoId:ytId,
        playerVars:{autoplay:autoplay?1:0,loop:1,playlist:ytId,start:Math.floor(seekTo||0),controls:0,disablekb:1,fs:0},
        events:{
          onReady:(e)=>{
            e.target.setVolume(vol!=null?vol:myVol);
            if(autoplay)e.target.playVideo();
            else{e.target.pauseVideo();}
            setStatus(autoplay?"playing":"paused");
          },
          onError:()=>setStatus("error"),
          onStateChange:(e)=>{
            if(e.data===0)e.target.playVideo(); // loop
          }
        }
      });
    };
    if(window.YT&&window.YT.Player)go();
    else window.onYouTubeIframeAPIReady=go;
  };

  // React to Firebase changes (player side)
  const prevFbState=useRef(null);
  useEffect(()=>{
    if(isDM)return;
    const prev=prevFbState.current;
    const cur=fbData;
    prevFbState.current=cur;

    const vol=synced?(cur.dmVol||70):myVol;

    // No video
    if(!cur.ytId){
      if(playerRef.current){destroyPlayer();setStatus("idle");}
      return;
    }

    // New video started
    if(!prev||prev.ytId!==cur.ytId){
      const elapsed=(ts()-cur.startedAt)/1000;
      const seek=cur.pausedAt?((cur.pausedAt-cur.startedAt)/1000):elapsed%3600;
      createPlayer(cur.ytId,seek,vol,cur.state==="playing");
      return;
    }

    // State changed: play/pause
    if(prev&&prev.state!==cur.state&&playerRef.current){
      try{
        if(cur.state==="playing")playerRef.current.playVideo();
        else if(cur.state==="paused")playerRef.current.pauseVideo();
      }catch{}
      setStatus(cur.state==="playing"?"playing":"paused");
    }

    // Volume changed (synced)
    if(synced&&prev&&prev.dmVol!==cur.dmVol&&playerRef.current){
      try{playerRef.current.setVolume(cur.dmVol||70);}catch{}
      setMyVol(cur.dmVol||70);
    }
  },[fbData,isDM,synced]);

  // Apply my volume when synced changes
  useEffect(()=>{
    if(isDM||!playerRef.current)return;
    const v=synced?fbData.dmVol||70:myVol;
    try{playerRef.current.setVolume(v);}catch{}
  },[synced]);

  useEffect(()=>()=>destroyPlayer(),[]);

  // DM actions
  const play=async(ytUrl)=>{
    const ytId=ytIdFromUrl(ytUrl||url);
    if(!ytId){setStatus("error");setTimeout(()=>setStatus("idle"),2000);return;}
    const data={ytId,startedAt:ts(),pausedAt:null,dmVol:fbData.dmVol||myVol,state:"playing"};
    await fbSet("ambiance",data);
    setUrl("");
    createPlayer(ytId,0,data.dmVol,true);
  };

  const pause=async()=>{
    if(!playerRef.current)return;
    let elapsed=0;
    try{elapsed=playerRef.current.getCurrentTime();}catch{}
    const pausedAt=fbData.startedAt+(elapsed*1000);
    await fbPatch("ambiance",{state:"paused",pausedAt});
    try{playerRef.current.pauseVideo();}catch{}
    setStatus("paused");
  };

  const resume=async()=>{
    await fbPatch("ambiance",{state:"playing",pausedAt:null});
    try{playerRef.current.playVideo();}catch{}
    setStatus("playing");
  };

  const stop=async()=>{
    await fbSet("ambiance",{ytId:null,startedAt:0,pausedAt:null,dmVol:fbData.dmVol||70,state:"idle"});
    destroyPlayer();setStatus("idle");setUrl("");
  };

  const changeDMVol=async(v)=>{
    setMyVol(v);
    if(playerRef.current)try{playerRef.current.setVolume(v);}catch{}
    await fbPatch("ambiance",{dmVol:v});
  };

  const saveLink=()=>{
    if(!scLabel.trim()||!scUrl.trim())return;
    const ns=[...savedLinks,{label:scLabel.trim(),url:scUrl.trim()}];
    setSavedLinks(ns);localStorage.setItem("jukebox_sc",JSON.stringify(ns));
    setScLabel("");setScUrl("");
  };
  const deleteLink=(i)=>{
    const ns=savedLinks.filter((_,j)=>j!==i);
    setSavedLinks(ns);localStorage.setItem("jukebox_sc",JSON.stringify(ns));
  };

  const nowPlaying=!!fbData.ytId;
  const isPlaying=fbData.state==="playing";
  const isPaused=fbData.state==="paused";
  const dmVol=fbData.dmVol||70;

  // ─── PLAYER UI ───────────────────────────────────────────────
  if(!isDM){
    return(
      <div style={{position:"fixed",bottom:22,left:22,zIndex:500}}>
        <button className={"amb-toggle"+(nowPlaying?" playing":"")} onClick={()=>setOpen(o=>!o)} title="Jukebox">🎵</button>
        {open&&(
          <div style={{position:"absolute",bottom:64,left:0,width:265,background:"var(--bg1)",border:"1px solid rgba(91,155,213,.3)",borderRadius:12,padding:16,boxShadow:"0 8px 40px rgba(0,0,0,.7)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",letterSpacing:".15em",color:"#90b8f0"}}>🎵 JUKEBOX</span>
              <button onClick={()=>setOpen(false)} style={{background:"transparent",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:"1rem",lineHeight:1}}>✕</button>
            </div>

            {!nowPlaying&&<div style={{fontSize:".78rem",color:"var(--text-dim)",fontStyle:"italic",textAlign:"center",padding:"12px 0"}}>DM henüz bir şey başlatmadı...</div>}

            {nowPlaying&&<>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"7px 10px",background:"rgba(91,155,213,.07)",border:"1px solid rgba(91,155,213,.15)",borderRadius:7}}>
                <span style={{fontSize:"1rem",animation:isPlaying?"amb-pulse 2s infinite":"none"}}>♪</span>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:".6rem",color:"#90b8f0"}}>{isPlaying?"ÇALIYOR":isPaused?"DURAKLATILDI":"..."}</div>
                  <a href={"https://youtube.com/watch?v="+fbData.ytId} target="_blank" rel="noopener noreferrer" style={{fontSize:".65rem",color:"rgba(91,155,213,.6)",textDecoration:"none"}}>youtu.be/{fbData.ytId}</a>
                </div>
              </div>

              <div style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:".65rem"}}>
                  <span style={{color:"var(--text-dim)"}}>🔊 Ses</span>
                  <span style={{fontFamily:"monospace",color:"var(--gold)"}}>{synced?dmVol:myVol}</span>
                </div>
                <div style={{position:"relative",display:"flex",alignItems:"center"}}>
                  <input type="range" min={0} max={100} value={synced?dmVol:myVol}
                    className="amb-vol-slider" style={{width:"100%"}}
                    disabled={synced}
                    onChange={e=>{const v=Number(e.target.value);setMyVol(v);if(playerRef.current)try{playerRef.current.setVolume(v);}catch{}}}/>
                  {!synced&&<div style={{position:"absolute",left:dmVol+"%",top:"50%",transform:"translate(-50%,-50%)",width:11,height:11,borderRadius:"50%",background:"var(--gold)",border:"2px solid var(--gold-light)",boxShadow:"0 0 5px rgba(200,149,42,.6)",pointerEvents:"none"}}/>}
                </div>
                {!synced&&<div style={{fontSize:".6rem",color:"rgba(200,149,42,.4)",marginTop:3}}>● DM önerisi: {dmVol}</div>}
              </div>

              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",background:synced?"rgba(91,155,213,.1)":"rgba(0,0,0,.15)",borderRadius:6,border:"1px solid "+(synced?"rgba(91,155,213,.3)":"rgba(200,149,42,.1)")}}>
                <div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:".63rem",color:synced?"#90b8f0":"var(--text-dim)"}}>DM Senkronu</div>
                  <div style={{fontSize:".6rem",color:"var(--text-dim)",marginTop:1}}>{synced?"DM ses seviyesini takip ediyor":"Manuel kontrol"}</div>
                </div>
                <label className="toggle">
                  <input type="checkbox" checked={synced} onChange={e=>{
                    const v=e.target.checked;
                    setSynced(v);
                    if(v&&playerRef.current){try{playerRef.current.setVolume(dmVol);}catch{}setMyVol(dmVol);}
                  }}/>
                  <div className="toggle-track"/>
                  <div className="toggle-thumb"/>
                </label>
              </div>
            </>}
          </div>
        )}
      </div>
    );
  }

  // ─── DM UI ───────────────────────────────────────────────────
  return(
    <>
      {open&&(
        <div style={{position:"fixed",bottom:84,left:22,width:300,background:"var(--bg1)",border:"1px solid rgba(91,155,213,.3)",borderRadius:12,padding:18,boxShadow:"0 8px 40px rgba(0,0,0,.7)",zIndex:499}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:".7rem",letterSpacing:".18em",color:"#90b8f0"}}>🎵 JUKEBOX</span>
            <button onClick={()=>setOpen(false)} style={{background:"transparent",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:"1rem",lineHeight:1}}>✕</button>
          </div>

          {/* Kısayollar */}
          {savedLinks.length>0&&<div style={{marginBottom:12}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:".52rem",letterSpacing:".15em",color:"rgba(91,155,213,.5)",marginBottom:5,textTransform:"uppercase"}}>Kısayollar</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {savedLinks.map((sc,i)=>(
                <button key={i} onClick={()=>play(sc.url)}
                  style={{background:"rgba(91,155,213,.08)",border:"1px solid rgba(91,155,213,.25)",borderRadius:14,padding:"4px 10px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".6rem",color:"#a8c8f8",transition:"all .2s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(91,155,213,.2)"}
                  onMouseLeave={e=>e.currentTarget.style.background="rgba(91,155,213,.08)"}>
                  ▶ {sc.label}
                </button>
              ))}
            </div>
          </div>}

          {/* Aktif oynatıcı */}
          {nowPlaying?(
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(91,155,213,.07)",border:"1px solid rgba(91,155,213,.15)",borderRadius:8,padding:"8px 10px",marginBottom:10}}>
                <span style={{fontSize:"1.1rem",animation:isPlaying?"amb-pulse 2s infinite":"none"}}>♪</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:".58rem",color:"#90b8f0",marginBottom:2}}>{isPlaying?"ÇALIYOR":isPaused?"DURAKLATILDI":"..."}</div>
                  <a href={"https://youtube.com/watch?v="+fbData.ytId} target="_blank" rel="noopener noreferrer" style={{fontSize:".7rem",color:"#a8c8f8",textDecoration:"none",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>youtu.be/{fbData.ytId}</a>
                </div>
                {/* Oynatma kontrolleri */}
                <div style={{display:"flex",gap:4,flexShrink:0}}>
                  {isPlaying
                    ?<button onClick={pause} title="Duraklat" style={{width:28,height:28,borderRadius:5,background:"rgba(91,155,213,.1)",border:"1px solid rgba(91,155,213,.25)",cursor:"pointer",color:"#90b8f0",fontSize:".85rem",display:"flex",alignItems:"center",justifyContent:"center"}}>⏸</button>
                    :<button onClick={resume} title="Devam et" style={{width:28,height:28,borderRadius:5,background:"rgba(76,175,125,.1)",border:"1px solid rgba(76,175,125,.25)",cursor:"pointer",color:"#7ef0a0",fontSize:".85rem",display:"flex",alignItems:"center",justifyContent:"center"}}>▶</button>}
                  <button onClick={stop} title="Durdur" style={{width:28,height:28,borderRadius:5,background:"rgba(139,26,26,.1)",border:"1px solid rgba(139,26,26,.3)",cursor:"pointer",color:"#ff9090",fontSize:".85rem",display:"flex",alignItems:"center",justifyContent:"center"}}>⏹</button>
                </div>
              </div>
              <div style={{marginBottom:5,display:"flex",justifyContent:"space-between",fontSize:".63rem"}}>
                <span style={{color:"var(--text-dim)"}}>🔊 Ses Seviyesi</span>
                <span style={{color:"var(--gold)",fontFamily:"monospace"}}>{dmVol}%</span>
              </div>
              <input type="range" min={0} max={100} value={dmVol} className="amb-vol-slider" style={{width:"100%",marginBottom:4}} onChange={e=>changeDMVol(Number(e.target.value))}/>
              <div style={{fontSize:".6rem",color:"rgba(91,155,213,.4)",fontStyle:"italic"}}>Oyuncular bu seviyeyi görebilir</div>
            </div>
          ):(
            <div style={{marginBottom:14}}>
              <input className="nb-input" placeholder="YouTube linki yapıştır..." value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>e.key==="Enter"&&play()} style={{marginBottom:8}}/>
              {status==="error"&&<div style={{color:"#ff6060",fontSize:".7rem",marginBottom:6}}>⚠ Geçersiz link!</div>}
              <button onClick={()=>play()} disabled={!url.trim()} style={{width:"100%",background:url.trim()?"rgba(91,155,213,.12)":"rgba(91,155,213,.04)",border:"1px solid "+(url.trim()?"rgba(91,155,213,.35)":"rgba(91,155,213,.12)"),borderRadius:7,color:url.trim()?"#a8c8f8":"rgba(91,155,213,.3)",fontFamily:"'Cinzel',serif",fontSize:".68rem",letterSpacing:".1em",padding:"9px",cursor:url.trim()?"pointer":"not-allowed",transition:"all .2s"}}>▶ BAŞLAT</button>
            </div>
          )}

          {/* Kısayol yönetimi */}
          <div style={{borderTop:"1px solid rgba(91,155,213,.1)",paddingTop:10}}>
            <button onClick={()=>setShowMgr(s=>!s)} style={{background:"transparent",border:"none",color:"rgba(91,155,213,.4)",fontFamily:"'Cinzel',serif",fontSize:".55rem",letterSpacing:".1em",cursor:"pointer",textTransform:"uppercase",display:"flex",alignItems:"center",gap:5}}>
              {showMgr?"▲":"▶"} Kısayol Yönet
            </button>
            {showMgr&&<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:6}}>
              <input className="nb-input" placeholder="İsim (ör. Tavern)" value={scLabel} onChange={e=>setScLabel(e.target.value)}/>
              <input className="nb-input" placeholder="YouTube URL" value={scUrl} onChange={e=>setScUrl(e.target.value)}/>
              <button onClick={saveLink} disabled={!scLabel.trim()||!scUrl.trim()} style={{background:"rgba(91,155,213,.1)",border:"1px solid rgba(91,155,213,.25)",borderRadius:5,color:"#a8c8f8",fontFamily:"'Cinzel',serif",fontSize:".62rem",padding:"6px",cursor:"pointer"}}>+ Ekle</button>
              {savedLinks.map((sc,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:".7rem"}}>
                  <span style={{color:"var(--text-dim)"}}>{sc.label}</span>
                  <button onClick={()=>deleteLink(i)} style={{background:"transparent",border:"none",color:"rgba(180,40,40,.5)",cursor:"pointer",fontSize:".8rem"}}>✕</button>
                </div>
              ))}
            </div>}
          </div>
        </div>
      )}
      <div className="amb-bar">
        <button className={"amb-toggle"+(nowPlaying?" playing":"")} onClick={()=>setOpen(o=>!o)} title="Jukebox">🎵</button>
      </div>
    </>
  );
}

function WaitingRoom({me,all,isDM,avatars}){
  const [messages,setMessages]=useState([]);
  const [text,setText]=useState("");
  const [reaction,setReaction]=useState(null);
  const [reactionAnim,setReactionAnim]=useState(null);
  const [trivia,setTrivia]=useState(null);
  const lastRef=useRef(0);
  const bottomRef=useRef(null);

  const REACTIONS=["😂","🎲","⚔️","🐉","✨","💀","🤝","🎶","🔥","💫"];
  const TRIVIA=[
    {q:"D&D hangi yıl ilk yayınlandı?",a:"1974"},
    {q:"Bir d20'nin maksimum değeri nedir?",a:"20"},
    {q:"En güçlü ejderha tipi nedir?",a:"Kırmızı veya Gold"},
    {q:"Bard sınıfının ana özelliği nedir?",a:"Karizm"},
    {q:"Goblin'lerin seviyesi genellikle kaçtır?",a:"1/4 CR"},
    {q:"Saving throw kaç tür vardır?",a:"6"},
    {q:"Advantage atışında kaç zar atılır?",a:"2, yüksek alınır"},
    {q:"Critical hit için d20'de ne çıkmalı?",a:"20"},
    {q:"Resting türleri nelerdir?",a:"Short ve Long Rest"},
    {q:"Concentration büyüsü kırılırsa ne olur?",a:"Büyü sona erer"},
  ];

  useEffect(()=>{
    const poll=async()=>{
      const data=await fbGet("waitroom");
      if(!data)return;
      const arr=Object.values(data).sort((a,b)=>a.id-b.id);
      const newOnes=arr.filter(m=>m.id>lastRef.current);
      if(newOnes.length){lastRef.current=Math.max(...newOnes.map(m=>m.id));setMessages(arr.slice(-80));}
    };
    poll();const iv=setInterval(poll,2000);return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{if(bottomRef.current)bottomRef.current.scrollIntoView({behavior:"smooth"});},[messages]);

  const send=async()=>{
    if(!text.trim())return;
    const id=ts();await fbSet("waitroom/"+id,{id,from:me,text:text.trim(),type:"msg"});
    setText("");
  };

  const sendReaction=async(emoji)=>{
    const id=ts();await fbSet("waitroom/"+id,{id,from:me,text:emoji,type:"reaction"});
    setReactionAnim(emoji);setTimeout(()=>setReactionAnim(null),1200);
  };

  const rollDice=async()=>{
    const raw=Math.floor(Math.random()*20)+1;
    const id=ts();await fbSet("waitroom/"+id,{id,from:me,text:"🎲 d20 attı → "+raw+(raw===20?" ✨CRIT!":raw===1?" 💀FAIL!":""),type:"roll",val:raw});
  };

  const pickTrivia=()=>setTrivia(TRIVIA[Math.floor(Math.random()*TRIVIA.length)]);

  return(
    <div className="panel" style={{paddingBottom:16,display:"flex",flexDirection:"column",gap:0,height:"100%"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:"1rem",fontWeight:700,color:"var(--gold)",letterSpacing:".15em",marginBottom:4}}>🏠 Bekleme Odası</div>
      <div style={{fontSize:".78rem",color:"var(--text-dim)",fontStyle:"italic",marginBottom:14}}>Oturum başlayana kadar burada takılın!</div>

      {/* Trivia */}
      <div style={{background:"rgba(200,149,42,.06)",border:"1px solid rgba(200,149,42,.18)",borderRadius:8,padding:12,marginBottom:12}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:".6rem",color:"var(--gold)",letterSpacing:".1em",marginBottom:6}}>🧠 D&D TRİVİA</div>
        {trivia?(
          <div>
            <div style={{fontSize:".85rem",color:"var(--parchment)",marginBottom:8}}>{trivia.q}</div>
            <button onClick={()=>setTrivia({...trivia,show:true})} style={{background:"rgba(200,149,42,.08)",border:"1px solid rgba(200,149,42,.2)",borderRadius:5,padding:"4px 12px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".62rem",color:"var(--gold)"}}>
              {trivia.show?"→ "+trivia.a:"Cevabı Gör"}
            </button>
            <button onClick={pickTrivia} style={{background:"transparent",border:"none",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".6rem",color:"var(--text-dim)",marginLeft:8}}>↻ Yeni</button>
          </div>
        ):(
          <button onClick={pickTrivia} style={{background:"rgba(200,149,42,.08)",border:"1px solid rgba(200,149,42,.2)",borderRadius:6,padding:"6px 14px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".65rem",color:"var(--gold)"}}>Soru Getir</button>
        )}
      </div>

      {/* Online oyuncular */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        {all.map(p=>{
          const av=avatars&&avatars[p.name];
          return(
            <div key={p.name} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{width:36,height:36,borderRadius:"50%",overflow:"hidden",border:"2px solid rgba(200,149,42,.3)",background:"rgba(200,149,42,.08)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {av?<img src={av} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:"1rem"}}>🧙</span>}
              </div>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:".42rem",color:"rgba(200,149,42,.5)",textAlign:"center",maxWidth:40,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(p.char&&p.char.name)||p.name}</span>
            </div>
          );
        })}
      </div>

      {/* Chat */}
      <div style={{flex:1,background:"rgba(0,0,0,.2)",borderRadius:8,border:"1px solid rgba(200,149,42,.12)",padding:10,overflowY:"auto",marginBottom:8,minHeight:120,maxHeight:280}}>
        {messages.length===0&&<div style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:".78rem",textAlign:"center",padding:"12px 0"}}>Henüz mesaj yok 👋</div>}
        {messages.map(m=>{
          const isMe=m.from===me;
          const av=avatars&&avatars[m.from];
          if(m.type==="reaction")return <div key={m.id} style={{textAlign:"center",fontSize:"1.8rem",margin:"4px 0",animation:"fp .3s"}}>{m.text}</div>;
          if(m.type==="roll")return <div key={m.id} style={{textAlign:"center",fontSize:".78rem",color:"var(--gold)",fontFamily:"'Cinzel',serif",margin:"5px 0",fontStyle:"italic"}}>{m.from} {m.text}</div>;
          return(
            <div key={m.id} style={{display:"flex",gap:7,marginBottom:6,flexDirection:isMe?"row-reverse":"row",alignItems:"flex-end"}}>
              <div style={{width:26,height:26,borderRadius:"50%",overflow:"hidden",flexShrink:0,background:"rgba(200,149,42,.1)",border:"1px solid rgba(200,149,42,.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {av?<img src={av} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:".7rem"}}>🧙</span>}
              </div>
              <div style={{maxWidth:"72%"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:".55rem",color:"rgba(200,149,42,.5)",marginBottom:2,textAlign:isMe?"right":"left"}}>{m.from}</div>
                <div style={{background:isMe?"rgba(200,149,42,.12)":"rgba(255,255,255,.05)",border:"1px solid "+(isMe?"rgba(200,149,42,.2)":"rgba(200,149,42,.1)"),borderRadius:isMe?"10px 2px 10px 10px":"2px 10px 10px 10px",padding:"6px 10px",fontSize:".82rem",color:"var(--parchment)",lineHeight:1.4,wordBreak:"break-word"}}>{m.text}</div>
              </div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>

      {/* Reaksiyon bar */}
      <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
        {REACTIONS.map(e=>(
          <button key={e} onClick={()=>sendReaction(e)} style={{background:"transparent",border:"1px solid rgba(200,149,42,.12)",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:"1rem",transition:"all .15s"}} onMouseEnter={ev=>ev.currentTarget.style.background="rgba(200,149,42,.1)"} onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>{e}</button>
        ))}
        <button onClick={rollDice} style={{background:"rgba(200,149,42,.08)",border:"1px solid rgba(200,149,42,.2)",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".6rem",color:"var(--gold)",marginLeft:"auto"}}>🎲 Zar At</button>
      </div>

      {/* Input */}
      <div style={{display:"flex",gap:6}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Bir şeyler yaz..." style={{flex:1,background:"rgba(200,149,42,.05)",border:"1px solid rgba(200,149,42,.2)",borderRadius:7,padding:"8px 12px",color:"var(--parchment)",fontFamily:"'Crimson Text',serif",fontSize:".92rem",outline:"none"}}/>
        <button onClick={send} style={{background:"rgba(200,149,42,.12)",border:"1px solid rgba(200,149,42,.3)",borderRadius:7,padding:"0 14px",cursor:"pointer",color:"var(--gold)",fontSize:"1rem"}}>➤</button>
      </div>

      {reactionAnim&&<div style={{position:"fixed",top:"40%",left:"50%",transform:"translate(-50%,-50%)",fontSize:"5rem",pointerEvents:"none",animation:"fp .3s ease-out",zIndex:999}}>{reactionAnim}</div>}

      {isDM&&<div style={{marginTop:12,borderTop:"1px solid rgba(200,149,42,.1)",paddingTop:10}}>
        <button onClick={async()=>{await fbSet("waitroom",null);setMessages([]);lastRef.current=0;}} style={{background:"transparent",border:"1px solid rgba(139,26,26,.25)",borderRadius:5,padding:"5px 12px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".6rem",color:"rgba(255,100,100,.5)"}}>🗑 Sohbeti Temizle</button>
      </div>}
    </div>
  );
}

  return <>
    <div className="settings-overlay" onClick={onClose}>
      <div className="settings-panel" onClick={e=>e.stopPropagation()}>

          ⚙ Ayarlar
          <button className="settings-close" onClick={onClose}>✕ Kapat</button>

          <div className="settings-section-title">Site Teması</div>

            <button className={`theme-btn${isLight?" on":""}`} onClick={()=>{setDarkness(100);applyTheme(100);}}>☀️ Açık</button>

              style={{background:`linear-gradient(to right,#1a0f00 0%,var(--parchment) 100%)`}}
              onChange={e=>{const v=Number(e.target.value);setDarkness(v);applyTheme(v);}}
            />
          </div>
        </div>

        <div className="settings-section">
          <div className="settings-section-title">Animasyonlar</div>
          <div className="toggle-row">
            <div>
              <div className="toggle-label">✨ Crit Animasyonları</div>
              <div className="toggle-sub">Havai fişek & duman efektleri</div>
            </div>
            <label className="toggle">
              <input type="checkbox" checked={animOn} onChange={e=>setAnimOn(e.target.checked)}/>
              <div className="toggle-track"/>
              <div className="toggle-thumb"/>
            </label>
          </div>
        </div>

        <div style={{borderTop:"1px solid rgba(200,149,42,.1)",paddingTop:16,marginTop:4}}>
          <button onClick={onLogout} style={{
            width:"100%",background:"rgba(139,26,26,.1)",border:"1px solid rgba(139,26,26,.35)",
            borderRadius:6,color:"#ff9090",fontFamily:"'Cinzel',serif",fontSize:".72rem",
            letterSpacing:".12em",padding:"10px",cursor:"pointer",textTransform:"uppercase",
            transition:"all .2s"
          }}
          onMouseEnter={e=>e.currentTarget.style.background="rgba(139,26,26,.2)"}
          onMouseLeave={e=>e.currentTarget.style.background="rgba(139,26,26,.1)"}>
            ⇠ Çıkış Yap
          </button>
        </div>
      </div>
    </div>
  </>;
}

function App(){
  const ss=window.sessionStorage;
  const [phase,setPhase]=useState(()=>ss.getItem("tr_phase")||"lobby");
  const [name,setName]=useState(()=>ss.getItem("tr_name")||"");
  const [role,setRole]=useState(()=>ss.getItem("tr_role")||"player");
  const [tab,setTab]=useState("dice");
  const [waitRoomActive,setWaitRoomActive]=useState(false);
  const [char,setChar]=useState(()=>{try{const c=ss.getItem("tr_char");return c?JSON.parse(c):iChar();}catch{return iChar();}});
  const [npcs,setNpcs]=useState([]);
  const [all,setAll]=useState([]);
  const [rolls,setRolls]=useState({latest:null,feed:[],akey:0});
  const [dmPass,setDmPass]=useState("");
  const [dmErr,setDmErr]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [darkness,setDarkness]=useState(()=>{const v=localStorage.getItem("tr_dark");return v?Number(v):0;});
  const [animOn,setAnimOn]=useState(()=>localStorage.getItem("tr_anim")!=="0");
  const [avatars,setAvatars]=useState({});

  // Apply saved theme on mount
  useEffect(()=>{applyTheme(darkness);},[]);
  useEffect(()=>{localStorage.setItem("tr_dark",darkness);},[darkness]);
  useEffect(()=>{localStorage.setItem("tr_anim",animOn?"1":"0");},[animOn]);
  const lastRid=useRef(0);
  const cst=useRef(null);

  // Persist session (survives F5, cleared on tab close)
  useEffect(()=>{ss.setItem("tr_phase",phase);},[phase]);
  useEffect(()=>{ss.setItem("tr_name",name);},[name]);
  useEffect(()=>{ss.setItem("tr_role",role);},[role]);
  useEffect(()=>{try{ss.setItem("tr_char",JSON.stringify(char));}catch{}},[char]);

  useEffect(()=>{
    if(phase!=="game")return;
    // Register self immediately & include self in all list right away
    const selfEntry={name,role,lastSeen:ts(),loginAt:ts(),char};
    fbSet(`players/${name}`,{name,role,lastSeen:ts(),loginAt:ts()});
    fbSet(`chars/${name}`,char);
    setAll([selfEntry]);
    const hb=setInterval(()=>fbPatch(`players/${name}`,{lastSeen:ts()}),4000);
    // Poll waitroom active state
    const wrPoll=setInterval(async()=>{
      const d=await fbGet("waitRoomActive");
      setWaitRoomActive(!!d);
    },3000);
    fbGet("waitRoomActive").then(d=>setWaitRoomActive(!!d));
    // Activity tracker — tıklama/tuş = aktif
    const onActivity=()=>fbPatch(`players/${name}`,{lastActive:ts()});
    document.addEventListener("click",onActivity,{passive:true});
    document.addEventListener("keydown",onActivity,{passive:true});

    // Kick check — oyuncu kick edilirse lobby'ye gönder
    const pollKick=async()=>{
      const kicked=await fbGet(`kicked/${name}`);
      if(kicked&&kicked.at){
        await fbDel(`kicked/${name}`);
        ss.clear();
        setPhase("lobby");
        setName("");
        setRole("player");
      }
    };
    pollKick();
    const kickPoll=setInterval(pollKick,3000);

    // Rolls: polling her 2sn
    const pollRolls=async()=>{
      const data=await fbGet("rolls");
      if(!data)return;
      const arr=Object.values(data).sort((a,b)=>a.id-b.id);
      const nw=arr.filter(r=>r.id>lastRid.current);
      if(nw.length){
        lastRid.current=Math.max(...nw.map(r=>r.id));
        setRolls({latest:nw[nw.length-1],feed:arr.slice(-30).reverse(),akey:Date.now()});
      }
    };
    pollRolls();
    const rollPoll=setInterval(pollRolls,2000);

    // Players: polling (SSE unreliable for this)
    const pollPlayers=async()=>{
      const data=await fbGet("players");
      if(!data)return;
      const now=ts();
      const alive=Object.values(data).filter(p=>now-(p.lastSeen||0)<12000);
      const charData=await fbGet("chars");
      setAll(alive.map(p=>({...p,away:now-(p.lastActive||p.lastSeen||0)>180000,char:(charData&&charData[p.name])||iChar(p.name)})));
    };
    pollPlayers();
    const playerPoll=setInterval(pollPlayers,3000);

    // Chars & npcs: SSE (these work fine)
    // Avatars: SSE
    const unA=fbListen("avatars",data=>{
      if(!data)return;
      setAvatars(data);
    });

    const unC=fbListen("chars",data=>{
      if(!data)return;
      if(data[name])setChar(data[name]);
      setAll(prev=>prev.map(p=>({...p,char:data[p.name]||p.char})));
    });
    const unN=fbListen("npcs",data=>{
      if(!data){setNpcs([]);return;}
      setNpcs(Object.values(data).sort((a,b)=>a.id-b.id));
    });
    return()=>{clearInterval(hb);clearInterval(kickPoll);clearInterval(rollPoll);clearInterval(playerPoll);clearInterval(wrPoll);unA();unC();unN();document.removeEventListener("click",onActivity);document.removeEventListener("keydown",onActivity);};
  },[phase,name]);

  const hChar=fn=>{setChar(prev=>{const u=typeof fn==="function"?fn(prev):fn;clearTimeout(cst.current);cst.current=setTimeout(()=>fbSet(`chars/${name}`,u),400);return u;});};

  const onPipChange=async(playerName,field,val)=>{
    if(playerName===name){
      hChar(c=>({...c,[field]:val}));
    } else {
      const cur=all.find(p=>p.name===playerName);
      const updated={...((cur&&cur.char)||{}), [field]:val};
      await fbSet(`chars/${playerName}`,updated);
    }
  };

  const onNpcPipChange=async(npcId,field,val)=>{
    const updated=npcs.map(n=>n.id===npcId?{...n,[field]:val}:n);
    setNpcs(updated);
    const o={};updated.forEach(n=>{o[n.id]=n;});
    await fbSet("npcs",o);
  };

  const onRoll=async({sides,raw,modifier,total,skillName})=>{
    const id=ts();
    const entry={id,player:name,sides,raw,modifier,total,time:id,skillName:skillName||null};
    setRolls(r=>({latest:entry,feed:[entry,...r.feed].slice(0,12),akey:id}));
    lastRid.current=id;
    await fbSet(`rolls/${id}`,entry);
    const all2=await fbGet("rolls");
    if(all2){const keys=Object.keys(all2).sort((a,b)=>Number(a)-Number(b));if(keys.length>30)for(const k of keys.slice(0,keys.length-30))await fbDel(`rolls/${k}`);}
  };

  const uploadAvatar=async(b64)=>{
    setAvatars(a=>({...a,[name]:b64}));
    await fbSet(`avatars/${name}`,b64);
  };

  const clearRolls=async()=>{
    setRolls({latest:null,feed:[],akey:0});
    lastRid.current=0;
    await fbDel("rolls");
  };

  const TABS=role==="dm"
    ?[{id:"dice",l:"🎲 Zar"},{id:"char",l:"📜 Karakterler"},{id:"npc",l:"⚔ NPC Yönet"},{id:"map",l:"⚔ Arena"},{id:"wait",l:"🏠 Bekleme Odası"}]
    :[{id:"dice",l:"🎲 Zar"},{id:"char",l:"📜 Karakter"},{id:"npc",l:"⚔ NPC'ler"},{id:"map",l:"⚔ Arena"},...(waitRoomActive?[{id:"wait",l:"🏠 Bekleme Odası"}]:[])];

  if(phase==="lobby"){
    return <LobbyScreen role={role} setRole={setRole} dmPass={dmPass} setDmPass={setDmPass} dmErr={dmErr} setDmErr={setDmErr} setName={setName} setPhase={setPhase}/>;
  }


  return <div>
    <div className="hdr">
      <div className="htitle">TAVERN ROLL</div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div className="huser"><span className="pd"/><strong>{name}</strong>{role==="dm"?" · DM":""}</div>
        <button className="gear-btn" onClick={()=>setShowSettings(s=>!s)} title="Ayarlar">⚙</button>
      </div>
    </div>
    {showSettings&&<SettingsPanel onClose={()=>setShowSettings(false)} darkness={darkness} setDarkness={setDarkness} animOn={animOn} setAnimOn={setAnimOn} onLogout={()=>{
      // Firebase'den çıkış
      fbDel(`players/${name}`);
      // Session sıfırla
      window.sessionStorage.clear();
      setPhase("lobby");setName("");setRole("player");setShowSettings(false);
    }}/>}
    <div className="ob">
      <span className="ol">Çevrimiçi</span>
      {all.map(p=><span key={p.name} className={`op${p.role==="dm"?" dm":p.away?" away":""}`}><span className={`pd${p.away?" away":""}`} style={{width:5,height:5}}/>{p.name}{p.role==="dm"?" 👁":p.away?" 💤":""}</span>)}
      {!all.length&&<span style={{fontSize:".72rem",color:"rgba(var(--text-rgb,245,230,200),.25)",fontStyle:"italic"}}>bağlanıyor...</span>}
    </div>
    
    <div className="tabs">
      {TABS.map(t=><button key={t.id} className={`tb${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
    </div>
    {tab==="dice"&&<Dice me={name} role={role} char={char} npcs={npcs} all={all} rolls={rolls} onRoll={onRoll} animOn={animOn} avatars={avatars} onPipChange={onPipChange} onNpcPipChange={onNpcPipChange}/>}
    {tab==="char"&&<Char me={name} isDM={role==="dm"} char={char} setChar={hChar} all={all} avatars={avatars} onUploadAvatar={uploadAvatar}/>}
    {tab==="npc" &&<Npc isDM={role==="dm"} npcs={npcs} setNpcs={setNpcs} onClearRolls={clearRolls} allPlayers={all}/>}
    {tab==="map" &&<Arena me={name} isDM={role==="dm"} avatars={avatars} all={all} npcs={npcs} rolls={rolls} onRoll={onRoll} char={char}/>}
    {tab==="wait"&&<WaitingRoom me={name} all={all} isDM={role==="dm"} avatars={avatars}/>}
    <Chat me={name} role={role} all={all} avatars={avatars}/>
    <Ambiance isDM={role==="dm"}/>
    {role!=="dm"&&<FloatingNotebook me={name} isDM={false} charName={char.name||name}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
